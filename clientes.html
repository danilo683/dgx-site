<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Área do Cliente — DGX Consulting</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;700;900&family=Barlow+Condensed:wght@600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#0D1B2E;--navy2:#0A1525;--navy3:#111f35;
  --cyan:#00AEEF;--cyan-dark:#0090C8;
  --white:#FFFFFF;--gray:#8BA0B0;--gray2:#c5d3dc;
}
html,body{min-height:100vh}
body{font-family:'Barlow',sans-serif;background:var(--navy2);color:var(--white)}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 3rem;background:rgba(10,21,37,0.98);border-bottom:1px solid rgba(0,174,239,0.15)}
.nav-logo img{height:40px;display:block}
.nav-back{display:inline-flex;align-items:center;gap:.5rem;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);text-decoration:none;transition:color .2s}
.nav-back::before{content:'←';font-size:.9rem}
.nav-back:hover{color:var(--cyan)}

/* LOGIN */
.login-wrap{min-height:calc(100vh - 65px);display:flex;align-items:center;justify-content:center;padding:2rem}
.login-box{background:var(--navy3);border:1px solid rgba(0,174,239,0.15);padding:3rem 2.5rem;width:100%;max-width:420px}
.login-label{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem}
.login-label span{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;color:var(--cyan)}
.login-label::before{content:'';display:block;width:28px;height:2px;background:var(--cyan);flex-shrink:0}
.login-title{font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:700;text-transform:uppercase;color:var(--white);line-height:1.1;margin-bottom:.5rem}
.login-title em{color:var(--cyan);font-style:normal}
.login-sub{font-size:.85rem;color:var(--gray);margin-bottom:2rem;line-height:1.6}
.form-group{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.25rem}
.form-label{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--cyan)}
.form-input{background:rgba(255,255,255,0.03);border:1px solid rgba(0,174,239,0.15);border-bottom:1px solid rgba(0,174,239,0.3);color:var(--white);padding:.75rem .9rem;font-family:'Barlow',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;width:100%}
.form-input:focus{border-color:var(--cyan)}
.form-input::placeholder{color:rgba(139,160,176,0.4)}
.form-btn{width:100%;background:var(--cyan);color:var(--navy2);border:none;padding:.9rem;font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:background .2s;margin-top:.5rem}
.form-btn:hover{background:var(--cyan-dark)}
.form-btn:disabled{opacity:.5;cursor:not-allowed}
.error-msg{background:rgba(255,90,90,0.1);border:1px solid rgba(255,90,90,0.3);color:#FF5A5A;padding:.75rem 1rem;font-size:.82rem;margin-bottom:1rem;display:none}

/* DASHBOARD CLIENTE (PJ) */
.dash-wrap{min-height:calc(100vh - 65px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 2rem}
.dash-header{text-align:center;margin-bottom:3rem}
.dash-label{display:flex;align-items:center;justify-content:center;gap:.75rem;margin-bottom:1rem}
.dash-label span{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;color:var(--cyan)}
.dash-label::before,.dash-label::after{content:'';display:block;width:28px;height:2px;background:var(--cyan)}
.dash-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(1.8rem,3vw,2.4rem);font-weight:700;text-transform:uppercase;color:var(--white);margin-bottom:.5rem}
.dash-title em{color:var(--cyan);font-style:normal}
.dash-sub{font-size:.875rem;color:var(--gray2)}
.dash-grid{display:grid;grid-template-columns:1fr;max-width:380px;width:100%}
.dash-card{background:var(--navy3);border:1px solid rgba(0,174,239,0.12);padding:3rem 2rem;display:flex;align-items:center;justify-content:center;min-height:160px;cursor:pointer;transition:background .25s;text-decoration:none;position:relative}
.dash-card:hover{background:#152236}
.dash-card img{max-height:56px;max-width:160px;object-fit:contain;opacity:.85;transition:opacity .2s}
.dash-card:hover img{opacity:1}
.dash-card .card-label{position:absolute;bottom:.75rem;left:0;right:0;text-align:center;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(0,174,239,0.4)}
.dash-logout{margin-top:2rem;font-size:.75rem;color:var(--gray);cursor:pointer;letter-spacing:.08em;text-transform:uppercase;background:none;border:none;text-decoration:underline;transition:color .2s}
.dash-logout:hover{color:var(--cyan)}

/* Loading */
.loading-screen{min-height:calc(100vh - 65px);display:flex;align-items:center;justify-content:center}
.spinner{width:36px;height:36px;border:3px solid rgba(0,174,239,.2);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.hidden{display:none!important}
</style>
</head>
<body>

<nav>
  <div class="nav-logo"><img src="logo-dgx.png" alt="DGX Consulting"></div>
  <a href="index.html" class="nav-back">Voltar ao site</a>
</nav>

<!-- LOADING -->
<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
</div>

<!-- LOGIN -->
<div class="login-wrap hidden" id="loginScreen">
  <div class="login-box">
    <div class="login-label"><span>Área do Cliente</span></div>
    <h1 class="login-title">Acesse seu<br><em>Dashboard</em></h1>
    <p class="login-sub">Entre com suas credenciais para acessar os relatórios e indicadores da sua empresa.</p>
    <div class="error-msg" id="errorMsg"></div>
    <div class="form-group">
      <label class="form-label">E-mail</label>
      <input type="email" class="form-input" id="emailInput" placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Senha</label>
      <input type="password" class="form-input" id="senhaInput" placeholder="••••••••">
    </div>
    <button class="form-btn" id="loginBtn">Entrar</button>
  </div>
</div>

<!-- DASHBOARD CLIENTE PJ -->
<div class="dash-wrap hidden" id="dashCliente">
  <div class="dash-header">
    <div class="dash-label"><span>Área do Cliente</span></div>
    <h2 class="dash-title">Seu <em>Dashboard</em></h2>
    <p class="dash-sub" id="clienteNome"></p>
  </div>
  <div class="dash-grid">
    <a href="#" class="dash-card" id="clienteCard">
      <img src="" alt="" id="clienteLogo">
      <span class="card-label">Acessar Dashboard</span>
    </a>
  </div>
  <button class="dash-logout" onclick="fazerLogout()">Sair da conta</button>
</div>

<script>
const SUPABASE_URL = 'https://mixsehmmwvrbpndavvhp.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1peHNlaG1td3ZyYnBuZGF2dmhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MDU4NzEsImV4cCI6MjA5NzA4MTg3MX0.h03aDgCiHpH975ZEC0j8A0BnSNdVANoru6ii4rjVjJw';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const DASHBOARDS = {
  hawks: { logo: 'logo-hawks.png', url: 'hawks.html', nome: 'Hawks Beauty' },
  fnyx:  { logo: 'logo-fnyx.png',  url: 'fnyx.html',  nome: 'FNYX Cosmetics' },
  oak:   { logo: 'logo-oak.png',   url: '#',           nome: 'Oak & Co.' },
  mp:    { logo: 'logo-mp.png',    url: '#',           nome: 'MP Prudente' },
};

function mostrar(id) {
  ['loadingScreen','loginScreen','dashCliente'].forEach(s =>
    document.getElementById(s).classList.add('hidden')
  );
  document.getElementById(id).classList.remove('hidden');
}

async function init() {
  mostrar('loadingScreen');
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { mostrar('loginScreen'); return; }
  await rotear(session.user);
}

async function rotear(user) {
  const { data: profile } = await sb.from('profiles')
    .select('nome, tipo, dashboard, is_admin')
    .eq('id', user.id).single();

  if (!profile) { mostrar('loginScreen'); return; }

  // Admin → vai para admin.html
  if (profile.is_admin || profile.tipo === 'admin') {
    window.location.href = 'admin.html';
    return;
  }

  // PJ → card do dashboard
  if (profile.tipo === 'PJ' && profile.dashboard && DASHBOARDS[profile.dashboard]) {
    const dash = DASHBOARDS[profile.dashboard];
    document.getElementById('clienteNome').textContent = `Bem-vindo, ${profile.nome || user.email}`;
    document.getElementById('clienteLogo').src = dash.logo;
    document.getElementById('clienteLogo').alt = dash.nome;
    document.getElementById('clienteCard').href = dash.url;
    mostrar('dashCliente');
    return;
  }

  // PF → portal PF
  if (profile.tipo === 'PF') {
    window.location.href = '/pf/app';
    return;
  }

  mostrar('loginScreen');
}

async function fazerLogin() {
  const email = document.getElementById('emailInput').value.trim();
  const senha = document.getElementById('senhaInput').value;
  const btn   = document.getElementById('loginBtn');
  const erro  = document.getElementById('errorMsg');

  if (!email || !senha) {
    erro.textContent = 'Preencha e-mail e senha.';
    erro.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Entrando...';
  erro.style.display = 'none';

  const { data, error } = await sb.auth.signInWithPassword({ email, password: senha });

  if (error) {
    erro.textContent = 'E-mail ou senha incorretos.';
    erro.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Entrar';
    return;
  }

  await rotear(data.user);
}

async function fazerLogout() {
  await sb.auth.signOut();
  mostrar('loginScreen');
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('loginBtn').addEventListener('click', fazerLogin);
});

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('loginScreen').classList.contains('hidden')) {
    fazerLogin();
  }
});

init();
</script>
</body>
</html>
