<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Área do Cliente — DGX Consulting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0D1B2E;--navy2:#0A1525;--navy3:#111f35;--cyan:#00AEEF;--cyan-dark:#0090C8;--white:#FFFFFF;--gray:#8BA0B0;--gray2:#c5d3dc}
html,body{height:100%}
body{font-family:'Barlow',sans-serif;background:var(--navy2);color:var(--white);display:flex;flex-direction:column;min-height:100vh}

/* NAV */
nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 2.5rem;
  background:rgba(10,21,37,0.98);
  border-bottom:1px solid rgba(0,174,239,0.15);
}
.nav-logo img{height:44px;display:block}
.nav-back{
  display:inline-flex;align-items:center;gap:.5rem;
  font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--gray);text-decoration:none;transition:color .2s;
}
.nav-back::before{content:'←';font-size:.9rem}
.nav-back:hover{color:var(--cyan)}

/* PAGE */
.page{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:4rem 2.5rem;position:relative;overflow:hidden;
}
.bg-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(0,174,239,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,174,239,0.04) 1px,transparent 1px);
  background-size:55px 55px;
}
.page-inner{position:relative;z-index:2;width:100%;max-width:700px;text-align:center}

.section-label{display:flex;align-items:center;justify-content:center;gap:.75rem;margin-bottom:1rem}
.section-label span{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;color:var(--cyan)}
.section-label::before,.section-label::after{content:'';display:block;width:28px;height:2px;background:var(--cyan);flex-shrink:0}

.page-titulo{
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(1.8rem,3.5vw,2.6rem);
  font-weight:700;text-transform:uppercase;
  color:var(--white);line-height:1.1;margin-bottom:.75rem;
}
.page-titulo em{color:var(--cyan);font-style:normal}
.page-desc{font-size:.875rem;color:var(--gray);line-height:1.8;margin-bottom:3rem}

/* GRID */
.clientes-grid{
  display:grid;grid-template-columns:repeat(2,1fr);
  gap:1px;background:rgba(0,174,239,0.12);
  margin-bottom:2.5rem;
}
.cliente-card{
  background:var(--navy3);
  padding:2.5rem 2rem;
  display:flex;align-items:center;justify-content:center;
  min-height:120px;cursor:pointer;text-decoration:none;
  position:relative;overflow:hidden;transition:background .25s;
}
.cliente-card:hover{background:#152236}
.cliente-card::after{
  content:'Acessar →';
  position:absolute;bottom:0;left:0;right:0;
  background:var(--cyan);color:var(--navy2);
  font-size:.65rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;
  padding:.4rem;text-align:center;
  transform:translateY(100%);transition:transform .25s;
  font-family:'Barlow',sans-serif;
}
.cliente-card:hover::after{transform:translateY(0)}
.logo-box{
  width:110px;height:40px;
  border:1px dashed rgba(0,174,239,0.25);
  display:flex;align-items:center;justify-content:center;
}
.logo-box span{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(0,174,239,0.35)}

.page-footer{font-size:.72rem;color:rgba(139,160,176,0.5);letter-spacing:.05em}
.page-footer a{color:rgba(0,174,239,0.4);text-decoration:none}
.page-footer a:hover{color:var(--cyan)}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <img style="height:44px;display:block" src="logo-dgx.png" alt="DGX Consulting">
  </div>
  <a href="index.html" class="nav-back">Voltar ao site</a>
</nav>

<div class="page">
  <div class="bg-grid"></div>
  <div class="page-inner">
    <div class="section-label"><span>Área do Cliente</span></div>
    <h1 class="page-titulo">Acesse seu<br><em>dashboard</em></h1>
    <p class="page-desc">Selecione sua empresa para acessar seus relatórios e indicadores financeiros.</p>

        <div class="clientes-grid">
      <a href="hawks.html" class="cliente-card">
        <img src="logo-hawks.png" alt="Hawks" style="max-height:44px;max-width:120px;object-fit:contain;opacity:.85;transition:opacity .2s" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='.85'">
      </a>
      <a href="#" class="cliente-card">
        <img src="logo-oak.png" alt="Oak & Co." style="max-height:44px;max-width:120px;object-fit:contain;opacity:.85;transition:opacity .2s" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='.85'">
      </a>
      <a href="#" class="cliente-card">
        <img src="logo-mp.png" alt="MP Prudente" style="max-height:44px;max-width:120px;object-fit:contain;opacity:.85;transition:opacity .2s" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='.85'">
      </a>
      <a href="fnyx.html" class="cliente-card">
        <img src="logo-fnyx.png" alt="FNYX Cosmetics" style="max-height:44px;max-width:120px;object-fit:contain;opacity:.85;transition:opacity .2s" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='.85'">
      </a>
    </div>

    <p class="page-footer">Problemas de acesso? <a href="mailto:danilo@dgxconsultoria.com.br">Entre em contato</a></p>
  </div>
</div>

</body>
</html>
