<!-- SCRIPT LANÇAMENTO — adicionar ao <script> principal -->
<script id="lanc-script">
// ============================================================
// LANÇAMENTO DE DADOS — admin.html
// ============================================================

function lancamentoCarregar() {
  const mes = document.getElementById('lanc-mes').value;
  if (!mes) return;
  const cliente = document.getElementById('lanc-cliente').value;
  const comp = mes + '-01';
  lancCarregarModulo('vendas', cliente, comp);
  lancCarregarModulo('margem', cliente, comp);
  lancCarregarModulo('dre', cliente, comp);
  lancCarregarModulo('dfc', cliente, comp);
}

function lancTab(nome, el) {
  document.querySelectorAll('.lanc-modulo').forEach(m => m.style.display = 'none');
  document.querySelectorAll('.lanc-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('lanc-' + nome).style.display = '';
  el.classList.add('active');
}

async function lancCarregarModulo(modulo, clienteId, comp) {
  const sb = window.supabaseClient;
  const tabela = 'dash_' + modulo;
  const { data } = await sb.from(tabela).select('*').eq('cliente_id', clienteId).eq('competencia', comp).single();
  if (!data) return;

  if (modulo === 'vendas') {
    setV('v-canal-salao',     data.canal_salao);
    setV('v-canal-loja',      data.canal_loja);
    setV('v-canal-func',      data.canal_func);
    setV('v-canal-perfumaria',data.canal_perfumaria);
    setV('v-canal-outros',    data.canal_outros);
    setV('v-cat-homecare',    data.cat_homecare);
    setV('v-cat-profissional',data.cat_profissional);
    setV('v-cat-coloracao',   data.cat_coloracao);
    setV('v-cat-tratamento',  data.cat_tratamento);
    setV('v-cat-quimica',     data.cat_quimica);
    setV('v-cat-outros',      data.cat_outros);
    setV('v-vol-salao',       data.vol_salao);
    setV('v-vol-loja',        data.vol_loja);
    setV('v-vol-func',        data.vol_func);
    setV('v-vol-total',       data.vol_total);
  } else if (modulo === 'margem') {
    setV('m-rec-bruta',     data.receita_bruta);
    setV('m-rec-liq',       data.receita_liquida);
    setV('m-cmv-bruto',     data.cmv_bruto);
    setV('m-politica',      data.politica_comercial);
    setV('m-cmv-liq',       data.cmv_liquido);
    setV('m-margem-bruta',  data.margem_bruta);
  } else if (modulo === 'dre') {
    setV('d-rec-bruta',   data.rec_bruta);
    setV('d-devolucoes',  data.dev_devolucoes);
    setV('d-imp-vendas',  data.imp_vendas);
    setV('d-cmv',         data.cmv);
    setV('d-pessoal',     data.desp_pessoal);
    setV('d-prolabore',   data.desp_prolabore);
    setV('d-mkt',         data.desp_mkt);
    setV('d-comissoes',   data.desp_comissoes);
    setV('d-logistica',   data.desp_logistica);
    setV('d-ocupacao',    data.desp_ocupacao);
    setV('d-gerais',      data.desp_gerais);
    setV('d-terceiros',   data.desp_terceiros);
    setV('d-impostos',    data.desp_impostos);
    setV('d-rec-financ',  data.rec_financ);
    setV('d-desp-financ', data.desp_financ);
  } else if (modulo === 'dfc') {
    setV('f-caixa-ini',       data.caixa_inicial);
    setV('f-rec-vendas',      data.rec_vendas);
    setV('f-emprestimos',     data.emprestimos);
    setV('f-ent-invest',      data.ent_invest);
    setV('f-pgto-truss',      data.pgto_truss);
    setV('f-pgto-nao-truss',  data.pgto_nao_truss);
    setV('f-pgto-pessoal',    data.pgto_pessoal);
    setV('f-pgto-prolabore',  data.pgto_prolabore);
    setV('f-pgto-mkt',        data.pgto_mkt);
    setV('f-pgto-comissoes',  data.pgto_comissoes);
    setV('f-pgto-logistica',  data.pgto_logistica);
    setV('f-pgto-ocupacao',   data.pgto_ocupacao);
    setV('f-pgto-gerais',     data.pgto_gerais);
    setV('f-pgto-terceiros',  data.pgto_terceiros);
    setV('f-pgto-impostos',   data.pgto_impostos);
    setV('f-sai-invest',      data.sai_invest);
    setV('f-pgto-financ',     data.pgto_financ);
  }
}

function setV(id, val) {
  const el = document.getElementById(id);
  if (el && val !== null && val !== undefined) el.value = val;
}
function gV(id) { return parseFloat(document.getElementById(id)?.value) || 0; }

async function lancSalvar(modulo) {
  const sb = window.supabaseClient;
  const clienteId = document.getElementById('lanc-cliente').value;
  const mes = document.getElementById('lanc-mes').value;
  if (!mes) { alert('Selecione o mês.'); return; }
  const comp = mes + '-01';
  const statusEl = document.getElementById('lanc-' + modulo + '-status');
  statusEl.textContent = 'Salvando...';
  statusEl.className = 'lanc-status';

  let payload = { cliente_id: clienteId, competencia: comp, updated_at: new Date().toISOString() };

  if (modulo === 'vendas') {
    Object.assign(payload, {
      canal_salao: gV('v-canal-salao'), canal_loja: gV('v-canal-loja'),
      canal_func: gV('v-canal-func'), canal_perfumaria: gV('v-canal-perfumaria'),
      canal_outros: gV('v-canal-outros'), cat_homecare: gV('v-cat-homecare'),
      cat_profissional: gV('v-cat-profissional'), cat_coloracao: gV('v-cat-coloracao'),
      cat_tratamento: gV('v-cat-tratamento'), cat_quimica: gV('v-cat-quimica'),
      cat_outros: gV('v-cat-outros'), vol_salao: gV('v-vol-salao'),
      vol_loja: gV('v-vol-loja'), vol_func: gV('v-vol-func'), vol_total: gV('v-vol-total')
    });
  } else if (modulo === 'margem') {
    Object.assign(payload, {
      receita_bruta: gV('m-rec-bruta'), receita_liquida: gV('m-rec-liq'),
      cmv_bruto: gV('m-cmv-bruto'), politica_comercial: gV('m-politica'),
      cmv_liquido: gV('m-cmv-liq'), margem_bruta: gV('m-margem-bruta')
    });
  } else if (modulo === 'dre') {
    Object.assign(payload, {
      rec_bruta: gV('d-rec-bruta'), dev_devolucoes: gV('d-devolucoes'),
      imp_vendas: gV('d-imp-vendas'), cmv: gV('d-cmv'),
      desp_pessoal: gV('d-pessoal'), desp_prolabore: gV('d-prolabore'),
      desp_mkt: gV('d-mkt'), desp_comissoes: gV('d-comissoes'),
      desp_logistica: gV('d-logistica'), desp_ocupacao: gV('d-ocupacao'),
      desp_gerais: gV('d-gerais'), desp_terceiros: gV('d-terceiros'),
      desp_impostos: gV('d-impostos'), rec_financ: gV('d-rec-financ'),
      desp_financ: gV('d-desp-financ')
    });
  } else if (modulo === 'dfc') {
    Object.assign(payload, {
      caixa_inicial: gV('f-caixa-ini'), rec_vendas: gV('f-rec-vendas'),
      emprestimos: gV('f-emprestimos'), ent_invest: gV('f-ent-invest'),
      pgto_truss: gV('f-pgto-truss'), pgto_nao_truss: gV('f-pgto-nao-truss'),
      pgto_pessoal: gV('f-pgto-pessoal'), pgto_prolabore: gV('f-pgto-prolabore'),
      pgto_mkt: gV('f-pgto-mkt'), pgto_comissoes: gV('f-pgto-comissoes'),
      pgto_logistica: gV('f-pgto-logistica'), pgto_ocupacao: gV('f-pgto-ocupacao'),
      pgto_gerais: gV('f-pgto-gerais'), pgto_terceiros: gV('f-pgto-terceiros'),
      pgto_impostos: gV('f-pgto-impostos'), sai_invest: gV('f-sai-invest'),
      pgto_financ: gV('f-pgto-financ')
    });
  }

  const tabela = 'dash_' + modulo;
  const { error } = await sb.from(tabela).upsert(payload, { onConflict: 'cliente_id,competencia' });

  if (error) {
    statusEl.textContent = 'Erro: ' + error.message;
    statusEl.className = 'lanc-status erro';
  } else {
    statusEl.textContent = '✓ Salvo com sucesso';
    statusEl.className = 'lanc-status';
    setTimeout(() => statusEl.textContent = '', 3000);
  }
}

// Inicializar com mês atual
(function() {
  const hoje = new Date();
  const mesAtual = hoje.toISOString().slice(0, 7);
  const el = document.getElementById('lanc-mes');
  if (el) el.value = mesAtual;
})();
</script>
