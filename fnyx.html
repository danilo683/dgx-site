<script>
var sb=supabase.createClient('https://mixsehmmwvrbpndavvhp.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1peHNlaG1td3ZyYnBuZGF2dmhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MDU4NzEsImV4cCI6MjA5NzA4MTg3MX0.h03aDgCiHpH975ZEC0j8A0BnSNdVANoru6ii4rjVjJw');

// ── VENDAS/MARGEM/DRE — agora vêm da base única (fato_vendas) ──
var V={meses:['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'],
  canal:{salao:[],perfumaria:[],outros:[]},
  cat:{homecare:[],coloracao:[],tratamento:[],outros:[]},
  volTotal:[]};
var DRE_TOPLINE = { meses:[] };   // Receita Bruta -> Margem Bruta (mesma base do Margem)

var FV_FNYX = [];
var TOP_PRODUTOS = [];
var VENDEDORES_DISPONIVEIS = [];
var filtroVendedorAtual = 'todos';
var filtroCanalAtual = 'todos';

function nf(v){return v!==null&&v!==undefined?parseFloat(v):0;}
function semAcento(s){ return (s||'').toString().toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }

// Tipologia real da Fnyx: SALÃO / PERFUMARIA-LOJA-COSMÉTICO / OUTROS
function normTipologia(t){
  var s = semAcento(t);
  if (s.indexOf('SALAO') >= 0) return 'salao';
  if (s.indexOf('PERFUMARIA') >= 0 || s.indexOf('LOJA') >= 0) return 'perfumaria';
  return 'outros';
}
// Grupo real da Fnyx tem muitas subcategorias — agrupamos nos 4 baldes do dashboard
function normGrupo(g){
  var s = semAcento(g);
  if (s.indexOf('HOME') >= 0) return 'homecare';
  if (s.indexOf('COLORA') >= 0) return 'coloracao';
  if (s.indexOf('TRATAMENTO') >= 0) return 'tratamento';
  return 'outros'; // Tonalizante, Matizador, Água Oxigenada, Pó Descolorante, Revolution, Linha Profissional, Miracle, Queratina, Mask, Cursos...
}

async function fetchFatoVendas(clienteId){
  var all = [], from = 0, pageSize = 1000;
  while (true) {
    var res = await sb.from('fato_vendas')
      .select('competencia,tipo_operacao,tipologia,grupo,vendedor,sku,produto,qtd,valor_liquido,desconto,cmv_total,reembolso_total,margem')
      .eq('cliente_id', clienteId)
      .range(from, from + pageSize - 1);
    if (res.error) { console.error('fetchFatoVendas', res.error); break; }
    var data = res.data;
    if (!data || !data.length) break;
    all = all.concat(data);
    if (data.length < pageSize) break;
    from += pageSize;
  }
  return all;
}

// Agrega item-a-item em canal/categoria/volume por mês + ranking de produtos.
// Considera só tipo_operacao = 'venda' (bonificações e devoluções ficam fora
// das métricas comerciais de Vendas, mesmo critério usado na Hawks).
function agregarFatoVendas(rows, filtroVendedor, filtroCanal){
  var canal = { salao:Array(12).fill(null), perfumaria:Array(12).fill(null), outros:Array(12).fill(null) };
  var cat   = { homecare:Array(12).fill(null), coloracao:Array(12).fill(null), tratamento:Array(12).fill(null), outros:Array(12).fill(null) };
  var volTotal = Array(12).fill(null);
  var produtosMap = {};
  var vendedoresSet = {};

  rows.forEach(function(r){
    if (r.tipo_operacao !== 'venda') return;
    if (r.vendedor) vendedoresSet[r.vendedor] = true;
    if (filtroVendedor !== 'todos' && r.vendedor !== filtroVendedor) return;
    var c = normTipologia(r.tipologia);
    if (filtroCanal !== 'todos' && c !== filtroCanal) return;
    var mi = parseInt(r.competencia.split('-')[1], 10) - 1;
    if (mi < 0 || mi > 11) return;
    var val = parseFloat(r.valor_liquido) || 0;
    var qtd = parseFloat(r.qtd) || 0;

    canal[c][mi] = (canal[c][mi] || 0) + val;
    volTotal[mi] = (volTotal[mi] || 0) + qtd;

    var g = normGrupo(r.grupo);
    cat[g][mi] = (cat[g][mi] || 0) + val;

    var sku = r.sku || '(sem SKU)';
    if (!produtosMap[sku]) produtosMap[sku] = { produto: r.produto || sku, qtd:0, valor:0, cmv:0 };
    produtosMap[sku].qtd += qtd;
    produtosMap[sku].valor += val;
    produtosMap[sku].cmv += (parseFloat(r.cmv_total) || 0);
  });

  var topProdutos = Object.keys(produtosMap).map(function(k){
    var p = produtosMap[k];
    return { sku:k, produto:p.produto, qtd:p.qtd, valor:p.valor, margem: p.valor ? (p.valor - p.cmv) / p.valor : null };
  }).sort(function(a,b){ return b.valor - a.valor; }).slice(0, 10);

  return { canal:canal, cat:cat, volTotal:volTotal, topProdutos:topProdutos, vendedores: Object.keys(vendedoresSet).sort() };
}

// DRE/Margem — replica exatamente as fórmulas da aba TOP Line da Fnyx
// (validado célula a célula contra a fórmula original do Excel):
//   Receita Bruta      = SUM(valor_liquido, venda) + SUM(desconto, venda)
//   Descontos/Abatim.  = -(SUM(desconto, venda) + SUM(cmv_total, bonificação))
//   Trocas/Devoluções  = SUM(valor_liquido, devolução)  [já vem negativo na origem]
//   Receita Líquida    = Receita Bruta + Descontos + Trocas
//   Custo Produto      = -(SUM(cmv_total, venda) + SUM(cmv_total, devolução))
//   Política Comercial = SUM(reembolso_total, venda)  [só "venda", diferente da Hawks]
//   Margem Bruta       = Receita Líquida + Custo Produto + Política Comercial
// Diferente da Hawks: aqui devolução É uma devolução de venda real (cliente
// final) e por isso entra no DRE — confirmado (Razão Social = pessoa física).
function agregarDRETopline(rows){
  var porMes = {};
  rows.forEach(function(r){
    var partes = r.competencia.split('-');
    var mi = parseInt(partes[1], 10) - 1, ano = partes[0];
    var key = mi + '|' + ano;
    if (!porMes[key]) porMes[key] = { mi:mi, ano:ano, volume:0, recLiqVenda:0, descVenda:0, trocasDev:0, cmvVenda:0, cmvDev:0, cmvBonif:0, politica:0 };
    var m = porMes[key];
    if (r.tipo_operacao === 'venda' || r.tipo_operacao === 'bonificacao' || r.tipo_operacao === 'devolucao') {
      m.volume += parseFloat(r.qtd) || 0;
    }
    if (r.tipo_operacao === 'venda') {
      m.recLiqVenda += parseFloat(r.valor_liquido) || 0;
      m.descVenda += parseFloat(r.desconto) || 0;
      m.cmvVenda += parseFloat(r.cmv_total) || 0;
      m.politica += parseFloat(r.reembolso_total) || 0;
    } else if (r.tipo_operacao === 'bonificacao') {
      m.cmvBonif += parseFloat(r.cmv_total) || 0;
    } else if (r.tipo_operacao === 'devolucao') {
      m.trocasDev += parseFloat(r.valor_liquido) || 0;
      m.cmvDev += parseFloat(r.cmv_total) || 0;
    }
  });
  var chaves = Object.keys(porMes).sort(function(a,b){
    var pa = porMes[a], pb = porMes[b];
    return (pa.ano - pb.ano) || (pa.mi - pb.mi);
  });
  var MESES_L = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  var D = { meses:[], volume:[], receitaBruta:[], descontosAbatimentos:[], trocasDevolucoes:[], receitaLiquida:[], custoProduto:[], politicaComercial:[], cmvTotal:[], margemBruta:[] };
  chaves.forEach(function(k){
    var m = porMes[k];
    var receitaBruta = m.recLiqVenda + m.descVenda;
    var descontos = -(m.descVenda + m.cmvBonif);
    var trocas = m.trocasDev;
    var receitaLiquida = receitaBruta + descontos + trocas;
    var custoProduto = -(m.cmvVenda + m.cmvDev);
    var cmvTotal = custoProduto + m.politica;
    var margemBruta = receitaLiquida + cmvTotal;
    D.meses.push(MESES_L[m.mi] + '/' + String(m.ano).slice(2));
    D.volume.push(m.volume);
    D.receitaBruta.push(receitaBruta);
    D.descontosAbatimentos.push(descontos);
    D.trocasDevolucoes.push(trocas);
    D.receitaLiquida.push(receitaLiquida);
    D.custoProduto.push(custoProduto);
    D.politicaComercial.push(m.politica);
    D.cmvTotal.push(cmvTotal);
    D.margemBruta.push(margemBruta);
  });
  return D;
}

var DD={meses:[],caixaInicial:[],recVendas:[],jurosMultas:[],outrasEntOp:[],
  pgtoTruss:[],pgtoNaoTruss:[],pgtoPessoal:[],pgtoProLabore:[],pgtoMkt:[],
  pgtoComissoes:[],pgtoLogistica:[],pgtoOcupacao:[],pgtoGerais:[],pgtoTerceiros:[],
  pgtoImpostos:[],entInvest:[],saiInvest:[],emprestimos:[],pgtoFinanc:[],
  caixaOp:[],caixaInv:[],caixaFin:[],resultado:[],caixaFinal:[]};

async function carregarDadosFnyx(){
  FV_FNYX = await fetchFatoVendas('fnyx');
  refreshVendasEMargem();

  const{data:dfc}=await sb.from('dash_dfc').select('*').eq('cliente_id','fnyx').order('competencia',{ascending:true});
  if(dfc&&dfc.length){
    Object.keys(DD).forEach(k=>DD[k]=[]);
    const ML=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    function lbl(d){var p=d.split('-');return ML[parseInt(p[1],10)-1]+'/'+p[0].slice(2);}
    dfc.forEach(function(r){
      DD.meses.push(lbl(r.competencia));
      DD.caixaInicial.push(nf(r.caixa_inicial)); DD.recVendas.push(nf(r.rec_vendas));
      DD.jurosMultas.push(0); DD.outrasEntOp.push(0);
      DD.pgtoTruss.push(nf(r.pgto_truss)); DD.pgtoNaoTruss.push(nf(r.pgto_nao_truss));
      DD.pgtoPessoal.push(nf(r.pgto_pessoal)); DD.pgtoProLabore.push(nf(r.pgto_prolabore));
      DD.pgtoMkt.push(nf(r.pgto_mkt)); DD.pgtoComissoes.push(nf(r.pgto_comissoes));
      DD.pgtoLogistica.push(nf(r.pgto_logistica)); DD.pgtoOcupacao.push(nf(r.pgto_ocupacao));
      DD.pgtoGerais.push(nf(r.pgto_gerais)); DD.pgtoTerceiros.push(nf(r.pgto_terceiros));
      DD.pgtoImpostos.push(nf(r.pgto_impostos));
      DD.entInvest.push(nf(r.ent_invest)); DD.saiInvest.push(nf(r.sai_invest));
      DD.emprestimos.push(nf(r.emprestimos)); DD.pgtoFinanc.push(nf(r.pgto_financ));
      var fcOp=nf(r.rec_vendas)+nf(r.pgto_truss)+nf(r.pgto_nao_truss)+nf(r.pgto_pessoal)+nf(r.pgto_prolabore)+nf(r.pgto_mkt)+nf(r.pgto_comissoes)+nf(r.pgto_logistica)+nf(r.pgto_ocupacao)+nf(r.pgto_gerais)+nf(r.pgto_terceiros)+nf(r.pgto_impostos);
      var fcInv=nf(r.ent_invest)+nf(r.sai_invest);
      var fcFin=nf(r.emprestimos)+nf(r.pgto_financ);
      DD.caixaOp.push(fcOp); DD.caixaInv.push(fcInv); DD.caixaFin.push(fcFin);
      DD.resultado.push(fcOp+fcInv+fcFin);
      DD.caixaFinal.push(nf(r.caixa_inicial)+fcOp+fcInv+fcFin);
    });
    if(dfc.length>1) periods.dfc = DD.meses[0] + ' \u2013 ' + DD.meses[DD.meses.length-1];
  }
}

function margemHTML(){
  var D = DRE_TOPLINE;
  if (!D.meses.length) return '<div style="padding:2rem;color:#8BA0B0;text-align:center">Nenhum dado de vendas importado ainda.</div>';
  var totRB=D.receitaBruta.reduce(function(a,b){return a+b;},0);
  var totCMV=D.cmvTotal.reduce(function(a,b){return a+b;},0);
  var totMB=D.margemBruta.reduce(function(a,b){return a+b;},0);
  var avgMg=totRB?(totMB/totRB*100).toFixed(1):'0';

  return'<div class="mg-kpi-grid"><div class="mg-kpi"><div class="mg-kpi-label">Receita Bruta acum.</div><div class="mg-kpi-value">'+fK(totRB)+'</div><div class="mg-kpi-sub">'+periods.margem+'</div></div><div class="mg-kpi" style="border-left-color:#c0392b"><div class="mg-kpi-label">CMV l\u00edquido acum.</div><div class="mg-kpi-value" style="color:#c0392b">'+fK(totCMV)+'</div><div class="mg-kpi-sub">Ap\u00f3s pol\u00edtica comercial</div></div><div class="mg-kpi" style="border-left-color:#006d8f"><div class="mg-kpi-label">Margem Bruta acum.</div><div class="mg-kpi-value" style="color:#006d8f">'+fK(totMB)+'</div><div class="mg-kpi-sub">Rec. Bruta + CMV liq.</div></div><div class="mg-kpi" style="border-left-color:#006d8f"><div class="mg-kpi-label">% Margem Bruta m\u00e9dia</div><div class="mg-kpi-value" style="color:#006d8f">'+avgMg+'%</div><div class="mg-kpi-sub">M\u00e9dia do per\u00edodo</div></div><div class="mg-kpi" style="border-left-color:#00B4D8"><div class="mg-kpi-label">Markup m\u00e9dio</div><div class="mg-kpi-value" style="color:#00B4D8">'+markup+'x</div><div class="mg-kpi-sub">1 \u00f7 (1 \u2212 margem)</div></div></div>'
  +'<div class="chart-card"><div class="chart-title">Receita Bruta, CMV e Margem Bruta — m\u00eas a m\u00eas</div><div class="chart-sub">Barras: Rec. Bruta (azul) e CMV l\u00edquido (vermelho) · Linha verde: % Margem Bruta</div><div class="legend"><span class="leg"><span class="leg-dot" style="background:#00B4D8"></span>Receita Bruta</span><span class="leg"><span class="leg-dot" style="background:#c0392b"></span>CMV L\u00edquido</span><span class="leg"><span class="leg-line" style="background:#2ECC71"></span>% Margem Bruta</span></div><div style="height:300px;position:relative"><canvas id="chartMargem"></canvas></div></div>'
  +'<div class="confidential">© 2026 DGX Consulting · Uso exclusivo Fnyx Cosmetics · N\u00e3o compartilhar</div>';
}

// ============================================================
// DRE — Receita Bruta -> Margem Bruta, calculado a partir da base
// única. Despesas operacionais/EBITDA/Lucro L\u00edquido n\u00e3o constam
// na TOP Line (mesma decis\u00e3o tomada para a Hawks) — removidos por
// ora; a antiga se\u00e7\u00e3o mostrava dados de demonstra\u00e7\u00e3o, n\u00e3o reais.
// ============================================================
function fmtK(v){var a=Math.abs(v);if(a>=1e6)return(v<0?'-':'')+'R$ '+(a/1e6).toFixed(2)+'M';if(a>=1e3)return(v<0?'-':'')+'R$ '+Math.round(a/1e3)+'K';return(v<0?'-R$ ':'R$ ')+a.toLocaleString('pt-BR');}
function pct(v){return(v*100).toFixed(1)+'%';}
function dreHTML(){
  var D = DRE_TOPLINE;
  if (!D.meses.length) return '<div style="padding:2rem;color:#8BA0B0;text-align:center">Nenhum dado importado ainda para calcular o DRE.</div>';
  var n = D.meses.length;
  function fv(v){return v===0?'\u2014':fmtK(v);}
  function cls(v){return v===0?'':v>0?' class="pos"':' class="neg"';}
  function row(lbl,vals,rowcls){rowcls=rowcls||'';var tot=vals.reduce(function(a,b){return a+b;},0);
    return'<tr class="'+rowcls+'"><td>'+lbl+'</td>'+vals.map(function(v){return'<td'+cls(v)+'>'+fv(v)+'</td>';}).join('')+'<td'+cls(tot)+'>'+fv(tot)+'</td></tr>';}
  function pctRow(lbl,vals,baseVals){var tot=vals.reduce(function(a,b){return a+b;},0),totB=baseVals.reduce(function(a,b){return a+b;},0);
    return'<tr class="dre-pct"><td>'+lbl+'</td>'+vals.map(function(v,i){return'<td>'+(baseVals[i]?pct(v/baseVals[i]):'\u2014')+'</td>';}).join('')+'<td>'+(totB?pct(tot/totB):'\u2014')+'</td></tr>';}
  var totRB=D.receitaBruta.reduce(function(a,b){return a+b;},0);
  var totRL=D.receitaLiquida.reduce(function(a,b){return a+b;},0);
  var totMB=D.margemBruta.reduce(function(a,b){return a+b;},0);
  var totVol=D.volume.reduce(function(a,b){return a+b;},0);
  var h='<div class="kpi-grid">'
    +'<div class="kpi"><div class="kpi-label">Receita L\u00edquida acum.</div><div class="kpi-value">'+fmtK(totRL)+'</div><div class="kpi-sub">'+D.meses[0]+' \u2013 '+D.meses[n-1]+'</div></div>'
    +'<div class="kpi"><div class="kpi-label">Volume acum.</div><div class="kpi-value">'+Math.round(totVol).toLocaleString('pt-BR')+'</div><div class="kpi-sub">unidades (venda + bonif. + devolu\u00e7\u00e3o)</div></div>'
    +'<div class="kpi"><div class="kpi-label">Margem Bruta acum.</div><div class="kpi-value" style="color:'+(totMB>=0?'#2ECC71':'#e24b4a')+'">'+fmtK(totMB)+'</div><div class="kpi-sub">Mg. bruta: '+(totRL?(totMB/totRL*100).toFixed(1):'0')+'%</div></div>'
    +'<div class="kpi"><div class="kpi-label">Custo Produto acum.</div><div class="kpi-value" style="color:#c0392b">'+fmtK(D.custoProduto.reduce(function(a,b){return a+b;},0))+'</div><div class="kpi-sub">CMV + Pol\u00edtica Comercial</div></div>'
    +'</div>';
  h+='<div class="chart-card"><div class="chart-title">DRE (Receita Bruta \u2192 Margem Bruta) \u2014 '+D.meses[0]+' a '+D.meses[n-1]+'</div><div class="chart-sub">Calculado a partir da base \u00fanica de vendas, espelhando a l\u00f3gica da aba TOP Line. Despesas operacionais e Lucro L\u00edquido n\u00e3o constam aqui \u2014 fora do DRE por enquanto.</div></div>';
  h+='<div class="dre-outer"><table class="dre-tbl"><thead><tr><th style="min-width:240px;text-align:left">Linha</th>'+D.meses.map(function(m){return'<th>'+m+'</th>';}).join('')+'<th>Acum.</th></tr></thead><tbody>';
  h+=row('(+) Receita Bruta',D.receitaBruta);
  h+=row('(-) Descontos e Abatimentos',D.descontosAbatimentos);
  h+=row('(-) Trocas e Devolu\u00e7\u00f5es',D.trocasDevolucoes);
  h+=row('(-) Impostos sobre Vendas',D.meses.map(function(){return 0;}));
  h+=row('= Receita L\u00edquida',D.receitaLiquida,'dre-sub');
  h+=pctRow('% s/ Receita Bruta',D.receitaLiquida,D.receitaBruta);
  h+=row('(-) Custo Produto (CMV)',D.custoProduto);
  h+=row('(+) Pol\u00edtica Comercial (verbas de ciclo)',D.politicaComercial);
  h+=row('= Margem Bruta',D.margemBruta,'dre-tot');
  h+=pctRow('Margem bruta %',D.margemBruta,D.receitaLiquida);
  h+='</tbody></table></div>';
  h+='<div class="confidential">© 2026 DGX Consulting · Uso exclusivo Fnyx Cosmetics · N\u00e3o compartilhar</div>';
  return h;
}
function destroyChart(id){var c=Chart.getChart(id);if(c)c.destroy();}

function fmtDFC(v){var a=Math.abs(v);if(a>=1e6)return(v<0?'-':'')+'R$ '+(a/1e6).toFixed(2)+'M';if(a>=1e3)return(v<0?'-':'')+'R$ '+Math.round(a/1e3)+'K';return(v<0?'-R$ ':'R$ ')+a.toLocaleString('pt-BR');}
function dfcHTML(){
  if (!DD.meses.length) return '<div style="padding:2rem;color:#8BA0B0;text-align:center">Nenhum dado de DFC cadastrado (Lan\u00e7amentos).</div>';
  return'<div class="dfc-kpi-grid" id="dfc-kpis"></div><div class="dfc-chart-card"><div class="dfc-chart-title">Waterfall — Composi\u00e7\u00e3o do saldo</div><div class="dfc-chart-sub">Saldo inicial \u2192 entradas \u2192 sa\u00eddas \u2192 saldo final</div><div style="height:230px;position:relative"><canvas id="dfc-waterfall"></canvas></div></div><div class="dfc-chart-card"><div class="dfc-chart-title">Resultado l\u00edquido mensal</div><div class="dfc-chart-sub">Positivo em ciano · negativo em creme</div><div style="height:150px;position:relative"><canvas id="dfc-saldo-bar"></canvas></div></div><div class="dfc-outer"><table class="dfc-tbl" id="dfc-tabela"></table></div><div class="confidential" style="color:#4A6580">© 2026 DGX Consulting · Uso exclusivo Fnyx Cosmetics · N\u00e3o compartilhar</div>';
}
function initDFC(){renderDFCKPIs();renderDFCWaterfall();renderDFCSaldoBar();renderDFCTabela();}
function renderDFCKPIs(){var D=DD;var i=D.meses.length-1;var entTotal=D.recVendas.reduce(function(a,b){return a+b;},0)+D.emprestimos.reduce(function(a,b){return a+b;},0);var saiTotal=D.meses.map(function(_,i){return Math.abs(D.pgtoTruss[i])+Math.abs(D.pgtoNaoTruss[i])+Math.abs(D.pgtoPessoal[i])+Math.abs(D.pgtoProLabore[i])+Math.abs(D.pgtoMkt[i])+Math.abs(D.pgtoComissoes[i])+Math.abs(D.pgtoLogistica[i])+Math.abs(D.pgtoOcupacao[i])+Math.abs(D.pgtoGerais[i])+Math.abs(D.pgtoTerceiros[i])+Math.abs(D.pgtoImpostos[i])+Math.abs(D.pgtoFinanc[i]);}).reduce(function(a,b){return a+b;},0);var res=D.resultado.reduce(function(a,b){return a+b;},0);var kpis=[{label:'Total entradas',value:entTotal,sub:periods.dfc,color:'#00D4DA'},{label:'Total sa\u00eddas',value:-saiTotal,sub:periods.dfc,color:'#C8B89A'},{label:'Resultado acumulado',value:res,sub:'Varia\u00e7\u00e3o l\u00edquida',color:res>=0?'#00D4DA':'#C8B89A'},{label:'Saldo final',value:D.caixaFinal[i],sub:'Posi\u00e7\u00e3o banc\u00e1ria',color:D.caixaFinal[i]>=0?'#00D4DA':'#C8B89A'}];document.getElementById('dfc-kpis').innerHTML=kpis.map(function(k){return'<div class="dfc-kpi" style="border-left-color:'+k.color+'"><div class="dfc-kpi-label">'+k.label+'</div><div class="dfc-kpi-value" style="color:'+k.color+'">'+fmtDFC(k.value)+'</div><div class="dfc-kpi-sub">'+k.sub+'</div></div>';}).join('');}
function renderDFCWaterfall(){var D=DD,CYAN='#00D4DA',BEIGE='#C8B89A',INI='#2C6BE0',TOT='#007B80';var i=D.meses.length-1;var entOp=D.recVendas.reduce(function(a,b){return a+b;},0);var captacoes=D.emprestimos.reduce(function(a,b){return a+b;},0);var saiTruss=Math.abs(D.pgtoTruss.reduce(function(a,b){return a+b;},0))+Math.abs(D.pgtoNaoTruss.reduce(function(a,b){return a+b;},0));var saiDesp=Math.abs(D.pgtoPessoal.reduce(function(a,b){return a+b;},0))+Math.abs(D.pgtoProLabore.reduce(function(a,b){return a+b;},0))+Math.abs(D.pgtoMkt.reduce(function(a,b){return a+b;},0))+Math.abs(D.pgtoComissoes.reduce(function(a,b){return a+b;},0))+Math.abs(D.pgtoLogistica.reduce(function(a,b){return a+b;},0))+Math.abs(D.pgtoOcupacao.reduce(function(a,b){return a+b;},0))+Math.abs(D.pgtoGerais.reduce(function(a,b){return a+b;},0))+Math.abs(D.pgtoTerceiros.reduce(function(a,b){return a+b;},0));var saiImp=Math.abs(D.pgtoImpostos.reduce(function(a,b){return a+b;},0));var saiFinanc=Math.abs(D.pgtoFinanc.reduce(function(a,b){return a+b;},0));var saldoIni=D.caixaInicial[0],saldoFim=D.caixaFinal[i];var items=[{label:'Saldo inicial',value:saldoIni,type:'ini'},{label:'Rec. vendas',value:entOp,type:'pos'},{label:'Capta\u00e7\u00f5es',value:captacoes,type:'pos'},{label:'Pgto. fornec.',value:-saiTruss,type:'neg'},{label:'Desp. operac.',value:-saiDesp,type:'neg'},{label:'Impostos',value:-saiImp,type:'neg'},{label:'Financiamentos',value:-saiFinanc,type:'neg'},{label:'Saldo final',value:saldoFim,type:'tot'}];var starts=[],bars=[],colors=[],run=0;items.forEach(function(v){if(v.type==='ini'||v.type==='tot'){starts.push(0);bars.push(v.value);}else if(v.type==='pos'){starts.push(run);bars.push(v.value);}else{starts.push(run+v.value);bars.push(-v.value);}if(v.type!=='tot')run+=v.value;colors.push(v.type==='ini'?INI:v.type==='tot'?TOT:v.type==='pos'?CYAN:BEIGE);});destroyChart('dfc-waterfall');new Chart(document.getElementById('dfc-waterfall'),{type:'bar',data:{labels:items.map(function(v){return v.label;}),datasets:[{data:starts,backgroundColor:'transparent',borderColor:'transparent',stack:'s'},{data:bars,backgroundColor:colors,borderRadius:3,borderSkipped:false,stack:'s'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){if(c.datasetIndex===0)return null;return items[c.dataIndex].label+': '+fmtDFC(items[c.dataIndex].value);},filter:function(i){return i.datasetIndex===1;}}}},scales:{x:{grid:{display:false},ticks:{color:'#6B8BAA',font:{size:11}},stacked:true},y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#6B8BAA',font:{size:11},callback:function(v){return fmtDFC(v);}},stacked:true}}}});}
function renderDFCSaldoBar(){var D=DD;destroyChart('dfc-saldo-bar');new Chart(document.getElementById('dfc-saldo-bar'),{type:'bar',data:{labels:D.meses,datasets:[{label:'Resultado',data:D.resultado,backgroundColor:D.resultado.map(function(v){return v>=0?'#00D4DA':'#C8B89A';}),borderRadius:4,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#6B8BAA',font:{size:12}},border:{display:false}},y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#6B8BAA',font:{size:11},callback:function(v){return fmtDFC(v);}},border:{display:false}}}}});}
function renderDFCTabela(){var D=DD,n=D.meses.length;function fv(v){return v===0?'—':fmtDFC(v);}function tc(v){return v===0?'':v>0?' class="dfc-pos"':' class="dfc-neg"';}function row(lbl,vals,cls){cls=cls||'';var tot=vals.reduce(function(a,b){return a+b;},0);return'<tr class="'+cls+'"><td>'+lbl+'</td>'+vals.map(function(v){return'<td'+tc(v)+'>'+fv(v)+'</td>';}).join('')+'<td'+tc(tot)+'>'+fv(tot)+'</td></tr>';}var h='<thead><tr><th style="min-width:240px;text-align:left">Linha</th>'+D.meses.map(function(m){return'<th>'+m+'</th>';}).join('')+'<th>Total</th></tr></thead><tbody>';h+=row('Saldo inicial',D.caixaInicial,'dfc-ini');h+='<tr class="dfc-grp"><td colspan="'+(n+2)+'">Atividade Operacional</td></tr>';h+=row('Recebimentos de vendas',D.recVendas);h+=row('Pgto. compras Truss',D.pgtoTruss);h+=row('Pgto. fornecedores n\u00e3o Truss',D.pgtoNaoTruss);h+=row('Pgto. despesas com pessoal',D.pgtoPessoal);h+=row('Pgto. pr\u00f3-labore',D.pgtoProLabore);h+=row('Pgto. despesas comerciais (Mkt)',D.pgtoMkt);h+=row('Pgto. comiss\u00f5es',D.pgtoComissoes);h+=row('Pgto. despesas log\u00edsticas',D.pgtoLogistica);h+=row('Pgto. taxa de ocupa\u00e7\u00e3o',D.pgtoOcupacao);h+=row('Pgto. despesas gerais',D.pgtoGerais);h+=row('Servi\u00e7os de terceiros',D.pgtoTerceiros);h+=row('Pgto. impostos',D.pgtoImpostos);h+=row('= Caixa Operacional',D.caixaOp,'dfc-sub');h+='<tr class="dfc-grp"><td colspan="'+(n+2)+'">Atividade de Investimento</td></tr>';h+=row('Entradas de investimento',D.entInvest);h+=row('Sa\u00eddas de investimento (CAPEX)',D.saiInvest);h+=row('= Caixa de Investimento',D.caixaInv,'dfc-sub');h+='<tr class="dfc-grp"><td colspan="'+(n+2)+'">Atividade de Financiamento</td></tr>';h+=row('Empr\u00e9stimos tomados',D.emprestimos);h+=row('Pgto. financiamentos banc\u00e1rios',D.pgtoFinanc);h+=row('= Caixa de Financiamento',D.caixaFin,'dfc-sub');h+=row('= Resultado do m\u00eas',D.resultado,'dfc-tot');h+=row('Saldo final (banc\u00e1rio)',D.caixaFinal,'dfc-ini');h+='</tbody>';document.getElementById('dfc-tabela').innerHTML=h;}
</script>
