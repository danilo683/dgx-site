<script>
var sb=supabase.createClient('https://mixsehmmwvrbpndavvhp.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1peHNlaG1td3ZyYnBuZGF2dmhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MDU4NzEsImV4cCI6MjA5NzA4MTg3MX0.h03aDgCiHpH975ZEC0j8A0BnSNdVANoru6ii4rjVjJw');

var V={meses:['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'],
  canal:{salao:[],perfumaria:[],outros:[]},
  cat:{homecare:[],coloracao:[],tratamento:[],outros:[]},
  volTotal:[]};
var DRE_TOPLINE = { meses:[] };

var FV_FNYX = [];
var TOP_PRODUTOS = [];
var VENDEDORES_DISPONIVEIS = [];
var filtroVendedorAtual = 'todos';
var filtroCanalAtual = 'todos';

function nf(v){return v!==null&&v!==undefined?parseFloat(v):0;}
function semAcento(s){ return (s||'').toString().toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }

function normTipologia(t){
  var s = semAcento(t);
  if (s.indexOf('SALAO') >= 0) return 'salao';
  if (s.indexOf('PERFUMARIA') >= 0 || s.indexOf('LOJA') >= 0) return 'perfumaria';
  return 'outros';
}
function normGrupo(g){
  var s = semAcento(g);
  if (s.indexOf('HOME') >= 0) return 'homecare';
  if (s.indexOf('COLORA') >= 0) return 'coloracao';
  if (s.indexOf('TRATAMENTO') >= 0) return 'tratamento';
  return 'outros';
}

async function fetchFatoVendas(clienteId){
  var all = [], from = 0, pageSize = 1000;
  while (true) {
    var res = await sb.from('fato_vendas')
      .select('competencia,tipo_operacao,tipologia,grupo,vendedor,sku,produto,qtd,valor_liquido,desconto,cmv_total,reembolso_total,margem')
      .eq('cliente_id', clienteId)
      .range(from, from + pageSize - 1);
    if (res.error) { console.error('fetchFatoVendas', res.error); break; }
    var data = res.data;
    if (!data || !data.length) break;
    all = all.concat(data);
    if (data.length < pageSize) break;
    from += pageSize;
  }
  return all;
}

function agregarFatoVendas(rows, filtroVendedor, filtroCanal){
  var canal = { salao:Array(12).fill(null), perfumaria:Array(12).fill(null), outros:Array(12).fill(null) };
  var cat   = { homecare:Array(12).fill(null), coloracao:Array(12).fill(null), tratamento:Array(12).fill(null), outros:Array(12).fill(null) };
  var volTotal = Array(12).fill(null);
  var produtosMap = {};
  var vendedoresSet = {};

  rows.forEach(function(r){
    if (r.tipo_operacao !== 'venda') return;
    if (r.vendedor) vendedoresSet[r.vendedor] = true;
    if (filtroVendedor !== 'todos' && r.vendedor !== filtroVendedor) return;
    var c = normTipologia(r.tipologia);
    if (filtroCanal !== 'todos' && c !== filtroCanal) return;
    var mi = parseInt(r.competencia.split('-')[1], 10) - 1;
    if (mi < 0 || mi > 11) return;
    var val = parseFloat(r.valor_liquido) || 0;
    var qtd = parseFloat(r.qtd) || 0;

    canal[c][mi] = (canal[c][mi] || 0) + val;
    volTotal[mi] = (volTotal[mi] || 0) + qtd;

    var g = normGrupo(r.grupo);
    cat[g][mi] = (cat[g][mi] || 0) + val;

    var sku = r.sku || '(sem SKU)';
    if (!produtosMap[sku]) produtosMap[sku] = { produto: r.produto || sku, qtd:0, valor:0, cmv:0 };
    produtosMap[sku].qtd += qtd;
    produtosMap[sku].valor += val;
    produtosMap[sku].cmv += (parseFloat(r.cmv_total) || 0);
  });

  var topProdutos = Object.keys(produtosMap).map(function(k){
    var p = produtosMap[k];
    return { sku:k, produto:p.produto, qtd:p.qtd, valor:p.valor, margem: p.valor ? (p.valor - p.cmv) / p.valor : null };
  }).sort(function(a,b){ return b.valor - a.valor; }).slice(0, 10);

  return { canal:canal, cat:cat, volTotal:volTotal, topProdutos:topProdutos, vendedores: Object.keys(vendedoresSet).sort() };
}

function agregarDRETopline(rows){
  var porMes = {};
  rows.forEach(function(r){
    var partes = r.competencia.split('-');
    var mi = parseInt(partes[1], 10) - 1, ano = partes[0];
    var key = mi + '|' + ano;
    if (!porMes[key]) porMes[key] = { mi:mi, ano:ano, volume:0, recLiqVenda:0, descVenda:0, trocasDev:0, cmvVenda:0, cmvDev:0, cmvBonif:0, politica:0 };
    var m = porMes[key];
    if (r.tipo_operacao === 'venda' || r.tipo_operacao === 'bonificacao' || r.tipo_operacao === 'devolucao') {
      m.volume += parseFloat(r.qtd) || 0;
    }
    if (r.tipo_operacao === 'venda') {
      m.recLiqVenda += parseFloat(r.valor_liquido) || 0;
      m.descVenda += parseFloat(r.desconto) || 0;
      m.cmvVenda += parseFloat(r.cmv_total) || 0;
      m.politica += parseFloat(r.reembolso_total) || 0;
    } else if (r.tipo_operacao === 'bonificacao') {
      m.cmvBonif += parseFloat(r.cmv_total) || 0;
    } else if (r.tipo_operacao === 'devolucao') {
      m.trocasDev += parseFloat(r.valor_liquido) || 0;
      m.cmvDev += parseFloat(r.cmv_total) || 0;
    }
  });
  var chaves = Object.keys(porMes).sort(function(a,b){
    var pa = porMes[a], pb = porMes[b];
    return (pa.ano - pb.ano) || (pa.mi - pb.mi);
  });
  var MESES_L = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  var D = { meses:[], volume:[], receitaBruta:[], descontosAbatimentos:[], trocasDevolucoes:[], receitaLiquida:[], custoProduto:[], politicaComercial:[], cmvTotal:[], margemBruta:[] };
  chaves.forEach(function(k){
    var m = porMes[k];
    var receitaBruta = m.recLiqVenda + m.descVenda;
    var descontos = -(m.descVenda + m.cmvBonif);
    var trocas = m.trocasDev;
    var receitaLiquida = receitaBruta + descontos + trocas;
    var custoProduto = -(m.cmvVenda + m.cmvDev);
    var cmvTotal = custoProduto + m.politica;
    var margemBruta = receitaLiquida + cmvTotal;
    D.meses.push(MESES_L[m.mi] + '/' + String(m.ano).slice(2));
    D.volume.push(m.volume);
    D.receitaBruta.push(receitaBruta);
    D.descontosAbatimentos.push(descontos);
    D.trocasDevolucoes.push(trocas);
    D.receitaLiquida.push(receitaLiquida);
    D.custoProduto.push(custoProduto);
    D.politicaComercial.push(m.politica);
    D.cmvTotal.push(cmvTotal);
    D.margemBruta.push(margemBruta);
  });
  return D;
}

var DD={meses:[],caixaInicial:[],recVendas:[],jurosMultas:[],outrasEntOp:[],
  pgtoTruss:[],pgtoNaoTruss:[],pgtoPessoal:[],pgtoProLabore:[],pgtoMkt:[],
  pgtoComissoes:[],pgtoLogistica:[],pgtoOcupacao:[],pgtoGerais:[],pgtoTerceiros:[],
  pgtoImpostos:[],entInvest:[],saiInvest:[],emprestimos:[],pgtoFinanc:[],
  caixaOp:[],caixaInv:[],caixaFin:[],resultado:[],caixaFinal:[]};

async function carregarDadosFnyx(){
  FV_FNYX = await fetchFatoVendas('fnyx');
  refreshVendasEMargem();

  const{data:dfc}=await sb.from('dash_dfc').select('*').eq('cliente_id','fnyx').order('competencia',{ascending:true});
  if(dfc&&dfc.length){
    Object.keys(DD).forEach(k=>DD[k]=[]);
    const ML=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    function lbl(d){var p=d.split('-');return ML[parseInt(p[1],10)-1]+'/'+p[0].slice(2);}
    dfc.forEach(function(r){
      DD.meses.push(lbl(r.competencia));
      DD.caixaInicial.push(nf(r.caixa_inicial)); DD.recVendas.push(nf(r.rec_vendas));
      DD.jurosMultas.push(0); DD.outrasEntOp.push(0);
      DD.pgtoTruss.push(nf(r.pgto_truss)); DD.pgtoNaoTruss.push(nf(r.pgto_nao_truss));
      DD.pgtoPessoal.push(nf(r.pgto_pessoal)); DD.pgtoProLabore.push(nf(r.pgto_prolabore));
      DD.pgtoMkt.push(nf(r.pgto_mkt)); DD.pgtoComissoes.push(nf(r.pgto_comissoes));
      DD.pgtoLogistica.push(nf(r.pgto_logistica)); DD.pgtoOcupacao.push(nf(r.pgto_ocupacao));
      DD.pgtoGerais.push(nf(r.pgto_gerais)); DD.pgtoTerceiros.push(nf(r.pgto_terceiros));
      DD.pgtoImpostos.push(nf(r.pgto_impostos));
      DD.entInvest.push(nf(r.ent_invest)); DD.saiInvest.push(nf(r.sai_invest));
      DD.emprestimos.push(nf(r.emprestimos)); DD.pgtoFinanc.push(nf(r.pgto_financ));
      var fcOp=nf(r.rec_vendas)+nf(r.pgto_truss)+nf(r.pgto_nao_truss)+nf(r.pgto_pessoal)+nf(r.pgto_prolabore)+nf(r.pgto_mkt)+nf(r.pgto_comissoes)+nf(r.pgto_logistica)+nf(r.pgto_ocupacao)+nf(r.pgto_gerais)+nf(r.pgto_terceiros)+nf(r.pgto_impostos);
      var fcInv=nf(r.ent_invest)+nf(r.sai_invest);
      var fcFin=nf(r.emprestimos)+nf(r.pgto_financ);
      DD.caixaOp.push(fcOp); DD.caixaInv.push(fcInv); DD.caixaFin.push(fcFin);
      DD.resultado.push(fcOp+fcInv+fcFin);
      DD.caixaFinal.push(nf(r.caixa_inicial)+fcOp+fcInv+fcFin);
    });
    if(dfc.length>1) periods.dfc = DD.meses[0] + ' \u2013 ' + DD.meses[DD.meses.length-1];
  }
}

function labelMesChave(key){

  var MESES_LABELS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return MESES_LABELS[mi] + '/' + p[0].slice(2);
}

function calcularBridgeMargem(deKey, paraKey){
  var GRUPOS = ['homecare','coloracao','tratamento','outros'];
  function vazio(){ return { q:0, receita:0, custoProduto:0, politica:0 }; }
  var acc = {}; acc[deKey]={}; acc[paraKey]={};
  GRUPOS.forEach(function(g){ acc[deKey][g]=vazio(); acc[paraKey][g]=vazio(); });

  FV_FNYX.forEach(function(r){
    var key = r.competencia ? r.competencia.slice(0,7) : null;
    if (key !== deKey && key !== paraKey) return;
    var g = normGrupo(r.grupo);
    if (!acc[key][g]) acc[key][g] = vazio();
    if (r.tipo_operacao === 'venda' || r.tipo_operacao === 'devolucao') {
      acc[key][g].q += parseFloat(r.qtd) || 0;
      acc[key][g].receita += parseFloat(r.valor_liquido) || 0;
      acc[key][g].custoProduto += parseFloat(r.cmv_total) || 0;
    }
    // Política Comercial soma reembolso_total só das linhas de venda,
    // mesmo critério usado em agregarDRETopline para o Fnyx.
    if (r.tipo_operacao === 'venda') {
      acc[key][g].politica += parseFloat(r.reembolso_total) || 0;
    }
  });

  function montar(obj){
    var out = {};
    GRUPOS.forEach(function(g){
      var d = obj[g];
      var custoLiquido = d.custoProduto - d.politica;
      var p = d.q ? d.receita/d.q : 0;
      var c = d.q ? custoLiquido/d.q : 0;
      out[g] = { q:d.q, receita:d.receita, custoLiquido:custoLiquido, p:p, c:c, m:p-c };
    });
    return out;
  }
  var D0 = montar(acc[deKey]), D1 = montar(acc[paraKey]);
  var Q0 = GRUPOS.reduce(function(a,g){return a+D0[g].q;},0);
  var Q1 = GRUPOS.reduce(function(a,g){return a+D1[g].q;},0);
  var RL0 = GRUPOS.reduce(function(a,g){return a+D0[g].receita;},0);
  var RL1 = GRUPOS.reduce(function(a,g){return a+D1[g].receita;},0);
  var Margem0 = GRUPOS.reduce(function(a,g){return a+D0[g].q*D0[g].m;},0);
  var Margem1 = GRUPOS.reduce(function(a,g){return a+D1[g].q*D1[g].m;},0);

  var volEfeito=0, mixEfeito=0, precoEfeito=0, custoEfeito=0;
  GRUPOS.forEach(function(g){
    var w0 = Q0 ? D0[g].q/Q0 : 0;
    var w1 = Q1 ? D1[g].q/Q1 : 0;
    volEfeito += (Q1-Q0) * w0 * D0[g].m;
    mixEfeito += Q1 * (w1-w0) * D0[g].m;
    precoEfeito += D1[g].q * (D1[g].p - D0[g].p);
    custoEfeito += -D1[g].q * (D1[g].c - D0[g].c);
  });

  var margemPct0 = RL0 ? Margem0/RL0*100 : 0;
  var margemPct1 = RL1 ? Margem1/RL1*100 : 0;
  var escalaPP = RL1 && RL0 ? (Margem0/RL1*100 - Margem0/RL0*100) : 0;
  var volPP = RL1 ? volEfeito/RL1*100 : 0;
  var mixPP = RL1 ? mixEfeito/RL1*100 : 0;
  var precoPP = RL1 ? precoEfeito/RL1*100 : 0;
  var custoPP = RL1 ? custoEfeito/RL1*100 : 0;

  var drivers = GRUPOS.map(function(g){
    var d0=D0[g], d1=D1[g];
    return {
      grupo:g, q0:d0.q, q1:d1.q, receita0:d0.receita, receita1:d1.receita,
      margemPct0: d0.receita ? ((d0.receita-d0.custoLiquido)/d0.receita*100) : null,
      margemPct1: d1.receita ? ((d1.receita-d1.custoLiquido)/d1.receita*100) : null,
      deltaMargemR$: (d1.q*d1.m) - (d0.q*d0.m)
    };
  });

  return {
    de:deKey, para:paraKey, RL0:RL0, RL1:RL1, Margem0:Margem0, Margem1:Margem1,
    margemPct0:margemPct0, margemPct1:margemPct1,
    efeitos:{escala:escalaPP, volume:volPP, mix:mixPP, preco:precoPP, custo:custoPP},
    drivers: drivers
  };
}

function bridgeTabelaHTML(res){
  var GRUPO_ORDEM = ['homecare','coloracao','tratamento','outros'];
  var fR2=function(v){return'R$ '+(Math.abs(v)>=1000000?(v/1000000).toFixed(2)+'M':Math.round(v/1000).toLocaleString('pt-BR')+'K');};
  var rows = GRUPO_ORDEM.map(function(g){
    var d = res.drivers.filter(function(x){return x.grupo===g;})[0];
    if (!d || (!d.q0 && !d.q1)) return '';
    var mg0 = d.margemPct0!==null ? d.margemPct0.toFixed(1)+'%' : '\u2014';
    var mg1 = d.margemPct1!==null ? d.margemPct1.toFixed(1)+'%' : '\u2014';
    return '<tr><td>'+GRUPO_LABELS[g]+'</td><td>'+Math.round(d.q0).toLocaleString('pt-BR')+' \u2192 '+Math.round(d.q1).toLocaleString('pt-BR')+'</td>'
      +'<td>'+fR2(d.receita0)+' \u2192 '+fR2(d.receita1)+'</td>'
      +'<td>'+mg0+' \u2192 '+mg1+'</td>'
      +'<td'+(d.deltaMargemR$>=0?' class="pos"':' class="neg"')+'>'+(d.deltaMargemR$>=0?'+':'')+fR2(d.deltaMargemR$)+'</td></tr>';
  }).join('');
  return '<div style="overflow-x:auto;margin-top:10px"><table class="dre-tbl"><thead><tr>'
    +'<th style="text-align:left">Categoria</th><th>Volume (unid.)</th><th>Receita L\u00edq.</th><th>% Margem</th><th>Contribui\u00e7\u00e3o \u0394 Margem</th>'
    +'</tr></thead><tbody>'+rows+'</tbody></table></div>';
}

function renderBridgeMargem(){
  var de = bridgeState.de, para = bridgeState.para;
  if (!de || !para) return;
  var res = calcularBridgeMargem(de, para);
  var canvas = document.getElementById('chartBridgeMargem');
  if (!canvas) return;
  var existing = Chart.getChart('chartBridgeMargem'); if (existing) existing.destroy();

  var bData = [
    {label:labelMesChave(de)+' ('+res.margemPct0.toFixed(1)+'%)', value:res.margemPct0, type:'ini'},
    {label:'Efeito Escala (Receita)', value:res.efeitos.escala, type: res.efeitos.escala>=0?'pos':'neg'},
    {label:'Efeito Volume', value:res.efeitos.volume, type: res.efeitos.volume>=0?'pos':'neg'},
    {label:'Efeito Mix', value:res.efeitos.mix, type: res.efeitos.mix>=0?'pos':'neg'},
    {label:'Efeito Pre\u00e7o', value:res.efeitos.preco, type: res.efeitos.preco>=0?'pos':'neg'},
    {label:'Efeito Custo', value:res.efeitos.custo, type: res.efeitos.custo>=0?'pos':'neg'},
    {label:labelMesChave(para)+' ('+res.margemPct1.toFixed(1)+'%)', value:res.margemPct1, type:'tot'}
  ];
  var starts=[], bars=[], colors=[], run=res.margemPct0;
  bData.forEach(function(v){
    if (v.type==='ini' || v.type==='tot') { starts.push(0); bars.push(v.value); }
    else if (v.type==='pos') { starts.push(run); bars.push(v.value); run+=v.value; }
    else { starts.push(run+v.value); bars.push(-v.value); run+=v.value; }
    colors.push(v.type==='ini'?'#1E2D40':v.type==='tot'?'#007B80':v.type==='pos'?'#2ECC71':'#C8B89A');
  });
  new Chart(canvas,{type:'bar',data:{labels:bData.map(function(v){return v.label;}),datasets:[
    {data:starts,backgroundColor:'transparent',borderColor:'transparent',stack:'s'},
    {data:bars,backgroundColor:colors,borderRadius:4,borderSkipped:false,stack:'s'}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){if(c.datasetIndex===0)return null;var v=bData[c.dataIndex].value;return bData[c.dataIndex].label+': '+(v>=0?'+':'')+v.toFixed(2)+' p.p.';},filter:function(i){return i.datasetIndex===1;}}}},scales:{x:{grid:{display:false},ticks:{color:'#6B8BAA',font:{size:10}},stacked:true},y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#6B8BAA',callback:function(v){return v.toFixed(0)+'%';}},stacked:true}}}});

  document.getElementById('bridgeMargemTabela').innerHTML = bridgeTabelaHTML(res);
}

function despValores(l, nMeses){
  if (DESPESAS_DADOS[l.codigo]) return DESPESAS_DADOS[l.codigo];
  if (l.filhos && l.filhos.length) {
    var acc = Array(nMeses).fill(0);
    l.filhos.forEach(function(f){
      despValores(f, nMeses).forEach(function(v,i){ acc[i]+=v; });
    });
    return acc;
  }
  return Array(nMeses).fill(0);
}
function despFmt(v){
  if (!v && v!==0) return '\u2014';
  if (v===0) return '\u2014';
  var s = 'R$ ' + Math.abs(Math.round(v)).toLocaleString('pt-BR');
  return v<0 ? '('+s+')' : s;
}
function despLinhaHTML(l, nivel, nMeses, rl, rlTotal){
  var vals = despValores(l, nMeses);
  var tot = vals.reduce(function(a,b){return a+b;},0);
  var temFilhos = !!(l.filhos && l.filhos.length);
  var aberto = !!despesasAbertos[l.codigo];
  var rowCls = l.resultado ? 'dre-tot' : (temFilhos ? 'qd-grupo' : '');
  var onclick = temFilhos ? ' onclick="toggleDespesa(\''+l.codigo+'\')"' : '';
  var caret = temFilhos ? '<span class="qd-caret'+(aberto?' open':'')+'">\u25b8</span>' : '';
  var cod = l.resultado ? '' : '<span class="qd-codigo">'+l.codigo+'</span>';
  var h = '<tr class="'+rowCls+'"'+onclick+'><td style="padding-left:'+(12+nivel*18)+'px">'+caret+cod+l.nome+'</td>';
  vals.forEach(function(v){
    h += '<td'+(v===0?' class="qd-zero"':'')+'>'+despFmt(v)+'</td>';
  });
  var pctTot = (rlTotal && tot!==0) ? (tot/rlTotal*100).toFixed(1)+'%' : '\u2014';
  h += '<td'+(tot===0?' class="qd-zero"':'')+'>'+despFmt(tot)+'</td>';
  h += '<td'+(tot===0?' class="qd-zero"':'')+' style="font-size:10px;color:#6B8BAA">'+pctTot+'</td></tr>';
  if (temFilhos && aberto) {
    l.filhos.forEach(function(f){ h += despLinhaHTML(f, nivel+1, nMeses, rl, rlTotal); });
  }
  return h;
}

    + '<div class="chart-sub" style="margin-bottom:0">Blocos 2 a 5: Custos, Despesas Vari\u00e1veis, Despesas Fixas e Resultado Financeiro \u00b7 clique nos grupos para expandir</div>'

function rerenderQuadroDespesas(){
  var el = document.getElementById('quadroDespesas');

function toggleDespesa(codigo){
  despesasAbertos[codigo] = !despesasAbertos[codigo];

}
function despesasExpandir(abrir){
  function walk(ls){ ls.forEach(function(l){ if(l.filhos){ despesasAbertos[l.codigo]=abrir; walk(l.filhos); } }); }
  ESTRUTURA_DESPESAS.forEach(function(b){ walk(b.linhas); });
  if (!abrir) despesasAbertos = {};
  rerenderQuadroDespesas();
}
