  var el = document.getElementById('fin-grafico-wrap');
  if (el) el.outerHTML = renderGraficoFinanceiro(estado.meuClube);
}

function _renderGraficoSVG(clube) {
  var dados = _montarDadosGrafico(clube);
  if (!dados || dados.length === 0) {
    return '<div class="dash-empty" style="height:200px;display:flex;align-items:center;justify-content:center">Sem dados financeiros ainda</div>';
  }

  var W = 900, H = 300, PAD_T = 20, PAD_B = 30, PAD_L = 70, PAD_R = 70;
  var innerW = W - PAD_L - PAD_R;
  var innerH = H - PAD_T - PAD_B;
  var midY = PAD_T + innerH / 2;

  // Calcular escala unificada (mesmo eixo para barras e saldo)
  var maxEntr  = Math.max.apply(null, dados.map(function(d){ return d.entrada || 0; }));
  var maxSaid  = Math.max.apply(null, dados.map(function(d){ return d.saida  || 0; }));
  var saldos   = dados.map(function(d){ return d.saldo || 0; });
  var maxSaldo = Math.max.apply(null, saldos);
  var maxVal   = Math.max(maxEntr, maxSaid, maxSaldo * 0.3, 1); // saldo no mesmo eixo
  var halfH    = innerH / 2;
  // Saldo usa o mesmo eixo que as barras (escala = maxVal)
  var minSaldo = 0; var rangeSaldo = Math.max(maxVal, 1);

  var n = dados.length;
  var barW = Math.max(4, Math.floor((innerW / n) * 0.55));
  var barGap = innerW / n;

  function fmtK(v) {
    if (Math.abs(v) >= 1000000) return 'R$ '+(v/1000000).toFixed(1)+'M';
    if (Math.abs(v) >= 1000) return 'R$ '+(v/1000).toFixed(0)+'K';
    return 'R$ '+Math.round(v);
  }

  var svg = '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block">';

  // Fundo
  svg += '<rect width="'+W+'" height="'+H+'" fill="transparent"/>';

  // Linha central (zero)
  svg += '<line x1="'+PAD_L+'" y1="'+midY+'" x2="'+(W-PAD_R)+'" y2="'+midY+'" stroke="rgba(255,255,255,.15)" stroke-width="1"/>';

  // Grades horizontais
  for (var gi = 1; gi <= 4; gi++) {
    var gyT = midY - (halfH * gi / 4);
    var gyB = midY + (halfH * gi / 4);
    var gVal = maxVal * gi / 4;
    svg += '<line x1="'+PAD_L+'" y1="'+gyT+'" x2="'+(W-PAD_R)+'" y2="'+gyT+'" stroke="rgba(255,255,255,.05)" stroke-width="1"/>';
    svg += '<line x1="'+PAD_L+'" y1="'+gyB+'" x2="'+(W-PAD_R)+'" y2="'+gyB+'" stroke="rgba(255,255,255,.05)" stroke-width="1"/>';
    // Labels eixo esquerdo (entradas cima, saídas baixo)
    svg += '<text x="'+(PAD_L-6)+'" y="'+(gyT+4)+'" text-anchor="end" fill="rgba(255,255,255,.35)" font-size="9">'+fmtK(gVal)+'</text>';
    svg += '<text x="'+(PAD_L-6)+'" y="'+(gyB+4)+'" text-anchor="end" fill="rgba(255,255,255,.35)" font-size="9">'+fmtK(gVal)+'</text>';
  }
  // Label "R$ 0"
  svg += '<text x="'+(PAD_L-6)+'" y="'+(midY+4)+'" text-anchor="end" fill="rgba(255,255,255,.4)" font-size="9">R$ 0</text>';

  // Barras e labels X
  var pontosSaldo = [];
  dados.forEach(function(d, i) {
    var cx = PAD_L + i * barGap + barGap / 2;
    var hEntr = d.entrada > 0 ? (d.entrada / maxVal) * halfH : 0;
    var hSaid = d.saida  > 0 ? (d.saida  / maxVal) * halfH : 0;
    var isProvisao = d.provisao;
    var bx = cx - barW / 2;

    // Barra entrada (sobe acima do eixo)
    if (d.entrada > 0) {
      var fillEntr = isProvisao ? 'rgba(45,212,191,.22)' : 'rgba(45,212,191,.85)';
      var strokeEntr = isProvisao ? '#2dd4bf' : 'none';
      var dashEntr = isProvisao ? 'stroke-dasharray="4,3"' : '';
      svg += '<rect x="'+bx+'" y="'+(midY-hEntr)+'" width="'+barW+'" height="'+hEntr+'" fill="'+fillEntr+'" rx="2" stroke="'+strokeEntr+'" stroke-width="'+(isProvisao?'1':'0')+'" '+dashEntr+'/>';
    }

    // Barra saída (desce abaixo do eixo)
    if (d.saida > 0) {
      var fillSaid = isProvisao ? 'rgba(245,158,11,.22)' : 'rgba(245,158,11,.85)';
      var strokeSaid = isProvisao ? '#f59e0b' : 'none';
      var dashSaid = isProvisao ? 'stroke-dasharray="4,3"' : '';
      svg += '<rect x="'+bx+'" y="'+midY+'" width="'+barW+'" height="'+hSaid+'" fill="'+fillSaid+'" rx="2" stroke="'+strokeSaid+'" stroke-width="'+(isProvisao?'1':'0')+'" '+dashSaid+'/>';
    }

    // Label X
    svg += '<text x="'+cx+'" y="'+(H-6)+'" text-anchor="middle" fill="rgba(255,255,255,.45)" font-size="9">'+d.label+'</text>';

    // Ponto do saldo
    // Saldo no mesmo eixo das barras (positivo sobe acima de midY, negativo desce)
    var sy = midY - ((d.saldo || 0) / maxVal) * halfH;
    sy = Math.max(PAD_T+4, Math.min(H-PAD_B-4, sy));
    pontosSaldo.push({ x: cx, y: sy, provisao: isProvisao });
  });

  // Linha de saldo — sempre traçada, tracejada onde é provisão
  if (pontosSaldo.length > 1) {
    // Construir path contínuo
    var pathReal = '', pathProv = '', lastX = 0, lastY = 0;
    var prevProv = pontosSaldo[0].provisao;

    // Linha completa sólida (real) e tracejada (provisão)
    var segReal = [], segProv = [];
    pontosSaldo.forEach(function(p) {
      if (!p.provisao) segReal.push(p);
      else             segProv.push(p);
    });

    // Linha sólida — todos os pontos reais
    if (segReal.length >= 2) {
      var pr = 'M'+segReal[0].x+','+segReal[0].y;
      for (var ri=1;ri<segReal.length;ri++) pr+=' L'+segReal[ri].x+','+segReal[ri].y;
      svg += '<path d="'+pr+'" fill="none" stroke="#4f8ef7" stroke-width="2"/>';
      segReal.forEach(function(p){ svg += '<circle cx="'+p.x+'" cy="'+p.y+'" r="3" fill="#4f8ef7"/>'; });
    } else if (segReal.length===1) {
      svg += '<circle cx="'+segReal[0].x+'" cy="'+segReal[0].y+'" r="3" fill="#4f8ef7"/>';
    }

    // Linha tracejada — provisões, conectando ao último ponto real
    if (segProv.length > 0) {
      var anchor = segReal.length > 0 ? segReal[segReal.length-1] : pontosSaldo[0];
      var pp = 'M'+anchor.x+','+anchor.y;
      segProv.forEach(function(p){ pp+=' L'+p.x+','+p.y; });
      svg += '<path d="'+pp+'" fill="none" stroke="#4f8ef7" stroke-width="2" stroke-dasharray="5,3" opacity=".5"/>';
      segProv.forEach(function(p){ svg += '<circle cx="'+p.x+'" cy="'+p.y+'" r="3" fill="none" stroke="#4f8ef7" stroke-width="1.5" opacity=".5"/>'; });
    }

    // Se tudo é provisão (início do jogo = jan), mostrar linha tracejada completa
    if (segReal.length === 0 && segProv.length > 1) {
      var pa = 'M'+segProv[0].x+','+segProv[0].y;
      for (var pi2=1;pi2<segProv.length;pi2++) pa+=' L'+segProv[pi2].x+','+segProv[pi2].y;
      svg += '<path d="'+pa+'" fill="none" stroke="#4f8ef7" stroke-width="2" stroke-dasharray="5,3" opacity=".5"/>';
      segProv.forEach(function(p){ svg += '<circle cx="'+p.x+'" cy="'+p.y+'" r="3" fill="none" stroke="#4f8ef7" stroke-width="1.5" opacity=".5"/>'; });
    }

    // Saldo usa mesmo eixo esquerdo — nenhum label adicional necessário
  }

  svg += '</svg>';
  return svg;
}

function _montarDadosGrafico(clube) {
  if (_graficoModo === 'mensal') {
    return _dadosMensais(clube);
  } else {
    return _dadosAnuais(clube);
  }
}

function _dadosMensais(clube) {
  // Dias do mês selecionado
  var diasNoMes = new Date(_graficoAno, _graficoMes, 0).getDate();
  var folha = clube.jogadores.reduce(function(s,j){ return s+(j.salario||0); }, 0);
  var hist = clube.financeiro ? (clube.financeiro.historico || []) : [];

  var dadosDia = [];
  var saldoAcum = clube.caixa || 0;
  // Usar calendário do jogo
  var rodadaAtual = estado.rodadaAtual || 0;
  var mesJogoAtual = Math.floor(rodadaAtual / 4); // 0=jan, 1=fev...
  var diaJogoEstimado = ((rodadaAtual % 4) / 4) * 28;

  for (var d = 1; d <= diasNoMes; d++) {
    // Dia "passado" se já foi no calendário do jogo
    var mesGrafico = _graficoMes - 1; // 0-based
    var isPassado = (mesGrafico < mesJogoAtual) ||
                    (mesGrafico === mesJogoAtual && d <= diaJogoEstimado);
    var isProvisao = !isPassado;

    // Buscar eventos reais do histórico neste dia
    var entradasDia = 0, saidasDia = 0;
    hist.forEach(function(h) {
      if (!h.data) return;
      var hd = new Date(h.data);
      if (hd.getDate()===d && hd.getMonth()===(_graficoMes-1) && hd.getFullYear()===_graficoAno) {
        if (h.tipo==='receita') entradasDia += h.valor;
        else saidasDia += Math.abs(h.valor);
      }
    });

    // Provisões: dia 10 = folha
    if (isProvisao) {
      if (d === 10) saidasDia += folha;
      // Match day: 3 jogos em casa por mês aprox
      if (d % 7 === 0) {
        if (typeof calcularMatchDay !== 'undefined') {
          entradasDia += calcularMatchDay(clube).renda * 0.15;
        }
      }
      // Sócio torcedor mensal (dia 1)
      if (d === 1 && clube.socio_torcedor) {
        entradasDia += clube.socio_torcedor.num_socios * clube.socio_torcedor.mensalidade / 30;
      }
      // Patrocínios por rodada
      if (typeof calcularPatrociniosTotal !== 'undefined') {
        entradasDia += calcularPatrociniosTotal(clube) / 4;
      }
    }

    if (entradasDia > 0 || saidasDia > 0) {
      saldoAcum += entradasDia - saidasDia;
    }

    dadosDia.push({
      label: d < 10 ? '0'+d : ''+d,
      entrada: Math.round(entradasDia),
      saida: Math.round(saidasDia),
      saldo: Math.round(saldoAcum),
      provisao: isProvisao
    });
  }

  return dadosDia;
}

function _dadosAnuais(clube) {
  var meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  var folha = clube.jogadores.reduce(function(s,j){ return s+(j.salario||0); }, 0);
  var hist = clube.financeiro ? (clube.financeiro.historico || []) : [];
  // Usar calendário do jogo: rodada 0 = jan 2026, ~4 rodadas/mês
  var rodadaJogo = estado.rodadaAtual || 0;
  var mesHoje = Math.min(Math.floor(rodadaJogo / 4), 11); // 0=jan, 1=fev...
  var anoHoje = 2026;

  // Receitas mensais estimadas
  var recSocio = clube.socio_torcedor
    ? clube.socio_torcedor.num_socios * clube.socio_torcedor.mensalidade : 0;
  var recMatchDay = typeof calcularMatchDay !== 'undefined'
    ? calcularMatchDay(clube).renda * 2 : 0;
  var recPat = typeof calcularPatrociniosTotal !== 'undefined'
    ? calcularPatrociniosTotal(clube) * 4 : 0;
  var recTV = typeof COTAS_TV !== 'undefined'
    ? (COTAS_TV[estado.minhaDivisao] || 0) : 0;

  // Pré-temporada começa em janeiro — financeiro mostra o ano todo
  var mesInicioJogo = 0; // janeiro (mostrar todos os meses desde o início)

  var saldoCaixaAtual = parseFloat(clube.caixa || clube.budget || 0) || 0;
  var dados = [];

  // Primeira passagem: construir dados de cada mês
  var saldoAcum = saldoCaixaAtual;

  // Calcular saldo estimado no início do ano projetando de trás para frente
  // Para meses futuros projeta para frente; para passados usa caixa como âncora
  var resultadoMensal = recSocio + recMatchDay + recPat - folha;

  // Fase 1: passar por todos os meses e calcular entradas/saídas
  var mesesDados = [];
  for (var m = 0; m < 12; m++) {
    var temDadosReais = false;
    var entradaReal = 0, saidaReal = 0;
    hist.forEach(function(h) {
      if (!h.data) return;
      var hd = new Date(h.data);
      if (hd.getMonth()===m && hd.getFullYear()===_graficoAno) {
        temDadosReais = true;
        if (h.tipo==='receita') entradaReal += h.valor;
        else saidaReal += Math.abs(h.valor);
      }
    });

    var antesDoInicio = (m < mesInicioJogo);
    var isProvisao = !temDadosReais;

    var entrada = 0, saida = 0;
    if (antesDoInicio) {
      // Antes do início do jogo: sem barras, linha flat no caixa
      entrada = 0; saida = 0;
    } else if (temDadosReais) {
      entrada = entradaReal; saida = saidaReal;
    } else {
      // Provisão
      entrada = recSocio + recMatchDay + recPat;
      saida   = folha;
      if (m === mesInicioJogo) entrada += recTV; // cota TV no mês de início
    }

    mesesDados.push({ m:m, entrada:entrada, saida:saida, isProvisao:isProvisao, antesDoInicio:antesDoInicio });
  }

  // Fase 2: saldo — partir do caixa atual para o mês atual
  // Projetar apenas para frente (não retroativamente para evitar saldo negativo artificial)
  var saldoPorMes = {};
  // Para meses passados (jan até mesHoje-1), usar o caixa como base fixa
  for (var mp = 0; mp < mesHoje; mp++) {
    saldoPorMes[mp] = saldoCaixaAtual; // flat — sem dados históricos reais
  }
  saldoPorMes[mesHoje] = saldoCaixaAtual;

  // Projetar para frente (meses futuros)
  for (var mf = mesHoje + 1; mf < 12; mf++) {
    var prev = saldoPorMes[mf-1];
    var d = mesesDados[mf];
    saldoPorMes[mf] = Math.round(prev + d.entrada - d.saida);
  }

  for (var m2 = 0; m2 < 12; m2++) {
    var d3 = mesesDados[m2];
    dados.push({
      label: meses[m2],
      entrada: Math.round(d3.entrada),
      saida:   Math.round(d3.saida),
      saldo:   saldoPorMes[m2] !== undefined ? saldoPorMes[m2] : saldoCaixaAtual,
      provisao: d3.isProvisao
    });
  }

  return dados;
}

<script>// ════════════════════════════════════════
// SISTEMA DE RECEITAS — v2
// TV por cota, Naming Rights, Match Day com ingresso,
// Sócio Torcedor mensal, Patrocínios de camisa e material
// ════════════════════════════════════════

// ── Cotas de TV reais (anuais) por divisão ──
var COTAS_TV = {
  serieA:     80000000,
  serieB:     15000000,
  serieC:      5000000,
  serieD:      1500000,
  paulista_a1: 8000000,
  paulista_a2: 2000000,
  paulista_a3:  500000,
  paulista_a4:  150000,
  paulista_b1:   50000
};

// ── Marcas fictícias para patrocínios ──
var MARCAS_CAMISA = [
  { nome:"Betzone",   tipo:"aposta",    base:1200000 },
  { nome:"CaféBom",   tipo:"alimentos", base:800000  },
  { nome:"TechPay",   tipo:"fintech",   base:1500000 },
  { nome:"AutoMax",   tipo:"auto",      base:900000  },
  { nome:"BancaRed",  tipo:"banco",     base:2000000 },
  { nome:"EnergaPro", tipo:"energia",   base:600000  },
  { nome:"FreshBeer", tipo:"bebidas",   base:700000  },
  { nome:"SeguroPlus",tipo:"seguros",   base:1100000 },
  { nome:"MegaCell",  tipo:"telecom",   base:1800000 },
  { nome:"VidaFarm",  tipo:"farma",     base:950000  }
];

var MARCAS_MATERIAL = [
  { nome:"Puma",    base:3000000 },
  { nome:"Umbro",   base:2000000 },
  { nome:"Topper",  base:800000  },
  { nome:"Penalty", base:600000  },
  { nome:"Kappa",   base:700000  },
  { nome:"Olympikus",base:500000 },
  { nome:"Finta",   base:400000  }
];

// ── Inicializar contratos e receitas do clube ──
function inicializarContratosClube(clube) {
  if (clube._contratosInit) return;
  clube._contratosInit = true;

  // TV — cota única no início do torneio
  if (!clube.cota_tv_paga) clube.cota_tv_paga = false;

  // Naming rights
  if (!clube.naming_rights) clube.naming_rights = null; // { marca, valor_anual, duracao, inicio_rodada }

  // Patrocínios de camisa: { frente:[], costas:[], mangas:[] }
  if (!clube.patrocinios_camisa) clube.patrocinios_camisa = { frente:[], costas:[], mangas:[] };

  // Material esportivo
  if (!clube.material_esportivo) clube.material_esportivo = null;

  // Match Day
  if (!clube.matchday) clube.matchday = {
    preco_ingresso: 60,     // R$ por ingresso
    capacidade: 15000,      // lotação base
    engajamento: 50         // % de engajamento (0-100)
  };

  // Sócio torcedor
  if (!clube.socio_torcedor) clube.socio_torcedor = {
    mensalidade: 40,        // R$ por mês
    num_socios: 2000,
    ultima_variacao: 0
  };
}

// ── Pagar cota de TV no início do torneio ──
function pagarCotaTV(clube, divisao) {
  inicializarContratosClube(clube);
  if (clube.cota_tv_paga) return 0;
  var cota = COTAS_TV[divisao] || 50000;
  clube.caixa = (clube.caixa||0) + cota;
  clube.budget = clube.caixa;
  clube.cota_tv_paga = true;
  return cota;
}

// ── Receita de Match Day ──
function calcularMatchDay(clube) {
  inicializarContratosClube(clube);
  var md = clube.matchday;
  var cap = md.capacidade || 15000;
  var preco = md.preco_ingresso || 60;
  var eng = md.engajamento || 50;

  // Público: função da confiança da torcida, engajamento e preço
  var conf = clube.confianca_torcida || 50;
  var demanda = (conf/100 * 0.5 + eng/100 * 0.5); // 0-1

  // Elasticidade: preço alto reduz público
  var precoRef = 60;
  var fatorPreco = Math.max(0.2, Math.min(1.5, Math.pow(precoRef/preco, 0.7)));

  var publico = Math.round(cap * demanda * fatorPreco);
  publico = Math.max(500, Math.min(cap, publico));

  var renda = publico * preco;
  // Camarotes: 2% do público paga 5x
  renda += Math.round(publico * 0.02 * preco * 5);

  return { publico: publico, renda: renda };
}

// ── Receita mensal sócio torcedor ──
function calcularReceitaSocio(clube) {
  inicializarContratosClube(clube);
  var st = clube.socio_torcedor;
  return st.num_socios * st.mensalidade;
}

// ── Atualizar sócios mensalmente ──
function atualizarSociosMensais(clube) {
  inicializarContratosClube(clube);
  var st = clube.socio_torcedor;
  var conf = clube.confianca_torcida || 50;

  // Variação: +5% se confiança alta, -3% se baixa, base estável
  var varPct = (conf >= 70) ? (2 + Math.random()*3) :
               (conf >= 40) ? (-1 + Math.random()*2) :
               (-5 + Math.random()*2);
  var delta = Math.round(st.num_socios * varPct/100);
  st.num_socios = Math.max(0, st.num_socios + delta);
  st.ultima_variacao = delta;

  var receita = calcularReceitaSocio(clube);
  clube.caixa = (clube.caixa||0) + receita;
  clube.budget = clube.caixa;

  // Notícia
  if (clube.id === (estado.meuClube && estado.meuClube.id)) {
    var msg = delta >= 0
      ? '🎫 Sócio Torcedor: +'+delta+' novos sócios (total: '+st.num_socios+'). Receita: '+formatarDinheiro(receita)
      : '🎫 Sócio Torcedor: '+delta+' saídas (total: '+st.num_socios+'). Receita: '+formatarDinheiro(receita);
    adicionarNoticia(msg, estado.rodadaAtual);
    if (estado.inbox) estado.inbox.push({
      id: 'socio_'+Date.now(), titulo: '📋 Relatório Sócio Torcedor',
      remetente: 'Departamento Comercial',
      texto: msg + '. Mensalidade atual: '+formatarDinheiro(st.mensalidade)+'/mês.',
      lida: false
    });
  }
  return receita;
}

// ── Receita de Naming Rights (anual) ──
function calcularNamingRightsAnual(clube) {
  inicializarContratosClube(clube);
  if (!clube.naming_rights) return 0;
  var nr = clube.naming_rights;
  if (estado.rodadaAtual > nr.inicio_rodada + nr.duracao * 38) {
    clube.naming_rights = null; // contrato expirado
    return 0;
  }
  return nr.valor_anual;
}

// ── Receita de patrocínios ──
function calcularPatrociniosTotal(clube) {
  inicializarContratosClube(clube);
  var total = 0;
  var pc = clube.patrocinios_camisa;
  ['frente','costas','mangas'].forEach(function(local) {
    (pc[local]||[]).forEach(function(p) {
      if (estado.rodadaAtual <= p.inicio_rodada + p.duracao*38) {
        total += p.valor_anual / 38; // por rodada
      }
    });
  });
  if (clube.material_esportivo) {
    var me = clube.material_esportivo;
    if (estado.rodadaAtual <= me.inicio_rodada + me.duracao*38) {
      total += me.valor_anual / 38;
    }
  }
  return total;
}

// ── Gerar proposta de Naming Rights ──
function gerarPropostaNamingRights(clube) {
  inicializarContratosClube(clube);
  if (clube.naming_rights) return null; // já tem contrato
  var cap = (clube.matchday||{}).capacidade || 15000;
  var eng = (clube.matchday||{}).engajamento || 50;
  var baseValor = Math.round(cap * 100 * (eng/100 + 0.5));
  var duracao = 1 + Math.floor(Math.random()*19); // 1-20 anos
  var marca = ['Arena','Estádio','Campo'][Math.floor(Math.random()*3)] +
              ' ' + ['Tech','Bank','Energy','Beer','Auto'][Math.floor(Math.random()*5)];
  return { marca: marca, valor_anual: baseValor, duracao: duracao };
}

// ── Gerar proposta de patrocínio de camisa ──
function gerarPropostaPatrocinio(clube, local) {
  inicializarContratosClube(clube);
  var pc = clube.patrocinios_camisa;
  var limites = { frente:5, costas:3, mangas:2 };
  if ((pc[local]||[]).length >= limites[local]) return null;

  var marca = MARCAS_CAMISA[Math.floor(Math.random()*MARCAS_CAMISA.length)];
  var div = estado.minhaDivisao || 'serieD';
  var mult = { serieA:1.0, serieB:0.4, serieC:0.15, serieD:0.05,
    paulista_a1:0.3, paulista_a2:0.1, paulista_a3:0.05, paulista_a4:0.02, paulista_b1:0.01 };
  var m = mult[div] || 0.05;
  var fatorLocal = local==='frente' ? 1.0 : local==='costas' ? 0.5 : 0.3;
  var valor = Math.round(marca.base * m * fatorLocal * (0.8 + Math.random()*0.4));
  var duracao = 1 + Math.floor(Math.random()*4); // 1-5 anos
  return { marca: marca.nome, tipo: marca.tipo, valor_anual: valor, duracao: duracao, local: local };
}

// ── Gerar proposta de material esportivo ──
function gerarPropostaMaterial(clube) {
  inicializarContratosClube(clube);
  if (clube.material_esportivo) return null;
  var marca = MARCAS_MATERIAL[Math.floor(Math.random()*MARCAS_MATERIAL.length)];
  var div = estado.minhaDivisao || 'serieD';
  var mult = { serieA:1.0, serieB:0.4, serieC:0.15, serieD:0.05,
    paulista_a1:0.3, paulista_a2:0.1, paulista_a3:0.05, paulista_a4:0.02, paulista_b1:0.01 };
  var m = mult[div] || 0.05;
  var valor = Math.round(marca.base * m * (0.8 + Math.random()*0.4));
  var duracao = 1 + Math.floor(Math.random()*4);
  return { marca: marca.nome, valor_anual: valor, duracao: duracao };
}

// ── Aceitar contratos ──
function aceitarNamingRights(proposta) {
  var clube = estado.meuClube;
  clube.naming_rights = {
    marca: proposta.marca,
    valor_anual: proposta.valor_anual,
    duracao: proposta.duracao,
    inicio_rodada: estado.rodadaAtual
  };
  // Pagar primeira parcela imediatamente
  clube.caixa = (clube.caixa||0) + proposta.valor_anual;
  clube.budget = clube.caixa;
  salvarJogo();
  adicionarNoticia('🏟 Naming Rights: '+proposta.marca+' firmou contrato de '+proposta.duracao+' anos por '+formatarDinheiro(proposta.valor_anual)+'/ano.', estado.rodadaAtual);
  renderReceitas();
}

function aceitarPatrocinioCamisa(proposta) {
  var clube = estado.meuClube;
  inicializarContratosClube(clube);
  if (!clube.patrocinios_camisa[proposta.local]) clube.patrocinios_camisa[proposta.local] = [];
  clube.patrocinios_camisa[proposta.local].push({
    marca: proposta.marca, tipo: proposta.tipo,
    valor_anual: proposta.valor_anual, duracao: proposta.duracao,
    inicio_rodada: estado.rodadaAtual
  });
  salvarJogo();
  adicionarNoticia('👕 Patrocínio: '+proposta.marca+' na '+proposta.local+' da camisa — '+formatarDinheiro(proposta.valor_anual)+'/ano por '+proposta.duracao+' anos.', estado.rodadaAtual);
  renderReceitas();
}

function aceitarMaterialEsportivo(proposta) {
  var clube = estado.meuClube;
  clube.material_esportivo = {
    marca: proposta.marca,
    valor_anual: proposta.valor_anual,
    duracao: proposta.duracao,
    inicio_rodada: estado.rodadaAtual
  };
  salvarJogo();
  adicionarNoticia('👟 Material esportivo: '+proposta.marca+' assina por '+proposta.duracao+' anos — '+formatarDinheiro(proposta.valor_anual)+'/ano.', estado.rodadaAtual);
  renderReceitas();
}

// ── Processar receitas por rodada (chamado a cada evento) ──
function processarReceitasRodada(clube, divisao, jogoEmCasa, resultadoJogo, posicaoTabela) {
  inicializarContratosClube(clube);
  var total = 0;
  var detalhes = [];
  var rod = estado.rodadaAtual;

  // 1. Cota de TV — rodada 1
  if (rod === 0 && !clube.cota_tv_paga) {
    var cota = pagarCotaTV(clube, divisao);
    if (cota > 0) {
      total += cota;
      detalhes.push({ cat:'tv', desc:'Cota de TV ('+divisao+')', valor: cota });
    }
  }

  // 2. Match Day — só jogos em casa
  if (jogoEmCasa) {
    var md = calcularMatchDay(clube);
    clube.caixa = (clube.caixa||0) + md.renda;
    clube.budget = clube.caixa;
    total += md.renda;
    detalhes.push({ cat:'matchday', desc:'Match Day ('+md.publico.toLocaleString('pt-BR')+' torcedores)', valor: md.renda });
  }

  // 3. Patrocínios (por rodada)
  var pat = calcularPatrociniosTotal(clube);
  if (pat > 0) {
    clube.caixa = (clube.caixa||0) + pat;
    clube.budget = clube.caixa;
    total += pat;
    detalhes.push({ cat:'patrocinio', desc:'Patrocínios (camisa + material)', valor: pat });
  }

  // 4. Sócio torcedor (a cada 4 rodadas = mensal)
  if (rod % 4 === 0) {
    var recSocio = atualizarSociosMensais(clube);
    total += recSocio;
    detalhes.push({ cat:'socio', desc:'Sócio Torcedor', valor: recSocio });
  }

  // 5. Naming Rights (anual = rodada 0 de cada temporada)
  if (rod % 38 === 0 && rod > 0) {
    var nr = calcularNamingRightsAnual(clube);
    if (nr > 0) {
      clube.caixa = (clube.caixa||0) + nr;
      clube.budget = clube.caixa;
      total += nr;
      detalhes.push({ cat:'naming', desc:'Naming Rights ('+clube.naming_rights.marca+')', valor: nr });
    }
  }

  // Histórico
  if (!clube.historico_receitas) clube.historico_receitas = [];
  if (detalhes.length > 0) {
    clube.historico_receitas.push({ rodada: rod, total: total, detalhes: detalhes });
    if (clube.historico_receitas.length > 38) clube.historico_receitas.shift();
  }

  return { total: total, detalhes: detalhes };
}

// ── Atualizar confiança da torcida ──
function atualizarConfiancaTorcida(clube, resultado) {
  var delta = resultado==='vitoria' ? 4 : resultado==='derrota' ? -5 : 0;
  clube.confianca_torcida = Math.max(0, Math.min(100, (clube.confianca_torcida||50) + delta));
  inicializarContratosClube(clube);
  if (resultado==='vitoria') {
    clube.metas = clube.metas || {};
    clube.metas.vitorias_seguidas = (clube.metas.vitorias_seguidas||0)+1;
    // Engajamento sobe com vitórias
    clube.matchday.engajamento = Math.min(100, clube.matchday.engajamento + 2);
  } else if (resultado==='derrota') {
    clube.metas = clube.metas || {};
    clube.metas.vitorias_seguidas = 0;
    clube.matchday.engajamento = Math.max(0, clube.matchday.engajamento - 1);
  }
}

// TELA DE RECEITAS
// ════════════════════════════════
function renderReceitas() {
  var clube = estado.meuClube;
  var div   = estado.minhaDivisao || 'serieD';
  inicializarContratosClube(clube);

  var html = '<div class="fin-tela">';
  html += '<h2 class="secao-titulo" style="margin:0 0 20px">📈 Receitas — '+clube.nome+'</h2>';

  // Tabs
  var tab = window._receitasTab || 'tv';
  var tabs = [
    {k:'tv',     label:'📺 TV & Cotas'},
    {k:'matchday',label:'🏟 Match Day'},
    {k:'socio',  label:'🎫 Sócio Torcedor'},
    {k:'naming', label:'🏷 Naming Rights'},
    {k:'patrocinio', label:'👕 Patrocínios'},
    {k:'historico',  label:'📊 Histórico'}
  ];
  html += '<div class="divisoes-tabs" style="margin-bottom:20px;flex-wrap:wrap">';
  tabs.forEach(function(t){
    html += '<button class="div-tab'+(tab===t.k?' ativo':'')+'" onclick="mudarReceitasTab(\''+t.k+'\')">'+t.label+'</button>';
  });
  html += '</div>';

  if (tab==='tv')         html += renderReceitasTV(clube, div);
  else if (tab==='matchday')   html += renderReceitasMatchDay(clube);
  else if (tab==='socio')      html += renderReceitasSocio(clube);
  else if (tab==='naming')     html += renderReceitasNaming(clube);
  else if (tab==='patrocinio') html += renderReceitasPatrocinio(clube, div);
  else if (tab==='historico')  html += renderReceitasHistorico(clube);

  html += '</div>';
  document.getElementById('main').innerHTML = html;
}

function mudarReceitasTab(t){ window._receitasTab=t; renderReceitas(); }

// ── Tab TV ──
function renderReceitasTV(clube, div) {
  var cota = COTAS_TV[div] || 50000;
  var paga = clube.cota_tv_paga;

  html += '<div class="receita-valores" style="margin-top:12px">';
  html += '<div class="receita-val-item"><span class="receita-val-label">Divisão</span><span class="receita-val">'+div+'</span></div>';
  html += '<div class="receita-val-item"><span class="receita-val-label">Cota anual</span><span class="receita-val receita-anual">'+formatarDinheiro(cota)+'</span></div>';
  html += '<div class="receita-val-item"><span class="receita-val-label">Status</span><span class="receita-val" style="color:'+(paga?'var(--green)':'var(--yellow)')+'">'+( paga?'✅ Recebida':'⏳ Aguardando início')+'</span></div>';
  html += '</div>';
  if (!paga) {
    html += '<div class="receita-info">💡 A cota será creditada automaticamente na rodada 1 do torneio.</div>';
  }
  html += '</div>';

  // Cotas de referência
  html += '<div class="fin-secao-titulo" style="margin-top:20px;margin-bottom:8px">📋 Cotas por divisão (referência)</div>';
  html += '<table class="elenco-tabela"><thead><tr><th>Divisão</th><th>Cota anual</th></tr></thead><tbody>';
  var divs = [
    ['serieA','Série A'],['serieB','Série B'],['serieC','Série C'],['serieD','Série D'],
    ['paulista_a1','Paulistão A1'],['paulista_a2','Paulistão A2'],['paulista_a3','Paulistão A3'],['paulista_b1','Bezinha']
  ];
  divs.forEach(function(d) {
    var ativo = d[0]===div?' style="background:rgba(79,142,247,.12)"':'';
    html += '<tr'+ativo+'><td>'+d[1]+'</td><td style="color:var(--green);font-weight:700">'+formatarDinheiro(COTAS_TV[d[0]]||0)+'</td></tr>';
  });
  html += '</tbody></table>';
  return html;
}

// ── Tab Match Day ──
function renderReceitasMatchDay(clube) {
  var md = clube.matchday;
  var calc = calcularMatchDay(clube);
  var html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">';

  // Card de configuração
  html += '<div class="receita-card">';
  html += '<div class="receita-card-header"><span class="receita-icon">🏟</span>';
  html += '<div><div class="receita-titulo">Bilheteria & Match Day</div>';
  html += '<div class="receita-desc">Receita por jogo em casa</div></div></div>';

      var prop = gerarPropostaPatrocinio(clube, loc.k);

        html += '<div style="margin-top:8px;padding:8px;background:rgba(79,142,247,.08);border:1px solid var(--accent);border-radius:6px;font-size:11px">';

    html += '<div class="receita-card-header"><span class="receita-icon">👟</span>';
    html += '<div><div class="receita-titulo">'+me.marca+'</div>';
    html += '<div class="receita-desc">'+me.duracao+' anos · '+(meAtivo?'Ativo':'Expirado')+'</div></div></div>';
    html += '<div style="margin-top:10px">';
    html += '<div class="receita-val-item"><span class="receita-val-label">Valor anual</span><span class="receita-val receita-anual">'+formatarDinheiro(me.valor_anual)+'</span></div>';
    html += '</div>';
  } else {
    var propMe = gerarPropostaMaterial(clube);
    html += '<div class="receita-card-header"><span class="receita-icon">👟</span>';
    html += '<div><div class="receita-titulo">Sem contrato de material</div></div></div>';
    if (propMe) {
      html += '<div style="margin-top:10px;background:rgba(79,142,247,.08);border:1px solid var(--accent);border-radius:8px;padding:10px;font-size:12px">';
      html += '<div><strong>'+propMe.marca+'</strong> — '+formatarDinheiro(propMe.valor_anual)+'/ano · '+propMe.duracao+' anos</div>';
      html += '<button class="btn-primario" style="margin-top:8px" onclick="aceitarMaterialEsportivo('+JSON.stringify(propMe)+')">✅ Aceitar</button>';
      html += '</div>';
    } else {
      html += '<div class="receita-info" style="margin-top:10px">Aguardando proposta de material esportivo.</div>';
    }
  }
  html += '</div>';
  return html;
}

// ── Tab Histórico ──
function renderReceitasHistorico(clube) {
  var hist = clube.historico_receitas || [];
  if (hist.length === 0) return '<div class="dash-empty">Nenhuma receita registrada ainda.</div>';

  var html = '<table class="elenco-tabela"><thead><tr>';
  html += '<th>Rodada</th><th>Tipo</th><th>Descrição</th><th>Valor</th>';
  html += '</tr></thead><tbody>';
  hist.slice().reverse().forEach(function(h) {
    h.detalhes.forEach(function(d) {
      var icone = d.cat==='tv'?'📺':d.cat==='matchday'?'🏟':d.cat==='socio'?'🎫':d.cat==='patrocinio'?'👕':d.cat==='naming'?'🏷':'💰';
      html += '<tr><td>Rod.'+h.rodada+'</td><td>'+icone+'</td><td>'+d.desc+'</td>';
      html += '<td style="color:var(--green);font-weight:700">'+formatarDinheiro(d.valor)+'</td></tr>';
    });
  });
  html += '</tbody></table>';
  return html;
}

}

  var v = parseInt(val);
  estado.meuClube.socio_torcedor.mensalidade = v;

}

  c: { clubes: null, resultados: [], calendario: [], rodadaAtual: 0 },
  d: { clubes: null, resultados: [], calendario: [], rodadaAtual: 0 }
};

function inicializarDivisoes() {
  var _tecIdx = 0;
  function prepararClubes(lista, overallBase, spread) {
    return lista.map(function(c) {
      var overall = overallBase - Math.floor(Math.random() * spread);
      var jogadores = gerarJogadoresFicticios(c.id, overall);
      aplicarNomesFicticios(jogadores, c.id.charCodeAt(0)*997 + c.id.charCodeAt(1)*31);
      var perfil = gerarPerfilFinanceiroGenerico(overallBase);
      var tecSeed = c.id.charCodeAt(0)*13 + c.id.charCodeAt(1)*7 + _tecIdx;
      return Object.assign({}, c, {
        jogadores: jogadores,
        caixa: perfil.caixa,
        dividas: perfil.dividas,
        budget: perfil.caixa,
        tecnico_id: "t" + (String((_tecIdx++ % 40) + 1)).padStart(2,"0"),
        tecnico_nome_ficticio: gerarNomeTecnicoFicticio(tecSeed)
      });
    });
  }

  estadoDivisoes.b.clubes = prepararClubes(CLUBES_SERIE_B, 70, 10);
  estadoDivisoes.c.clubes = prepararClubes(CLUBES_SERIE_C, 62, 8);
  estadoDivisoes.d.clubes = prepararClubes(CLUBES_SERIE_D, 55, 8);

  // Gerar calendários
  estadoDivisoes.b.calendario = gerarCalendario(estadoDivisoes.b.clubes);
  estadoDivisoes.c.calendario = gerarCalendario(estadoDivisoes.c.clubes);
  estadoDivisoes.d.calendario = gerarCalendario(estadoDivisoes.d.clubes);
}

function gerarJogadoresFicticios(clubeId, overallBase) {
  var posicoes = ["GOL","GOL","LD","LD","ZAG","ZAG","ZAG","LE","LE","VOL","VOL","VOL","MEI","MEI","MEI","ATA","ATA","ATA","ATA","ATA","MEI","VOL","ZAG","LD","LE"];
  return posicoes.map(function(pos, i) {
    var ov = Math.max(40, Math.min(85, overallBase + Math.floor(Math.random()*10) - 5));
    var nacs = ['BR','BR','BR','BR','BR','BR','BR','AR','AR','CO','UY','PT'];
    var nac = nacs[Math.floor(Math.random()*nacs.length)];
    return {
      id: clubeId + "_j" + i,
      nome: "Jogador " + (i+1),
      posicao: pos,
      overall: ov,
      nacionalidade: nac,
      stats: { jogos:0, gols:0, assistencias:0, nota_media:0 },
      valor_mercado: Math.round(ov * 8000),
      salario: Math.round(ov * 300),
      clausula_rescisoria: Math.round(ov * 20000),
      contrato_termino: 20 + Math.floor(Math.random()*18),
      fadiga: 0
    };
  });
}

// Simular todas as rodadas das divisões inferiores junto com a Série A
function simularRodadaDivisoes(rodadaIdx) {
  ["b","c","d"].forEach(function(div) {
    var est = estadoDivisoes[div];
    if (!est.clubes || rodadaIdx >= est.calendario.length) return;
    var rodada = est.calendario[rodadaIdx];
    rodada.jogos.forEach(function(jogo) {
      var m = est.clubes.find(function(c){return c.id===jogo.mandanteId;});
      var v = est.clubes.find(function(c){return c.id===jogo.visitanteId;});
      if (!m || !v) return;
      var r = simularPartidaSimples(m, v, null, null);
      est.resultados.push({
        rodada: rodadaIdx,
        mandanteId: m.id, visitanteId: v.id,
        golsMandante: r.golsMandante, golsVisitante: r.golsVisitante
      });
    });
    est.rodadaAtual = rodadaIdx + 1;
  });
}

// Promoção e rebaixamento ao fim da temporada
function processarPromocaoRebaixamento() {
  var tabelaA = calcularTabela(CLUBES, estado.resultados);
  var tabelaB = calcularTabela(estadoDivisoes.b.clubes, estadoDivisoes.b.resultados);
  var tabelaC = calcularTabela(estadoDivisoes.c.clubes, estadoDivisoes.c.resultados);
  var tabelaD = calcularTabela(estadoDivisoes.d.clubes, estadoDivisoes.d.resultados);

  var noticias = [];

  // Rebaixados da A → B (4 últimos)
  var rebaixadosA = tabelaA.slice(-4);
  var promovidos_B = tabelaB.slice(0, 4); // campeões da B sobem

  rebaixadosA.forEach(function(t) {
    var clube = CLUBES.find(function(c){return c.id===t.id;});
    if (clube) { clube.divisao = "B"; estadoDivisoes.b.clubes.push(clube); CLUBES.splice(CLUBES.indexOf(clube),1); }
    noticias.push("⬇ " + t.nome + " rebaixado para a Série B");
  });
  promovidos_B.forEach(function(t) {
    var clube = estadoDivisoes.b.clubes.find(function(c){return c.id===t.id;});
    if (clube) { clube.divisao = "A"; CLUBES.push(clube); estadoDivisoes.b.clubes.splice(estadoDivisoes.b.clubes.indexOf(clube),1); }
    noticias.push("⬆ " + t.nome + " promovido para a Série A");
  });

  // B ↔ C
  var rebaixadosB = tabelaB.slice(-4);
  var promovidosC = tabelaC.slice(0, 4);
  rebaixadosB.forEach(function(t) {
    var c = estadoDivisoes.b.clubes.find(function(x){return x.id===t.id;});
    if (c) { c.divisao="C"; estadoDivisoes.c.clubes.push(c); estadoDivisoes.b.clubes.splice(estadoDivisoes.b.clubes.indexOf(c),1); }
    noticias.push("⬇ " + t.nome + " rebaixado para a Série C");
  });
  promovidosC.forEach(function(t) {
    var c = estadoDivisoes.c.clubes.find(function(x){return x.id===t.id;});
    if (c) { c.divisao="B"; estadoDivisoes.b.clubes.push(c); estadoDivisoes.c.clubes.splice(estadoDivisoes.c.clubes.indexOf(c),1); }
    noticias.push("⬆ " + t.nome + " promovido para a Série B");
  });

  // C ↔ D
  var rebaixadosC = tabelaC.slice(-4);
  var promovidosD = tabelaD.slice(0, 4);
  rebaixadosC.forEach(function(t) {
    var c = estadoDivisoes.c.clubes.find(function(x){return x.id===t.id;});
    if (c) { c.divisao="D"; estadoDivisoes.d.clubes.push(c); estadoDivisoes.c.clubes.splice(estadoDivisoes.c.clubes.indexOf(c),1); }
    noticias.push("⬇ " + t.nome + " rebaixado para a Série D");
  });
  promovidosD.forEach(function(t) {
    var c = estadoDivisoes.d.clubes.find(function(x){return x.id===t.id;});
    if (c) { c.divisao="C"; estadoDivisoes.c.clubes.push(c); estadoDivisoes.d.clubes.splice(estadoDivisoes.d.clubes.indexOf(c),1); }
    noticias.push("⬆ " + t.nome + " promovido para a Série C");
  });

  noticias.forEach(function(n) { adicionarNoticia(n, estado.rodadaAtual); });
  return noticias;
}

// ── TELA DIVISÕES ──
function renderDivisoes() {
  var divAtiva = window._divAtiva || "A";

  var html = '<div class="divisoes-tela">';
  html += '<div class="divisoes-tabs">';
  ["A","B","C","D"].forEach(function(d) {
    html += '<button class="div-tab' + (divAtiva===d?" ativo":"") + '" onclick="mudarDivisao(\'' + d + '\')">Série ' + d + '</button>';
  });
  html += '</div>';

  var clubes, resultados, calendario, rodada;
  if (divAtiva === "A") {
    clubes = CLUBES; resultados = estado.resultados;
    calendario = estado.calendario; rodada = estado.rodadaAtual;
  } else {
    var est = estadoDivisoes[divAtiva.toLowerCase()];
    clubes = est.clubes || []; resultados = est.resultados;
    calendario = est.calendario; rodada = est.rodadaAtual;
  }

  if (!clubes || clubes.length === 0) {
    html += '<div class="dash-empty">Aguardando inicialização...</div>';
    html += '</div>';
    document.getElementById("main").innerHTML = html;
    return;
  }

  var tabela = calcularTabela(clubes, resultados);
  var meuId  = estado.meuClube.id;

  html += '<div class="divisoes-grid">';

  // Tabela classificação
  html += '<div class="div-tabela-wrap">';
  html += '<div class="fin-secao-titulo">Classificação — Série ' + divAtiva + '</div>';
  html += '<table class="elenco-tabela">';
  html += '<thead><tr><th>#</th><th>Clube</th><th>Pts</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>SG</th></tr></thead><tbody>';

  tabela.forEach(function(t, i) {
    var pos = i + 1;
    var cls = t.id === meuId ? " mini-tab-eu" : "";
    var zonaCor = pos <= 4 ? "color:var(--green)" : pos > tabela.length - 4 ? "color:var(--red)" : "";
    html += '<tr class="' + cls + '">';
    html += '<td class="td-pos" style="' + zonaCor + '">' + pos + '</td>';
    html += '<td><span class="escudo-mini" style="background:' + t.cor + '">' + t.sigla + '</span>' + t.nome + '</td>';
    html += '<td class="td-pts">' + t.pts + '</td>';
    html += '<td>' + t.j + '</td><td>' + t.v + '</td><td>' + t.e + '</td><td>' + t.d + '</td>';
    html += '<td>' + t.gp + '</td><td>' + t.gc + '</td>';
    html += '<td>' + (t.sg > 0 ? "+" + t.sg : t.sg) + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  html += '<div style="font-size:11px;color:var(--text2);margin-top:8px">🟢 Top 4 = promoção · 🔴 Últimos 4 = rebaixamento</div>';
  html += '</div>';

  // Últimos resultados da rodada atual
  html += '<div class="div-resultados">';
  html += '<div class="fin-secao-titulo">Rodada ' + rodada + ' — Resultados</div>';
  if (rodada === 0) {
    html += '<div class="dash-empty">Nenhuma rodada simulada ainda.</div>';
  } else {
    var ultRodada = rodada - 1;
    var jogosRodada = calendario[ultRodada] ? calendario[ultRodada].jogos : [];
    jogosRodada.forEach(function(jogo) {
      var res = resultados.find(function(r) {
        return r.rodada === ultRodada && r.mandanteId === jogo.mandanteId && r.visitanteId === jogo.visitanteId;
      });
      var m = clubes.find(function(c){return c.id===jogo.mandanteId;});
      var v = clubes.find(function(c){return c.id===jogo.visitanteId;});
      if (!m || !v) return;
      html += '<div class="resultado-item" style="font-size:12px">';
      html += '<span class="res-time">' + m.nome + '</span>';
      if (res) html += '<span class="res-placar">' + res.golsMandante + ' – ' + res.golsVisitante + '</span>';
      else html += '<span class="res-placar" style="color:var(--text2)">vs</span>';
      html += '<span class="res-time direita">' + v.nome + '</span>';
      html += '</div>';
    });
  }
  html += '</div>';

  html += '</div>'; // divisoes-grid
  html += '</div>'; // divisoes-tela
  document.getElementById("main").innerHTML = html;
}

function mudarDivisao(div) {
  window._divAtiva = div;
  renderDivisoes();
}
</script>
<script>// ════════════════════════════════════════
// SISTEMA DE TORNEIOS
// ════════════════════════════════════════

var estadoTorneios = {
  copaBrasil:    null,
  libertadores:  null,
  mundial:       null,
  estaduais:     null
};

// ── Utilitários ──
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function simularJogoTorneio(mandante, visitante) {
  var tecM = TECNICOS_DISPONIVEIS.find(function(t){return t.id===mandante.tecnico_id;});
  var tecV = TECNICOS_DISPONIVEIS.find(function(t){return t.id===visitante.tecnico_id;});
  var r = simularPartidaSimples(mandante, visitante, tecM, tecV);
  return { gM: r.golsMandante, gV: r.golsVisitante };
}

function clubePorId(id) {
  var c = CLUBES.find(function(x){return x.id===id;});
  if (c) return c;
  c = (estadoDivisoes.b.clubes||[]).find(function(x){return x.id===id;});
  if (c) return c;
  c = (estadoDivisoes.c.clubes||[]).find(function(x){return x.id===id;});
  if (c) return c;
  c = (estadoDivisoes.d.clubes||[]).find(function(x){return x.id===id;});
  return c || null;
}

// ════════════════════════════════════════
// COPA DO BRASIL
// ════════════════════════════════════════
function inicializarCopaBrasil() {
  // 64 clubes: 20 Série A + 20 B + 20 C + 4 D
  var participantes = shuffle(
    CLUBES.slice().concat(
      (estadoDivisoes.b.clubes||[]).slice(),
      (estadoDivisoes.c.clubes||[]).slice(),
      (estadoDivisoes.d.clubes||[]).slice(0,4)
    )
  ).slice(0, 64);

  estadoTorneios.copaBrasil = {
    nome: "Copa do Brasil",
    icone: "🏆",
    participantes: participantes.map(function(c){return c.id;}),
    fases: ["1ª Rodada","Oitavas","Quartas","Semifinal","Final"],
    faseAtual: 0,
    jogos: [], // { fase, mandanteId, visitanteId, gM, gV, simulado }
    eliminados: [],
    campeao: null,
    rodadaInicio: 3
  };

  gerarFaseCopa(0, participantes.map(function(c){return c.id;}));
}

function gerarFaseCopa(faseIdx, clubesRestantes) {
  var cb = estadoTorneios.copaBrasil;
  var emb = shuffle(clubesRestantes);
  for (var i = 0; i < emb.length; i += 2) {
    if (i+1 >= emb.length) break;
    cb.jogos.push({ fase: faseIdx, mandanteId: emb[i], visitanteId: emb[i+1], gM:null, gV:null, simulado:false });
  }
}

function simularFaseCopa(faseIdx) {
  var cb = estadoTorneios.copaBrasil;
  var meuId = estado.meuClube.id;
  var classificados = [];
  var jogosRodada = cb.jogos.filter(function(j){return j.fase===faseIdx && !j.simulado;});

  jogosRodada.forEach(function(jogo) {
    if (jogo.simulado) return;
    var m = clubePorId(jogo.mandanteId);
    var v = clubePorId(jogo.visitanteId);
    if (!m || !v) return;

    var ehMeu = jogo.mandanteId === meuId || jogo.visitanteId === meuId;

    if (ehMeu) {
      // Vai para tela de jogo ao vivo — registrar como pendente
      cb.jogoPendente = jogo;
      return;
    }

    var r = simularJogoTorneio(m, v);
    jogo.gM = r.gM; jogo.gV = r.gV; jogo.simulado = true;

    // Em caso de empate, pênaltis (50/50)
    if (r.gM === r.gV) {
      jogo.penaltis = Math.random() > 0.5 ? "mandante" : "visitante";
    }

    var vencedor = r.gM > r.gV ? jogo.mandanteId :
                   r.gM < r.gV ? jogo.visitanteId :
                   (jogo.penaltis === "mandante" ? jogo.mandanteId : jogo.visitanteId);

    classificados.push(vencedor);
    cb.eliminados.push(r.gM > r.gV ? jogo.visitanteId : jogo.mandanteId);

    adicionarNoticia("🏆 Copa BR · " + (m.sigla||m.nome) + " " + r.gM + "x" + r.gV + " " + (v.sigla||v.nome), estado.rodadaAtual);
  });

  return classificados;
}

function avancarFaseCopa() {
  var cb = estadoTorneios.copaBrasil;
  if (!cb || cb.campeao) return;

  var fase = cb.faseAtual;
  var classificados = simularFaseCopa(fase);

  // Se ainda tem jogo pendente (meu time), aguardar
  if (cb.jogoPendente && !cb.jogoPendente.simulado) return;

  // Adicionar meu resultado se estava pendente
  if (cb.jogoPendente && cb.jogoPendente.simulado) {
    var jp = cb.jogoPendente;
    var meuId = estado.meuClube.id;
    var venc = jp.gM > jp.gV ? jp.mandanteId :
               jp.gM < jp.gV ? jp.visitanteId :
               (jp.penaltis === "mandante" ? jp.mandanteId : jp.visitanteId);
    classificados.push(venc);
    cb.eliminados.push(venc === jp.mandanteId ? jp.visitanteId : jp.mandanteId);
    cb.jogoPendente = null;
  }

  if (classificados.length === 1) {
    cb.campeao = classificados[0];
    var camp = clubePorId(cb.campeao);
    adicionarNoticia("🏆 " + (camp?camp.nome:"?") + " é CAMPEÃO da Copa do Brasil!", estado.rodadaAtual);
    if (cb.campeao === estado.meuClube.id) {
      estado.manager.titulos = (estado.manager.titulos||0) + 1;
      estado.inbox.push({ id:"titulo_copa_"+Date.now(), titulo:"🏆 CAMPEÃO DA COPA DO BRASIL!", remetente:"Confederação", texto:"Parabéns! Seu clube conquistou a Copa do Brasil!", lida:false });
    }
    return;
  }

  cb.faseAtual++;
  if (classificados.length > 1) gerarFaseCopa(cb.faseAtual, classificados);
}

// ════════════════════════════════════════
// LIBERTADORES
// ════════════════════════════════════════
function inicializarLibertadores() {
  // Top 6 da Série A + campeão Copa Brasil + 1 runner-up = 8 times diretos
  // Mais 8 times de outros países simulados
  var tabela = calcularTabela(CLUBES, estado.resultados);
  var top6 = tabela.slice(0, 6).map(function(t){return t.id;});

  var timesEstrangeiros = [
    { id: "rp01", nome: "River Plate",      sigla: "RIV", cor: "#CC0000", overall: 84 },
    { id: "rp02", nome: "Boca Juniors",      sigla: "BOC", cor: "#FFD700", overall: 83 },
    { id: "rp03", nome: "Nacional",          sigla: "NAC", cor: "#CC0000", overall: 79 },
    { id: "rp04", nome: "Peñarol",           sigla: "PEN", cor: "#FFD700", overall: 78 },
    { id: "rp05", nome: "LDU",               sigla: "LDU", cor: "#FFD700", overall: 76 },
    { id: "rp06", nome: "Olimpia",           sigla: "OLI", cor: "#CC0000", overall: 74 },
    { id: "rp07", nome: "Colo-Colo",         sigla: "COL", cor: "#CC0000", overall: 77 },
    { id: "rp08", nome: "Talleres",          sigla: "TAL", cor: "#0033A0", overall: 75 },
    { id: "rp09", nome: "Fluminense",        sigla: "FLU", cor: "#6B0F1A", overall: 80 },
    { id: "rp10", nome: "Estudiantes",       sigla: "EST", cor: "#CC0000", overall: 76 },
  ].map(function(t) {
    return Object.assign({}, t, {
      jogadores: gerarJogadoresFicticios(t.id, t.overall),
      budget: 20000000, tecnico_id: "t01"
    });
  });

  var participantes = shuffle(
    top6.map(function(id){ return clubePorId(id); }).filter(Boolean)
    .concat(timesEstrangeiros)
  ).slice(0, 32);

  // Fase de grupos: 8 grupos de 4
  var grupos = [];
  for (var i = 0; i < 8; i++) {
    grupos.push({
      letra: "ABCDEFGH"[i],
      clubes: participantes.slice(i*4, i*4+4).map(function(c){return c.id;}),
      jogos: [],
      tabela: {}
    });
  }

  // Guardar times estrangeiros no estado
  estadoTorneios._timesEstrangeiros = timesEstrangeiros;

  estadoTorneios.libertadores = {
    nome: "Libertadores",
    icone: "🌎",
    grupos: grupos,
    faseAtual: "grupos", // grupos → oitavas → quartas → semi → final
    jogos: [],
    campeao: null,
    rodadaInicio: 5
  };

  // Gerar jogos da fase de grupos
  grupos.forEach(function(g) {
    for (var i = 0; i < g.clubes.length; i++) {
      for (var j = i+1; j < g.clubes.length; j++) {
        estadoTorneios.libertadores.jogos.push({
          fase: "grupos", grupo: g.letra,
          mandanteId: g.clubes[i], visitanteId: g.clubes[j],
          gM: null, gV: null, simulado: false
        });
        // Jogo de volta
        estadoTorneios.libertadores.jogos.push({
          fase: "grupos", grupo: g.letra,
          mandanteId: g.clubes[j], visitanteId: g.clubes[i],
          gM: null, gV: null, simulado: false
        });
      }
    }
  });
}

function simularRodadaLibertadores() {
  var lib = estadoTorneios.libertadores;
  if (!lib || lib.campeao) return;
  var meuId = estado.meuClube.id;

  var pendentes = lib.jogos.filter(function(j){return !j.simulado;}).slice(0, 8);
  pendentes.forEach(function(jogo) {
    var m = clubePorId(jogo.mandanteId) || (estadoTorneios._timesEstrangeiros||[]).find(function(t){return t.id===jogo.mandanteId;});
    var v = clubePorId(jogo.visitanteId) || (estadoTorneios._timesEstrangeiros||[]).find(function(t){return t.id===jogo.visitanteId;});
    if (!m || !v) { jogo.simulado=true; jogo.gM=0; jogo.gV=0; return; }

    var ehMeu = jogo.mandanteId===meuId || jogo.visitanteId===meuId;
    var tecM = TECNICOS_DISPONIVEIS.find(function(t){return t.id===m.tecnico_id;});
    var tecV = TECNICOS_DISPONIVEIS.find(function(t){return t.id===v.tecnico_id;});
    var r = simularPartidaSimples(m, v, tecM, tecV);
    jogo.gM = r.golsMandante; jogo.gV = r.golsVisitante; jogo.simulado = true;

    if (ehMeu) {
      var euM = jogo.mandanteId===meuId;
      var mg = euM?r.golsMandante:r.golsVisitante;
      var dg = euM?r.golsVisitante:r.golsMandante;
      var adv = euM?v:m;
      adicionarNoticia("🌎 Libertadores · " + estado.meuClube.sigla + " " + mg + "x" + dg + " " + adv.sigla, estado.rodadaAtual);
    }
  });

  // Verificar se todos os jogos de grupos terminaram
  var gruposPendentes = lib.jogos.filter(function(j){return j.fase==="grupos"&&!j.simulado;});
  if (gruposPendentes.length === 0 && lib.faseAtual === "grupos") {
    avancarLibertadoresMataM();
  }
}

function avancarLibertadoresMataM() {
  var lib = estadoTorneios.libertadores;
  // Calcular classificados de cada grupo (top 2)
  var classificados = [];
  lib.grupos.forEach(function(g) {
    var pts = {};
    g.clubes.forEach(function(id){ pts[id]={p:0,gp:0,gc:0}; });
    lib.jogos.filter(function(j){return j.grupo===g.letra&&j.simulado;}).forEach(function(j){
      if (!pts[j.mandanteId]||!pts[j.visitanteId]) return;
      pts[j.mandanteId].gp+=j.gM; pts[j.mandanteId].gc+=j.gV;
      pts[j.visitanteId].gp+=j.gV; pts[j.visitanteId].gc+=j.gM;
      if(j.gM>j.gV){ pts[j.mandanteId].p+=3; }
      else if(j.gM<j.gV){ pts[j.visitanteId].p+=3; }
      else{ pts[j.mandanteId].p+=1; pts[j.visitanteId].p+=1; }
    });
    var ranking = g.clubes.slice().sort(function(a,b){
      var pa=pts[a]||{p:0,gp:0,gc:0}, pb=pts[b]||{p:0,gp:0,gc:0};
      return (pb.p-pa.p)||(pb.gp-pb.gc)-(pa.gp-pa.gc);
    });
    classificados.push(ranking[0], ranking[1]);
  });

  lib.faseAtual = "oitavas";
  var sorteados = shuffle(classificados);
  for (var i=0; i<sorteados.length; i+=2) {
    if (i+1>=sorteados.length) break;
    lib.jogos.push({fase:"oitavas",mandanteId:sorteados[i],visitanteId:sorteados[i+1],gM:null,gV:null,simulado:false});
    lib.jogos.push({fase:"oitavas",mandanteId:sorteados[i+1],visitanteId:sorteados[i],gM:null,gV:null,simulado:false});
  }
  adicionarNoticia("🌎 Libertadores: fase de oitavas definida!", estado.rodadaAtual);
}

// ════════════════════════════════════════
// MUNDIAL DE CLUBES
// ════════════════════════════════════════
function inicializarMundial() {
  var lib = estadoTorneios.libertadores;
  var campLibertadores = lib ? lib.campeao : null;

  var times = [
    { id: "m01", nome: "Real Madrid",     sigla: "RMA", cor: "#FFFFFF", overall: 92 },
    { id: "m02", nome: "Manchester City", sigla: "MCI", cor: "#6CABDD", overall: 90 },
    { id: "m03", nome: "Bayern München",  sigla: "BAY", cor: "#DC052D", overall: 89 },
    { id: "m04", nome: "PSG",             sigla: "PSG", cor: "#004170", overall: 87 },
    { id: "m05", nome: "Al-Hilal",        sigla: "HIL", cor: "#0033A0", overall: 82 },
    { id: "m06", nome: "Fluminense",      sigla: "FLU", cor: "#6B0F1A", overall: 81 },
    { id: "m07", nome: "Auckland City",   sigla: "AUC", cor: "#1a1a1a", overall: 68 },
  ].map(function(t) {
    return Object.assign({}, t, {
      jogadores: gerarJogadoresFicticios(t.id, t.overall),
      budget: 50000000, tecnico_id: "t01"
    });
  });

  var participantes = times.slice();
  if (campLibertadores && campLibertadores !== "m06") {
    var camp = clubePorId(campLibertadores);
    if (camp) participantes.push(camp);
  }
  participantes = shuffle(participantes).slice(0, 8);
  estadoTorneios._timesMundial = times;

  // Fase de grupos: 2 grupos de 4
  var grupos = [
    { letra:"A", clubes: participantes.slice(0,4).map(function(c){return c.id;}), jogos:[] },
    { letra:"B", clubes: participantes.slice(4,8).map(function(c){return c.id;}), jogos:[] }
  ];

  estadoTorneios.mundial = {
    nome: "Mundial de Clubes",
    icone: "🌍",
    grupos: grupos,
    jogos: [],
    faseAtual: "grupos",
    campeao: null
  };

  grupos.forEach(function(g) {
    for (var i=0;i<g.clubes.length;i++) {
      for (var j=i+1;j<g.clubes.length;j++) {
        estadoTorneios.mundial.jogos.push({ fase:"grupos",grupo:g.letra,mandanteId:g.clubes[i],visitanteId:g.clubes[j],gM:null,gV:null,simulado:false });
      }
    }
  });
}

function simularMundial() {
  var mun = estadoTorneios.mundial;
  if (!mun || mun.campeao) return;
  var meuId = estado.meuClube.id;
  var todos = (estadoTorneios._timesMundial||[]).concat(CLUBES);

  function findClube(id) { return todos.find(function(c){return c.id===id;}) || clubePorId(id); }

  mun.jogos.filter(function(j){return !j.simulado;}).forEach(function(jogo) {
    var m = findClube(jogo.mandanteId);
    var v = findClube(jogo.visitanteId);
    if (!m||!v) { jogo.simulado=true; jogo.gM=0; jogo.gV=0; return; }
    var r = simularJogoTorneio(m, v);
    jogo.gM=r.gM; jogo.gV=r.gV; jogo.simulado=true;

    var ehMeu = jogo.mandanteId===meuId||jogo.visitanteId===meuId;
    if (ehMeu) {
      var euM=jogo.mandanteId===meuId;
      adicionarNoticia("🌍 Mundial · " + (euM?m.sigla:v.sigla) + " " + (euM?r.gM:r.gV) + "x" + (euM?r.gV:r.gM) + " " + (euM?v.sigla:m.sigla), estado.rodadaAtual);
    }
  });

  // Verificar campeão (simplificado: melhor pontuação geral)
  var todos_pendentes = mun.jogos.filter(function(j){return !j.simulado;});
  if (todos_pendentes.length === 0 && mun.faseAtual !== "fim") {
    var pts = {};
    mun.jogos.forEach(function(j) {
      if (!pts[j.mandanteId]) pts[j.mandanteId]=0;
      if (!pts[j.visitanteId]) pts[j.visitanteId]=0;
      if(j.gM>j.gV) pts[j.mandanteId]+=3;
      else if(j.gM<j.gV) pts[j.visitanteId]+=3;
      else { pts[j.mandanteId]+=1; pts[j.visitanteId]+=1; }
    });
    var campeaoId = Object.keys(pts).sort(function(a,b){return pts[b]-pts[a];})[0];
    mun.campeao = campeaoId;
    mun.faseAtual = "fim";
    var camp = findClube(campeaoId);
    adicionarNoticia("🌍 " + (camp?camp.nome:"?") + " é CAMPEÃO MUNDIAL!", estado.rodadaAtual);
    if (campeaoId===meuId) {
      estado.manager.titulos = (estado.manager.titulos||0)+1;
      estado.inbox.push({ id:"mundial_"+Date.now(), titulo:"🌍 CAMPEÃO MUNDIAL!", remetente:"FIFA", texto:"Seu clube conquistou o Mundial de Clubes! Feito histórico!", lida:false });
    }
  }
}

// ════════════════════════════════════════
// ESTADUAIS
// ════════════════════════════════════════
var ESTADOS_CLUBES = {
  "SP": ["palmeiras","corinthians","saopulo","santos","rbbragantino"],
  "RJ": ["flamengo","fluminense","vasco","botafogo"],
  "MG": ["atleticomg","cruzeiro"],
  "RS": ["internacional","gremio","juventude"],
  "PR": ["atleticopr"],
  "BA": ["bahia"],
  "CE": ["fortaleza"],
  "MT": ["cuiaba"],
  "GO": ["goias"]
};

var NOMES_ESTADUAIS = {
  "SP":"Campeonato Paulista","RJ":"Campeonato Carioca","MG":"Campeonato Mineiro",
  "RS":"Campeonato Gaúcho","PR":"Campeonato Paranaense","BA":"Campeonato Baiano",
  "CE":"Campeonato Cearense","MT":"Campeonato Mato-grossense","GO":"Campeonato Goiano"
};

function inicializarEstaduais() {
  estadoTorneios.estaduais = {};
  Object.entries(ESTADOS_CLUBES).forEach(function(entry) {
    var uf = entry[0], ids = entry[1];
    var clubes = ids.map(function(id){ return clubePorId(id); }).filter(Boolean);
    if (clubes.length < 2) return;

    var jogos = [];
    var shuffled = shuffle(clubes);
    for (var i=0; i<shuffled.length; i++) {
      for (var j=i+1; j<shuffled.length; j++) {
        jogos.push({ mandanteId:shuffled[i].id, visitanteId:shuffled[j].id, gM:null, gV:null, simulado:false });
        jogos.push({ mandanteId:shuffled[j].id, visitanteId:shuffled[i].id, gM:null, gV:null, simulado:false });
      }
    }

    estadoTorneios.estaduais[uf] = {
      nome: NOMES_ESTADUAIS[uf],
      uf: uf,
      clubes: clubes.map(function(c){return c.id;}),
      jogos: jogos,
      campeao: null
    };
  });
}

function simularRodadaEstaduais() {
  if (!estadoTorneios.estaduais) return;
  var meuId = estado.meuClube.id;

  Object.values(estadoTorneios.estaduais).forEach(function(est) {
    if (est.campeao) return;
    var pendente = est.jogos.find(function(j){return !j.simulado;});
    if (!pendente) {
      // Calcular campeão
      var pts = {};
      est.clubes.forEach(function(id){pts[id]=0;});
      est.jogos.forEach(function(j){
        if(j.gM>j.gV) pts[j.mandanteId]=(pts[j.mandanteId]||0)+3;
        else if(j.gM<j.gV) pts[j.visitanteId]=(pts[j.visitanteId]||0)+3;
        else { pts[j.mandanteId]=(pts[j.mandanteId]||0)+1; pts[j.visitanteId]=(pts[j.visitanteId]||0)+1; }
      });
      est.campeao = est.clubes.slice().sort(function(a,b){return (pts[b]||0)-(pts[a]||0);})[0];
      var camp = clubePorId(est.campeao);
      adicionarNoticia("🏅 " + (camp?camp.nome:"?") + " é campeão do " + est.nome + "!", estado.rodadaAtual);
      if (est.campeao===meuId) {
        estado.manager.titulos=(estado.manager.titulos||0)+1;
        estado.inbox.push({id:"est_"+est.uf+"_"+Date.now(),titulo:"🏅 Campeão do "+est.nome+"!",remetente:"Federação",texto:"Parabéns! Título estadual conquistado!",lida:false});
      }
      return;
    }

    var m = clubePorId(pendente.mandanteId);
    var v = clubePorId(pendente.visitanteId);
    if (!m||!v) { pendente.simulado=true; pendente.gM=0; pendente.gV=0; return; }

    var r = simularJogoTorneio(m, v);
    pendente.gM=r.gM; pendente.gV=r.gV; pendente.simulado=true;

    var ehMeu = pendente.mandanteId===meuId||pendente.visitanteId===meuId;
    if (ehMeu) {
      var euM=pendente.mandanteId===meuId;
      adicionarNoticia("🏅 " + est.nome + " · " + m.sigla + " " + r.gM + "x" + r.gV + " " + v.sigla, estado.rodadaAtual);
    }
  });
}

// ════════════════════════════════════════
// INICIALIZAR TODOS OS TORNEIOS
// ════════════════════════════════════════
function inicializarTorneios() {
  inicializarEstaduais();
  inicializarCopaBrasil();
  inicializarLibertadores();
  // Mundial só após Libertadores
}

// Chamado a cada rodada simulada
function processarTorneiosRodada(rodadaIdx) {
  // Estaduais: rodam nas primeiras rodadas
  if (rodadaIdx < 8) simularRodadaEstaduais();

  // Copa do Brasil: a partir da rodada 3
  if (rodadaIdx >= 3 && estadoTorneios.copaBrasil && !estadoTorneios.copaBrasil.campeao) {
    avancarFaseCopa();
  }

  // Libertadores: a partir da rodada 5
  if (rodadaIdx >= 5 && estadoTorneios.libertadores && !estadoTorneios.libertadores.campeao) {
    simularRodadaLibertadores();
  }

  // Mundial: após rodada 38
  if (rodadaIdx >= 37) {
    if (!estadoTorneios.mundial && estadoTorneios.libertadores && estadoTorneios.libertadores.campeao) {
      inicializarMundial();
    }
    if (estadoTorneios.mundial) simularMundial();
  }
}

// ════════════════════════════════════════
// TELA DE TORNEIOS
// ════════════════════════════════════════
function renderTorneios() {
  var aba = window._torneioAba || "copa";
  var html = '<div class="torneios-tela">';

  html += '<div class="divisoes-tabs">';
  [
    {k:"copa",  label:"🏆 Copa do Brasil"},
    {k:"lib",   label:"🌎 Libertadores"},
    {k:"mundial",label:"🌍 Mundial"},
    {k:"estad", label:"🏅 Estaduais"}
  ].forEach(function(t) {
    html += '<button class="div-tab' + (aba===t.k?" ativo":"") + '" onclick="mudarTorneioAba(\'' + t.k + '\')">' + t.label + '</button>';
  });
  html += '</div>';

  if (aba==="copa")    html += renderCopaBrasilTela();
  if (aba==="lib")     html += renderLibertadoresTela();
  if (aba==="mundial") html += renderMundialTela();
  if (aba==="estad")   html += renderEstaduaisTela();

  html += '</div>';
  document.getElementById("main").innerHTML = html;
}

function mudarTorneioAba(aba) { window._torneioAba=aba; renderTorneios(); }

function renderCopaBrasilTela() {
  var cb = estadoTorneios.copaBrasil;
  if (!cb) return '<div class="dash-empty">Copa do Brasil não iniciada ainda.</div>';
  var meuId = estado.meuClube.id;
  var fases = cb.fases;
  var html = '<div class="torneio-conteudo">';

  if (cb.campeao) {
    var camp = clubePorId(cb.campeao);
    html += '<div class="torneio-campeao">🏆 CAMPEÃO: ' + (camp?camp.nome:"?") + '</div>';
  }

  html += '<div class="torneio-fases">';
  fases.forEach(function(fase, fi) {
    var jogos = cb.jogos.filter(function(j){return j.fase===fi;});
    if (jogos.length===0) return;
    html += '<div class="torneio-fase">';
    html += '<div class="torneio-fase-titulo">' + fase + '</div>';
    jogos.forEach(function(j) {
      var m = clubePorId(j.mandanteId);
      var v = clubePorId(j.visitanteId);
      if (!m||!v) return;
      var ehMeu = j.mandanteId===meuId||j.visitanteId===meuId;
      html += '<div class="torneio-jogo' + (ehMeu?" torneio-meu":"") + '">';
      html += '<span class="torneio-time">' + (m.sigla||m.nome) + '</span>';
      if (j.simulado) {
        var diff=j.gM-j.gV;
        var cor=diff>0?"var(--green)":diff<0?"var(--red)":"var(--yellow)";
        html += '<span class="torneio-placar" style="color:' + (ehMeu?(j.mandanteId===meuId?cor:(diff<0?"var(--green)":diff>0?"var(--red)":"var(--yellow)")):cor) + '">' + j.gM + '-' + j.gV + '</span>';
      } else {
        html += '<span class="torneio-placar pendente">vs</span>';
      }
      html += '<span class="torneio-time right">' + (v.sigla||v.nome) + '</span>';
      html += '</div>';
    });
    html += '</div>';
  });
  html += '</div></div>';
  return html;
}

function renderLibertadoresTela() {
  var lib = estadoTorneios.libertadores;
  if (!lib) return '<div class="dash-empty">Libertadores não iniciada ainda.</div>';
  var meuId = estado.meuClube.id;
  var html = '<div class="torneio-conteudo">';

  if (lib.campeao) {
    var camp = clubePorId(lib.campeao) || (estadoTorneios._timesEstrangeiros||[]).find(function(t){return t.id===lib.campeao;});
    html += '<div class="torneio-campeao">🌎 CAMPEÃO: ' + (camp?camp.nome:"?") + '</div>';
  }

  html += '<div class="lib-grupos">';
  lib.grupos.forEach(function(g) {
    var pts={};
    g.clubes.forEach(function(id){pts[id]={p:0,j:0,gp:0,gc:0};});
    lib.jogos.filter(function(j){return j.grupo===g.letra&&j.simulado;}).forEach(function(j){
      if(!pts[j.mandanteId]||!pts[j.visitanteId]) return;
      pts[j.mandanteId].j++; pts[j.visitanteId].j++;
      pts[j.mandanteId].gp+=j.gM; pts[j.mandanteId].gc+=j.gV;
      pts[j.visitanteId].gp+=j.gV; pts[j.visitanteId].gc+=j.gM;
      if(j.gM>j.gV) pts[j.mandanteId].p+=3;
      else if(j.gM<j.gV) pts[j.visitanteId].p+=3;
      else{pts[j.mandanteId].p+=1;pts[j.visitanteId].p+=1;}
    });

    html += '<div class="lib-grupo">';
    html += '<div class="lib-grupo-titulo">Grupo ' + g.letra + '</div>';
    var ranking = g.clubes.slice().sort(function(a,b){
      var pa=pts[a]||{p:0,gp:0,gc:0}, pb=pts[b]||{p:0,gp:0,gc:0};
      return (pb.p-pa.p)||((pb.gp-pb.gc)-(pa.gp-pa.gc));
    });
    ranking.forEach(function(id, i) {
      var c = clubePorId(id)||(estadoTorneios._timesEstrangeiros||[]).find(function(t){return t.id===id;});
      var p = pts[id]||{p:0,j:0,gp:0,gc:0};
      var cls = id===meuId?" lib-eu":"";
      var promovido = i<2?" lib-prom":"";
      html += '<div class="lib-clube-row' + cls + promovido + '">';
      html += '<span class="lib-pos">' + (i+1) + '</span>';
      html += '<span class="lib-nome">' + (c?c.sigla:id) + '</span>';
      html += '<span class="lib-pts">' + p.p + '</span>';
      html += '<span class="lib-j">' + p.j + '</span>';
      html += '</div>';
    });
    html += '</div>';
  });
  html += '</div></div>';
  return html;
}

function renderMundialTela() {
  var mun = estadoTorneios.mundial;
  if (!mun) return '<div class="dash-empty">Mundial acontece após conquistar a Libertadores.</div>';
  var meuId = estado.meuClube.id;
  var todos = (estadoTorneios._timesMundial||[]).concat(CLUBES);
  function fc(id){ return todos.find(function(c){return c.id===id;})||clubePorId(id); }

  var html = '<div class="torneio-conteudo">';
  if (mun.campeao) {
    var camp = fc(mun.campeao);
    html += '<div class="torneio-campeao">🌍 CAMPEÃO MUNDIAL: ' + (camp?camp.nome:"?") + '</div>';
  }
  mun.grupos.forEach(function(g) {
    html += '<div class="torneio-fase"><div class="torneio-fase-titulo">Grupo ' + g.letra + '</div>';
    mun.jogos.filter(function(j){return j.grupo===g.letra;}).forEach(function(j) {
      var m=fc(j.mandanteId), v=fc(j.visitanteId);
      if(!m||!v) return;
      var ehMeu=j.mandanteId===meuId||j.visitanteId===meuId;
      html += '<div class="torneio-jogo' + (ehMeu?" torneio-meu":"") + '">';
      html += '<span class="torneio-time">' + (m.sigla||"?") + '</span>';
      html += j.simulado ? '<span class="torneio-placar">' + j.gM + '-' + j.gV + '</span>' : '<span class="torneio-placar pendente">vs</span>';
      html += '<span class="torneio-time right">' + (v.sigla||"?") + '</span>';
      html += '</div>';
    });
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function renderEstaduaisTela() {
  if (!estadoTorneios.estaduais) return '<div class="dash-empty">Estaduais não iniciados.</div>';
  var meuId = estado.meuClube.id;
  var html = '<div class="torneio-conteudo"><div class="estaduais-grid">';

  Object.values(estadoTorneios.estaduais).forEach(function(est) {
    var ehMeu = est.clubes.indexOf(meuId) >= 0;
    html += '<div class="estadual-card' + (ehMeu?" estadual-meu":"") + '">';
    html += '<div class="estadual-nome">' + est.nome + '</div>';
    if (est.campeao) {
      var camp = clubePorId(est.campeao);
      html += '<div class="estadual-campeao">🏅 ' + (camp?camp.nome:"?") + '</div>';
    } else {
      var jogados = est.jogos.filter(function(j){return j.simulado;}).length;
      var total   = est.jogos.length;
      html += '<div class="estadual-prog">' + jogados + '/' + total + ' jogos</div>';
    }
    html += '</div>';
  });
  html += '</div></div>';
  return html;
}
</script>

// ── Utilitários ──
function shuffleArr(arr) {
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}

function gerarJogadoresFicticios(clubeId, overallBase) {
  var posicoes=["GOL","GOL","LD","LD","ZAG","ZAG","ZAG","LE","LE","VOL","VOL","VOL","MEI","MEI","MEI","ATA","ATA","ATA","ATA","MEI","VOL","ZAG","LD","LE"];
  return posicoes.map(function(pos,i){
    var ov=Math.max(40,Math.min(85,overallBase+Math.floor(Math.random()*10)-5));
    return {id:clubeId+"_j"+i,nome:"Jogador "+(i+1),posicao:pos,overall:ov,
      stats:{jogos:0,gols:0,assistencias:0,nota_media:0},
      valor_mercado:Math.round(ov*8000),salario:Math.round(ov*300),
      clausula_rescisoria:Math.round(ov*20000),contrato_termino:20+Math.floor(Math.random()*18),fadiga:0};
  });
}

function simularJPaulista(mId, vId, allClubes) {
  var m=allClubes.find(function(c){return c.id===mId;});
  var v=allClubes.find(function(c){return c.id===vId;});
  if(!m||!v) return {gM:0,gV:0};
  var fM=calcularForca(m).forca, fV=calcularForca(v).forca;
  var diff=(fM-fV)/20;
  var baseGols=1.5;
  var gM=Math.max(0,Math.round(baseGols+diff+(Math.random()*3-1)));
  var gV=Math.max(0,Math.round(baseGols-diff+(Math.random()*3-1)));
  return {gM:gM,gV:gV};
}

// Gerar todos os jogos de turno único (round robin)
function gerarJogosGrupo(clubes, divKey) {
  var jogos=[];
  for(var i=0;i<clubes.length;i++){
    for(var j=i+1;j<clubes.length;j++){
      jogos.push({div:divKey,fase:"grupos",mId:clubes[i].id,vId:clubes[j].id,gM:null,gV:null,ok:false,rodada:i+j});
    }
  }
  return jogos;
}

// Calcular pontuação de um grupo
function calcPts(jogos, clubeIds) {
  var pts={};
  clubeIds.forEach(function(id){pts[id]={p:0,j:0,v:0,e:0,d:0,gp:0,gc:0};});
  jogos.filter(function(j){return j.ok;}).forEach(function(j){
    if(!pts[j.mId]||!pts[j.vId]) return;
    pts[j.mId].j++; pts[j.vId].j++;
    pts[j.mId].gp+=j.gM; pts[j.mId].gc+=j.gV;
    pts[j.vId].gp+=j.gV; pts[j.vId].gc+=j.gM;
    if(j.gM>j.gV){pts[j.mId].p+=3;pts[j.mId].v++; pts[j.vId].d++;}
    else if(j.gM<j.gV){pts[j.vId].p+=3;pts[j.vId].v++;pts[j.mId].d++;}
    else{pts[j.mId].p++;pts[j.mId].e++;pts[j.vId].p++;pts[j.vId].e++;}
  });
  return pts;
}

function rankear(ids, pts) {
  return ids.slice().sort(function(a,b){
    var pa=pts[a]||{p:0,gp:0,gc:0,v:0}, pb=pts[b]||{p:0,gp:0,gc:0,v:0};
    return (pb.p-pa.p)||(pb.v-pa.v)||((pb.gp-pb.gc)-(pa.gp-pa.gc))||(pb.gp-pa.gp);
  });
}

function inicializarPaulista() {
  var _ptIdx = 0;
  function prepDiv(lista, nivel, overallBase) {
    return lista.map(function(c){
      var jogs = gerarJogadoresFicticios(c.id, overallBase+Math.floor(Math.random()*8)-4);
      aplicarNomesFicticios(jogs, c.id.charCodeAt(2)*997 + overallBase*31);
      var perfil = gerarPerfilFinanceiroGenerico(overallBase);
      var ptSeed = (c.id||"x").charCodeAt(0)*17 + _ptIdx;
      return Object.assign({},c,{
        divisao_paulista:nivel,
        jogadores:jogs,
        caixa: perfil.caixa,
        dividas: perfil.dividas,
        budget: perfil.caixa,
        tecnico_id:"t"+String((_ptIdx++%40)+1).padStart(2,"0"),
        tecnico_nome_ficticio: gerarNomeTecnicoFicticio(ptSeed)
      });
    });
  }

  estadoPaulista.a1.clubes = prepDiv(CLUBES_PAULISTA_A1,"a1",74);
  estadoPaulista.a2.clubes = prepDiv(CLUBES_PAULISTA_A2,"a2",66);
  estadoPaulista.a3.clubes = prepDiv(CLUBES_PAULISTA_A3,"a3",60);
  estadoPaulista.a4.clubes = prepDiv(CLUBES_PAULISTA_A4,"a4",54);

  // Bezinha: preparar clubes de todos os grupos
  var _bzIdx = 0;
  GRUPOS_BEZINHA.forEach(function(g){
    g.clubes = g.clubes.map(function(c){
      var jogs=gerarJogadoresFicticios(c.id, 46+Math.floor(Math.random()*8)-4);
      aplicarNomesFicticios(jogs, c.id.charCodeAt(3)*997 + 46*31);
      var perfil = gerarPerfilFinanceiroGenerico(46);
      var bzSeed = _bzIdx * 137 + 11; // seed único por clube
      _bzIdx++;
      return Object.assign({},c,{
        divisao_paulista:"b1",
        jogadores:jogs,
        caixa: perfil.caixa,
        dividas: perfil.dividas,
        budget: perfil.caixa,
        tecnico_id:"t"+String((bzSeed%40)+1).padStart(2,"0"),
        tecnico_nome_ficticio: gerarNomeTecnicoFicticio(bzSeed)
      });
    });
  });

  // Gerar jogos de fase de grupos
  ["a1","a2","a3","a4"].forEach(function(div){
    var est=estadoPaulista[div];
    est.jogos = gerarJogosGrupo(est.clubes, div);
    est.faseAtual = "grupos";
  });

  // Bezinha: gerar jogos em rodadas round-robin (6 times = 5 rodadas ida + 5 volta)
  // Cada rodada tem 3 jogos (todos os 6 times jogam 1x)
  GRUPOS_BEZINHA.forEach(function(g){
    var ids=g.clubes.map(function(c){return c.id;});
    var n=ids.length; // 6
    var lista=ids.slice();
    // Round-robin: fixar o primeiro, rodar os demais
    var rodadasIda=[];
    for(var r=0;r<n-1;r++){
      var rodada=[];
      for(var i=0;i<n/2;i++){
        rodada.push({mId:lista[i],vId:lista[n-1-i]});
      }
      rodadasIda.push(rodada);
      // Rotacionar: mover último para posição 1, manter [0] fixo
      lista.splice(1,0,lista.pop());
    }
    // Turno (ida)
    rodadasIda.forEach(function(rodada,rIdx){
      rodada.forEach(function(jogo){
        estadoPaulista.b1.jogos.push({div:"b1",grupo:g.letra,fase:"grupos",rodada:rIdx,mId:jogo.mId,vId:jogo.vId,gM:null,gV:null,ok:false});
      });
    });
    // Returno (volta: mandante e visitante trocados)
    rodadasIda.forEach(function(rodada,rIdx){
      rodada.forEach(function(jogo){
        estadoPaulista.b1.jogos.push({div:"b1",grupo:g.letra,fase:"grupos",rodada:rIdx+(n-1),mId:jogo.vId,vId:jogo.mId,gM:null,gV:null,ok:false});

  estadoPaulista.b1.faseAtual = "grupos";

  // Copa Paulista 2026 — times reais em 4 grupos de 4

      { id:"cp_16",nome:"São José EC",     sigla:"SJE",cor:"#006400" }
    ]}
  ];

  // Preparar clubes com jogadores fictícios
  var copaClubes = [];
  GRUPOS_COPA.forEach(function(g) {
    g.clubes.forEach(function(c) {
      var jogs = gerarJogadoresFicticios(c.id, 62 + Math.floor(Math.random()*8));
      aplicarNomesFicticios(jogs, c.id.charCodeAt(2)*997 + 62*31);
      var perfil = gerarPerfilFinanceiroGenerico(62);
      var seed = c.id.charCodeAt(0)*17 + copaClubes.length;
      copaClubes.push(Object.assign({}, c, {
        jogadores: jogs,

        grupo_copa: g.letra
      }));
    });
  });

  estadoPaulista.copa.clubes = copaClubes;
  estadoPaulista.copa.grupos = GRUPOS_COPA.map(function(g) {
    return { letra: g.letra, clubeIds: g.clubes.map(function(c){ return c.id; }) };
  });

  // Fase de grupos: turno + returno dentro de cada grupo
  grupos.forEach(function(g) {

    for (var i=0; i<ids.length; i++) {
