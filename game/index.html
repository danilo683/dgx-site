<script>// Calcula encaixe do elenco na formação do técnico (0 a 1)
function calcularEncaixe(clube, formacao) {
  const req = FORMACOES[formacao].requisitos;
  let totalReq = 0, totalAtendido = 0;

  Object.entries(req).forEach(([pos, qtd]) => {
    const disponiveis = clube.jogadores
      .filter(j => j.posicao === pos)
      .sort((a, b) => b.overall - a.overall)
      .slice(0, qtd);

    totalReq += qtd;
    totalAtendido += disponiveis.length;
  });

  return totalAtendido / totalReq;
}

// Calcula força do clube considerando técnico e formação
function calcularForca(clube, tecnico = null) {
  const jogadores = clube.jogadores;
  const media = (pos) => {
    const g = jogadores.filter(j => j.posicao === pos);
    return g.length === 0 ? 50 : g.reduce((s, j) => s + j.overall, 0) / g.length;
  };

  const gol = media("GOL");
  const ld  = media("LD");
  const zag = media("ZAG");
  const le  = media("LE");
  const vol = media("VOL");
  const mei = media("MEI");
  const ata = media("ATA");

  // Pesos padrão (sem técnico)
  let pesos = { GOL: 0.15, LD: 0.10, ZAG: 0.20, LE: 0.10, VOL: 0.15, MEI: 0.15, ATA: 0.15 };
  let bonusTecnico = 0;
  let bonusFormacao = 0;
  let encaixe = 1;
  let formacao = null;

  if (tecnico) {
    formacao = tecnico.formacao;
    pesos = FORMACOES[formacao].pesos;

    // Bônus do overall do técnico: escala de 0 a +6 pontos
    bonusTecnico = ((tecnico.overall - 60) / 40) * 6;

    // Bônus/penalidade de encaixe: -8 a +4 pontos
    encaixe = calcularEncaixe(clube, formacao);
    bonusFormacao = (encaixe - 0.7) * 20; // 70% encaixe = neutro
  }

  const forcaBase =
    gol * pesos.GOL +
    ld  * pesos.LD  +
    zag * pesos.ZAG +
    le  * pesos.LE  +
    vol * pesos.VOL +
    mei * pesos.MEI +
    ata * pesos.ATA;

  const forca = Math.round(Math.max(40, Math.min(99,
    forcaBase + bonusTecnico + bonusFormacao
  )));

  return {
    forca, gol, ld, zag, le, vol, mei, ata,
    bonusTecnico: Math.round(bonusTecnico * 10) / 10,
    bonusFormacao: Math.round(bonusFormacao * 10) / 10,
    encaixe: Math.round(encaixe * 100),
    formacao
  };
}

function gerarGols(ataque, defesaAdversaria) {
  const vantagem = (ataque - defesaAdversaria) / 100;
  const rand = Math.random();
  const limites = [0.20, 0.45, 0.68, 0.83, 0.93];
  const gols    = [0,    1,    2,    3,    4,    5];
  // Vantagem desloca levemente os limites
  const ajuste = vantagem * 0.08;
  for (let i = 0; i < limites.length; i++) {
    if (rand < limites[i] - ajuste) return gols[i];
  }
  return gols[5];
}

function simularPartida(clubeMandante, clubeVisitante, tecnicoMandante = null, tecnicoVisitante = null) {
  const m = calcularForca(clubeMandante,  tecnicoMandante);
  const v = calcularForca(clubeVisitante, tecnicoVisitante);

  // Fator casa +3 no ataque e +3 na defesa do mandante
  const golsMandante  = gerarGols(m.ata * pesos(m, 'ata') + m.forca * 0.3 + 3, v.zag * pesos(v, 'zag') + v.forca * 0.3);
  const golsVisitante = gerarGols(v.ata * pesos(v, 'ata') + v.forca * 0.3,     m.zag * pesos(m, 'zag') + m.forca * 0.3 + 3);

  const eventos = gerarEventos(clubeMandante, clubeVisitante, golsMandante, golsVisitante);

  return {
    mandante: clubeMandante.nome, visitante: clubeVisitante.nome,
    golsMandante, golsVisitante,
    forcaMandante: m, forcaVisitante: v,
    eventos
  };
}

function pesos(f, setor) {
  // Já está embutido na força calculada — helper simplificado
  return 1;
}

function simularPartidaSimples(clubeMandante, clubeVisitante, tecnicoMandante = null, tecnicoVisitante = null) {
  const m = calcularForca(clubeMandante,  tecnicoMandante);
  const v = calcularForca(clubeVisitante, tecnicoVisitante);

  const golsMandante  = gerarGols(m.forca + 3, v.forca);
  const golsVisitante = gerarGols(v.forca,     m.forca + 3);

  const eventos = gerarEventos(clubeMandante, clubeVisitante, golsMandante, golsVisitante);

  return {
    mandante: clubeMandante.nome, visitante: clubeVisitante.nome,
    golsMandante, golsVisitante,
    forcaMandante: m, forcaVisitante: v,
    eventos
  };
}

function gerarEventos(mandante, visitante, golsM, golsV) {
  const eventos = [];
  const usados = new Set();
  const minuto = () => {
    let m;
    do { m = Math.floor(Math.random() * 90) + 1; } while (usados.has(m));
    usados.add(m);
    return m;
  };
  const marcador = (clube) => {
    const lista = clube.jogadores.filter(j => j.posicao === "ATA" || j.posicao === "MEI");
    return lista[Math.floor(Math.random() * lista.length)];
  };
  for (let i = 0; i < golsM; i++) {
    const j = marcador(mandante);
    eventos.push({ minuto: minuto(), texto: `⚽ ${j.nome} (${mandante.nome})` });
  }
  for (let i = 0; i < golsV; i++) {
    const j = marcador(visitante);
    eventos.push({ minuto: minuto(), texto: `⚽ ${j.nome} (${visitante.nome})` });
  }
  return eventos.sort((a, b) => a.minuto - b.minuto);
}

function calcularTabela(clubes, resultados) {
  const tabela = clubes.map(c => ({
    id: c.id, nome: c.nome, sigla: c.sigla, cor: c.cor,
    pts: 0, j: 0, v: 0, e: 0, d: 0, gp: 0, gc: 0, sg: 0
  }));
  const find = (id) => tabela.find(t => t.id === id);
  resultados.forEach(r => {
    const m = find(r.mandanteId), v = find(r.visitanteId);
    if (!m || !v) return;
    m.j++; v.j++;
    m.gp += r.golsMandante; m.gc += r.golsVisitante;
    v.gp += r.golsVisitante; v.gc += r.golsMandante;
    if (r.golsMandante > r.golsVisitante)      { m.pts += 3; m.v++; v.d++; }
    else if (r.golsMandante < r.golsVisitante) { v.pts += 3; v.v++; m.d++; }
    else                                        { m.pts++; v.pts++; m.e++; v.e++; }
  });
  tabela.forEach(t => t.sg = t.gp - t.gc);
  return tabela.sort((a, b) => b.pts - a.pts || b.sg - a.sg || b.gp - a.gp);
}

function gerarCalendario(clubes) {
  const ids = [...clubes.map(c => c.id)];
  if (ids.length % 2 !== 0) ids.push(null);
  const rodadas = [];
  const total = ids.length - 1;
  const lista = [...ids];
  for (let r = 0; r < total; r++) {
    const jogos = [];
    for (let i = 0; i < lista.length / 2; i++) {
      const m = lista[i], v = lista[lista.length - 1 - i];
      if (m && v) jogos.push({ mandanteId: m, visitanteId: v });
    }
    rodadas.push({ numero: r + 1, jogos });
    lista.splice(1, 0, lista.pop());
  }
  const ida = rodadas.length;
  for (let r = 0; r < ida; r++) {
    rodadas.push({
      numero: ida + r + 1,
      jogos: rodadas[r].jogos.map(j => ({ mandanteId: j.visitanteId, visitanteId: j.mandanteId }))
    });
  }
  return rodadas;
}

<script>// ── Configuração de datas ──
var DATA_INICIO = new Date(2026, 0, 1); // 1 janeiro 2026
var DATA_INICIO_CAMPEONATOS = new Date(2026, 3, 5); // 5 abril 2026 — início dos campeonatos

function dataRodada(rodadaIdx) {
  // Rodadas às quartas (3) e domingos (0), alternando
  // Rodada 0 = domingo 13/abr, rodada 1 = quarta 16/abr...
  var d = new Date(DATA_INICIO);
  d.setDate(d.getDate() + rodadaIdx * 3 + Math.floor(rodadaIdx / 2));
  return d;
}

function formatarData(d) {
  var dias = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  var meses = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  return dias[d.getDay()] + " " + d.getDate() + "/" + meses[d.getMonth()];
}

function formatarDataCompleta(d) {
  var meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  return d.getDate() + " de " + meses[d.getMonth()] + " de " + d.getFullYear();
}

// ── Tipos de evento ──

  JOGO:          "jogo",
  JANELA_ABRE:   "janela_abre",
  JANELA_FECHA:  "janela_fecha",
  FIM_CONTRATO:  "fim_contrato",
  MENSAGEM:      "mensagem",
  NOTICIA:       "noticia",
  FINANCEIRO:    "financeiro"
};

// Encontrar índice da rodada mais próxima a uma data
function rodadaMaisProxima(data) {
  var best = 0, bestDiff = Infinity;
  for (var i = 0; i < 38; i++) {
    var d = dataRodada(i);
    var diff = Math.abs(d - data);
    if (diff < bestDiff) { bestDiff = diff; best = i; }
  }
  return best;
}

// ── Gerar eventos da temporada ──
function gerarEventos() {
  var eventos = [];

  // Jogos
  estado.calendario.forEach(function(rodada, idx) {
    var data = dataRodada(idx);
    eventos.push({
      id: "jogo_" + idx,

      rodada: idx,

    });

  // Fim de contrato
  estado.meuClube.jogadores.forEach(function(j) {
    if (j.contrato_termino > 0 && j.contrato_termino <= 38) {
      var dataAviso = dataRodada(Math.max(0, j.contrato_termino - 3));
      eventos.push({
        id: "contrato_" + j.id,
        tipo: TIPO_EVENTO.FIM_CONTRATO,

        icone: "📋",
        jogadorId: j.id,
        processado: false
      });
    }
  });

  // Mensagens iniciais
  var msgs = [
    { rodada: -0.2, remetente: "Diretoria", titulo: "Bem-vindo ao clube!", texto: "Olá, manager! A diretoria está animada com sua chegada. Temos grandes expectativas para esta temporada. Conte com nosso apoio total." },
    { rodada: -0.1, remetente: "Técnico", titulo: "Plantel à disposição", texto: "Bom dia! Já analisei o elenco. Temos jogadores de qualidade mas precisamos reforçar alguns setores no mercado. Juntos vamos longe!" }
  ];
  msgs.forEach(function(m, i) {
    var d = new Date(DATA_INICIO);
    d.setDate(d.getDate() - (2 - i));
    eventos.push({
      id: "msg_init_" + i,
      tipo: TIPO_EVENTO.MENSAGEM,

      lida: false,
      processado: false
    });
  });

  // Eventos financeiros: dia 10 de cada mês = pagamento de salários
  // Calcular quantos "dia 10" existem na temporada
  var mesInicio = new Date(DATA_INICIO);
  for (var mes = 0; mes < 12; mes++) {
    var diaDez = new Date(mesInicio.getFullYear(), mesInicio.getMonth() + mes, 10);
    if (diaDez < DATA_INICIO) continue;
    var rodaRef = rodadaMaisProxima(diaDez);

    lida: false,
    processado: false
  });

  eventos.sort(function(a, b) {
    if (a.data && b.data) return a.data - b.data;
    return a.rodada - b.rodada;
  });
  return eventos;
}

function irParaEvento(idx) {
  while (estado.eventoAtual < idx) {
    estado.eventoAtual++;
    processarEvento(estado.eventos[estado.eventoAtual]);
  }
  var ev = estado.eventos[estado.eventoAtual];
  atualizarCalView(ev);
  renderDashboard();
}

// ── Inicializar ──
function inicializarCalendario() {
  estado.eventoAtual = 0;
  estado.inbox       = [];
  estado.noticias    = [];
  estado.rodadaPendente = null;
  estado.eventos     = gerarEventos();
  inicializarCalView();
  processarEvento(estado.eventos[0]);
}

function adicionarNoticia(texto, rodada) {
  estado.noticias = estado.noticias || [];
  estado.noticias.push({ texto: texto, rodada: rodada });
}

<script>// ════════════════════════════════════════
// MOTOR DE PARTIDA — escalação, lances, notas
// ════════════════════════════════════════

// Escalar 11 titulares conforme formação do técnico
function escalarTime(clube, tecnico) {
  var formacao = tecnico ? tecnico.formacao : "4-4-2";
  var req = FORMACOES[formacao] ? FORMACOES[formacao].requisitos : { GOL:1,LD:1,ZAG:2,LE:1,VOL:2,MEI:2,ATA:2 };
  var escalados = [];

  Object.entries(req).forEach(function(entry) {
    var pos = entry[0], qtd = entry[1];
    var disponiveis = clube.jogadores
      .filter(function(j) { return j.posicao === pos; })
      .sort(function(a, b) { return b.overall - a.overall; })
      .slice(0, qtd);
    disponiveis.forEach(function(j) { escalados.push(j); });
  });

  return escalados;
}

// Posições no campo (0-1 relativo, por posição e índice)
// Posicionar jogador no campo
// Recebe: posicao, idx (índice na linha), total (qtd na mesma linha), lado, linhaY (0-1 relativo à metade)
function posicaoCampo(posicao, idx, total, lado, linhaY) {

  // linhaY: posição relativa DENTRO da metade do time (0=fundo, 1=meio-campo)
  // Cada formação define isso via renderCampoTatico

  var y;
  if (lado === "dir") {
    // Mandante: metade baixa (y 0.53 → 0.97)
    y = 0.97 - (linhaY || 0.1) * 0.44;
  } else {
    // Visitante: metade alta (y 0.03 → 0.47)
    y = 0.03 + (linhaY || 0.1) * 0.44;
  }

  // Distribuição horizontal — margem maior quando há poucos jogadores na linha,
  // para evitar que fiquem espremidos nas pontas (ex: 2 atacantes centralizados)
  var margens = { 1: 0.50, 2: 0.28, 3: 0.18, 4: 0.10, 5: 0.08 };
  var margem  = margens[total] !== undefined ? margens[total] : 0.10;
  var x;
  if (total === 1) {
    x = 0.50;
  } else {
    x = margem + idx * ((1 - 2*margem) / (total - 1));
  }

  return { x: x, y: y };
}

// Retorna as linhas de uma formação
// linhaY: 0 = linha de fundo do próprio time, 1 = linha do meio-campo
// Cada posição ocupa SUA linha — posições iguais ficam na mesma linha horizontal
function linhasFormacao(formacao) {
  // Cada valor é linhaY dentro da metade do time (0=fundo, 1=meio-campo)
  // Posições com MESMO valor ficam na MESMA linha horizontal
  var f = {
    //         GOL   LD    ZAG   LE    VOL   MEI   ATA
    "4-4-2":  { GOL:0.05, LD:0.25, ZAG:0.25, LE:0.25, VOL:0.55, MEI:0.55, ATA:0.85 },
    // 4-3-3: defesa(4) + meio(3 todos na mesma linha) + ataque(3)
    "4-3-3":  { GOL:0.05, LD:0.25, ZAG:0.25, LE:0.25, VOL:0.58, MEI:0.58, ATA:0.88 },
    // 4-2-3-1: 4 def + 2 vol + 3 mei + 1 ata
    "4-2-3-1":{ GOL:0.05, LD:0.25, ZAG:0.25, LE:0.25, VOL:0.45, MEI:0.68, ATA:0.90 },
    // 3-5-2: 3 zag + ld+vol+vol+le na mesma linha + 2 mei + 2 ata
    "3-5-2":  { GOL:0.05, ZAG:0.25, LD:0.55, VOL:0.55, LE:0.55, MEI:0.75, ATA:0.90 },
    // 5-3-2: 5 def + 3 mei(VOL+MEI) + 2 ata
    "5-3-2":  { GOL:0.05, LD:0.22, ZAG:0.22, LE:0.22, VOL:0.58, MEI:0.58, ATA:0.88 }
  };
  return f[formacao] || f["4-4-2"];
}

// Gerar lances da partida (retorna array ordenado por minuto)
function gerarLancesPartida(mandante, visitante, tecM, tecV, golsM, golsV) {
  var lances = [];
  var usados = new Set();

  function minUnico(min_base, spread) {
    var m = min_base + Math.floor(Math.random() * (spread || 5));
    m = Math.max(1, Math.min(90, m));
    while (usados.has(m)) m = Math.min(90, m + 1);
    usados.add(m);
    return m;
  }

  var escM = escalarTime(mandante, tecM);
  var escV = escalarTime(visitante, tecV);

  var ataqM = escM.filter(function(j) { return j.posicao === "ATA" || j.posicao === "MEI"; });
  var ataqV = escV.filter(function(j) { return j.posicao === "ATA" || j.posicao === "MEI"; });
  var meiM  = escM.filter(function(j) { return j.posicao === "MEI" || j.posicao === "VOL"; });
  var meiV  = escV.filter(function(j) { return j.posicao === "MEI" || j.posicao === "VOL"; });

  function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  // Gols mandante
  var minutosGolM = [];
  for (var i = 0; i < golsM; i++) {
    var minuto = minUnico(5 + Math.floor(Math.random() * 85), 3);
    minutosGolM.push(minuto);
    var marcador = rand(ataqM) || rand(escM);
    var assistente = Math.random() > 0.35 ? rand(meiM.filter(function(j) { return j.id !== marcador.id; })) : null;

    lances.push({
      minuto: minuto,
      tipo: "gol",
      time: "mandante",
      texto: "⚽ GOL! " + marcador.nome + " marca para o " + mandante.nome + (assistente ? " (assist: " + assistente.nome + ")" : ""),
      jogadorId: marcador.id,
      assistenteId: assistente ? assistente.id : null,
      clube: mandante
    });
  }

  // Gols visitante
  for (var i = 0; i < golsV; i++) {
    var minuto = minUnico(5 + Math.floor(Math.random() * 85), 3);
    var marcador = rand(ataqV) || rand(escV);
    var assistente = Math.random() > 0.35 ? rand(meiV.filter(function(j) { return j.id !== marcador.id; })) : null;

    lances.push({
      minuto: minuto,
      tipo: "gol",
      time: "visitante",
      texto: "⚽ GOL! " + marcador.nome + " marca para o " + visitante.nome + (assistente ? " (assist: " + assistente.nome + ")" : ""),
      jogadorId: marcador.id,
      assistenteId: assistente ? assistente.id : null,
      clube: visitante
    });
  }

  // Lances extras (chutes, defesas, faltas)
  var tiposExtra = [
    { tipo: "chute",  textos: ["Chute de {j} para fora", "Finalização de {j} defendida pelo goleiro", "{j} tenta de longe, vai pra fora"] },
    { tipo: "defesa", textos: ["Grande defesa! Goleiro salva chute de {j}", "Goleiro espalmou tentativa de {j}"] },
    { tipo: "falta",  textos: ["{j} sofre falta perigosa na intermediária", "Falta dura em {j}"] },
    { tipo: "escanteio", textos: ["Escanteio para {nome}", "Cobrança de escanteio — ninguém alcança"] }
  ];

  // Cartões amarelos (1-3 por partida)
  var qtdAmarelos = 1 + Math.floor(Math.random() * 3);
  for (var ca = 0; ca < qtdAmarelos; ca++) {
    var ehMandanteA = Math.random() > 0.5;
    var escA = ehMandanteA ? escM : escV;
    var clubeA = ehMandanteA ? mandante : visitante;
    var jA = rand(escA);
    if (jA) {
      jA.cartoes_amarelos = (jA.cartoes_amarelos || 0) + 1;
      var textoAmarelo = "🟨 Cartão amarelo! " + jA.nome.split(" ")[0] + " (" + clubeA.nome + ")";
      if (jA.cartoes_amarelos >= 2) {
        textoAmarelo = "🟥 EXPULSO! " + jA.nome.split(" ")[0] + " leva segundo amarelo (" + clubeA.nome + ")";
        jA.cartoes_amarelos = 0;
        lances.push({ minuto: minUnico(30 + Math.floor(Math.random()*55), 2), tipo: "vermelho", time: ehMandanteA?"mandante":"visitante", texto: textoAmarelo, jogadorId: jA.id });
      } else {
        lances.push({ minuto: minUnico(10 + Math.floor(Math.random()*75), 2), tipo: "amarelo", time: ehMandanteA?"mandante":"visitante", texto: textoAmarelo, jogadorId: jA.id });
      }
    }
  }

  // Cartão vermelho direto (raro, ~15% das partidas)
  if (Math.random() < 0.15) {
    var ehMandanteV2 = Math.random() > 0.5;
    var escV2 = ehMandanteV2 ? escM : escV;
    var clubeV2 = ehMandanteV2 ? mandante : visitante;
    var jV2 = rand(escV2);
    if (jV2) {
      jV2.cartoes_vermelhos = (jV2.cartoes_vermelhos||0)+1;
      lances.push({ minuto: minUnico(20+Math.floor(Math.random()*65),2), tipo:"vermelho", time:ehMandanteV2?"mandante":"visitante",
        texto:"🟥 EXPULSO! "+jV2.nome.split(" ")[0]+" recebe vermelho direto ("+clubeV2.nome+")", jogadorId:jV2.id });
    }
  }

  var qtdExtra = 8 + Math.floor(Math.random() * 6);
  for (var i = 0; i < qtdExtra; i++) {
    var ehMandante = Math.random() > 0.5;
    var esc = ehMandante ? escM : escV;
    var clube = ehMandante ? mandante : visitante;
    var j = rand(esc);
    var tipo = tiposExtra[Math.floor(Math.random() * tiposExtra.length)];
    var textosT = tipo.textos;
    var texto = textosT[Math.floor(Math.random() * textosT.length)]
      .replace("{j}", j.nome)
      .replace("{nome}", clube.nome);

    lances.push({
      minuto: minUnico(1 + Math.floor(Math.random() * 89), 2),
      tipo: tipo.tipo,
      time: ehMandante ? "mandante" : "visitante",
      texto: texto
    });
  }

  // Intervalo
  lances.push({ minuto: 45, tipo: "intervalo", texto: "⏸ Intervalo — " + mandante.nome + " " + golsM + " x " + golsV + " " + visitante.nome });

  // Apito final
  lances.push({ minuto: 90, tipo: "fim", texto: "⏱ Fim de jogo! " + mandante.nome + " " + golsM + " x " + golsV + " " + visitante.nome });

  return lances.sort(function(a, b) { return a.minuto - b.minuto; });
}

// Calcular notas dos jogadores
function calcularNotasJogadores(escalados, lancesPartida, clube, resultado, ehMandante) {
  var notas = {};

  escalados.forEach(function(j) {
    // Base: overall normalizado entre 5.0 e 7.5
    var base = 5.0 + (j.overall - 60) / 40 * 2.5;

    // Variação aleatória ±1.0
    var variacao = (Math.random() * 2 - 1) * 1.0;

    // Bônus por resultado
    var meusGols = ehMandante ? resultado.golsMandante : resultado.golsVisitante;
    var delesGols = ehMandante ? resultado.golsVisitante : resultado.golsMandante;
    var bonusResultado = meusGols > delesGols ? 0.5 : meusGols < delesGols ? -0.5 : 0;

    // Bônus por gol
    var bonusGol = 0;
    lancesPartida.forEach(function(l) {
      if (l.tipo === "gol" && l.jogadorId === j.id) bonusGol += 1.2;
      if (l.tipo === "gol" && l.assistenteId === j.id) bonusGol += 0.7;
    });

    var nota = Math.max(3.0, Math.min(10.0, base + variacao + bonusResultado + bonusGol));
    notas[j.id] = Math.round(nota * 10) / 10;
  });

  return notas;
}

// Aplicar resultados da partida nos jogadores (stats persistentes)
function aplicarResultadosJogadores(escalados, lancesPartida, notas) {
  escalados.forEach(function(j) {
    if (!j.stats) j.stats = { jogos: 0, gols: 0, assistencias: 0, nota_media: 0 };

    j.stats.jogos++;

    // Contar gols e assistências
    lancesPartida.forEach(function(l) {
      if (l.tipo === "gol" && l.jogadorId === j.id) j.stats.gols++;
      if (l.tipo === "gol" && l.assistenteId === j.id) j.stats.assistencias++;
    });

    // Atualizar média de notas
    var nota = notas[j.id] || 6.0;
    j.stats.nota_media = Math.round(
      ((j.stats.nota_media * (j.stats.jogos - 1) + nota) / j.stats.jogos) * 10
    ) / 10;

    // Valorização/desvalorização baseada na nota
    if (j.stats.jogos >= 3) {
      var fator = (j.stats.nota_media - 6.5) / 10;
      j.valor_mercado = Math.round(j.valor_mercado * (1 + fator * 0.05));
      j.clausula_rescisoria = Math.round(j.valor_mercado * (j.overall >= 82 ? 2.5 : 2.0));
    }
  });
}

// ════════════════════════════════════════
// FADIGA E SUBSTITUIÇÕES
// ════════════════════════════════════════

// Calcular fadiga acumulada de um jogador (0-100)
function getFadiga(jogador) {
  return jogador.fadiga || 0;
}

// Aumentar fadiga durante a partida (por minuto jogado)
function calcularFadigaPartida(jogador, minutosJogados) {
  var fisico = 70; // base
  // Jogadores com overall maior tendem a ter melhor físico
  var resistencia = 0.5 + (jogador.overall - 60) / 80;
  var ganho = (minutosJogados / 90) * (35 + Math.random() * 20) / resistencia;
  return Math.min(100, (jogador.fadiga || 0) + ganho);
}

// Recuperar fadiga entre rodadas
function recuperarFadigaElenco(clube) {
  clube.jogadores.forEach(function(j) {
    var fadiga = j.fadiga || 0;
    // Recupera 30-45% entre rodadas
    j.fadiga = Math.max(0, fadiga - (30 + Math.random() * 15));
  });
}

// Penalidade de fadiga no overall efetivo
function overallEfetivo(jogador) {
  var fadiga = jogador.fadiga || 0;
  if (fadiga < 70) return jogador.overall;
  var penalidade = (fadiga - 70) / 30 * 10; // até -10 overall
  return Math.max(40, jogador.overall - penalidade);
}

// Lógica do técnico para substituições
// parada: 1, 2 ou 3
// retorna array de { sai, entra, motivo }
function tecnicoDecideSubstituicoes(escAtual, reservas, parada, subsRestantes, paradasRestantes) {
  if (subsRestantes <= 0 || paradasRestantes <= 0) return [];

  var substituicoes = [];
  var maxNestaParada = parada === 1 ? 2 : Math.min(subsRestantes, 2); // 1a parada até 2, depois até o limite

  // Ordenar por fadiga desc
  var candidatos = escAtual.filter(function(j) {
    return j.posicao !== "GOL"; // goleiro raramente sai
  }).sort(function(a, b) {
    return (b.fadiga || 0) - (a.fadiga || 0);
  });

  candidatos.forEach(function(saindo) {
    if (substituicoes.length >= maxNestaParada) return;
    if ((saindo.fadiga || 0) < 65) return; // só substitui se fadiga alta

    // Achar reserva da mesma posição com menor fadiga
    var entrando = reservas.filter(function(r) {
      return r.posicao === saindo.posicao &&
             !substituicoes.find(function(s) { return s.entra.id === r.id; });
    }).sort(function(a, b) {
      return (a.fadiga || 0) - (b.fadiga || 0);
    })[0];

    if (!entrando) return; // sem reserva disponível

    substituicoes.push({
      sai: saindo,
      entra: entrando,
      motivo: "Fadiga " + Math.round(saindo.fadiga || 0) + "%"
    });
  });

  return substituicoes;
}

// Aplicar substituição no array de escalados
function aplicarSubstituicao(escAtual, sub) {
  // Marcar flags
  sub.sai._substituido = true;
  sub.entra._entrouSub = true;
  // Substituir na posição correta — NÃO adicionar de volta ao array
  // (quem saiu fica acessível via jogoAtivo.substituidos para exibição)
  var idx = escAtual.findIndex(function(j) { return j.id === sub.sai.id; });
  if (idx >= 0) escAtual[idx] = sub.entra;
  return escAtual;
}

    var ends   = { 1:0.05, 2:0.88, 3:0.88, 4:0.90, 5:0.92 };
    var start = starts[nLinhas] || 0.05;
    var end   = ends[nLinhas]   || 0.90;
    for (var li=0; li<nLinhas; li++) {
      if (nLinhas === 1) { yPos.push(0.05); }
      else { yPos.push(start + li * (end-start)/(nLinhas-1)); }
    }

    // Mapear jogadores por posição
    var disponiveis = {};
    esc.forEach(function(j) {
      if (!disponiveis[j.posicao]) disponiveis[j.posicao] = [];
      disponiveis[j.posicao].push(j);
    });
    // Contadores de uso
    var usados = {};

    linhasFixas.forEach(function(linhaPos, linhaIdx) {
      var linhaY = yPos[linhaIdx] || 0.5;
      var jogsDaLinha = [];

      linhaPos.forEach(function(pos) {
        if (!usados[pos]) usados[pos] = 0;
        var arr = disponiveis[pos] || [];
        if (usados[pos] < arr.length) {
          jogsDaLinha.push(arr[usados[pos]]);
          usados[pos]++;
        }
      });

      // Distribuir horizontalmente
      var total = jogsDaLinha.length;
      jogsDaLinha.forEach(function(j, idx) {
        var p = posicaoCampo(j.posicao, idx, total, lado, linhaY);
        var cx = Math.round(18 + p.x * 324);
        var cy = Math.round(18 + p.y * 484);
        var fadiga = Math.round(j.fadiga || 0);
        var corFadiga = fadiga >= 75 ? "#e74c3c" : fadiga >= 50 ? "#f1c40f" : "#2ecc71";
        var corFinal = j._substituido ? "#555" : corCirculo;

        html += '<circle cx="' + cx + '" cy="' + cy + '" r="13" fill="' + corFinal + '" stroke="#fff" stroke-width="1.5" opacity="0.95"/>';
        var ovEf = Math.round(overallEfetivo(j));
        html += '<text x="' + cx + '" y="' + (cy+4) + '" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">' + ovEf + '</text>';
        var nome = j.nome.split(" ")[0];
        if (nome.length > 8) nome = nome.substring(0,7)+".";
        html += '<text x="' + cx + '" y="' + (cy+22) + '" text-anchor="middle" fill="#eee" font-size="7.5">' + nome + '</text>';
        var barW = 26;
        var barFill = Math.round((fadiga/100)*barW);
        html += '<rect x="' + (cx-13) + '" y="' + (cy+25) + '" width="' + barW + '" height="3" fill="#333" rx="1.5"/>';
        html += '<rect x="' + (cx-13) + '" y="' + (cy+25) + '" width="' + barFill + '" height="3" fill="' + corFadiga + '" rx="1.5"/>';
      });
    });
  }

  var formV = tecV ? tecV.formacao : "4-4-2";
  var formM = tecM ? tecM.formacao : "4-4-2";

  renderJogs(escV, "esq", visitante.cor || "#2980b9", formV);
  renderJogs(escM, "dir", mandante.cor  || "#e67e22", formM);

  // Labels
  if (tecV) html += '<text x="180" y="13" text-anchor="middle" fill="#9be" font-size="9" font-weight="600">' + visitante.nome + ' · ' + (tecV ? tecV.formacao : '') + '</text>';
  if (tecM) html += '<text x="180" y="515" text-anchor="middle" fill="#fb9" font-size="9" font-weight="600">' + mandante.nome + ' · ' + (tecM ? tecM.formacao : '') + '</text>';

  html += '</svg>';
  return html;
}

function iniciarPartidaAoVivo() {
  // Evitar dupla inicialização
  if (jogoAtivo && jogoAtivo.timer) return;
  if (jogoAtivo && jogoAtivo.iniciado) return;

  // Marcar como iniciada
  jogoAtivo.iniciado = true;
  _partidaPausada = false;

  // Esconder botão iniciar
  var acoeswrap = document.getElementById("jogo-acoes-wrap");
  if (acoeswrap) acoeswrap.innerHTML = '<button class="btn-simular-grande" disabled style="opacity:.5;cursor:default">⏱ Em andamento...</button>';

  // Simular resultado
  var r = simularPartidaSimples(
    jogoAtivo.mandante, jogoAtivo.visitante,
    jogoAtivo.tecMandante, jogoAtivo.tecVisitante
  );
  jogoAtivo.resultado = r;
  jogoAtivo.golsM = r.golsMandante;
  jogoAtivo.golsV = r.golsVisitante;

  // Gerar lances
  var lances = gerarLancesPartida(
    jogoAtivo.mandante, jogoAtivo.visitante,
    jogoAtivo.tecMandante, jogoAtivo.tecVisitante,
    r.golsMandante, r.golsVisitante
  );
  jogoAtivo.lances = lances;

  // Iniciar fadiga inicial dos titulares
  jogoAtivo.escMandante.forEach(function(j) { j.fadiga = j.fadiga || 0; });
  jogoAtivo.escVisitante.forEach(function(j) { j.fadiga = j.fadiga || 0; });

  var golsExibidosM = 0, golsExibidosV = 0;
  var lancesExibidos = 0;
  var chutesM = 0, chutesV = 0;
  var minAtual = 0;
  var totalMs = 30000;
  var intervalo = totalMs / 90;
  // Paradas: 45, 60, 75
  var paradasFeitas = { 45: false, 60: false, 75: false };

  jogoAtivo.idxLance = 0;
  jogoAtivo.golsExibidosM = 0;
  jogoAtivo.golsExibidosV = 0;
  jogoAtivo.lancesExibidos = [];
  jogoAtivo.paradasFeitas = { 45:false, 60:false, 75:false };

  jogoAtivo.timer = setInterval(function() {
    minAtual++;
    jogoAtivo.minAtual = minAtual;

    // Atualizar cronômetro
    var cron = document.getElementById("cronometro");
    if (cron) cron.textContent = minAtual + "'";

    // Atualizar fadiga dos em campo
    jogoAtivo.escMandante.forEach(function(j) {
      j.fadiga = Math.min(100, (j.fadiga || 0) + (0.4 + Math.random() * 0.2) / (0.5 + (j.overall - 60) / 80));
    });
    jogoAtivo.escVisitante.forEach(function(j) {
      j.fadiga = Math.min(100, (j.fadiga || 0) + (0.4 + Math.random() * 0.2) / (0.5 + (j.overall - 60) / 80));
    });

    // Paradas do técnico
    [45, 60, 75].forEach(function(parada) {
      if (minAtual === parada && !paradasFeitas[parada]) {
        paradasFeitas[parada] = true;
        var paradaNum = parada === 45 ? 1 : parada === 60 ? 2 : 3;

        // Mandante
        var subsM = tecnicoDecideSubstituicoes(
          jogoAtivo.escMandante, jogoAtivo.reservasMandante,
          paradaNum, 5 - jogoAtivo.subsM, 3 - jogoAtivo.paradasM
        );
        if (subsM.length > 0) {
          jogoAtivo.paradasM++;
          subsM.forEach(function(sub) {
            if (jogoAtivo.subsM >= 5) return;
            jogoAtivo.saidosM.push(sub.sai);
            jogoAtivo.escMandante = aplicarSubstituicao(jogoAtivo.escMandante, sub);
            jogoAtivo.subsM++;
            adicionarLanceFeed({
              minuto: parada,
              tipo: "substituicao",
              texto: "🔄 " + jogoAtivo.mandante.nome + ": entra " + sub.entra.nome + ", sai " + sub.sai.nome + " (" + sub.motivo + ")"
            });
          });
        }

        // Visitante
        var subsV = tecnicoDecideSubstituicoes(
          jogoAtivo.escVisitante, jogoAtivo.reservasVisitante,
          paradaNum, 5 - jogoAtivo.subsV, 3 - jogoAtivo.paradasV
        );
        if (subsV.length > 0) {
          jogoAtivo.paradasV++;
          subsV.forEach(function(sub) {
            if (jogoAtivo.subsV >= 5) return;
            jogoAtivo.saidosV.push(sub.sai);
            jogoAtivo.escVisitante = aplicarSubstituicao(jogoAtivo.escVisitante, sub);
            jogoAtivo.subsV++;
            adicionarLanceFeed({
              minuto: parada,
              tipo: "substituicao",
              texto: "🔄 " + jogoAtivo.visitante.nome + ": entra " + sub.entra.nome + ", sai " + sub.sai.nome + " (" + sub.motivo + ")"
            });
          });
        }

        // Atualizar campo
        var campoWrap = document.getElementById("campo-wrap");
        if (campoWrap) {
          campoWrap.innerHTML = renderCampoTatico(
            jogoAtivo.escMandante, jogoAtivo.escVisitante,
            jogoAtivo.mandante, jogoAtivo.visitante,
            jogoAtivo.tecMandante, jogoAtivo.tecVisitante
          );
        }

        // Atualizar contador de subs
        var sm = document.getElementById("sv-subs-m");
        var sv = document.getElementById("sv-subs-v");
        if (sm) sm.textContent = jogoAtivo.subsM + "/5";
        if (sv) sv.textContent = jogoAtivo.subsV + "/5";
      }
    });

    // Exibir lances do minuto
    while (lancesExibidos < lances.length && lances[lancesExibidos].minuto <= minAtual) {
      var lance = lances[lancesExibidos];
      adicionarLanceFeed(lance);

      if (lance.tipo === "gol") {
        if (lance.time === "mandante") golsExibidosM++;
        else golsExibidosV++;
        var pn = document.getElementById("placar-numeros");
        if (pn) pn.textContent = golsExibidosM + " – " + golsExibidosV;
      }
      if (lance.tipo === "chute" || lance.tipo === "gol") {
        if (lance.time === "mandante") chutesM++;
        else chutesV++;
        // barras atualizadas via atualizarPainelStats()
      }
      lancesExibidos++;
    }

    // Posse
    var fM = r.forcaMandante.forca;
    var fV = r.forcaVisitante.forca;
    var posseM = Math.max(30, Math.min(70, Math.round(50 + (fM-fV)*0.2 + (Math.random()*4-2))));
    var spm = document.getElementById("sv-posse-m");
    var spv = document.getElementById("sv-posse-v");
    if (spm) spm.textContent = posseM + "%";
    if (spv) spv.textContent = (100-posseM) + "%";

    // Atualizar campo a cada 10 minutos (fadiga)
    if (minAtual % 10 === 0) {
      var cw = document.getElementById("campo-wrap");
      if (cw) cw.innerHTML = renderCampoTatico(
        jogoAtivo.escMandante, jogoAtivo.escVisitante,
        jogoAtivo.mandante, jogoAtivo.visitante,
        jogoAtivo.tecMandante, jogoAtivo.tecVisitante
      );
    }

    if (minAtual >= 90) {
      clearInterval(jogoAtivo.timer);
      jogoAtivo.timer = null;
      try { finalizarPartida(); } catch(e) {
        console.error("Erro em finalizarPartida:", e);
        var aw = document.getElementById("jogo-acoes-wrap");
        if (aw) aw.innerHTML = '<button class="btn-primario" style="width:100%;font-size:16px;padding:14px" onclick="voltarAoDashboard()">← Voltar ao Dashboard</button>';
      }
    }
  }, intervalo);
}

function adicionarLanceFeed(lance) {
  var lista = document.getElementById("lances-lista");
  if (!lista) return;
  var vazio = lista.querySelector(".lance-vazio");
  if (vazio) lista.removeChild(vazio);
  var div = document.createElement("div");
  var cls = "lance-item";
  if (lance.tipo === "gol")         cls += " lance-gol";
  if (lance.tipo === "substituicao")cls += " lance-sub";
  if (lance.tipo === "intervalo")   cls += " lance-intervalo";
  if (lance.tipo === "fim")         cls += " lance-fim";
  if (lance.tipo === "amarelo")     cls += " lance-amarelo";
  if (lance.tipo === "vermelho")    cls += " lance-vermelho";
  // Borda e fundo colorido pela cor real do time
  var corTime = null;
  if (lance.time === 'mandante' && jogoAtivo && jogoAtivo.mandante) {
    corTime = jogoAtivo.mandante.cor || '#fb9';
  } else if (lance.time === 'visitante' && jogoAtivo && jogoAtivo.visitante) {
    corTime = jogoAtivo.visitante.cor || '#9be';
  }
  if (corTime) {
    div.style.borderLeft = '3px solid ' + corTime;
    div.style.background = corTime.replace('#','rgba(').replace(')',',0.08)') ||
      'rgba(79,142,247,0.06)';
    // fallback limpo para hex
    div.style.background = 'rgba(0,0,0,0)';
    div.style.borderLeft = '3px solid ' + corTime;
    // usar opacity em vez de rgba para preservar cores hex
    var overlay = document.createElement('div');
    overlay.style.cssText = 'position:absolute;inset:0;background:'+corTime+';opacity:.07;border-radius:inherit;pointer-events:none';
    div.style.position = 'relative';
    div.appendChild(overlay);
  }
  div.className = cls;
  div.innerHTML = '<span class="lance-min">' + lance.minuto + '\'</span><span class="lance-texto">' + lance.texto + '</span>';
  lista.appendChild(div);
  lista.scrollTop = lista.scrollHeight;

  // Atualizar listas laterais se houve substituição
  if (lance.tipo === "substituicao") {
    atualizarListasLaterais();
  }
  // Atualizar painel de stats a cada lance
  atualizarPainelStats();
}

function atualizarPainelStats() {
  // Atualizar barras via DOM (sem re-render total)
  _atualizarBarrasDOM();
  _atualizarPosseDOM();
  _atualizarResumoDOM();
}

function _atualizarBarrasDOM() {
  if (!jogoAtivo) return;
  var cM  = jogoAtivo.chutesM    || 0, cV  = jogoAtivo.chutesV    || 0;
  var cgM = jogoAtivo.chutesGolM || 0, cgV = jogoAtivo.chutesGolV || 0;
  var gM  = jogoAtivo.golsM      || 0, gV  = jogoAtivo.golsV      || 0;
  function upBarra(id, vM, vV, max) {
    var pM = max>0?Math.round((vM/max)*100):0;
    var pV = max>0?Math.round((vV/max)*100):0;
    var em = document.getElementById('sb-'+id+'-m');
    var ev = document.getElementById('sb-'+id+'-v');
    var bm = document.getElementById('sb-'+id+'-bm');
    var bv = document.getElementById('sb-'+id+'-bv');
    if(em) em.textContent = vM;
    if(ev) ev.textContent = vV;
    if(bm) bm.style.width = pM+'%';
    if(bv) bv.style.width = pV+'%';
  }
  var maxC  = Math.max(cM+cV, 1);
  var maxCg = Math.max(cgM+cgV, 1);
  var maxG  = Math.max(gM+gV, 1);
  upBarra('chutes', cM, cV, maxC);
  upBarra('nogol',  cgM, cgV, maxCg);
  upBarra('gols',   gM, gV, maxG);
}

function _atualizarResumoDOM() {

  var eventos = (jogoAtivo ? jogoAtivo.lancesExibidos||[] : []).filter(function(l){
    return l.tipo==='gol'||l.tipo==='amarelo'||l.tipo==='vermelho';
  });

  // Garantir que a seção de resumo existe no painel
  var el = document.getElementById('stats-resumo');
  if (!el) {
    var titEl = document.getElementById('stats-resumo-titulo');
    if (!titEl) {
      var sec = document.createElement('div');
      sec.id = 'stats-resumo-wrap';
      sec.innerHTML = '<div class="stats-titulo" id="stats-resumo-titulo" style="margin-top:6px">Resumo</div><div class="stats-eventos" id="stats-resumo"></div>';
      painel.appendChild(sec);
    }
    el = document.getElementById('stats-resumo');
  }
  if (!el) return;

  // Mostrar/ocultar seção
  var wrap = document.getElementById('stats-resumo-wrap');
  if (wrap) wrap.style.display = eventos.length > 0 ? '' : 'none';

  eventos.forEach(function(l) {
    var icone = l.tipo==='gol'?'⚽':l.tipo==='amarelo'?'🟨':'🟥';
    var txt = l.texto.replace(/GOL! /,'').replace(/ para o .+\)/,'').replace(/Cartão amarelo! /,'').replace(/EXPULSO! /,'');
    var div = document.createElement('div');
    div.className = 'stats-evento-item';
    div.innerHTML = '<span class="stats-evento-min">'+l.minuto+"'</span><span class='stats-evento-txt'>"+icone+' '+txt+'</span>';
    el.appendChild(div);

function finalizarPartida() {
  var r          = jogoAtivo.resultado;
  var euMandante = jogoAtivo.euMandante;
  var mandante   = jogoAtivo.mandante;
  var visitante  = jogoAtivo.visitante;
  var lances     = jogoAtivo.lances;
  var meuClube   = estado.meuClube;
  // escMandante/Visitante já contém os substitutos no lugar dos titulares
  // Adicionar também os jogadores que saíram (para ter nota na tabela)
  var escAtual   = euMandante ? jogoAtivo.escMandante    : jogoAtivo.escVisitante;
  var saidosAtual= euMandante ? (jogoAtivo.saidosM||[])  : (jogoAtivo.saidosV||[]);
  var reservas   = euMandante ? jogoAtivo.reservasMandante : jogoAtivo.reservasVisitante;

  // meuEsc = quem está em campo agora + quem saiu por substituição
  var meuEsc = escAtual.slice().concat(saidosAtual.filter(function(j){
    return !escAtual.find(function(e){ return e.id===j.id; });
  }));
  var escInicial = escAtual;

  // Para calcular notas de todo mundo que participou (mandante e visitante)
  var escMAtual = jogoAtivo.escMandante.slice().concat((jogoAtivo.saidosM||[]).filter(function(j){
    return !jogoAtivo.escMandante.find(function(e){ return e.id===j.id; });
  }));
  var escVAtual = jogoAtivo.escVisitante.slice().concat((jogoAtivo.saidosV||[]).filter(function(j){
    return !jogoAtivo.escVisitante.find(function(e){ return e.id===j.id; });
  }));
  var escMComSubs = escMAtual;
  var escVComSubs = escVAtual;
  var notasM = calcularNotasJogadores(escMComSubs, lances, mandante, r, true);
  var notasV = calcularNotasJogadores(escVComSubs, lances, visitante, r, false);
  var minhasNotas = euMandante ? notasM : notasV;

  // Aplicar stats nos jogadores do meu time
  aplicarResultadosJogadores(meuEsc, lances, minhasNotas);

  // Atualizar fadiga real dos jogadores
  meuClube.jogadores.forEach(function(j) {
    var emCampo = meuEsc.find(function(e) { return e.id === j.id; });
    if (emCampo) j.fadiga = emCampo.fadiga;
  });

  // Salvar resultado
  estado.resultados.push({
    rodada: jogoAtivo.rodadaIdx,
    mandanteId: mandante.id, visitanteId: visitante.id,
    golsMandante: r.golsMandante, golsVisitante: r.golsVisitante,
    eventos: lances.filter(function(l) { return l.tipo === "gol"; }).map(function(l) {
      return { minuto: l.minuto, texto: l.texto };
    }),
    forcaMandante: r.forcaMandante, forcaVisitante: r.forcaVisitante
  });

  // Outros jogos da rodada — usar buscarClubePorId para cobrir todas divisões
  var cal = estado.calendario[jogoAtivo.rodadaIdx];
  var ehPaulistaDiv = estado.minhaDivisao && estado.minhaDivisao.indexOf('paulista_') === 0;
  var arrOutros = ehPaulistaDiv
    ? (estado.resultadosPaulista || (estado.resultadosPaulista = []))
    : estado.resultados;

  cal.jogos.forEach(function(jogo) {
    if (jogo.mandanteId === mandante.id && jogo.visitanteId === visitante.id) return;
    var m2 = buscarClubePorId(jogo.mandanteId);
    var v2 = buscarClubePorId(jogo.visitanteId);
    if (!m2 || !v2) return; // ignorar jogos com clube não encontrado
    var tM2 = getTecnicoClube(m2);
    var tV2 = getTecnicoClube(v2);
    var r2  = simularPartidaSimples(m2, v2, tM2, tV2);
    arrOutros.push({
      rodada: jogoAtivo.rodadaIdx,
      mandanteId: jogo.mandanteId, visitanteId: jogo.visitanteId,
      golsMandante: r2.golsMandante, golsVisitante: r2.golsVisitante,
      eventos: r2.eventos, forcaMandante: r2.forcaMandante, forcaVisitante: r2.forcaVisitante
    });
  });

  estado.rodadaAtual = jogoAtivo.rodadaIdx + 1;
  processarMercadoRodada(jogoAtivo.rodadaIdx);

  // Notícias e inbox
  var meusG = euMandante ? r.golsMandante : r.golsVisitante;
  var delesG= euMandante ? r.golsVisitante : r.golsMandante;
  var adv   = euMandante ? visitante : mandante;
  var txt   = meusG > delesG ? "Vitória" : meusG < delesG ? "Derrota" : "Empate";
  adicionarNoticia(txt + " " + meusG + "x" + delesG + " contra o " + adv.nome + " (Rod. " + (jogoAtivo.rodadaIdx+1) + ")", jogoAtivo.rodadaIdx);
  estado.inbox = estado.inbox || [];
  estado.inbox.push({
    id: "res_" + jogoAtivo.rodadaIdx,
    titulo: txt + " " + meusG + "x" + delesG + " · " + adv.nome,
    remetente: "Imprensa",
    texto: meuClube.nome + " " + txt.toLowerCase() + " por " + meusG + " a " + delesG + " contra " + adv.nome + " - Rodada " + (jogoAtivo.rodadaIdx+1),
    lida: false
  });

  salvarJogo();
  if (typeof desbloquearMenuPartida !== 'undefined') desbloquearMenuPartida();
  renderTelaRodadaCompleta(meuEsc, minhasNotas, r, euMandante, jogoAtivo.rodadaIdx);
}

// ── Tela: todos os resultados da rodada ──
// ── TELA 1: Resultado + Notas detalhadas ──
function renderTelaRodadaCompleta(meuEsc, notas, resultado, euMandante, rodadaIdx) {
  // Guardar contexto para as próximas telas
  window._posJogoCtx = { meuEsc: meuEsc, notas: notas, resultado: resultado, euMandante: euMandante, rodadaIdx: rodadaIdx };
  var mandante  = jogoAtivo ? jogoAtivo.mandante : window._posJogoMandante;
  var visitante = jogoAtivo ? jogoAtivo.visitante : window._posJogoVisitante;
  var lances    = jogoAtivo ? jogoAtivo.lances : [];
  // Guardar mandante/visitante para telas seguintes
  window._posJogoMandante = mandante;
  window._posJogoVisitante = visitante;
  window._posJogoLances = lances;

  var meusG = euMandante ? resultado.golsMandante : resultado.golsVisitante;
  var delesG= euMandante ? resultado.golsVisitante : resultado.golsMandante;
  var res   = meusG > delesG ? "vitoria" : meusG < delesG ? "derrota" : "empate";

  html += mandante.nome+' <span style="font-size:36px;color:var(--accent);margin:0 16px">'+resultado.golsMandante+' – '+resultado.golsVisitante+'</span> '+visitante.nome;
  html += '</div></div>';

  html += '<div class="fin-secao-titulo" style="margin-bottom:10px">📊 Avaliação dos jogadores</div>';
  html += '<table class="elenco-tabela"><thead><tr>';

  html += '</tr></thead><tbody>';

  meuEsc.forEach(function(j) {
    var nota = notas[j.id] || 6.0;
    var corNota = nota>=7.5?'var(--green)':nota>=6.5?'var(--yellow)':'var(--red)';
    // Contar eventos do jogador nos lances
    var gols = 0, assists = 0, amarelos = 0, vermelhos = 0;

      if (l.jogadorId === j.id) {

// ── TELA 2: Todos os resultados da rodada ──
function renderTelaResultadosRodada() {
  var ctx = window._posJogoCtx || {};
  var rodadaIdx = ctx.rodadaIdx || 0;
  var ehPaulista = estado.minhaDivisao && estado.minhaDivisao.indexOf('paulista_') === 0;

  var todosResultados = [];

  if (ehPaulista) {
    // Para divisões paulistas, buscar diretamente dos jogos completados nesta rodada
    var div = estado.minhaDivisao.replace('paulista_','');
    var estDiv = div === 'b1' ? estadoPaulista.b1 : (estadoPaulista[div] || {});
    var jogosDiv = estDiv.jogos || [];

    if (div === 'b1') {
      // Bezinha: pegar última rodada interna concluída (rodada = índice round-robin)
      var _b1ok = jogosDiv.filter(function(j){ return j.ok && j.fase==='grupos'; });
      var _rodMap = {};
      _b1ok.forEach(function(j){ if(!_rodMap[j.rodada]) _rodMap[j.rodada]=[]; _rodMap[j.rodada].push(j); });
      var _rKeys = Object.keys(_rodMap).map(Number).sort(function(a,b){return b-a;});
      (_rKeys.length>0 ? _rodMap[_rKeys[0]] : []).forEach(function(j){
        todosResultados.push({ mandanteId:j.mId, visitanteId:j.vId,
          golsMandante:j.gM, golsVisitante:j.gV, rodada:rodadaIdx });
      });
    } else {
      // A1-A4: jogos com numero === rodadaIdx+1
      jogosDiv.filter(function(j){ return j.ok && j.numero === rodadaIdx+1; })
        .forEach(function(j){
          todosResultados.push({ mandanteId:j.mandanteId||j.mId, visitanteId:j.visitanteId||j.vId, golsMandante:j.gM, golsVisitante:j.gV, rodada:rodadaIdx });
        });
    }
    // Complementar com o jogo do manager (salvo em resultadosPaulista)
    var doManager = (estado.resultadosPaulista||[]).filter(function(r){ return r.rodada===rodadaIdx; });
    doManager.forEach(function(r){
      if (!todosResultados.find(function(x){ return x.mandanteId===r.mandanteId && x.visitanteId===r.visitanteId; })) {
        todosResultados.push(r);
      }
    });
  } else {
    todosResultados = estado.resultados.filter(function(r){ return r.rodada===rodadaIdx; });
  }

  var html = '<div class="tela-resultado">';
  html += '<div class="fin-secao-titulo" style="font-size:18px;margin-bottom:16px">📋 Rodada '+(rodadaIdx+1)+' — Todos os resultados</div>';
  html += '<div class="rodada-jogos-lista">';

  todosResultados.forEach(function(res) {
    var m = buscarClubePorId(res.mandanteId) || {nome:"?",sigla:"?",cor:"#555"};
    var v = buscarClubePorId(res.visitanteId) || {nome:"?",sigla:"?",cor:"#555"};
    var ehMeu = res.mandanteId===estado.meuClube.id || res.visitanteId===estado.meuClube.id;
    html += '<div class="rodada-jogo-item'+(ehMeu?' rodada-jogo-meu':'')+'">'+
      '<span class="rodada-jogo-time"><span class="escudo-mini" style="background:'+(m.cor||"#555")+'">'+m.sigla+'</span>'+m.nome+'</span>'+
      '<span class="rodada-jogo-placar">'+res.golsMandante+' – '+res.golsVisitante+'</span>'+
      '<span class="rodada-jogo-time direita">'+v.nome+'<span class="escudo-mini" style="background:'+(v.cor||"#555")+'">'+v.sigla+'</span></span>'+
      '</div>';
  });

  html += '</div>';
  html += '<div class="jogo-acoes" style="margin-top:20px">';
  html += '<button class="btn-primario" style="font-size:16px;padding:14px 40px" onclick="voltarAoDashboard()">Seguir →</button>';
  html += '</div></div>';

  document.getElementById("main").innerHTML = html;
}

// ── Controle de partida ao vivo ──
var _partidaPausada = false;

function pausarPartida() {
  if (!jogoAtivo) return;
  // Parar timer sempre
  if (jogoAtivo.timer) {
    clearInterval(jogoAtivo.timer);
    jogoAtivo.timer = null;
  }
  // Só marcar como pausada se a partida já foi iniciada
  if (jogoAtivo.iniciado) {
    _partidaPausada = true;
  }
}

function voltarParaPartida() {
  if (!jogoAtivo) return;
  // Parar qualquer timer duplicado
  if (jogoAtivo.timer) {
    clearInterval(jogoAtivo.timer);
    jogoAtivo.timer = null;
  }
  _partidaPausada = false;
  renderTelaJogoAtivo();
  // Só retomar se a partida já foi iniciada
  if (jogoAtivo.iniciado) {
    retomarPartidaTimer();
  }
}

function retomarPartidaTimer() {
  if (!jogoAtivo || jogoAtivo.timer) return;
  // Garantir campos necessários
  if (!jogoAtivo.paradasFeitas) jogoAtivo.paradasFeitas = {};
  if (!jogoAtivo.lancesExibidos) jogoAtivo.lancesExibidos = [];
  if (!jogoAtivo.saidosM) jogoAtivo.saidosM = [];
  if (!jogoAtivo.saidosV) jogoAtivo.saidosV = [];
  var totalMs = 30000;
  var minRestante = 90 - jogoAtivo.minAtual;
  var intervalo = totalMs / 90;

  jogoAtivo.timer = setInterval(function() {
    jogoAtivo.minAtual++;
    var minAtual = jogoAtivo.minAtual;

    var cron = document.getElementById("cronometro");
    if (cron) cron.textContent = minAtual + "'";

    // Fadiga
    jogoAtivo.escMandante.forEach(function(j){ j.fadiga = Math.min(100,(j.fadiga||0)+(0.4+Math.random()*0.2)/(0.5+(j.overall-60)/80)); });
    jogoAtivo.escVisitante.forEach(function(j){ j.fadiga = Math.min(100,(j.fadiga||0)+(0.4+Math.random()*0.2)/(0.5+(j.overall-60)/80)); });

    // Paradas do técnico (45, 60, 75)
    [45,60,75].forEach(function(parada) {
      if (minAtual===parada && !jogoAtivo.paradasFeitas[parada]) {
        jogoAtivo.paradasFeitas[parada]=true;
        var paradaNum = parada===45?1:parada===60?2:3;
        _processarParada(parada, paradaNum);
      }
    });

    // Lances
    while (jogoAtivo.idxLance < jogoAtivo.lances.length && jogoAtivo.lances[jogoAtivo.idxLance].minuto <= minAtual) {
      var lance = jogoAtivo.lances[jogoAtivo.idxLance];
      jogoAtivo.lancesExibidos = jogoAtivo.lancesExibidos || [];
      jogoAtivo.lancesExibidos.push(lance);
      adicionarLanceFeed(lance);
      if (lance.tipo==="gol") {
        if (lance.time==="mandante") jogoAtivo.golsExibidosM++;
        else jogoAtivo.golsExibidosV++;
        var pn=document.getElementById("placar-numeros");
        if(pn) pn.textContent=jogoAtivo.golsExibidosM+" – "+jogoAtivo.golsExibidosV;
      }
      if (lance.tipo==="chute"||lance.tipo==="gol") {
        if(lance.time==="mandante") jogoAtivo.chutesM=(jogoAtivo.chutesM||0)+1;
        else jogoAtivo.chutesV=(jogoAtivo.chutesV||0)+1;
        // barras atualizadas via atualizarPainelStats()
      }
      jogoAtivo.idxLance++;
    }

    // Posse
    try {
      var fM=(jogoAtivo.resultado&&jogoAtivo.resultado.forcaMandante)?jogoAtivo.resultado.forcaMandante.forca:50;
      var fV=(jogoAtivo.resultado&&jogoAtivo.resultado.forcaVisitante)?jogoAtivo.resultado.forcaVisitante.forca:50;
      jogoAtivo.posseMandante=Math.max(30,Math.min(70,Math.round(50+(fM-fV)*0.2+(Math.random()*4-2))));
      var spm=document.getElementById("sv-posse-m"),spv=document.getElementById("sv-posse-v");
      if(spm) spm.textContent=jogoAtivo.posseMandante+"%"; if(spv) spv.textContent=(100-jogoAtivo.posseMandante)+"%";
      _atualizarPosseDOM();
    } catch(e) {}

    if(minAtual%10===0){try{var cw=document.getElementById("campo-wrap");if(cw)cw.innerHTML=renderCampoTatico(jogoAtivo.escMandante,jogoAtivo.escVisitante,jogoAtivo.mandante,jogoAtivo.visitante,jogoAtivo.tecMandante,jogoAtivo.tecVisitante);}catch(e){}}

    if (minAtual >= 90) {
      clearInterval(jogoAtivo.timer);
      jogoAtivo.timer = null;
      try { finalizarPartida(); } catch(e) {
        console.error("Erro em finalizarPartida:", e);
        // Fallback: mostrar botão de voltar mesmo com erro
        var aw = document.getElementById("jogo-acoes-wrap");
        if (aw) aw.innerHTML = '<button class="btn-primario" style="width:100%;font-size:16px;padding:14px" onclick="voltarAoDashboard()">← Voltar ao Dashboard</button>';
      }
    }
  }, intervalo);
}

function _processarParada(parada, paradaNum) {
  var subsM = tecnicoDecideSubstituicoes(jogoAtivo.escMandante,jogoAtivo.reservasMandante,paradaNum,5-jogoAtivo.subsM,3-jogoAtivo.paradasM);
  if(subsM.length>0){
    jogoAtivo.paradasM++;
    subsM.forEach(function(sub){
      if(jogoAtivo.subsM>=5) return;
      jogoAtivo.saidosM.push(sub.sai);
      jogoAtivo.escMandante=aplicarSubstituicao(jogoAtivo.escMandante,sub);
      jogoAtivo.subsM++;
      var lance={minuto:parada,tipo:"substituicao",texto:"🔄 "+jogoAtivo.mandante.nome+": entra "+sub.entra.nome+", sai "+sub.sai.nome+" ("+sub.motivo+")"};
      jogoAtivo.lancesExibidos=jogoAtivo.lancesExibidos||[];
      jogoAtivo.lancesExibidos.push(lance);
      adicionarLanceFeed(lance);
    });
    var sm=document.getElementById("sv-subs-m"); if(sm) sm.textContent=jogoAtivo.subsM+"/5";
  }
  var subsV = tecnicoDecideSubstituicoes(jogoAtivo.escVisitante,jogoAtivo.reservasVisitante,paradaNum,5-jogoAtivo.subsV,3-jogoAtivo.paradasV);
  if(subsV.length>0){
    jogoAtivo.paradasV++;
    subsV.forEach(function(sub){
      if(jogoAtivo.subsV>=5) return;
      jogoAtivo.escVisitante=aplicarSubstituicao(jogoAtivo.escVisitante,sub);
      jogoAtivo.subsV++;
      var lance={minuto:parada,tipo:"substituicao",texto:"🔄 "+jogoAtivo.visitante.nome+": entra "+sub.entra.nome+", sai "+sub.sai.nome+" ("+sub.motivo+")"};
      jogoAtivo.lancesExibidos=jogoAtivo.lancesExibidos||[];
      jogoAtivo.lancesExibidos.push(lance);
      adicionarLanceFeed(lance);
    });
    var sv=document.getElementById("sv-subs-v"); if(sv) sv.textContent=jogoAtivo.subsV+"/5";
  }
  var cw=document.getElementById("campo-wrap");
  if(cw) cw.innerHTML=renderCampoTatico(jogoAtivo.escMandante,jogoAtivo.escVisitante,jogoAtivo.mandante,jogoAtivo.visitante,jogoAtivo.tecMandante,jogoAtivo.tecVisitante);
}

<script>// ════════════════════════════════════════
// SISTEMA FINANCEIRO
// ════════════════════════════════════════

// Configuração das fontes de receita por porte do clube
function configurarFinanceiroClube(clube) {
  if (clube.financeiro) return; // já configurado

  var tier = clube.budget >= 80000000 ? "grande" :
             clube.budget >= 40000000 ? "medio"  : "pequeno";

  var config = {
    grande:  { socio: 3500000, bilheteria: 2500000, cotas_tv: 8000000, patrocinio_camisa: 5000000, patrocinio_esportivo: 2000000, licenciados: 800000, naming_rights: 1500000, aluguel_estadio: 600000 },
    medio:   { socio: 1200000, bilheteria: 900000,  cotas_tv: 3500000, patrocinio_camisa: 1500000, patrocinio_esportivo: 700000,  licenciados: 250000, naming_rights: 400000,  aluguel_estadio: 200000 },
    pequeno: { socio: 300000,  bilheteria: 250000,  cotas_tv: 800000,  patrocinio_camisa: 300000,  patrocinio_esportivo: 150000,  licenciados: 60000,  naming_rights: 80000,   aluguel_estadio: 50000  }
  };

  clube.financeiro = {
    tier: tier,
    receitas_config: config[tier],
    historico: [],        // { rodada, tipo, descricao, valor }
    folha_mensal: 0,      // calculado dinamicamente
    resultado_acumulado: 0
  };
}

function calcularFolha(clube) {
  return clube.jogadores.reduce(function(s, j) { return s + (j.salario || 0); }, 0);
}

// Processar receitas de uma rodada
function processarReceitasRodada(clube, rodadaIdx, jogosEmCasa) {
  configurarFinanceiroClube(clube);
  var cfg = clube.financeiro.receitas_config;
  var total = 0;

  // Receitas fixas mensais (divididas por ~4 rodadas)
  var fixas = [
    { tipo: "socio",              desc: "Sócio torcedor",           valor: Math.round(cfg.socio / 4) },
    { tipo: "cotas_tv",           desc: "Cotas de TV",              valor: Math.round(cfg.cotas_tv / 4) },
    { tipo: "patrocinio_camisa",  desc: "Patrocínio camisa",        valor: Math.round(cfg.patrocinio_camisa / 4) },
    { tipo: "patrocinio_esportivo",desc:"Patrocínio esportivo",     valor: Math.round(cfg.patrocinio_esportivo / 4) },
    { tipo: "licenciados",        desc: "Produtos licenciados",     valor: Math.round(cfg.licenciados / 4) },
    { tipo: "naming_rights",      desc: "Naming rights estádio",    valor: Math.round(cfg.naming_rights / 4) }
  ];

  fixas.forEach(function(f) {
    clube.budget += f.valor;
    total += f.valor;
    clube.financeiro.historico.push({ rodada: rodadaIdx, tipo: "receita", categoria: f.tipo, descricao: f.desc, valor: f.valor });
  });

  // Bilheteria só jogos em casa
  if (jogosEmCasa > 0) {
    var bilheteria = Math.round(cfg.bilheteria * jogosEmCasa * (0.8 + Math.random() * 0.4));
    clube.budget += bilheteria;
    total += bilheteria;
    clube.financeiro.historico.push({ rodada: rodadaIdx, tipo: "receita", categoria: "bilheteria", descricao: "Bilheteria (jogo em casa)", valor: bilheteria });

    // Aluguel ocasional para shows (20% de chance)
    if (Math.random() < 0.2) {
      var aluguel = Math.round(cfg.aluguel_estadio * (0.5 + Math.random()));
      clube.budget += aluguel;
      clube.financeiro.historico.push({ rodada: rodadaIdx, tipo: "receita", categoria: "aluguel_estadio", descricao: "Aluguel estádio (evento)", valor: aluguel });
    }
  }

  // Folha salarial (despesa)
  var folha = calcularFolha(clube);
  clube.financeiro.folha_mensal = folha;
  if (rodadaIdx % 4 === 0) { // paga mensalmente (a cada 4 rodadas)
    clube.budget -= folha;
    clube.financeiro.historico.push({ rodada: rodadaIdx, tipo: "despesa", categoria: "folha", descricao: "Folha salarial mensal", valor: -folha });
  }

  clube.financeiro.resultado_acumulado += total;
}

// Registrar transferência no histórico
function registrarTransferenciaFinanceiro(clube, descricao, valor, tipo) {
  configurarFinanceiroClube(clube);
  clube.financeiro.historico.push({
    rodada: estado.rodadaAtual,
    tipo: tipo || (valor > 0 ? "receita" : "despesa"),
    categoria: "transferencia",
    descricao: descricao,
    valor: valor
  });
}

// ── Mecânicas de gestão de jogadores ──

// Colocar jogador à venda (pode coexistir com empréstimo)
function colocarAVenda(jogadorId, precoMinimo) {
  var j = estado.meuClube.jogadores.find(function(x) { return x.id === jogadorId; });
  if (!j) return;
  j.a_venda = true;
  j.preco_minimo = precoMinimo;
  adicionarNoticia("📢 " + j.nome + " está disponível para transferência por " + formatarDinheiro(precoMinimo), estado.rodadaAtual);
}

// Colocar para empréstimo (pode coexistir com venda)
function colocarParaEmprestimo(jogadorId, rodadas) {
  var j = estado.meuClube.jogadores.find(function(x) { return x.id === jogadorId; });
  if (!j) return;
  j.para_emprestimo = true;
  j.emprestimo_rodadas = rodadas;
}

// Retirar jogador da venda
function retirarDaVenda(jogadorId) {
  var j = estado.meuClube.jogadores.find(function(x) { return x.id === jogadorId; });
  if (!j) return;
  j.a_venda = false;
  j.preco_minimo = null;
}

// Retirar jogador do empréstimo
function retirarDoEmprestimo(jogadorId) {
  var j = estado.meuClube.jogadores.find(function(x) { return x.id === jogadorId; });
  if (!j) return;
  j.para_emprestimo = false;
  j.emprestimo_rodadas = null;
}

// Dispensar jogador
function dispensarJogador(jogadorId, acordoMutuo) {
  var clube = estado.meuClube;
  var j = clube.jogadores.find(function(x) { return x.id === jogadorId; });
  if (!j) return false;

  var custo = 0;
  if (!acordoMutuo) {
    // Rescisão unilateral: pagar % do salário restante
    var rodadasRestantes = Math.max(0, (j.contrato_termino || 0) - estado.rodadaAtual);
    custo = Math.round(j.salario * rodadasRestantes * 0.5);
  }

  if (custo > clube.budget) return { erro: "Sem budget para pagar rescisão de " + formatarDinheiro(custo) };

  clube.budget -= custo;
  if (custo > 0) registrarTransferenciaFinanceiro(clube, "Rescisão: " + j.nome, -custo, "despesa");

  clube.jogadores = clube.jogadores.filter(function(x) { return x.id !== jogadorId; });
  adicionarNoticia("📤 " + j.nome + " dispensado do " + clube.nome + (custo > 0 ? " por " + formatarDinheiro(custo) : " (acordo mútuo)"), estado.rodadaAtual);
  return { ok: true, custo: custo };
}

// IA propõe comprar jogador do seu clube
function simularPropostasIA() {
  if (!estado.meuClube) return;
  var meuClube = estado.meuClube;

  // 30% de chance de receber proposta por rodada
  if (Math.random() > 0.30) return;

  // Escolher um jogador atraente (overall 75+)
  var candidatos = meuClube.jogadores.filter(function(j) { return j.overall >= 75; });
  if (candidatos.length === 0) return;

  var alvo = candidatos[Math.floor(Math.random() * candidatos.length)];

  // Clube que está oferecendo
  var clubesIA = CLUBES.filter(function(c) { return c.id !== meuClube.id && c.budget >= alvo.valor_mercado * 0.8; });
  if (clubesIA.length === 0) return;

  var clubeOfertante = clubesIA[Math.floor(Math.random() * clubesIA.length)];
  var oferta = Math.round(alvo.valor_mercado * (0.85 + Math.random() * 0.4));

  // Criar mensagem no inbox
  estado.inbox = estado.inbox || [];
  estado.inbox.push({
    id: "proposta_" + alvo.id + "_" + Date.now(),
    titulo: "Proposta por " + alvo.nome,
    remetente: clubeOfertante.nome,
    texto: "O " + clubeOfertante.nome + " está interessado em contratar " + alvo.nome + " (" + alvo.posicao + " · " + alvo.overall + ") e oferece " + formatarDinheiro(oferta) + " pela transferência.",
    lida: false,
    tipo: "proposta_recebida",
    jogadorId: alvo.id,
    clubeOfertanteId: clubeOfertante.id,
    valor: oferta
  });

  adicionarNoticia("📨 " + clubeOfertante.nome + " oferece " + formatarDinheiro(oferta) + " por " + alvo.nome, estado.rodadaAtual);
}

// ── TELA FINANCEIRO ──
function renderFinanceiro() {
  var clube = estado.meuClube;
  configurarFinanceiroClube(clube);
  var hist  = clube.financeiro.historico;
  var folha = calcularFolha(clube);

  // Agrupar receitas e despesas totais
  var totalReceitas = hist.filter(function(h) { return h.tipo === "receita"; }).reduce(function(s,h) { return s + h.valor; }, 0);
  var totalDespesas = hist.filter(function(h) { return h.tipo === "despesa"; }).reduce(function(s,h) { return s + Math.abs(h.valor); }, 0);
  var resultado = totalReceitas - totalDespesas;

  // Agrupar por categoria
  var porCategoria = {};
  hist.forEach(function(h) {
    var k = h.categoria;
    if (!porCategoria[k]) porCategoria[k] = { receita: 0, despesa: 0, desc: h.descricao };
    if (h.tipo === "receita") porCategoria[k].receita += h.valor;
    else porCategoria[k].despesa += Math.abs(h.valor);
  });

  var nomeCategoria = {
    socio: "Sócio torcedor", bilheteria: "Bilheteria", cotas_tv: "Cotas de TV",
    patrocinio_camisa: "Patrocínio camisa", patrocinio_esportivo: "Patrocínio esportivo",
    licenciados: "Prod. licenciados", naming_rights: "Naming rights", aluguel_estadio: "Aluguel estádio",
    folha: "Folha salarial", transferencia: "Transferências"
  };

  var html = '<div class="fin-tela">';

  // Header
  html += '<div class="fin-header">';
  html += '<h2 class="secao-titulo" style="margin:0">💰 Financeiro — ' + clube.nome + '</h2>';
  html += '<div class="fin-caixa">Caixa: <strong style="color:var(--green)">' + formatarDinheiro(clube.caixa||clube.budget) + '</strong></div>';
  html += '</div>';

  // Cards de patrimônio (Caixa / Dívidas / Valor de Mercado / Patrimônio Líquido)
  var valorMercadoClube = calcularValorMercadoClube(clube);
  var dividas = clube.dividas || 0;
  var patrimonioLiquido = (clube.caixa||clube.budget||0) + valorMercadoClube + dividas;
  html += '<div class="fin-dre-cards">';
  html += '<div class="fin-dre-card neutro"><div class="fin-dre-label">💵 Caixa Disponível</div><div class="fin-dre-valor">' + formatarDinheiro(clube.caixa||clube.budget) + '</div></div>';
  html += '<div class="fin-dre-card ' + (dividas<0?'negativo':'neutro') + '"><div class="fin-dre-label">📉 Dívidas</div><div class="fin-dre-valor">' + (dividas<0?formatarDinheiro(dividas):'R$ 0') + '</div></div>';
  html += '<div class="fin-dre-card neutro"><div class="fin-dre-label">⚽ Valor do Elenco</div><div class="fin-dre-valor">' + formatarDinheiro(valorMercadoClube) + '</div></div>';
  html += '<div class="fin-dre-card ' + (patrimonioLiquido>=0?'positivo':'negativo') + '"><div class="fin-dre-label">📊 Patrimônio Líquido</div><div class="fin-dre-valor">' + (patrimonioLiquido>=0?'+':'') + formatarDinheiro(patrimonioLiquido) + '</div></div>';
  html += '</div>';

  if (dividas < -5000000) {
    var folhaCheck = folha;
    var mesesAteFalencia = clube.caixa > 0 ? Math.round(clube.caixa / Math.max(folhaCheck,1)) : 0;
    html += '<div class="fin-alerta-divida">⚠ Seu clube tem dívidas significativas (' + formatarDinheiro(dividas) + '). ';
    html += 'Considere pagar parcelas para evitar problemas financeiros no futuro.</div>';
  }

  // Cards DRE
  html += '<div class="fin-dre-cards" style="margin-top:8px">';
  html += '<div class="fin-dre-card receita"><div class="fin-dre-label">Total Receitas</div><div class="fin-dre-valor">' + formatarDinheiro(totalReceitas) + '</div></div>';
  html += '<div class="fin-dre-card despesa"><div class="fin-dre-label">Total Despesas</div><div class="fin-dre-valor">' + formatarDinheiro(totalDespesas) + '</div></div>';
  html += '<div class="fin-dre-card ' + (resultado >= 0 ? 'positivo' : 'negativo') + '"><div class="fin-dre-label">Resultado</div><div class="fin-dre-valor">' + (resultado >= 0 ? '+' : '') + formatarDinheiro(resultado) + '</div></div>';
  html += '<div class="fin-dre-card neutro"><div class="fin-dre-label">Folha mensal</div><div class="fin-dre-valor">' + formatarDinheiro(folha) + '</div></div>';
  html += '</div>';

  // Gráfico financeiro interativo
  html += '<div class="fin-secao-titulo" style="margin-top:20px;margin-bottom:4px">📊 Entradas e saídas</div>';
  html += '<div style="font-size:11px;color:var(--text2);margin-bottom:10px">Barras espelhadas com linha de saldo acumulado · provisões em transparência</div>';
  html += renderGraficoFinanceiro(clube);

  // Botão de pagar dívida
  if (dividas < 0) {
    html += '<div class="fin-divida-acao">';
    html += '<div class="fin-secao-titulo" style="margin-bottom:8px">💳 Quitar parte da dívida</div>';
    html += '<div style="display:flex;gap:10px;align-items:center">';
    html += '<input type="number" id="inp-pagar-divida" placeholder="Valor a pagar" step="500000" style="flex:1"/>';
    html += '<button class="btn-primario" onclick="confirmarPagamentoDivida()">Pagar</button>';
    html += '</div></div>';
  }

  // Fluxo de caixa resumido (últimas 3 entradas)
  var histRec = clube.historico_receitas || [];
  var histDesp = clube.historico_despesas || [];
  if (histRec.length > 0 || histDesp.length > 0) {
    html += '<div class="fin-secao-titulo" style="margin-bottom:8px">🔄 Fluxo de Caixa Recente</div>';
    html += '<table class="elenco-tabela" style="margin-bottom:16px"><thead><tr>';
    html += '<th>Rodada</th><th>Receitas</th><th>Folha</th><th>Dívida (parcela)</th><th>Infra</th><th>Saldo do mês</th>';
    html += '</tr></thead><tbody>';

    // Juntar rodadas de receitas e despesas
    var rodadasVistas = {};
    histRec.concat(histDesp).forEach(function(h){ rodadasVistas[h.rodada]=true; });
    var rodadasOrdenadas = Object.keys(rodadasVistas).map(Number).sort(function(a,b){return b-a;}).slice(0,6);

    rodadasOrdenadas.forEach(function(rod) {
      var rec = histRec.find(function(h){return h.rodada===rod;});
      var desp = histDesp.find(function(h){return h.rodada===rod;});
      var totalRec = rec ? rec.total : 0;
      var folha=0, divida=0, infra=0;
      if (desp) {
        desp.detalhes.forEach(function(d){
          if(d.cat==='folha') folha=d.valor;
          if(d.cat==='divida') divida=d.valor;
          if(d.cat==='infra') infra=d.valor;
        });
      }
      var saldo = totalRec + folha + divida + infra;
      var corSaldo = saldo>=0?'color:var(--green)':'color:var(--red)';
      html += '<tr>';
      html += '<td>Rod. '+rod+'</td>';
      html += '<td style="color:var(--green)">'+(totalRec>0?'+'+formatarDinheiro(totalRec):'-')+'</td>';
      html += '<td style="color:var(--red)">'+(folha<0?formatarDinheiro(folha):'-')+'</td>';
      html += '<td style="color:var(--red)">'+(divida<0?formatarDinheiro(divida):'-')+'</td>';
      html += '<td style="color:var(--red)">'+(infra<0?formatarDinheiro(infra):'-')+'</td>';
      html += '<td style="font-weight:700;'+corSaldo+'">'+(saldo>=0?'+':'')+formatarDinheiro(saldo)+'</td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
  }

  // DRE por categoria
  html += '<div class="fin-grid">';

  // Receitas
  html += '<div class="fin-secao">';
  html += '<div class="fin-secao-titulo receita-titulo">📈 Receitas</div>';
  var cats = Object.entries(porCategoria).filter(function(e) { return e[1].receita > 0; })
    .sort(function(a,b) { return b[1].receita - a[1].receita; });
  cats.forEach(function(entry) {
    var k = entry[0], v = entry[1];
    html += '<div class="fin-linha">';
    html += '<span class="fin-linha-desc">' + (nomeCategoria[k] || k) + '</span>';
    html += '<span class="fin-linha-val receita-cor">' + formatarDinheiro(v.receita) + '</span>';
    html += '</div>';
  });
  if (cats.length === 0) html += '<div class="dash-empty">Nenhuma receita registrada.</div>';
  html += '</div>';

  // Despesas
  html += '<div class="fin-secao">';
  html += '<div class="fin-secao-titulo despesa-titulo">📉 Despesas</div>';
  var catsDes = Object.entries(porCategoria).filter(function(e) { return e[1].despesa > 0; })
    .sort(function(a,b) { return b[1].despesa - a[1].despesa; });
  catsDes.forEach(function(entry) {
    var k = entry[0], v = entry[1];
    html += '<div class="fin-linha">';
    html += '<span class="fin-linha-desc">' + (nomeCategoria[k] || k) + '</span>';
    html += '<span class="fin-linha-val despesa-cor">' + formatarDinheiro(v.despesa) + '</span>';
    html += '</div>';
  });
  if (catsDes.length === 0) html += '<div class="dash-empty">Nenhuma despesa registrada.</div>';
  html += '</div>';

  html += '</div>'; // fin-grid

  // Histórico recente
  html += '<div class="fin-historico">';
  html += '<div class="fin-secao-titulo" style="margin-bottom:10px">📋 Histórico recente</div>';
  var recentes = hist.slice(-20).reverse();
  if (recentes.length === 0) {
    html += '<div class="dash-empty">Nenhum lançamento ainda.</div>';
  } else {
    html += '<table class="fin-tabela">';
    html += '<thead><tr><th>Rod.</th><th>Descrição</th><th>Valor</th></tr></thead><tbody>';
    recentes.forEach(function(h) {
      var cor = h.tipo === "receita" ? "receita-cor" : "despesa-cor";
      var sinal = h.tipo === "receita" ? "+" : "-";
      html += '<tr>';
      html += '<td class="fin-tab-rod">' + (h.rodada + 1) + '</td>';
      html += '<td>' + h.descricao + '</td>';
      html += '<td class="' + cor + ' fin-tab-val">' + sinal + formatarDinheiro(Math.abs(h.valor)) + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
  }
  html += '</div>';
  html += '</div>'; // fin-tela

  document.getElementById("main").innerHTML = html;
}


function confirmarPagamentoDivida() {
  var inp = document.getElementById("inp-pagar-divida");
  if (!inp) return;
  var valor = parseInt(inp.value);
  if (!valor || valor <= 0) { alert("Digite um valor válido."); return; }
  var clube = estado.meuClube;
  if (valor > (clube.caixa||clube.budget||0)) { alert("Você não tem caixa suficiente."); return; }
  pagarParcelaDivida(clube, valor);
  adicionarNoticia("💳 Pagamento de " + formatarDinheiro(valor) + " realizado na dívida do clube.", estado.rodadaAtual);
  salvarJogo();
  renderFinanceiro();
}


// ════════════════════════════════════════
// EVENTOS FINANCEIROS
// ════════════════════════════════════════

function processarEventoFinanceiro(ev) {
  var clube = estado.meuClube;
  if (!clube) return;

  if (ev.subtipo === 'folha') {
    // Calcular folha do mês
    var folha = clube.jogadores.reduce(function(s,j){ return s+(j.salario||0); }, 0);
    clube.caixa = (clube.caixa||0) - folha;
    clube.budget = clube.caixa;

    // Parcela automática de dívida (2%)
    var parcela = 0;
    if (clube.dividas && clube.dividas < 0) {
      parcela = Math.round(Math.abs(clube.dividas) * 0.02);
      parcela = Math.min(parcela, Math.max(0, clube.caixa * 0.25));
      clube.caixa -= parcela;
      clube.budget = clube.caixa;
      clube.dividas = (clube.dividas||0) + parcela;
    }

    // Manutenção de infraestrutura
    var infra = clube.infraestrutura || {};
    var manutencao = ((infra.estadio||1)+(infra.ct||1)+(infra.base||1)) * 50000;
    clube.caixa -= manutencao;
    clube.budget = clube.caixa;

    // Registrar no histórico de despesas
    if (!clube.historico_despesas) clube.historico_despesas = [];
    clube.historico_despesas.push({
      rodada: estado.rodadaAtual,
      mes: new Date(ev.data).getMonth() + 1,
      folha: folha,
      parcela_divida: parcela,
      manutencao: manutencao,
      total: -(folha + parcela + manutencao)
    });
    if (clube.historico_despesas.length > 12) clube.historico_despesas.shift();

    // Alerta se caixa negativo
    var total = folha + parcela + manutencao;
    var msg = '💸 Folha paga: ' + formatarDinheiro(folha) +
              (parcela > 0 ? ' · Dívida: ' + formatarDinheiro(parcela) : '') +
              ' · Manutenção: ' + formatarDinheiro(manutencao) +
              ' · Total: ' + formatarDinheiro(total) +
              ' · Saldo: ' + formatarDinheiro(clube.caixa);

    adicionarNoticia(msg, estado.rodadaAtual);
    estado.inbox = estado.inbox || [];
    estado.inbox.push({
      id: 'folha_'+Date.now(),
      titulo: '💸 Pagamento de salários — ' + formatarDinheiro(total),
      remetente: 'Departamento Financeiro',
      texto: msg + (clube.caixa < 0 ? ' ⚠️ ATENÇÃO: Caixa negativo! Venda jogadores urgente.' : ''),
      lida: false
    });

    if (clube.caixa < 0) {
      estado.inbox.push({
        id: 'caixa_neg_'+Date.now(),
        titulo: '🚨 Caixa negativo!',
        remetente: 'Diretoria',
        texto: 'Seu clube está com caixa negativo ('+formatarDinheiro(clube.caixa)+'). Isso pode resultar em penalidades. Venda jogadores ou corte custos imediatamente.',
        lida: false
      });
    }

  } else if (ev.subtipo === 'cota_tv') {
    // Cota de TV
    if (typeof pagarCotaTV !== 'undefined') {
      var cota = pagarCotaTV(clube, estado.minhaDivisao||'serieD');
      if (cota > 0) {
        adicionarNoticia('📺 Cota de TV recebida: ' + formatarDinheiro(cota), estado.rodadaAtual);
        estado.inbox.push({
          id: 'tv_'+Date.now(),
          titulo: '📺 Cota de TV creditada — ' + formatarDinheiro(cota),
          remetente: 'CBF/FPF',
          texto: 'Os direitos de transmissão da temporada foram creditados: ' + formatarDinheiro(cota) + '. Saldo atual: ' + formatarDinheiro(clube.caixa),
          lida: false
        });
      }
    }
  }

  salvarJogo();
}

// ── Gerar texto do relatório financeiro anual ──
function gerarRelatorioFinanceiroAnual() {
  var clube = estado.meuClube;
  if (!clube) return '';
  if (typeof inicializarContratosClube !== 'undefined') inicializarContratosClube(clube);

  var div = estado.minhaDivisao || 'serieD';
  var folha = clube.jogadores.reduce(function(s,j){return s+(j.salario||0);},0);
  var cotaTV = (typeof COTAS_TV !== 'undefined') ? (COTAS_TV[div]||0) : 0;

  // Patrocínios anuais
  var patAnual = 0;
  if (clube.patrocinios_camisa) {
    ['frente','costas','mangas'].forEach(function(l){
      (clube.patrocinios_camisa[l]||[]).forEach(function(p){ patAnual += p.valor_anual||0; });
    });
  }
  if (clube.material_esportivo) patAnual += clube.material_esportivo.valor_anual||0;

  // Naming rights
  var namingAnual = clube.naming_rights ? (clube.naming_rights.valor_anual||0) : 0;

  // Match day (estimado: 19 jogos em casa)
  var mdEst = 0;
  if (typeof calcularMatchDay !== 'undefined') {
    mdEst = calcularMatchDay(clube).renda * 19;
  }

  // Sócio torcedor (anual)
  var socioAnual = 0;
  if (clube.socio_torcedor) {
    socioAnual = clube.socio_torcedor.num_socios * clube.socio_torcedor.mensalidade * 12;
  }

  var recTotal = cotaTV + patAnual + namingAnual + mdEst + socioAnual;
  var despTotal = folha * 12;
  var resultado = recTotal - despTotal;

  var br = '<br>';
  var texto = '=== PREVISÃO FINANCEIRA ' + new Date().getFullYear() + ' ===' + br + br;
  texto += '📥 RECEITAS PREVISTAS:' + br;
  texto += '• Cota de TV (' + div + '): ' + formatarDinheiro(cotaTV) + ' (paga antes da Rodada 1)' + br;
  texto += '• Patrocínios de camisa/material: ' + formatarDinheiro(patAnual) + '/ano (parcelas por rodada)' + br;
  if (namingAnual > 0) texto += '• Naming Rights (' + clube.naming_rights.marca + '): ' + formatarDinheiro(namingAnual) + '/ano' + br;
  texto += '• Match Day estimado (19 jogos em casa): ' + formatarDinheiro(mdEst) + br;
  texto += '• Sócio Torcedor estimado: ' + formatarDinheiro(socioAnual) + '/ano' + br;
  texto += '─────────────────' + br;
  texto += '• TOTAL RECEITAS: ' + formatarDinheiro(recTotal) + br + br;
  texto += '📤 DESPESAS PREVISTAS:' + br;
  texto += '• Folha salarial mensal: ' + formatarDinheiro(folha) + ' (dia 10 de cada mês)' + br;
  texto += '• Folha anual: ' + formatarDinheiro(folha * 12) + br;
  if (clube.dividas && clube.dividas < 0) {
    var parcelasAnuais = Math.round(Math.abs(clube.dividas)*0.02*12);
    texto += '• Parcelas de dívida (2%/mês): ' + formatarDinheiro(parcelasAnuais) + '/ano' + br;
  }
  texto += '─────────────────' + br;
  texto += '• TOTAL DESPESAS: ' + formatarDinheiro(despTotal) + br + br;
  texto += (resultado >= 0 ? '✅' : '⚠️') + ' RESULTADO PREVISTO: ' + formatarDinheiro(resultado);

  return texto;
}

// ════════════════════════════════════════
// GRÁFICO FINANCEIRO — Barras Espelhadas
// Modo Mensal (dias do mês) ou Anual (meses do ano)
// ════════════════════════════════════════

var _graficoModo = 'anual';    // 'mensal' | 'anual'
var _graficoAno  = 2026;
var _graficoMes  = 1;          // janeiro = 1 (início do jogo)

function renderGraficoFinanceiro(clube) {

    meses.forEach(function(m, i) {
      html += '<option value="'+(i+1)+'"'+(_graficoMes===i+1?' selected':'')+'>'+m+' '+_graficoAno+'</option>';

  html += '<span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;background:rgba(45,212,191,.25);border:1px dashed #2dd4bf;border-radius:2px;display:inline-block"></span>Provisão</span>';

  html += '</div>';

function mudarGraficoModo(modo) {

  var el = document.getElementById('fin-grafico-wrap');
  if (el) el.outerHTML = renderGraficoFinanceiro(estado.meuClube);
}

function mudarGraficoMes(mes) {
