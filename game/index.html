<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manager FC</title>
  <style>*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --bg2: #1a1d27;
  --bg3: #22263a;
  --border: #2e3350;
  --text: #e8eaf0;
  --text2: #8a90a8;
  --accent: #4f8ef7;
  --green: #2ecc71;
  --red: #e74c3c;
  --yellow: #f1c40f;
  --radius: 10px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

/* ── Layout ── */
#app { display: flex; flex-direction: column; min-height: 100vh; }

header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
}

header h1 { font-size: 16px; font-weight: 600; color: var(--accent); letter-spacing: .5px; }
header span { font-size: 12px; color: var(--text2); }

nav {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  padding: 0 24px;
  gap: 4px;
}

nav button {
  background: none;
  border: none;
  color: var(--text2);
  padding: 12px 16px;
  cursor: pointer;
  font-size: 13px;
  border-bottom: 2px solid transparent;
  transition: all .15s;
}

nav button:hover { color: var(--text); }
nav button.ativo { color: var(--accent); border-bottom-color: var(--accent); }

main { flex: 1; padding: 24px; max-width: 900px; margin: 0 auto; width: 100%; }

/* ── Tela de seleção de clube ── */
#tela-selecao h2 { font-size: 18px; margin-bottom: 6px; }
#tela-selecao p  { color: var(--text2); margin-bottom: 24px; font-size: 13px; }

.grid-clubes {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
}

.card-clube {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 16px;
  cursor: pointer;
  transition: border-color .15s, transform .1s;
  text-align: center;
}

.card-clube:hover { border-color: var(--accent); transform: translateY(-2px); }

.card-clube .escudo {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  margin: 0 auto 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 13px;
  color: #fff;
}

.card-clube .nome { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.card-clube .forca { font-size: 12px; color: var(--text2); }

/* ── Tela principal ── */
.secao-titulo {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--text);
}

/* ── Elenco ── */
.lista-jogadores { display: flex; flex-direction: column; gap: 6px; }

.item-jogador {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.posicao-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 7px;
  border-radius: 4px;
  min-width: 36px;
  text-align: center;
}

.pos-GOL { background: #5c2d00; color: #ffaa77; }
.pos-LD  { background: #003a7b; color: #77aaff; }
.pos-ZAG { background: #00307b; color: #88bbff; }
.pos-LE  { background: #003a7b; color: #77aaff; }
.pos-VOL { background: #1a4a1a; color: #88dd88; }
.pos-MEI { background: #1a5c1a; color: #77dd77; }
.pos-ATA { background: #5c1a1a; color: #ff8888; }

.jogador-nome { flex: 1; font-size: 13px; }

.overall-badge {
  font-weight: 700;
  font-size: 14px;
  min-width: 32px;
  text-align: right;
}

.overall-alto  { color: var(--green); }
.overall-medio { color: var(--yellow); }
.overall-baixo { color: var(--red); }

/* ── Tabela de classificação ── */
.tabela-classificacao {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.tabela-classificacao table {
  width: 100%;
  border-collapse: collapse;
}

.tabela-classificacao th {
  padding: 10px 12px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .5px;
  border-bottom: 1px solid var(--border);
}

.tabela-classificacao td {
  padding: 10px 12px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
}

.tabela-classificacao tr:last-child td { border-bottom: none; }
.tabela-classificacao tr.meu-clube td { background: rgba(79,142,247,.08); }
.tabela-classificacao tr:hover td { background: var(--bg3); }

.td-pos { color: var(--text2); width: 28px; font-size: 12px; }
.td-pts { font-weight: 700; color: var(--accent); }

.escudo-mini {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  font-size: 9px;
  font-weight: 700;
  color: #fff;
  margin-right: 8px;
  vertical-align: middle;
}

/* ── Rodadas / Jogos ── */
.rodadas-container { display: flex; flex-direction: column; gap: 16px; }

.card-rodada {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.rodada-header {
  padding: 10px 14px;
  background: var(--bg3);
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.btn-simular {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  font-weight: 600;
  transition: opacity .15s;
}

.btn-simular:hover { opacity: .85; }
.btn-simular:disabled { opacity: .4; cursor: default; }

.lista-jogos { padding: 8px 0; }

.item-jogo {
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
}

.item-jogo:last-child { border-bottom: none; }

.time-nome { flex: 1; }
.time-nome.direita { text-align: right; }
.time-nome.meu { color: var(--accent); font-weight: 600; }

.placar {
  font-weight: 700;
  font-size: 15px;
  min-width: 48px;
  text-align: center;
  background: var(--bg3);
  padding: 3px 8px;
  border-radius: 6px;
}

.placar.pendente { color: var(--text2); font-size: 11px; font-weight: 400; }
.placar.vitoria  { color: var(--green); }
.placar.derrota  { color: var(--red); }
.placar.empate   { color: var(--yellow); }

/* ── Modal de partida ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}

.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  width: 100%;
  max-width: 480px;
  overflow: hidden;
}

.modal-header {
  background: var(--bg3);
  padding: 20px;
  text-align: center;
}

.modal-placar {
  font-size: 36px;
  font-weight: 700;
  margin: 8px 0 4px;
  letter-spacing: 4px;
}

.modal-times {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text2);
  padding: 0 20px;
}

.modal-eventos {
  padding: 16px 20px;
  max-height: 240px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.evento-item {
  display: flex;
  gap: 10px;
  font-size: 13px;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
}

.evento-minuto { color: var(--text2); min-width: 34px; font-size: 12px; }

.modal-footer { padding: 16px 20px; }

.btn-fechar {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: background .15s;
}

.btn-fechar:hover { background: var(--border); }

/* ── Stats do clube ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  text-align: center;
}

.stat-valor { font-size: 26px; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 11px; color: var(--text2); margin-top: 4px; }

/* ── Utilitários ── */
.hidden { display: none !important; }
.mt16 { margin-top: 16px; }

.btn-primario {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s;
}

.btn-primario:hover { opacity: .85; }

/* ── Tela intro / criar manager ── */
.tela-intro {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 70vh;
}

.intro-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 36px;
  width: 100%;
  max-width: 400px;
  text-align: center;
}

.intro-logo { font-size: 48px; margin-bottom: 12px; }
.intro-card h2 { font-size: 22px; margin-bottom: 6px; }
.intro-sub { color: var(--text2); font-size: 13px; margin-bottom: 28px; }

.form-group { text-align: left; margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
.form-group input, .form-group select {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 10px 12px;
  font-size: 14px;
}
.form-group input:focus, .form-group select:focus {
  outline: none;
  border-color: var(--accent);
}

/* ── Lista de técnicos ── */
.lista-tecnicos { display: flex; flex-direction: column; gap: 10px; }

.card-tecnico {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  cursor: pointer;
  transition: border-color .15s, transform .1s;
}
.card-tecnico:hover { border-color: var(--accent); transform: translateY(-1px); }

.tecnico-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}

.tecnico-nome { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
.tecnico-meta { font-size: 12px; color: var(--text2); }
.flag { font-size: 14px; }

.overall-grande {
  font-size: 28px;
  font-weight: 700;
  min-width: 48px;
  text-align: center;
}

.tecnico-stats {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

.tstat {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
}
.tstat-label { color: var(--text2); }
.tstat-val   { font-weight: 600; }

/* ── Card staff técnico ── */
.card-staff-tecnico {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
}

.staff-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 6px;
}

.staff-cargo { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.staff-nome  { font-size: 18px; font-weight: 700; margin-bottom: 3px; }
.staff-meta  { font-size: 12px; color: var(--text2); }

.btn-demitir {
  margin-top: 16px;
  width: 100%;
  background: none;
  border: 1px solid var(--red);
  color: var(--red);
  padding: 8px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  transition: background .15s;
}
.btn-demitir:hover { background: rgba(231,76,60,.1); }

/* ── Vagas de staff ── */
.vagas-staff { margin-top: 8px; }

.vaga-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.vaga-item:last-child { border-bottom: none; }
.vaga-cargo { color: var(--text2); }

.vaga-badge {
  font-size: 11px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 3px 8px;
  border-radius: 20px;
}

/* ── Header atualizado ── */
.header-info-group { display: flex; gap: 16px; align-items: center; font-size: 12px; color: var(--text2); }
.header-info-group strong { color: var(--text); }

.tela-selecao h2 { font-size: 18px; margin-bottom: 6px; }
.tela-selecao .sub { color: var(--text2); margin-bottom: 24px; font-size: 13px; }</style>
</head>

  <script>// Calcula encaixe do elenco na formação do técnico (0 a 1)
function calcularEncaixe(clube, formacao) {
  const req = FORMACOES[formacao].requisitos;
  let totalReq = 0, totalAtendido = 0;

  Object.entries(req).forEach(([pos, qtd]) => {
    const disponiveis = clube.jogadores
      .filter(j => j.posicao === pos)
      .sort((a, b) => b.overall - a.overall)
      .slice(0, qtd);

    totalReq += qtd;
    totalAtendido += disponiveis.length;
  });

  return totalAtendido / totalReq;
}

// Calcula força do clube considerando técnico e formação
function calcularForca(clube, tecnico = null) {
  const jogadores = clube.jogadores;
  const media = (pos) => {
    const g = jogadores.filter(j => j.posicao === pos);
    return g.length === 0 ? 50 : g.reduce((s, j) => s + j.overall, 0) / g.length;
  };

  const gol = media("GOL");
  const ld  = media("LD");
  const zag = media("ZAG");
  const le  = media("LE");
  const vol = media("VOL");
  const mei = media("MEI");
  const ata = media("ATA");

  // Pesos padrão (sem técnico)
  let pesos = { GOL: 0.15, LD: 0.10, ZAG: 0.20, LE: 0.10, VOL: 0.15, MEI: 0.15, ATA: 0.15 };
  let bonusTecnico = 0;
  let bonusFormacao = 0;
  let encaixe = 1;
  let formacao = null;

  if (tecnico) {
    formacao = tecnico.formacao;
    pesos = FORMACOES[formacao].pesos;

    // Bônus do overall do técnico: escala de 0 a +6 pontos
    bonusTecnico = ((tecnico.overall - 60) / 40) * 6;

    // Bônus/penalidade de encaixe: -8 a +4 pontos
    encaixe = calcularEncaixe(clube, formacao);
    bonusFormacao = (encaixe - 0.7) * 20; // 70% encaixe = neutro
  }

  const forcaBase =
    gol * pesos.GOL +
    ld  * pesos.LD  +
    zag * pesos.ZAG +
    le  * pesos.LE  +
    vol * pesos.VOL +
    mei * pesos.MEI +
    ata * pesos.ATA;

  const forca = Math.round(Math.max(40, Math.min(99,
    forcaBase + bonusTecnico + bonusFormacao
  )));

  return {
    forca, gol, ld, zag, le, vol, mei, ata,
    bonusTecnico: Math.round(bonusTecnico * 10) / 10,
    bonusFormacao: Math.round(bonusFormacao * 10) / 10,
    encaixe: Math.round(encaixe * 100),
    formacao
  };
}

function gerarGols(ataque, defesaAdversaria) {
  const vantagem = (ataque - defesaAdversaria) / 100;
  const rand = Math.random();
  const limites = [0.20, 0.45, 0.68, 0.83, 0.93];
  const gols    = [0,    1,    2,    3,    4,    5];
  // Vantagem desloca levemente os limites
  const ajuste = vantagem * 0.08;
  for (let i = 0; i < limites.length; i++) {
    if (rand < limites[i] - ajuste) return gols[i];
  }
  return gols[5];
}

function simularPartida(clubeMandante, clubeVisitante, tecnicoMandante = null, tecnicoVisitante = null) {
  const m = calcularForca(clubeMandante,  tecnicoMandante);
  const v = calcularForca(clubeVisitante, tecnicoVisitante);

  // Fator casa +3 no ataque e +3 na defesa do mandante
  const golsMandante  = gerarGols(m.ata * pesos(m, 'ata') + m.forca * 0.3 + 3, v.zag * pesos(v, 'zag') + v.forca * 0.3);
  const golsVisitante = gerarGols(v.ata * pesos(v, 'ata') + v.forca * 0.3,     m.zag * pesos(m, 'zag') + m.forca * 0.3 + 3);

  const eventos = gerarEventos(clubeMandante, clubeVisitante, golsMandante, golsVisitante);

  return {
    mandante: clubeMandante.nome, visitante: clubeVisitante.nome,
    golsMandante, golsVisitante,
    forcaMandante: m, forcaVisitante: v,
    eventos
  };
}

function pesos(f, setor) {
  // Já está embutido na força calculada — helper simplificado
  return 1;
}

function simularPartidaSimples(clubeMandante, clubeVisitante, tecnicoMandante = null, tecnicoVisitante = null) {
  const m = calcularForca(clubeMandante,  tecnicoMandante);
  const v = calcularForca(clubeVisitante, tecnicoVisitante);

  const golsMandante  = gerarGols(m.forca + 3, v.forca);
  const golsVisitante = gerarGols(v.forca,     m.forca + 3);

  const eventos = gerarEventos(clubeMandante, clubeVisitante, golsMandante, golsVisitante);

  return {
    mandante: clubeMandante.nome, visitante: clubeVisitante.nome,
    golsMandante, golsVisitante,
    forcaMandante: m, forcaVisitante: v,
    eventos
  };
}

function gerarEventos(mandante, visitante, golsM, golsV) {
  const eventos = [];
  const usados = new Set();
  const minuto = () => {
    let m;
    do { m = Math.floor(Math.random() * 90) + 1; } while (usados.has(m));
    usados.add(m);
    return m;
  };
  const marcador = (clube) => {
    const lista = clube.jogadores.filter(j => j.posicao === "ATA" || j.posicao === "MEI");
    return lista[Math.floor(Math.random() * lista.length)];
  };
  for (let i = 0; i < golsM; i++) {
    const j = marcador(mandante);
    eventos.push({ minuto: minuto(), texto: `⚽ ${j.nome} (${mandante.nome})` });
  }
  for (let i = 0; i < golsV; i++) {
    const j = marcador(visitante);
    eventos.push({ minuto: minuto(), texto: `⚽ ${j.nome} (${visitante.nome})` });
  }
  return eventos.sort((a, b) => a.minuto - b.minuto);
}

function calcularTabela(clubes, resultados) {
  const tabela = clubes.map(c => ({
    id: c.id, nome: c.nome, sigla: c.sigla, cor: c.cor,
    pts: 0, j: 0, v: 0, e: 0, d: 0, gp: 0, gc: 0, sg: 0
  }));
  const find = (id) => tabela.find(t => t.id === id);
  resultados.forEach(r => {
    const m = find(r.mandanteId), v = find(r.visitanteId);
    if (!m || !v) return;
    m.j++; v.j++;
    m.gp += r.golsMandante; m.gc += r.golsVisitante;
    v.gp += r.golsVisitante; v.gc += r.golsMandante;
    if (r.golsMandante > r.golsVisitante)      { m.pts += 3; m.v++; v.d++; }
    else if (r.golsMandante < r.golsVisitante) { v.pts += 3; v.v++; m.d++; }
    else                                        { m.pts++; v.pts++; m.e++; v.e++; }
  });
  tabela.forEach(t => t.sg = t.gp - t.gc);
  return tabela.sort((a, b) => b.pts - a.pts || b.sg - a.sg || b.gp - a.gp);
}

function gerarCalendario(clubes) {
  const ids = [...clubes.map(c => c.id)];
  if (ids.length % 2 !== 0) ids.push(null);
  const rodadas = [];
  const total = ids.length - 1;
  const lista = [...ids];
  for (let r = 0; r < total; r++) {
    const jogos = [];
    for (let i = 0; i < lista.length / 2; i++) {
      const m = lista[i], v = lista[lista.length - 1 - i];
      if (m && v) jogos.push({ mandanteId: m, visitanteId: v });
    }
    rodadas.push({ numero: r + 1, jogos });
    lista.splice(1, 0, lista.pop());
  }
  const ida = rodadas.length;
  for (let r = 0; r < ida; r++) {
    rodadas.push({
      numero: ida + r + 1,
      jogos: rodadas[r].jogos.map(j => ({ mandanteId: j.visitanteId, visitanteId: j.mandanteId }))
    });
  }
  return rodadas;
}</script>

function abrirModal(resultado) {
  const mandante  = CLUBES.find(c => c.id === resultado.mandanteId);
  const visitante = CLUBES.find(c => c.id === resultado.visitanteId);
  const diff = resultado.golsMandante - resultado.golsVisitante;
  const cor  = diff > 0 ? "var(--green)" : diff < 0 ? "var(--red)" : "var(--yellow)";
  const fm   = resultado.forcaMandante;
  const fv   = resultado.forcaVisitante;

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <div style="font-size:12px;color:var(--text2);margin-bottom:6px">Resultado final</div>
        <div class="modal-placar" style="color:${cor}">${resultado.golsMandante} – ${resultado.golsVisitante}</div>
        <div class="modal-times">
          <span>${mandante.nome}</span>
          <span>${visitante.nome}</span>
        </div>
      </div>
      ${fm ? `
      <div style="display:flex;justify-content:space-around;padding:10px 20px;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border)">
        <span>Força: <strong style="color:var(--text)">${fm.forca}</strong></span>
        <span>vs</span>
        <span>Força: <strong style="color:var(--text)">${fv.forca}</strong></span>
      </div>` : ""}
      <div class="modal-eventos">
        ${resultado.eventos.length > 0
          ? resultado.eventos.map(e => `
              <div class="evento-item">
                <span class="evento-minuto">${e.minuto}'</span>
                <span>${e.texto}</span>
              </div>`).join("")
          : `<p style="color:var(--text2);font-size:13px">Jogo sem gols.</p>`
        }
      </div>
      <div class="modal-footer">
        <button class="btn-fechar" onclick="this.closest('.modal-overlay').remove()">Fechar</button>
      </div>
    </div>
  `;
  overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

// ════════════════════════════════════════
// Helpers
// ════════════════════════════════════════
function placarClasse(resultado, meuId) {
  if (resultado.mandanteId !== meuId && resultado.visitanteId !== meuId) return "";
  const euM    = resultado.mandanteId === meuId;
  const meus   = euM ? resultado.golsMandante : resultado.golsVisitante;
  const deles  = euM ? resultado.golsVisitante : resultado.golsMandante;
  return meus > deles ? "vitoria" : meus < deles ? "derrota" : "empate";
}

function overallClasse(v) {
  return v >= 80 ? "overall-alto" : v >= 70 ? "overall-medio" : "overall-baixo";
}

function bandeira(nac) {
  const flags = { BR:"🇧🇷", PT:"🇵🇹", AR:"🇦🇷", ES:"🇪🇸", IT:"🇮🇹", DE:"🇩🇪", FR:"🇫🇷", EN:"🏴󠁧󠁢󠁥󠁮󠁧󠁿" };
  return flags[nac] || "🌍";
}

function ocultarNav() {
  document.getElementById("header-info").classList.add("hidden");
  document.getElementById("nav").classList.add("hidden");
}

function mostrarNav() {
  document.getElementById("header-info").classList.remove("hidden");
  document.getElementById("nav").classList.remove("hidden");
}</script>
