function iniciarJogo() {
  document.getElementById("header-clube").textContent   = estado.meuClube.nome;
  document.getElementById("header-manager").textContent = estado.manager.nome;
  document.getElementById("header-tecnico").textContent = estado.meuTecnico.nome;
  var el = document.getElementById("sidebar-manager-nome"); if (el) el.textContent = estado.manager.nome;
  var ec = document.getElementById("sidebar-clube-nome");   if (ec) ec.textContent = estado.meuClube.nome;
  var et = document.getElementById("sidebar-tecnico-nome"); if (et) et.textContent = estado.meuTecnico.nome;
  var sb = document.getElementById("sidebar-info-block");   if (sb) sb.classList.remove("hidden");
  mostrarNav();

  // Se calendário já foi gerado por selecionarClube (paulistas), só inicializar os eventos
  // Caso contrário (Série A/B/C/D), gerar calendário agora
  if (!estado.calendario || estado.calendario.length === 0) {
    var div = estado.minhaDivisao || "serieA";
    var clubesCal = clubesParaCalendario(div);
    if (clubesCal.length >= 2) {
      estado.calendario = gerarCalendario(clubesCal);
    } else {
      estado.calendario = gerarCalendarioPaulista(div.replace("paulista_",""));
    }
  }
  inicializarCalendario();

  if (!estadoDivisoes.b.clubes) inicializarDivisoes();
  if (!estadoPaulista.a1.clubes) inicializarPaulista();
  inicializarTorneios();
  salvarJogo();

  // Forçar navegação para o dashboard
  try {
    navegarPara("dashboard");
  } catch(e) {
    document.getElementById("main").innerHTML = "<div style='padding:40px;color:red;font-size:14px'><strong>ERRO:</strong> " + e.message + "<br><pre style='font-size:11px;margin-top:8px'>" + e.stack + "</pre></div>";
  }
}

function navegarPara(aba) {
  // Se há partida em andamento (timer rodando), pausar ao sair
  if (jogoAtivo && jogoAtivo.timer) {
    pausarPartida();
  }

  // Se há partida pausada e não está indo pro dashboard, mostrar aviso
  // e ir mesmo assim (já está pausada)
  document.querySelectorAll("#sidebar-nav button").forEach(function(b) { b.classList.remove("ativo"); });
  var btn = document.querySelector('#sidebar-nav button[data-aba="' + aba + '"]');
  if (btn) btn.classList.add("ativo");
  var abas = { dashboard: renderDashboard, inbox: renderInbox, torneios: renderTorneiosHub, elenco: renderElenco, mercado: renderMercado, financeiro: renderFinanceiro, manager: renderManager, staff: renderStaff, infraestrutura: renderInfraestrutura };
  if (abas[aba]) abas[aba]();
}

var elencoOrdem = { col: 'posicao', asc: true };

// Cores de fundo por posição (rgba para não sobrescrever hover)
var COR_LINHA_POS = {
  GOL: 'rgba(139,92,246,0.25)',   // roxo
  LD:  'rgba(74,222,128,0.18)',   // verde claro
  LE:  'rgba(74,222,128,0.18)',
  ZAG: 'rgba(34,197,94,0.25)',    // verde forte
  VOL: 'rgba(253,224,71,0.20)',   // amarelo claro
  MEI: 'rgba(234,179,8,0.25)',    // amarelo escuro
  ATA: 'rgba(239,68,68,0.22)'    // vermelho
};

var COR_BORDA_POS = {
  GOL: '#8b5cf6', LD: '#4ade80', LE: '#4ade80',
  ZAG: '#22c55e', VOL: '#fde047', MEI: '#eab308', ATA: '#ef4444'
};

function renderElenco() {
  var clube   = estado.meuClube;
  var tecnico = estado.meuTecnico;
  var stats   = calcularForca(clube, tecnico);
  var ordemPos = { GOL:0, LD:1, ZAG:2, LE:3, VOL:4, MEI:5, ATA:6 };

  var jogadores = clube.jogadores.slice().sort(function(a, b) {
    var col = elencoOrdem.col;
    var va, vb;
    if (col === 'posicao') { va = ordemPos[a.posicao] || 0; vb = ordemPos[b.posicao] || 0; }
    else if (col === 'nome') { va = a.nome; vb = b.nome; }
    else if (col === 'overall') { va = a.overall; vb = b.overall; }
    else if (col === 'idade') { va = a.idade || 0; vb = b.idade || 0; }
    else if (col === 'jogos') { va = (a.stats||{}).jogos||0; vb = (b.stats||{}).jogos||0; }
    else if (col === 'gols') { va = (a.stats||{}).gols||0; vb = (b.stats||{}).gols||0; }
    else if (col === 'assistencias') { va = (a.stats||{}).assistencias||0; vb = (b.stats||{}).assistencias||0; }
    else if (col === 'nota') { va = (a.stats||{}).nota_media||0; vb = (b.stats||{}).nota_media||0; }
    else if (col === 'contrato') { va = a.contrato_termino||0; vb = b.contrato_termino||0; }
    else if (col === 'salario') { va = a.salario||0; vb = b.salario||0; }
    else if (col === 'valor') { va = a.valor_mercado||0; vb = b.valor_mercado||0; }
    else { va = 0; vb = 0; }
    if (va < vb) return elencoOrdem.asc ? -1 : 1;
    if (va > vb) return elencoOrdem.asc ? 1 : -1;
    return ordemPos[a.posicao] - ordemPos[b.posicao];
  });

  // Cards de força
  var html = '<div class="stats-grid" style="margin-bottom:20px">';
  html += '<div class="stat-card"><div class="stat-valor" style="color:var(--accent)">' + stats.forca + '</div><div class="stat-label">Força c/ técnico</div></div>';
  var sinal = stats.bonusFormacao >= 0 ? '+' : '';
  var corBonus = stats.bonusFormacao >= 0 ? 'overall-alto' : 'overall-baixo';
  html += '<div class="stat-card"><div class="stat-valor ' + corBonus + '">' + sinal + stats.bonusFormacao + '</div><div class="stat-label">Encaixe ' + stats.formacao + '</div></div>';
  ['gol','ld','zag','le','vol','mei','ata'].forEach(function(s) {
    html += '<div class="stat-card"><div class="stat-valor">' + Math.round(stats[s]) + '</div><div class="stat-label">' + s.toUpperCase() + '</div></div>';
  });
  html += '</div>';

  // Legenda de cores
  html += '<div class="elenco-legenda">';
  var legendas = [{pos:'GOL',label:'Goleiro'},{pos:'LD',label:'Lateral'},{pos:'ZAG',label:'Zagueiro'},{pos:'VOL',label:'Volante'},{pos:'MEI',label:'Meia'},{pos:'ATA',label:'Atacante'}];
  legendas.forEach(function(l){
    html += '<span class="legenda-item"><span class="legenda-cor" style="background:'+COR_BORDA_POS[l.pos]+'"></span>'+l.label+'</span>';
  });
  html += '</div>';

  // Tabela
  html += '<div class="elenco-tabela-wrap">';
  html += '<table class="elenco-tabela">';

  var cols = [
    { key: 'posicao',     label: 'Pos' },
    { key: 'nome',        label: 'Jogador' },
    { key: 'overall',     label: 'OVR' },
    { key: 'nota',        label: 'Nota' },
    { key: 'jogos',       label: 'J' },
    { key: 'gols',        label: 'G' },
    { key: 'assistencias',label: 'A' },
    { key: 'idade',       label: 'Idade' },
    { key: 'contrato',    label: 'Contrato' },
    { key: 'salario',     label: 'Salário' },
    { key: 'valor',       label: 'Valor' },
    { key: 'status',      label: '●' }
  ];

  html += '<thead><tr>';
  cols.forEach(function(c) {
    if (c.key === 'status') { html += '<th title="Status">●</th>'; return; }
    var ativo = elencoOrdem.col === c.key;
    var seta  = ativo ? (elencoOrdem.asc ? ' ↑' : ' ↓') : '';
    html += '<th onclick="ordenarElenco(\'' + c.key + '\')" class="' + (ativo ? 'col-ativa' : '') + '">' + c.label + seta + '</th>';
  });
  html += '</tr></thead><tbody>';

  var flags = { BR:'🇧🇷',AR:'🇦🇷',UY:'🇺🇾',CL:'🇨🇱',CO:'🇨🇴',VE:'🇻🇪',PY:'🇵🇾',EC:'🇪🇨',PT:'🇵🇹',FR:'🇫🇷',ES:'🇪🇸',DE:'🇩🇪',IT:'🇮🇹',EN:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',BO:'🇧🇴',PE:'🇵🇪' };

  jogadores.forEach(function(j) {
    var s    = j.stats || { jogos:0, gols:0, assistencias:0, nota_media:0 };
    var nota = s.jogos > 0 ? s.nota_media.toFixed(1) : '-';
    var flag = flags[j.nacionalidade] || '🌍';
    var rodadasRestantes = (j.contrato_termino || 0) - estado.rodadaAtual;
    var contratoLabel = rodadasRestantes > 0 ? 'Rod. ' + j.contrato_termino : '<span style="color:var(--red)">Vencido</span>';
    var corContrato   = rodadasRestantes <= 5 ? 'color:var(--yellow)' : '';
    var corLinha      = COR_LINHA_POS[j.posicao] || '';
    var bordaEsq      = COR_BORDA_POS[j.posicao] || 'transparent';

    // Badge pos2
    var posLabel = '<span class="posicao-badge pos-' + j.posicao + '">' + j.posicao + '</span>';
    if (j.pos2) posLabel += '<span class="posicao-badge pos-' + j.pos2 + '" style="opacity:.75;font-size:9px;padding:1px 4px">' + j.pos2 + '</span>';

    // Status
    var statusHtml = '';
    if (j.a_venda) statusHtml = '<span title="À venda" class="status-dot venda">💰</span>';
    else if (j.para_emprestimo) statusHtml = '<span title="Para empréstimo" class="status-dot emprestimo">🔄</span>';

    html += '<tr class="elenco-linha-clicavel" onclick="abrirFichaJogador(\'' + j.id + '\')" style="background:' + corLinha + ';border-left:3px solid ' + bordaEsq + '">';
    html += '<td>' + posLabel + '</td>';
    html += '<td class="col-nome"><span class="flag-jogador">' + flag + '</span>' + j.nome + '</td>';
    html += '<td class="col-centro ' + overallClasse(j.overall) + '">' + j.overall + '</td>';
    html += '<td class="col-centro">' + nota + '</td>';
    html += '<td class="col-centro">' + s.jogos + '</td>';
    html += '<td class="col-centro">' + s.gols + '</td>';
    html += '<td class="col-centro">' + s.assistencias + '</td>';
    html += '<td class="col-centro">' + (j.idade || '-') + '</td>';
    html += '<td class="col-centro" style="' + corContrato + '">' + contratoLabel + '</td>';
    html += '<td class="col-centro">' + formatarDinheiro(j.salario || 0) + '</td>';
    html += '<td class="col-centro">' + formatarDinheiro(j.valor_mercado || 0) + '</td>';
    html += '<td class="col-centro">' + statusHtml + '</td>';
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  document.getElementById("main").innerHTML = html;
}

function ordenarElenco(col) {
  if (elencoOrdem.col === col) {
    elencoOrdem.asc = !elencoOrdem.asc;
  } else {
    elencoOrdem.col = col;
    elencoOrdem.asc = col === 'nome';
  }
  renderElenco();
}

function simularRodada(idx) {
  var rodada = estado.calendario[idx];
  var meuId  = estado.meuClube.id;
  var meuTec = estado.meuTecnico;

  rodada.jogos.forEach(function(jogo) {
    var mandante  = CLUBES.find(function(c) { return c.id === jogo.mandanteId; });
    var visitante = CLUBES.find(function(c) { return c.id === jogo.visitanteId; });
    var tecM = jogo.mandanteId  === meuId ? meuTec : null;
    var tecV = jogo.visitanteId === meuId ? meuTec : null;
    var r = simularPartidaSimples(mandante, visitante, tecM, tecV);
    estado.resultados.push({
      rodada: idx,
      mandanteId: jogo.mandanteId, visitanteId: jogo.visitanteId,
      golsMandante: r.golsMandante, golsVisitante: r.golsVisitante,
      eventos: r.eventos,
      forcaMandante: r.forcaMandante, forcaVisitante: r.forcaVisitante
    });
  });

  estado.rodadaAtual = idx + 1;
  simularRodadaDivisoes(idx);
  if (idx === 37) { processarPromocaoRebaixamento(); processarPromocaoRebaixamentoPaulista(); }

  processarMercadoRodada(idx);
  // Receitas da rodada para todos os clubes
  CLUBES.forEach(function(c) {
    var jogosEmCasa = estado.calendario[idx].jogos.filter(function(j) { return j.mandanteId === c.id; }).length;
    processarReceitasRodada(c, idx, jogosEmCasa);
  });
  simularPropostasIA();
  salvarJogo();
  renderCampeonato();
  var proxima = document.getElementById("rodada-" + (idx + 1));
  if (proxima) proxima.scrollIntoView({ behavior: "smooth", block: "start" });
}

  var fv   = resultado.forcaVisitante;

  var eventosHtml = '';
  if (resultado.eventos && resultado.eventos.length > 0) {
    resultado.eventos.forEach(function(e) {
      eventosHtml += '<div class="evento-item"><span class="evento-minuto">' + e.minuto + '\'</span><span>' + e.texto + '</span></div>';
    });
  } else {
    eventosHtml = '<p style="color:var(--text2);font-size:13px">Jogo sem gols.</p>';
  }

  var forcaHtml = '';
  if (fm) {
    forcaHtml = '<div style="display:flex;justify-content:space-around;padding:10px 20px;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border)">' +
      '<span>Força: <strong style="color:var(--text)">' + fm.forca + '</strong></span><span>vs</span>' +
      '<span>Força: <strong style="color:var(--text)">' + fv.forca + '</strong></span></div>';
  }

  var overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML =
    '<div class="modal">' +
      '<div class="modal-header">' +
        '<div style="font-size:12px;color:var(--text2);margin-bottom:6px">Resultado final</div>' +
        '<div class="modal-placar" style="color:' + cor + '">' + resultado.golsMandante + ' – ' + resultado.golsVisitante + '</div>' +
        '<div class="modal-times"><span>' + mandante.nome + '</span><span>' + visitante.nome + '</span></div>' +
      '</div>' +
      forcaHtml +
      '<div class="modal-eventos">' + eventosHtml + '</div>' +
      '<div class="modal-footer"><button class="btn-fechar" onclick="this.closest(\'.modal-overlay\').remove()">Fechar</button></div>' +
    '</div>';

  overlay.addEventListener("click", function(e) { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

// ── Helpers ──
function placarClasse(resultado, meuId) {
  if (resultado.mandanteId !== meuId && resultado.visitanteId !== meuId) return "";
  var euM  = resultado.mandanteId === meuId;
  var meus = euM ? resultado.golsMandante : resultado.golsVisitante;
  var deles= euM ? resultado.golsVisitante : resultado.golsMandante;
  return meus > deles ? "vitoria" : meus < deles ? "derrota" : "empate";
}

function overallClasse(v) {
  return v >= 80 ? "overall-alto" : v >= 70 ? "overall-medio" : "overall-baixo";
}

function bandeira(nac) {
  var flags = { BR:"🇧🇷", PT:"🇵🇹", AR:"🇦🇷", ES:"🇪🇸", IT:"🇮🇹", DE:"🇩🇪", FR:"🇫🇷", EN:"🏴󠁧󠁢󠁥󠁮󠁧󠁿" };
  return flags[nac] || "🌍";
}

function filtrarMercado() {
  var pos    = document.getElementById("filtro-pos").value;
  var budget = document.getElementById("filtro-budget").value;
  var meuClube = estado.meuClube;

  var todos = [];
  CLUBES.forEach(function(clube) {
    if (clube.id === meuClube.id) return;
    clube.jogadores.forEach(function(j) {
      if (pos && j.posicao !== pos) return;
      if (budget && j.valor_mercado > parseInt(budget)) return;
      todos.push({ jogador: j, clube: clube });
    });
  });
  todos.sort(function(a, b) { return b.jogador.overall - a.jogador.overall; });
  document.getElementById("lista-mercado").innerHTML = renderListaJogadoresMercado(todos);
}

function enviarProposta(jogadorId, clubeId) {
  var clube   = CLUBES.find(function(c) { return c.id === clubeId; });
  var jogador = clube.jogadores.find(function(j) { return j.id === jogadorId; });
  var valor   = parseInt(document.getElementById("inp-proposta").value);

  if (!valor || valor <= 0) { alert("Digite um valor válido."); return; }
  if (valor > estado.meuClube.budget) { alert("Você não tem budget suficiente!"); return; }

  var result = avaliarProposta(jogador, clube, valor);

  document.querySelector(".modal-overlay").remove();

  if (result.aceita) {
    executarTransferencia(jogador, clube, estado.meuClube, valor);
    if (!estado.feedNoticias) estado.feedNoticias = [];
    estado.feedNoticias.push({
      rodada: estado.rodadaAtual,
      texto: "✅ " + jogador.nome + " (" + jogador.overall + ") chegou ao " + estado.meuClube.nome + " vindo do " + clube.nome + " por " + formatarDinheiro(valor)
    });
    mostrarResultadoProposta(true, result.motivo, jogador.nome);
  } else {
    if (!estado.feedNoticias) estado.feedNoticias = [];
    estado.feedNoticias.push({
      rodada: estado.rodadaAtual,
      texto: "❌ " + estado.meuClube.nome + " teve proposta recusada pelo " + clube.nome + " por " + jogador.nome
    });
    mostrarResultadoProposta(false, result.motivo, jogador.nome);
  }
}

function mostrarResultadoProposta(aceita, motivo, nomeJogador) {
  var overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  var cor  = aceita ? "var(--green)" : "var(--red)";
  var icon = aceita ? "✅" : "❌";
  var titulo = aceita ? "Transferência concluída!" : "Proposta recusada";

  overlay.innerHTML =

      '<div class="modal-header" style="text-align:center;padding:28px 20px">' +

        '<div style="font-size:18px;font-weight:700;color:' + cor + ';margin-bottom:6px">' + titulo + '</div>' +
        '<div style="font-size:13px;color:var(--text2)">' + motivo + '</div>' +
        (aceita ? '<div style="font-size:13px;margin-top:8px">' + nomeJogador + ' agora é do seu clube!</div>' : '') +
      '</div>' +
      '<div class="modal-footer">' +

// ── Processar mercado da IA ao simular rodada ──
function processarMercadoRodada(rodadaIdx) {
  if (!estado.feedNoticias) estado.feedNoticias = [];
  var janela = janelaAberta(rodadaIdx);
  if (!janela) return;

  // IA faz transferências entre si
  var noticias = simularMercadoIA();
  noticias.forEach(function(n) {
    n.rodada = rodadaIdx;
    estado.feedNoticias.push(n);
  });

  // Receita de bilheteria
  processarReceitaRodada(rodadaIdx);
}

// ABA — Inbox (estilo email)

var inboxMsgSelecionada = null;

function renderInbox() {
  var inbox = (estado.inbox || []).slice().reverse();

  var html = '<div class="inbox-screen">';

  // Header
  html += '<div class="inbox-header">';
  html += '<div class="inbox-header-titulo">✉️ Inbox <span class="inbox-count">(' + inbox.length + ')</span></div>';
  html += '<button class="btn-marcar-lidas" onclick="marcarTodasLidas()">✓ Marcar todas como lidas</button>';
  html += '</div>';

  html += '<div class="inbox-body">';

  // Lista de mensagens
  html += '<div class="inbox-lista-email" id="inbox-lista">';
  if (inbox.length === 0) {
    html += '<div class="inbox-vazio">Nenhuma mensagem.</div>';
  } else {
    inbox.forEach(function(msg, i) {
      var idx = (estado.inbox.length - 1) - i;
      var ativa = inboxMsgSelecionada === idx;
      html += '<div class="inbox-email-item ' + (msg.lida ? '' : 'nao-lida') + (ativa ? ' ativa' : '') + '" onclick="selecionarMensagem(' + idx + ')">';
      html += '<div class="inbox-email-remetente">' + (msg.remetente || 'Sistema') + '</div>';
      html += '<div class="inbox-email-assunto">' + msg.titulo + '</div>';
      if (msg.subtitulo) html += '<div class="inbox-email-data">' + msg.subtitulo + '</div>';
      html += '</div>';
    });
  }
  html += '</div>';

  // Conteúdo da mensagem
  html += '<div class="inbox-email-conteudo" id="inbox-conteudo">';
  if (inboxMsgSelecionada !== null && estado.inbox[inboxMsgSelecionada]) {
    html += renderConteudoEmail(estado.inbox[inboxMsgSelecionada]);
  } else {
    html += '<div class="inbox-selecione">← Selecione uma mensagem</div>';
  }
  html += '</div>';

  html += '</div>'; // inbox-body
  html += '</div>'; // inbox-screen

  document.getElementById("main").innerHTML = html;
}

function renderConteudoEmail(msg) {
  var html = '<div class="email-view">';
  html += '<div class="email-view-assunto">' + msg.titulo + '</div>';
  html += '<div class="email-view-meta">';
  html += '<div class="email-view-de"><span>De:</span> <strong>' + (msg.remetente || 'Sistema') + '</strong></div>';
  if (msg.subtitulo) html += '<div class="email-view-data">' + msg.subtitulo + '</div>';
  html += '</div>';
  html += '<div class="email-view-separador"></div>';
  html += '<div class="email-view-corpo">' + (msg.texto || '') + '</div>';

  // Botões aceitar/recusar para propostas recebidas
  if (msg.tipo === "proposta_recebida" && !msg.respondida) {
    html += '<div style="display:flex;gap:10px;margin-top:20px">';
    html += '<button class="btn-primario" style="flex:1" onclick="responderProposta(\"' + msg.id + '\",true)">✅ Aceitar proposta</button>';
    html += '<button class="btn-demitir" style="flex:1;margin-top:0" onclick="responderProposta(\"' + msg.id + '\",false)">❌ Recusar</button>';
    html += '</div>';
  } else if (msg.tipo === "proposta_recebida" && msg.respondida) {
    html += '<div style="margin-top:16px;font-size:13px;color:var(--text2)">✓ Proposta já respondida.</div>';
  }

  html += '</div>';
  return html;
}

function selecionarMensagem(idx) {
  var msg = estado.inbox[idx];
  if (!msg) return;
  msg.lida = true;
  inboxMsgSelecionada = idx;

  // Atualizar lista (remover nao-lida do item) e conteúdo sem re-render total
  var lista = document.getElementById("inbox-lista");
  var conteudo = document.getElementById("inbox-conteudo");

  if (lista && conteudo) {
    // Atualizar classes na lista
    var items = lista.querySelectorAll(".inbox-email-item");
    items.forEach(function(el) { el.classList.remove("ativa"); });
    // Índice reverso na lista
    var inbox = (estado.inbox || []).slice().reverse();
    var idxLista = inbox.findIndex(function(m) { return m === msg; });
    if (idxLista >= 0 && items[idxLista]) {
      items[idxLista].classList.add("ativa");
      items[idxLista].classList.remove("nao-lida");
    }
    conteudo.innerHTML = renderConteudoEmail(msg);
  } else {
    renderInbox();
  }

  // Atualizar badge do dashboard
  salvarJogo();
}

function marcarTodasLidas() {
  (estado.inbox || []).forEach(function(m) { m.lida = true; });
  inboxMsgSelecionada = estado.inbox.length > 0 ? estado.inbox.length - 1 : null;
  renderInbox();
  salvarJogo();
}

// Aceitar/recusar proposta recebida
function responderProposta(msgId, aceitar) {
  var msg = estado.inbox.find(function(m) { return m.id === msgId; });
  if (!msg || msg.tipo !== "proposta_recebida") return;

  if (aceitar) {
    var jogador = estado.meuClube.jogadores.find(function(j) { return j.id === msg.jogadorId; });
    var clubeComprador = CLUBES.find(function(c) { return c.id === msg.clubeOfertanteId; });
    if (jogador && clubeComprador) {
      executarTransferencia(jogador, estado.meuClube, clubeComprador, msg.valor);
      registrarTransferenciaFinanceiro(estado.meuClube, "Venda: " + jogador.nome + " → " + clubeComprador.nome, msg.valor, "receita");
      adicionarNoticia("✅ " + jogador.nome + " vendido ao " + clubeComprador.nome + " por " + formatarDinheiro(msg.valor), estado.rodadaAtual);
    }
  } else {
    adicionarNoticia("❌ Proposta do " + (CLUBES.find(function(c){return c.id===msg.clubeOfertanteId;})||{}).nome + " por " + (estado.meuClube.jogadores.find(function(j){return j.id===msg.jogadorId;})||{}).nome + " recusada.", estado.rodadaAtual);
  }

  msg.respondida = true;
  msg.lida = true;
  salvarJogo();
  renderInbox();
}

// Renovar contrato
function renovarContrato(jogadorId) {
  var j = estado.meuClube.jogadores.find(function(x) { return x.id === jogadorId; });
  if (!j) return;
  var novoSalario = parseInt(document.getElementById("inp-sal-renovacao").value);
  var duracao     = parseInt(document.getElementById("inp-dur-renovacao").value);
  if (!novoSalario || novoSalario <= 0) { alert("Digite um salário válido."); return; }

  // Jogador aceita se salário >= atual
  var aceita = novoSalario >= j.salario;
  // Chance de recusar mesmo com aumento se overall alto
  if (aceita && j.overall >= 82 && novoSalario < j.salario * 1.15) {
    aceita = Math.random() > 0.4;
  }

  if (aceita) {
    j.salario          = novoSalario;
    j.contrato_termino = estado.rodadaAtual + duracao;
    j.clausula_rescisoria = Math.round(j.valor_mercado * (j.overall >= 82 ? 2.5 : 2.0));
    adicionarNoticia("📝 " + j.nome + " renovou contrato até a rodada " + j.contrato_termino + " por " + formatarDinheiro(novoSalario) + "/mês", estado.rodadaAtual);
    salvarJogo();
    alert("✅ " + j.nome + " aceitou a renovação!");
    abrirFichaJogador(jogadorId);
  } else {
    alert("❌ " + j.nome + " recusou a proposta. Tente um salário maior.");
  }
}

var _torneioHubAba = "brasileirao";

function renderTorneiosHub() {
  var meuClube = estado.meuClube;
  var meuId    = meuClube.id;
  var div      = estado.minhaDivisao || "serieA";
  // Reset se aba antiga não existe mais
  var abasValidas = ["nacional","internacional","estadual"];
  if (!_torneioHubAba || abasValidas.indexOf(_torneioHubAba) < 0) _torneioHubAba = "nacional";
  // Times paulistas (Bezinha ou Paulistão) abrem direto na aba Estadual
  if (div.indexOf("paulista_") === 0 && _torneioHubAba === "nacional" && !window._torneioHubVisitadoNacional) {
    _torneioHubAba = "estadual";
  }
  window._torneioHubVisitadoNacional = true;
  var aba      = _torneioHubAba;

  // Detectar divisão principal do clube (só relevante para times NACIONAIS)
  var labelPrincipal, renderPrincipal;
  if (div.indexOf("paulista_") === 0) {
    // Times paulistas não têm aba "serie" no Nacional — usar fallback simples
    labelPrincipal = "🇧🇷 Série A"; renderPrincipal = renderBrasileirao;
  } else {
    var divisaoNacional = "A";
    if (estadoDivisoes.b.clubes && estadoDivisoes.b.clubes.find(function(c){return c.id===meuId;})) divisaoNacional="B";
    else if (estadoDivisoes.c.clubes && estadoDivisoes.c.clubes.find(function(c){return c.id===meuId;})) divisaoNacional="C";
    else if (estadoDivisoes.d.clubes && estadoDivisoes.d.clubes.find(function(c){return c.id===meuId;})) divisaoNacional="D";
    labelPrincipal = "🇧🇷 Série "+divisaoNacional;
    renderPrincipal = renderBrasileirao;
  }

  // Detectar participação em torneios
  var nasCopaBR = estadoTorneios.copaBrasil && estadoTorneios.copaBrasil.participantes &&
    estadoTorneios.copaBrasil.participantes.indexOf(meuId) >= 0 &&
    !(estadoTorneios.copaBrasil.eliminados||[]).includes(meuId);
  var naLib = estadoTorneios.libertadores && estadoTorneios.libertadores.grupos &&
    estadoTorneios.libertadores.grupos.some(function(g){ return g.clubes.indexOf(meuId)>=0; });
  var noMundial = estadoTorneios.mundial &&
    estadoTorneios.mundial.grupos &&
    estadoTorneios.mundial.grupos.some(function(g){ return g.clubes.indexOf(meuId)>=0; });
  var naPaulistaDiv = ["a1","a2","a3","a4"].some(function(d){
    return estadoPaulista[d].clubes && estadoPaulista[d].clubes.find(function(c){return c.id===meuId;});
  });
  var naBezinha = GRUPOS_BEZINHA.some(function(g){ return g.clubes.find(function(c){return c.id===meuId;}); });

  // Tabs principais
  var tabs = [
    { k:"nacional",       label:"🇧🇷 Nacional" },
    { k:"internacional",  label:"🌎 Internacional" },
    { k:"estadual",       label:"🏅 Estadual" }
  ];

  var html = '<div class="torneios-hub">';
  html += '<div class="hub-tabs">';
  tabs.forEach(function(t) {
    html += '<button class="hub-tab'+(aba===t.k?" ativo":"")+'" onclick="mudarTorneioHub(\'' + t.k + '\')">'+t.label+'</button>';
  });
  html += '</div><div class="hub-conteudo">';

  if (aba === "nacional") html += renderNacionalHub(meuId, labelPrincipal, renderPrincipal, nasCopaBR, div);
  if (aba === "internacional") html += renderInternacionalHub(meuId, naLib, noMundial);
  if (aba === "estadual") html += renderEstadualHub(meuId, naPaulistaDiv, naBezinha, div);

  html += '</div></div>';
  document.getElementById("main").innerHTML = html;
}

function mudarTorneioHub(aba) { _torneioHubAba=aba; renderTorneiosHub(); }

// ── NACIONAL ──
function renderNacionalHub(meuId, labelPrincipal, renderPrincipal, nasCopaBR, div) {
  var ehTimePaulista = div.indexOf("paulista_") === 0;
  var subaba = window._subabaNacional || (ehTimePaulista ? "serieA" : "serie");
  if (ehTimePaulista && subaba === "serie") subaba = "serieA";
  var html = '<div class="hub-sub-tabs">';

  // Sub-abas: divisão do clube (só se NÃO for paulista) + todas as séries + Copa do Brasil
  var subs = [];

  return html;
}

  else if (ehC) { clubes=estadoDivisoes.c.clubes; resultados=estadoDivisoes.c.resultados; rodada=estadoDivisoes.c.rodadaAtual; }
  else if (ehD) { clubes=estadoDivisoes.d.clubes; resultados=estadoDivisoes.d.resultados; rodada=estadoDivisoes.d.rodadaAtual; }

  var tabela = calcularTabela(clubes, resultados);
  var html = '<div class="divisoes-grid">';

  // Tabela
  html += '<div class="div-tabela-wrap">';
  html += '<div class="fin-secao-titulo">Classificação — Rodada ' + rodada + '</div>';
  html += '<table class="elenco-tabela"><thead><tr><th>#</th><th>Clube</th><th>Pts</th><th>J</th><th>V</th><th>E</th><th>D</th><th>SG</th></tr></thead><tbody>';
  tabela.forEach(function(t,i) {
    var pos=i+1;
    var cls=t.id===meuId?" mini-tab-eu":"";
    var corPos=pos<=4?"color:var(--green)":pos>tabela.length-4?"color:var(--red)":"";
    html+='<tr class="'+cls+'"><td class="td-pos" style="'+corPos+'">'+pos+'</td>';
    html+='<td><span class="escudo-mini" style="background:'+t.cor+'">'+t.sigla+'</span>'+t.nome+'</td>';
    html+='<td class="td-pts">'+t.pts+'</td><td>'+t.j+'</td><td>'+t.v+'</td><td>'+t.e+'</td><td>'+t.d+'</td>';
    html+='<td>'+(t.sg>0?"+"+t.sg:t.sg)+'</td></tr>';
  });
  html += '</tbody></table></div>';

  // Próximos e últimos jogos
  html += '<div class="div-resultados">';
  html += '<div class="fin-secao-titulo">Jogos do meu clube</div>';
  var meusJogos = resultados.filter(function(r){return r.mandanteId===meuId||r.visitanteId===meuId;}).slice(-5);
  if (meusJogos.length===0) html += '<div class="dash-empty">Nenhum jogo ainda.</div>';
  meusJogos.forEach(function(r){
    var m=clubes.find(function(c){return c.id===r.mandanteId;})||{sigla:"?"};
    var v=clubes.find(function(c){return c.id===r.visitanteId;})||{sigla:"?"};

    var mg=euM?r.golsMandante:r.golsVisitante;

// ARTILHEIROS E ASSISTÊNCIAS
// ════════════════════════════════════════
function calcularArtilheiros(lances, clubes) {
  var stats = {}; // { jogadorId: { nome, clube, gols, assists } }
  
  lances.forEach(function(l) {
    if (l.tipo !== "gol") return;
    
    // Gol
    if (l.jogadorId) {
      if (!stats[l.jogadorId]) {
        var j = null;
        clubes.forEach(function(c){ if(c.jogadores) { var jj=c.jogadores.find(function(x){return x.id===l.jogadorId;}); if(jj){j=jj; j._clube=c.nome; j._sigla=c.sigla;} } });
        if (j) stats[l.jogadorId] = { nome:j.nome, clube:j._clube, sigla:j._sigla||"?", gols:0, assists:0 };
      }
      if (stats[l.jogadorId]) stats[l.jogadorId].gols++;
    }
    
    // Assistência
    if (l.assistenteId) {
      if (!stats[l.assistenteId]) {
        var j2 = null;
        clubes.forEach(function(c){ if(c.jogadores) { var jj=c.jogadores.find(function(x){return x.id===l.assistenteId;}); if(jj){j2=jj; j2._clube=c.nome; j2._sigla=c.sigla;} } });
        if (j2) stats[l.assistenteId] = { nome:j2.nome, clube:j2._clube, sigla:j2._sigla||"?", gols:0, assists:0 };
      }
      if (stats[l.assistenteId]) stats[l.assistenteId].assists++;
    }
  });
  
  return Object.values(stats).sort(function(a,b){ return (b.gols-a.gols)||(b.assists-a.assists); });
}

function renderArtilheiros(artilheiros, titulo, max) {
  var top = artilheiros.slice(0, max||10);
  if (top.length === 0) return '<div class="dash-empty">Sem dados ainda.</div>';
  
  var html = '<div class="artilheiros-lista">';
  top.forEach(function(a, i) {
    html += '<div class="artilheiro-item">';
    html += '<span class="art-pos">'+(i+1)+'</span>';
    html += '<div class="art-info"><div class="art-nome">'+a.nome+'</div><div class="art-clube">'+a.clube+'</div></div>';
    html += '<div class="art-stats">';
    html += '<span class="art-gols">⚽ '+a.gols+'</span>';
    if (a.assists > 0) html += '<span class="art-assists">🎯 '+a.assists+'</span>';
    html += '</div></div>';
  });
  html += '</div>';
  return html;
}

function getLancesResultados(resultados) {
  var lances = [];
  resultados.forEach(function(r){
    if (r.eventos) r.eventos.forEach(function(e){ lances.push(e); });
  });
  return lances;
}</script>
