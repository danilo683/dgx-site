  jogoAtivo.escVisitante.forEach(function(j) { j.fadiga = j.fadiga || 0; });

  var golsExibidosM = 0, golsExibidosV = 0;
  var lancesExibidos = 0;
  var chutesM = 0, chutesV = 0;
  var minAtual = 0;
  var totalMs = 30000;
  var intervalo = totalMs / 90;
  // Paradas: 45, 60, 75
  var paradasFeitas = { 45: false, 60: false, 75: false };

  jogoAtivo.idxLance = 0;
  jogoAtivo.golsExibidosM = 0;
  jogoAtivo.golsExibidosV = 0;
  jogoAtivo.lancesExibidos = [];
  jogoAtivo.paradasFeitas = { 45:false, 60:false, 75:false };

  jogoAtivo.timer = setInterval(function() {
    minAtual++;
    jogoAtivo.minAtual = minAtual;

    // Atualizar cronômetro
    var cron = document.getElementById("cronometro");
    if (cron) cron.textContent = minAtual + "'";

    // Atualizar fadiga dos em campo
    jogoAtivo.escMandante.forEach(function(j) {
      j.fadiga = Math.min(100, (j.fadiga || 0) + (0.4 + Math.random() * 0.2) / (0.5 + (j.overall - 60) / 80));
    });
    jogoAtivo.escVisitante.forEach(function(j) {
      j.fadiga = Math.min(100, (j.fadiga || 0) + (0.4 + Math.random() * 0.2) / (0.5 + (j.overall - 60) / 80));
    });

    // Paradas do técnico
    [45, 60, 75].forEach(function(parada) {
      if (minAtual === parada && !paradasFeitas[parada]) {
        paradasFeitas[parada] = true;
        var paradaNum = parada === 45 ? 1 : parada === 60 ? 2 : 3;

        // Mandante
        var subsM = tecnicoDecideSubstituicoes(
          jogoAtivo.escMandante, jogoAtivo.reservasMandante,
          paradaNum, 5 - jogoAtivo.subsM, 3 - jogoAtivo.paradasM
        );
        if (subsM.length > 0) {
          jogoAtivo.paradasM++;
          subsM.forEach(function(sub) {
            if (jogoAtivo.subsM >= 5) return;
            jogoAtivo.escMandante = aplicarSubstituicao(jogoAtivo.escMandante, sub);
            jogoAtivo.subsM++;
            adicionarLanceFeed({
              minuto: parada,
              tipo: "substituicao",
              texto: "🔄 " + jogoAtivo.mandante.nome + ": entra " + sub.entra.nome + ", sai " + sub.sai.nome + " (" + sub.motivo + ")"
            });
          });
        }

        // Visitante
        var subsV = tecnicoDecideSubstituicoes(
          jogoAtivo.escVisitante, jogoAtivo.reservasVisitante,
          paradaNum, 5 - jogoAtivo.subsV, 3 - jogoAtivo.paradasV
        );
        if (subsV.length > 0) {
          jogoAtivo.paradasV++;
          subsV.forEach(function(sub) {
            if (jogoAtivo.subsV >= 5) return;
            jogoAtivo.escVisitante = aplicarSubstituicao(jogoAtivo.escVisitante, sub);
            jogoAtivo.subsV++;
            adicionarLanceFeed({
              minuto: parada,
              tipo: "substituicao",
              texto: "🔄 " + jogoAtivo.visitante.nome + ": entra " + sub.entra.nome + ", sai " + sub.sai.nome + " (" + sub.motivo + ")"
            });
          });
        }

        // Atualizar campo
        var campoWrap = document.getElementById("campo-wrap");
        if (campoWrap) {
          campoWrap.innerHTML = renderCampoTatico(
            jogoAtivo.escMandante, jogoAtivo.escVisitante,
            jogoAtivo.mandante, jogoAtivo.visitante,
            jogoAtivo.tecMandante, jogoAtivo.tecVisitante
          );
        }

        // Atualizar contador de subs
        var sm = document.getElementById("sv-subs-m");
        var sv = document.getElementById("sv-subs-v");
        if (sm) sm.textContent = jogoAtivo.subsM + "/5";
        if (sv) sv.textContent = jogoAtivo.subsV + "/5";
      }
    });

    // Exibir lances do minuto
    while (lancesExibidos < lances.length && lances[lancesExibidos].minuto <= minAtual) {
      var lance = lances[lancesExibidos];
      adicionarLanceFeed(lance);

      if (lance.tipo === "gol") {
        if (lance.time === "mandante") golsExibidosM++;
        else golsExibidosV++;
        var pn = document.getElementById("placar-numeros");
        if (pn) pn.textContent = golsExibidosM + " – " + golsExibidosV;
      }
      if (lance.tipo === "chute" || lance.tipo === "gol") {
        if (lance.time === "mandante") chutesM++;
        else chutesV++;
        var sm2 = document.getElementById("sv-chutes-m");
        var sv2 = document.getElementById("sv-chutes-v");
        if (sm2) sm2.textContent = chutesM;
        if (sv2) sv2.textContent = chutesV;
      }
      lancesExibidos++;
    }

    // Posse
    var fM = r.forcaMandante.forca;
    var fV = r.forcaVisitante.forca;
    var posseM = Math.max(30, Math.min(70, Math.round(50 + (fM-fV)*0.2 + (Math.random()*4-2))));
    var spm = document.getElementById("sv-posse-m");
    var spv = document.getElementById("sv-posse-v");
    if (spm) spm.textContent = posseM + "%";
    if (spv) spv.textContent = (100-posseM) + "%";

    // Atualizar campo a cada 10 minutos (fadiga)
    if (minAtual % 10 === 0) {
      var cw = document.getElementById("campo-wrap");
      if (cw) cw.innerHTML = renderCampoTatico(
        jogoAtivo.escMandante, jogoAtivo.escVisitante,
        jogoAtivo.mandante, jogoAtivo.visitante,
        jogoAtivo.tecMandante, jogoAtivo.tecVisitante
      );
    }

    if (minAtual >= 90) {
      clearInterval(jogoAtivo.timer);
      finalizarPartida();
    }
  }, intervalo);
}

function adicionarLanceFeed(lance) {
  var lista = document.getElementById("lances-lista");
  if (!lista) return;
  var vazio = lista.querySelector(".lance-vazio");
  if (vazio) lista.removeChild(vazio);
  var div = document.createElement("div");
  var cls = "lance-item";
  if (lance.tipo === "gol")         cls += " lance-gol";
  if (lance.tipo === "substituicao")cls += " lance-sub";
  if (lance.tipo === "intervalo")   cls += " lance-intervalo";
  if (lance.tipo === "fim")         cls += " lance-fim";
  div.className = cls;
  div.innerHTML = '<span class="lance-min">' + lance.minuto + '\'</span><span class="lance-texto">' + lance.texto + '</span>';
  lista.appendChild(div);
  lista.scrollTop = lista.scrollHeight;
}

function finalizarPartida() {
  var r          = jogoAtivo.resultado;
  var euMandante = jogoAtivo.euMandante;
  var mandante   = jogoAtivo.mandante;
  var visitante  = jogoAtivo.visitante;
  var lances     = jogoAtivo.lances;
  var meuClube   = estado.meuClube;
  var meuEsc     = euMandante ? jogoAtivo.escMandante : jogoAtivo.escVisitante;
  var escInicial = euMandante ? jogoAtivo.escMandante : jogoAtivo.escVisitante;

  // Calcular notas
  var notasM = calcularNotasJogadores(jogoAtivo.escMandante, lances, mandante, r, true);
  var notasV = calcularNotasJogadores(jogoAtivo.escVisitante, lances, visitante, r, false);
  var minhasNotas = euMandante ? notasM : notasV;

  // Aplicar stats nos jogadores do meu time
  aplicarResultadosJogadores(meuEsc, lances, minhasNotas);

  // Atualizar fadiga real dos jogadores
  meuClube.jogadores.forEach(function(j) {
    var emCampo = meuEsc.find(function(e) { return e.id === j.id; });
    if (emCampo) j.fadiga = emCampo.fadiga;
  });

  // Salvar resultado
  estado.resultados.push({
    rodada: jogoAtivo.rodadaIdx,
    mandanteId: mandante.id, visitanteId: visitante.id,
    golsMandante: r.golsMandante, golsVisitante: r.golsVisitante,
    eventos: lances.filter(function(l) { return l.tipo === "gol"; }).map(function(l) {
      return { minuto: l.minuto, texto: l.texto };
    }),
    forcaMandante: r.forcaMandante, forcaVisitante: r.forcaVisitante
  });

  // Outros jogos da rodada
  var cal = estado.calendario[jogoAtivo.rodadaIdx];
  cal.jogos.forEach(function(jogo) {
    if (jogo.mandanteId === mandante.id && jogo.visitanteId === visitante.id) return;
    var m2 = CLUBES.find(function(c) { return c.id === jogo.mandanteId; });
    var v2 = CLUBES.find(function(c) { return c.id === jogo.visitanteId; });
    var tM2 = TECNICOS_DISPONIVEIS.find(function(t) { return t.id === m2.tecnico_id; });
    var tV2 = TECNICOS_DISPONIVEIS.find(function(t) { return t.id === v2.tecnico_id; });
    var r2  = simularPartidaSimples(m2, v2, tM2, tV2);
    estado.resultados.push({
      rodada: jogoAtivo.rodadaIdx,
      mandanteId: jogo.mandanteId, visitanteId: jogo.visitanteId,
      golsMandante: r2.golsMandante, golsVisitante: r2.golsVisitante,
      eventos: r2.eventos, forcaMandante: r2.forcaMandante, forcaVisitante: r2.forcaVisitante
    });
  });

  estado.rodadaAtual = jogoAtivo.rodadaIdx + 1;
  processarMercadoRodada(jogoAtivo.rodadaIdx);

  // Notícias e inbox
  var meusG = euMandante ? r.golsMandante : r.golsVisitante;
  var delesG= euMandante ? r.golsVisitante : r.golsMandante;
  var adv   = euMandante ? visitante : mandante;
  var txt   = meusG > delesG ? "Vitória" : meusG < delesG ? "Derrota" : "Empate";
  adicionarNoticia(txt + " " + meusG + "x" + delesG + " contra o " + adv.nome + " (Rod. " + (jogoAtivo.rodadaIdx+1) + ")", jogoAtivo.rodadaIdx);
  estado.inbox = estado.inbox || [];
  estado.inbox.push({
    id: "res_" + jogoAtivo.rodadaIdx,
    titulo: txt + " " + meusG + "x" + delesG + " · " + adv.nome,
    remetente: "Imprensa",
    texto: meuClube.nome + " " + txt.toLowerCase() + " por " + meusG + " a " + delesG + " contra " + adv.nome + " - Rodada " + (jogoAtivo.rodadaIdx+1),
    lida: false
  });

  salvarJogo();
  renderTelaResultadoComNotas(meuEsc, minhasNotas, r, euMandante);
}

  document.getElementById("main").innerHTML = html;
}

var _partidaPausada = false;

function pausarPartida() {
  if (jogoAtivo && jogoAtivo.timer) {
    clearInterval(jogoAtivo.timer);
    jogoAtivo.timer = null;
    _partidaPausada = true;
  }
}

function voltarParaPartida() {
  if (!jogoAtivo) return;
  // Remontar a tela de jogo
  renderTelaJogoAtivo();
  if (_partidaPausada) {
    retomarPartidaTimer();
    _partidaPausada = false;
  }
}

function retomarPartidaTimer() {
  if (!jogoAtivo || jogoAtivo.timer) return;
  var totalMs = 30000;
  var minRestante = 90 - jogoAtivo.minAtual;
  var intervalo = totalMs / 90;

  jogoAtivo.timer = setInterval(function() {
    jogoAtivo.minAtual++;
    var minAtual = jogoAtivo.minAtual;

    var cron = document.getElementById("cronometro");
    if (cron) cron.textContent = minAtual + "'";

    // Fadiga
    jogoAtivo.escMandante.forEach(function(j){ j.fadiga = Math.min(100,(j.fadiga||0)+(0.4+Math.random()*0.2)/(0.5+(j.overall-60)/80)); });
    jogoAtivo.escVisitante.forEach(function(j){ j.fadiga = Math.min(100,(j.fadiga||0)+(0.4+Math.random()*0.2)/(0.5+(j.overall-60)/80)); });

    // Paradas do técnico (45, 60, 75)
    [45,60,75].forEach(function(parada) {
      if (minAtual===parada && !jogoAtivo.paradasFeitas[parada]) {
        jogoAtivo.paradasFeitas[parada]=true;
        var paradaNum = parada===45?1:parada===60?2:3;
        _processarParada(parada, paradaNum);
      }
    });

    // Lances
    while (jogoAtivo.idxLance < jogoAtivo.lances.length && jogoAtivo.lances[jogoAtivo.idxLance].minuto <= minAtual) {
      var lance = jogoAtivo.lances[jogoAtivo.idxLance];
      jogoAtivo.lancesExibidos = jogoAtivo.lancesExibidos || [];
      jogoAtivo.lancesExibidos.push(lance);
      adicionarLanceFeed(lance);
      if (lance.tipo==="gol") {
        if (lance.time==="mandante") jogoAtivo.golsExibidosM++;
        else jogoAtivo.golsExibidosV++;
        var pn=document.getElementById("placar-numeros");
        if(pn) pn.textContent=jogoAtivo.golsExibidosM+" – "+jogoAtivo.golsExibidosV;
      }
      if (lance.tipo==="chute"||lance.tipo==="gol") {
        if(lance.time==="mandante") jogoAtivo.chutesM=(jogoAtivo.chutesM||0)+1;
        else jogoAtivo.chutesV=(jogoAtivo.chutesV||0)+1;
        var sm=document.getElementById("sv-chutes-m"),sv=document.getElementById("sv-chutes-v");
        if(sm) sm.textContent=jogoAtivo.chutesM; if(sv) sv.textContent=jogoAtivo.chutesV;
      }
      jogoAtivo.idxLance++;
    }

    // Posse
    var fM=jogoAtivo.resultado.forcaMandante.forca,fV=jogoAtivo.resultado.forcaVisitante.forca;
    var posseM=Math.max(30,Math.min(70,Math.round(50+(fM-fV)*0.2+(Math.random()*4-2))));
    var spm=document.getElementById("sv-posse-m"),spv=document.getElementById("sv-posse-v");
    if(spm) spm.textContent=posseM+"%"; if(spv) spv.textContent=(100-posseM)+"%";

    if(minAtual%10===0){var cw=document.getElementById("campo-wrap");if(cw)cw.innerHTML=renderCampoTatico(jogoAtivo.escMandante,jogoAtivo.escVisitante,jogoAtivo.mandante,jogoAtivo.visitante,jogoAtivo.tecMandante,jogoAtivo.tecVisitante);}

    if (minAtual >= 90) {
      clearInterval(jogoAtivo.timer);
      jogoAtivo.timer = null;
      finalizarPartida();
    }
  }, intervalo);
}

function _processarParada(parada, paradaNum) {
  var subsM = tecnicoDecideSubstituicoes(jogoAtivo.escMandante,jogoAtivo.reservasMandante,paradaNum,5-jogoAtivo.subsM,3-jogoAtivo.paradasM);
  if(subsM.length>0){
    jogoAtivo.paradasM++;
    subsM.forEach(function(sub){
      if(jogoAtivo.subsM>=5) return;
      jogoAtivo.escMandante=aplicarSubstituicao(jogoAtivo.escMandante,sub);
      jogoAtivo.subsM++;
      var lance={minuto:parada,tipo:"substituicao",texto:"🔄 "+jogoAtivo.mandante.nome+": entra "+sub.entra.nome+", sai "+sub.sai.nome+" ("+sub.motivo+")"};
      jogoAtivo.lancesExibidos=jogoAtivo.lancesExibidos||[];

      adicionarLanceFeed(lance);
    });
    var sm=document.getElementById("sv-subs-m"); if(sm) sm.textContent=jogoAtivo.subsM+"/5";

  if(subsV.length>0){
    jogoAtivo.paradasV++;
    subsV.forEach(function(sub){
      if(jogoAtivo.subsV>=5) return;
      jogoAtivo.escVisitante=aplicarSubstituicao(jogoAtivo.escVisitante,sub);
      jogoAtivo.subsV++;
      var lance={minuto:parada,tipo:"substituicao",texto:"🔄 "+jogoAtivo.visitante.nome+": entra "+sub.entra.nome+", sai "+sub.sai.nome+" ("+sub.motivo+")"};
      jogoAtivo.lancesExibidos=jogoAtivo.lancesExibidos||[];
      jogoAtivo.lancesExibidos.push(lance);
      adicionarLanceFeed(lance);
    });
    var sv=document.getElementById("sv-subs-v"); if(sv) sv.textContent=jogoAtivo.subsV+"/5";
  }
  var cw=document.getElementById("campo-wrap");
  if(cw) cw.innerHTML=renderCampoTatico(jogoAtivo.escMandante,jogoAtivo.escVisitante,jogoAtivo.mandante,jogoAtivo.visitante,jogoAtivo.tecMandante,jogoAtivo.tecVisitante);
}</script>
<script>// ════════════════════════════════════════
// SISTEMA FINANCEIRO
// ════════════════════════════════════════

// Configuração das fontes de receita por porte do clube
function configurarFinanceiroClube(clube) {
  if (clube.financeiro) return; // já configurado

  var tier = clube.budget >= 80000000 ? "grande" :
             clube.budget >= 40000000 ? "medio"  : "pequeno";

  var config = {
    grande:  { socio: 3500000, bilheteria: 2500000, cotas_tv: 8000000, patrocinio_camisa: 5000000, patrocinio_esportivo: 2000000, licenciados: 800000, naming_rights: 1500000, aluguel_estadio: 600000 },
    medio:   { socio: 1200000, bilheteria: 900000,  cotas_tv: 3500000, patrocinio_camisa: 1500000, patrocinio_esportivo: 700000,  licenciados: 250000, naming_rights: 400000,  aluguel_estadio: 200000 },
    pequeno: { socio: 300000,  bilheteria: 250000,  cotas_tv: 800000,  patrocinio_camisa: 300000,  patrocinio_esportivo: 150000,  licenciados: 60000,  naming_rights: 80000,   aluguel_estadio: 50000  }
  };

  clube.financeiro = {
    tier: tier,
    receitas_config: config[tier],
    historico: [],        // { rodada, tipo, descricao, valor }
    folha_mensal: 0,      // calculado dinamicamente
    resultado_acumulado: 0
  };
}

function calcularFolha(clube) {
  return clube.jogadores.reduce(function(s, j) { return s + (j.salario || 0); }, 0);
}

// Processar receitas de uma rodada
function processarReceitasRodada(clube, rodadaIdx, jogosEmCasa) {
  configurarFinanceiroClube(clube);
  var cfg = clube.financeiro.receitas_config;
  var total = 0;

  // Receitas fixas mensais (divididas por ~4 rodadas)
  var fixas = [
    { tipo: "socio",              desc: "Sócio torcedor",           valor: Math.round(cfg.socio / 4) },
    { tipo: "cotas_tv",           desc: "Cotas de TV",              valor: Math.round(cfg.cotas_tv / 4) },
    { tipo: "patrocinio_camisa",  desc: "Patrocínio camisa",        valor: Math.round(cfg.patrocinio_camisa / 4) },
    { tipo: "patrocinio_esportivo",desc:"Patrocínio esportivo",     valor: Math.round(cfg.patrocinio_esportivo / 4) },
    { tipo: "licenciados",        desc: "Produtos licenciados",     valor: Math.round(cfg.licenciados / 4) },
    { tipo: "naming_rights",      desc: "Naming rights estádio",    valor: Math.round(cfg.naming_rights / 4) }
  ];

  fixas.forEach(function(f) {
    clube.budget += f.valor;
    total += f.valor;
    clube.financeiro.historico.push({ rodada: rodadaIdx, tipo: "receita", categoria: f.tipo, descricao: f.desc, valor: f.valor });
  });

  // Bilheteria só jogos em casa
  if (jogosEmCasa > 0) {
    var bilheteria = Math.round(cfg.bilheteria * jogosEmCasa * (0.8 + Math.random() * 0.4));
    clube.budget += bilheteria;
    total += bilheteria;
    clube.financeiro.historico.push({ rodada: rodadaIdx, tipo: "receita", categoria: "bilheteria", descricao: "Bilheteria (jogo em casa)", valor: bilheteria });

    // Aluguel ocasional para shows (20% de chance)
    if (Math.random() < 0.2) {
      var aluguel = Math.round(cfg.aluguel_estadio * (0.5 + Math.random()));
      clube.budget += aluguel;
      clube.financeiro.historico.push({ rodada: rodadaIdx, tipo: "receita", categoria: "aluguel_estadio", descricao: "Aluguel estádio (evento)", valor: aluguel });
    }
  }

  // Folha salarial (despesa)
  var folha = calcularFolha(clube);
  clube.financeiro.folha_mensal = folha;
  if (rodadaIdx % 4 === 0) { // paga mensalmente (a cada 4 rodadas)
    clube.budget -= folha;
    clube.financeiro.historico.push({ rodada: rodadaIdx, tipo: "despesa", categoria: "folha", descricao: "Folha salarial mensal", valor: -folha });
  }

  clube.financeiro.resultado_acumulado += total;
}

// Registrar transferência no histórico
function registrarTransferenciaFinanceiro(clube, descricao, valor, tipo) {
  configurarFinanceiroClube(clube);
  clube.financeiro.historico.push({
    rodada: estado.rodadaAtual,
    tipo: tipo || (valor > 0 ? "receita" : "despesa"),
    categoria: "transferencia",
    descricao: descricao,
    valor: valor
  });
}

// ── Mecânicas de gestão de jogadores ──

// Colocar jogador à venda (pode coexistir com empréstimo)
function colocarAVenda(jogadorId, precoMinimo) {
  var j = estado.meuClube.jogadores.find(function(x) { return x.id === jogadorId; });
  if (!j) return;
  j.a_venda = true;
  j.preco_minimo = precoMinimo;
  adicionarNoticia("📢 " + j.nome + " está disponível para transferência por " + formatarDinheiro(precoMinimo), estado.rodadaAtual);
}

// Colocar para empréstimo (pode coexistir com venda)
function colocarParaEmprestimo(jogadorId, rodadas) {
  var j = estado.meuClube.jogadores.find(function(x) { return x.id === jogadorId; });
  if (!j) return;
  j.para_emprestimo = true;
  j.emprestimo_rodadas = rodadas;
}

// Retirar jogador da venda
function retirarDaVenda(jogadorId) {
  var j = estado.meuClube.jogadores.find(function(x) { return x.id === jogadorId; });
  if (!j) return;
  j.a_venda = false;
  j.preco_minimo = null;
}

// Retirar jogador do empréstimo
function retirarDoEmprestimo(jogadorId) {
  var j = estado.meuClube.jogadores.find(function(x) { return x.id === jogadorId; });
  if (!j) return;
  j.para_emprestimo = false;
  j.emprestimo_rodadas = null;
}

// Dispensar jogador
function dispensarJogador(jogadorId, acordoMutuo) {
  var clube = estado.meuClube;
  var j = clube.jogadores.find(function(x) { return x.id === jogadorId; });
  if (!j) return false;

  var custo = 0;
  if (!acordoMutuo) {
    // Rescisão unilateral: pagar % do salário restante
    var rodadasRestantes = Math.max(0, (j.contrato_termino || 0) - estado.rodadaAtual);
    custo = Math.round(j.salario * rodadasRestantes * 0.5);
  }

  if (custo > clube.budget) return { erro: "Sem budget para pagar rescisão de " + formatarDinheiro(custo) };

  clube.budget -= custo;
  if (custo > 0) registrarTransferenciaFinanceiro(clube, "Rescisão: " + j.nome, -custo, "despesa");

  clube.jogadores = clube.jogadores.filter(function(x) { return x.id !== jogadorId; });
  adicionarNoticia("📤 " + j.nome + " dispensado do " + clube.nome + (custo > 0 ? " por " + formatarDinheiro(custo) : " (acordo mútuo)"), estado.rodadaAtual);
  return { ok: true, custo: custo };
}

// IA propõe comprar jogador do seu clube
function simularPropostasIA() {
  if (!estado.meuClube) return;
  var meuClube = estado.meuClube;

  // 30% de chance de receber proposta por rodada
  if (Math.random() > 0.30) return;

  // Escolher um jogador atraente (overall 75+)
  var candidatos = meuClube.jogadores.filter(function(j) { return j.overall >= 75; });
  if (candidatos.length === 0) return;

  var alvo = candidatos[Math.floor(Math.random() * candidatos.length)];

  // Clube que está oferecendo
  var clubesIA = CLUBES.filter(function(c) { return c.id !== meuClube.id && c.budget >= alvo.valor_mercado * 0.8; });
  if (clubesIA.length === 0) return;

  var clubeOfertante = clubesIA[Math.floor(Math.random() * clubesIA.length)];
  var oferta = Math.round(alvo.valor_mercado * (0.85 + Math.random() * 0.4));

  // Criar mensagem no inbox
  estado.inbox = estado.inbox || [];
  estado.inbox.push({
    id: "proposta_" + alvo.id + "_" + Date.now(),
    titulo: "Proposta por " + alvo.nome,
    remetente: clubeOfertante.nome,
    texto: "O " + clubeOfertante.nome + " está interessado em contratar " + alvo.nome + " (" + alvo.posicao + " · " + alvo.overall + ") e oferece " + formatarDinheiro(oferta) + " pela transferência.",
    lida: false,
    tipo: "proposta_recebida",
    jogadorId: alvo.id,
    clubeOfertanteId: clubeOfertante.id,
    valor: oferta
  });

  adicionarNoticia("📨 " + clubeOfertante.nome + " oferece " + formatarDinheiro(oferta) + " por " + alvo.nome, estado.rodadaAtual);
}

// ── TELA FINANCEIRO ──
function renderFinanceiro() {
  var clube = estado.meuClube;
  configurarFinanceiroClube(clube);
  var hist  = clube.financeiro.historico;
  var folha = calcularFolha(clube);

  // Agrupar receitas e despesas totais
  var totalReceitas = hist.filter(function(h) { return h.tipo === "receita"; }).reduce(function(s,h) { return s + h.valor; }, 0);
  var totalDespesas = hist.filter(function(h) { return h.tipo === "despesa"; }).reduce(function(s,h) { return s + Math.abs(h.valor); }, 0);
  var resultado = totalReceitas - totalDespesas;

  // Agrupar por categoria
  var porCategoria = {};

    if (!porCategoria[k]) porCategoria[k] = { receita: 0, despesa: 0, desc: h.descricao };
    if (h.tipo === "receita") porCategoria[k].receita += h.valor;

  });

  var nomeCategoria = {

    folha: "Folha salarial", transferencia: "Transferências"

  var html = '<div class="fin-tela">';

  // Header
  html += '<div class="fin-header">';

  html += '<div class="fin-dre-card despesa"><div class="fin-dre-label">Total Despesas</div><div class="fin-dre-valor">' + formatarDinheiro(totalDespesas) + '</div></div>';

  html += '<div class="fin-dre-card neutro"><div class="fin-dre-label">Folha mensal</div><div class="fin-dre-valor">' + formatarDinheiro(folha) + '</div></div>';

  html += '<div class="fin-grid">';

  // Receitas
  html += '<div class="fin-secao">';
  html += '<div class="fin-secao-titulo receita-titulo">📈 Receitas</div>';
  var cats = Object.entries(porCategoria).filter(function(e) { return e[1].receita > 0; })
    .sort(function(a,b) { return b[1].receita - a[1].receita; });
  cats.forEach(function(entry) {
    var k = entry[0], v = entry[1];
    html += '<div class="fin-linha">';
    html += '<span class="fin-linha-desc">' + (nomeCategoria[k] || k) + '</span>';
    html += '<span class="fin-linha-val receita-cor">' + formatarDinheiro(v.receita) + '</span>';

  if (cats.length === 0) html += '<div class="dash-empty">Nenhuma receita registrada.</div>';
  html += '</div>';

  // Despesas
  html += '<div class="fin-secao">';

  var catsDes = Object.entries(porCategoria).filter(function(e) { return e[1].despesa > 0; })
    .sort(function(a,b) { return b[1].despesa - a[1].despesa; });
  catsDes.forEach(function(entry) {

  if (catsDes.length === 0) html += '<div class="dash-empty">Nenhuma despesa registrada.</div>';

  // Histórico recente
  html += '<div class="fin-historico">';
  html += '<div class="fin-secao-titulo" style="margin-bottom:10px">📋 Histórico recente</div>';
  var recentes = hist.slice(-20).reverse();

    html += '</tbody></table>';

  html += '</div>';

function inicializarDivisoes() {
  var _tecIdx = 0;
  function prepararClubes(lista, overallBase, spread) {
    return lista.map(function(c) {
      var overall = overallBase - Math.floor(Math.random() * spread);
      var jogadores = gerarJogadoresFicticios(c.id, overall);
      aplicarNomesFicticios(jogadores, c.id.charCodeAt(0)*997 + c.id.charCodeAt(1)*31);
      return Object.assign({}, c, {
        jogadores: jogadores,
        budget: Math.round((overallBase / 100) * 15000000 * (0.7 + Math.random() * 0.6)),
        tecnico_id: "t" + (String((_tecIdx++ % 40) + 1)).padStart(2,"0")
      });
    });
  }

  estadoDivisoes.b.clubes = prepararClubes(CLUBES_SERIE_B, 70, 10);
  estadoDivisoes.c.clubes = prepararClubes(CLUBES_SERIE_C, 62, 8);
  estadoDivisoes.d.clubes = prepararClubes(CLUBES_SERIE_D, 55, 8);

  // Gerar calendários
  estadoDivisoes.b.calendario = gerarCalendario(estadoDivisoes.b.clubes);
  estadoDivisoes.c.calendario = gerarCalendario(estadoDivisoes.c.clubes);
  estadoDivisoes.d.calendario = gerarCalendario(estadoDivisoes.d.clubes);
}

function gerarJogadoresFicticios(clubeId, overallBase) {
  var posicoes = ["GOL","GOL","LD","LD","ZAG","ZAG","ZAG","LE","LE","VOL","VOL","VOL","MEI","MEI","MEI","ATA","ATA","ATA","ATA","ATA","MEI","VOL","ZAG","LD","LE"];
  return posicoes.map(function(pos, i) {
    var ov = Math.max(40, Math.min(85, overallBase + Math.floor(Math.random()*10) - 5));
    return {
      id: clubeId + "_j" + i,
      nome: "Jogador " + (i+1),
      posicao: pos,
      overall: ov,
      stats: { jogos:0, gols:0, assistencias:0, nota_media:0 },
      valor_mercado: Math.round(ov * 8000),
      salario: Math.round(ov * 300),
      clausula_rescisoria: Math.round(ov * 20000),
      contrato_termino: 20 + Math.floor(Math.random()*18),
      fadiga: 0
    };
  });
}

function simularRodadaDivisoes(rodadaIdx) {
  ["b","c","d"].forEach(function(div) {
    var est = estadoDivisoes[div];
    if (!est.clubes || rodadaIdx >= est.calendario.length) return;
    var rodada = est.calendario[rodadaIdx];
    rodada.jogos.forEach(function(jogo) {
      var m = est.clubes.find(function(c){return c.id===jogo.mandanteId;});
      var v = est.clubes.find(function(c){return c.id===jogo.visitanteId;});
      if (!m || !v) return;
      var r = simularPartidaSimples(m, v, null, null);
      est.resultados.push({
        rodada: rodadaIdx,
        mandanteId: m.id, visitanteId: v.id,
        golsMandante: r.golsMandante, golsVisitante: r.golsVisitante
      });
    });
    est.rodadaAtual = rodadaIdx + 1;
  });
}

function processarPromocaoRebaixamento() {
  var tabelaA = calcularTabela(CLUBES, estado.resultados);
  var tabelaB = calcularTabela(estadoDivisoes.b.clubes, estadoDivisoes.b.resultados);
  var tabelaC = calcularTabela(estadoDivisoes.c.clubes, estadoDivisoes.c.resultados);
  var tabelaD = calcularTabela(estadoDivisoes.d.clubes, estadoDivisoes.d.resultados);

  var noticias = [];

  // Rebaixados da A → B (4 últimos)
  var rebaixadosA = tabelaA.slice(-4);
  var promovidos_B = tabelaB.slice(0, 4); // campeões da B sobem

  rebaixadosA.forEach(function(t) {
    var clube = CLUBES.find(function(c){return c.id===t.id;});
    if (clube) { clube.divisao = "B"; estadoDivisoes.b.clubes.push(clube); CLUBES.splice(CLUBES.indexOf(clube),1); }
    noticias.push("⬇ " + t.nome + " rebaixado para a Série B");
  });
  promovidos_B.forEach(function(t) {
    var clube = estadoDivisoes.b.clubes.find(function(c){return c.id===t.id;});
    if (clube) { clube.divisao = "A"; CLUBES.push(clube); estadoDivisoes.b.clubes.splice(estadoDivisoes.b.clubes.indexOf(clube),1); }
    noticias.push("⬆ " + t.nome + " promovido para a Série A");
  });

  // B ↔ C
  var rebaixadosB = tabelaB.slice(-4);
  var promovidosC = tabelaC.slice(0, 4);
  rebaixadosB.forEach(function(t) {
    var c = estadoDivisoes.b.clubes.find(function(x){return x.id===t.id;});
    if (c) { c.divisao="C"; estadoDivisoes.c.clubes.push(c); estadoDivisoes.b.clubes.splice(estadoDivisoes.b.clubes.indexOf(c),1); }
    noticias.push("⬇ " + t.nome + " rebaixado para a Série C");
  });
  promovidosC.forEach(function(t) {
    var c = estadoDivisoes.c.clubes.find(function(x){return x.id===t.id;});
    if (c) { c.divisao="B"; estadoDivisoes.b.clubes.push(c); estadoDivisoes.c.clubes.splice(estadoDivisoes.c.clubes.indexOf(c),1); }
    noticias.push("⬆ " + t.nome + " promovido para a Série B");
  });

  // C ↔ D
  var rebaixadosC = tabelaC.slice(-4);
  var promovidosD = tabelaD.slice(0, 4);
  rebaixadosC.forEach(function(t) {
    var c = estadoDivisoes.c.clubes.find(function(x){return x.id===t.id;});
    if (c) { c.divisao="D"; estadoDivisoes.d.clubes.push(c); estadoDivisoes.c.clubes.splice(estadoDivisoes.c.clubes.indexOf(c),1); }
    noticias.push("⬇ " + t.nome + " rebaixado para a Série D");
  });
  promovidosD.forEach(function(t) {
    var c = estadoDivisoes.d.clubes.find(function(x){return x.id===t.id;});
    if (c) { c.divisao="C"; estadoDivisoes.c.clubes.push(c); estadoDivisoes.d.clubes.splice(estadoDivisoes.d.clubes.indexOf(c),1); }
    noticias.push("⬆ " + t.nome + " promovido para a Série C");
  });

  noticias.forEach(function(n) { adicionarNoticia(n, estado.rodadaAtual); });
  return noticias;
}

// ── Utilitários ──
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function simularJogoTorneio(mandante, visitante) {
  var tecM = TECNICOS_DISPONIVEIS.find(function(t){return t.id===mandante.tecnico_id;});
  var tecV = TECNICOS_DISPONIVEIS.find(function(t){return t.id===visitante.tecnico_id;});
  var r = simularPartidaSimples(mandante, visitante, tecM, tecV);
  return { gM: r.golsMandante, gV: r.golsVisitante };
}

function clubePorId(id) {
  var c = CLUBES.find(function(x){return x.id===id;});
  if (c) return c;
  c = (estadoDivisoes.b.clubes||[]).find(function(x){return x.id===id;});
  if (c) return c;
  c = (estadoDivisoes.c.clubes||[]).find(function(x){return x.id===id;});
  if (c) return c;
  c = (estadoDivisoes.d.clubes||[]).find(function(x){return x.id===id;});
  return c || null;
}

function inicializarCopaBrasil() {
  // 64 clubes: 20 Série A + 20 B + 20 C + 4 D
  var participantes = shuffle(
    CLUBES.slice().concat(
      (estadoDivisoes.b.clubes||[]).slice(),
      (estadoDivisoes.c.clubes||[]).slice(),
      (estadoDivisoes.d.clubes||[]).slice(0,4)
    )
  ).slice(0, 64);

  estadoTorneios.copaBrasil = {
    nome: "Copa do Brasil",
    icone: "🏆",
    participantes: participantes.map(function(c){return c.id;}),
    fases: ["1ª Rodada","Oitavas","Quartas","Semifinal","Final"],
    faseAtual: 0,
    jogos: [], // { fase, mandanteId, visitanteId, gM, gV, simulado }
    eliminados: [],
    campeao: null,
    rodadaInicio: 3
  };

  gerarFaseCopa(0, participantes.map(function(c){return c.id;}));
}

function gerarFaseCopa(faseIdx, clubesRestantes) {
  var cb = estadoTorneios.copaBrasil;
  var emb = shuffle(clubesRestantes);
  for (var i = 0; i < emb.length; i += 2) {
    if (i+1 >= emb.length) break;
    cb.jogos.push({ fase: faseIdx, mandanteId: emb[i], visitanteId: emb[i+1], gM:null, gV:null, simulado:false });
  }
}

function simularFaseCopa(faseIdx) {
  var cb = estadoTorneios.copaBrasil;
  var meuId = estado.meuClube.id;
  var classificados = [];
  var jogosRodada = cb.jogos.filter(function(j){return j.fase===faseIdx && !j.simulado;});

  jogosRodada.forEach(function(jogo) {
    if (jogo.simulado) return;
    var m = clubePorId(jogo.mandanteId);
    var v = clubePorId(jogo.visitanteId);
    if (!m || !v) return;

    var ehMeu = jogo.mandanteId === meuId || jogo.visitanteId === meuId;

    if (ehMeu) {
      // Vai para tela de jogo ao vivo — registrar como pendente
      cb.jogoPendente = jogo;
      return;
    }

    var r = simularJogoTorneio(m, v);
    jogo.gM = r.gM; jogo.gV = r.gV; jogo.simulado = true;

    // Em caso de empate, pênaltis (50/50)
    if (r.gM === r.gV) {
      jogo.penaltis = Math.random() > 0.5 ? "mandante" : "visitante";
    }

    var vencedor = r.gM > r.gV ? jogo.mandanteId :
                   r.gM < r.gV ? jogo.visitanteId :
                   (jogo.penaltis === "mandante" ? jogo.mandanteId : jogo.visitanteId);

    classificados.push(vencedor);
    cb.eliminados.push(r.gM > r.gV ? jogo.visitanteId : jogo.mandanteId);

    adicionarNoticia("🏆 Copa BR · " + (m.sigla||m.nome) + " " + r.gM + "x" + r.gV + " " + (v.sigla||v.nome), estado.rodadaAtual);
  });

  return classificados;
}

function avancarFaseCopa() {
  var cb = estadoTorneios.copaBrasil;
  if (!cb || cb.campeao) return;

  var fase = cb.faseAtual;
  var classificados = simularFaseCopa(fase);

  // Se ainda tem jogo pendente (meu time), aguardar
  if (cb.jogoPendente && !cb.jogoPendente.simulado) return;

  // Adicionar meu resultado se estava pendente
  if (cb.jogoPendente && cb.jogoPendente.simulado) {
    var jp = cb.jogoPendente;
    var meuId = estado.meuClube.id;
    var venc = jp.gM > jp.gV ? jp.mandanteId :
               jp.gM < jp.gV ? jp.visitanteId :
               (jp.penaltis === "mandante" ? jp.mandanteId : jp.visitanteId);
    classificados.push(venc);
    cb.eliminados.push(venc === jp.mandanteId ? jp.visitanteId : jp.mandanteId);
    cb.jogoPendente = null;
  }

  if (classificados.length === 1) {
    cb.campeao = classificados[0];
    var camp = clubePorId(cb.campeao);
    adicionarNoticia("🏆 " + (camp?camp.nome:"?") + " é CAMPEÃO da Copa do Brasil!", estado.rodadaAtual);
    if (cb.campeao === estado.meuClube.id) {
      estado.manager.titulos = (estado.manager.titulos||0) + 1;
      estado.inbox.push({ id:"titulo_copa_"+Date.now(), titulo:"🏆 CAMPEÃO DA COPA DO BRASIL!", remetente:"Confederação", texto:"Parabéns! Seu clube conquistou a Copa do Brasil!", lida:false });
    }
    return;
  }

  cb.faseAtual++;
  if (classificados.length > 1) gerarFaseCopa(cb.faseAtual, classificados);
}

          mandanteId: g.clubes[j], visitanteId: g.clubes[i],
          gM: null, gV: null, simulado: false
        });
      }
    }
  });
}

function simularRodadaLibertadores() {
  var lib = estadoTorneios.libertadores;
  if (!lib || lib.campeao) return;
  var meuId = estado.meuClube.id;

  var pendentes = lib.jogos.filter(function(j){return !j.simulado;}).slice(0, 8);
  pendentes.forEach(function(jogo) {
    var m = clubePorId(jogo.mandanteId) || (estadoTorneios._timesEstrangeiros||[]).find(function(t){return t.id===jogo.mandanteId;});
    var v = clubePorId(jogo.visitanteId) || (estadoTorneios._timesEstrangeiros||[]).find(function(t){return t.id===jogo.visitanteId;});
    if (!m || !v) { jogo.simulado=true; jogo.gM=0; jogo.gV=0; return; }

    var ehMeu = jogo.mandanteId===meuId || jogo.visitanteId===meuId;
    var tecM = TECNICOS_DISPONIVEIS.find(function(t){return t.id===m.tecnico_id;});
    var tecV = TECNICOS_DISPONIVEIS.find(function(t){return t.id===v.tecnico_id;});
    var r = simularPartidaSimples(m, v, tecM, tecV);
    jogo.gM = r.golsMandante; jogo.gV = r.golsVisitante; jogo.simulado = true;

    if (ehMeu) {
      var euM = jogo.mandanteId===meuId;
      var mg = euM?r.golsMandante:r.golsVisitante;
      var dg = euM?r.golsVisitante:r.golsMandante;
      var adv = euM?v:m;
      adicionarNoticia("🌎 Libertadores · " + estado.meuClube.sigla + " " + mg + "x" + dg + " " + adv.sigla, estado.rodadaAtual);
    }
  });

  // Verificar se todos os jogos de grupos terminaram
  var gruposPendentes = lib.jogos.filter(function(j){return j.fase==="grupos"&&!j.simulado;});
  if (gruposPendentes.length === 0 && lib.faseAtual === "grupos") {
    avancarLibertadoresMataM();
  }
}

function avancarLibertadoresMataM() {
  var lib = estadoTorneios.libertadores;
  // Calcular classificados de cada grupo (top 2)
  var classificados = [];
  lib.grupos.forEach(function(g) {
    var pts = {};
    g.clubes.forEach(function(id){ pts[id]={p:0,gp:0,gc:0}; });
    lib.jogos.filter(function(j){return j.grupo===g.letra&&j.simulado;}).forEach(function(j){
      if (!pts[j.mandanteId]||!pts[j.visitanteId]) return;
      pts[j.mandanteId].gp+=j.gM; pts[j.mandanteId].gc+=j.gV;
      pts[j.visitanteId].gp+=j.gV; pts[j.visitanteId].gc+=j.gM;
      if(j.gM>j.gV){ pts[j.mandanteId].p+=3; }
      else if(j.gM<j.gV){ pts[j.visitanteId].p+=3; }
      else{ pts[j.mandanteId].p+=1; pts[j.visitanteId].p+=1; }
    });
    var ranking = g.clubes.slice().sort(function(a,b){
      var pa=pts[a]||{p:0,gp:0,gc:0}, pb=pts[b]||{p:0,gp:0,gc:0};
      return (pb.p-pa.p)||(pb.gp-pb.gc)-(pa.gp-pa.gc);
    });
    classificados.push(ranking[0], ranking[1]);
  });

  lib.faseAtual = "oitavas";
  var sorteados = shuffle(classificados);
  for (var i=0; i<sorteados.length; i+=2) {
    if (i+1>=sorteados.length) break;
    lib.jogos.push({fase:"oitavas",mandanteId:sorteados[i],visitanteId:sorteados[i+1],gM:null,gV:null,simulado:false});
    lib.jogos.push({fase:"oitavas",mandanteId:sorteados[i+1],visitanteId:sorteados[i],gM:null,gV:null,simulado:false});
  }
  adicionarNoticia("🌎 Libertadores: fase de oitavas definida!", estado.rodadaAtual);
}

function inicializarMundial() {
  var lib = estadoTorneios.libertadores;
  var campLibertadores = lib ? lib.campeao : null;

  var times = [
    { id: "m01", nome: "Real Madrid",     sigla: "RMA", cor: "#FFFFFF", overall: 92 },
    { id: "m02", nome: "Manchester City", sigla: "MCI", cor: "#6CABDD", overall: 90 },
    { id: "m03", nome: "Bayern München",  sigla: "BAY", cor: "#DC052D", overall: 89 },
    { id: "m04", nome: "PSG",             sigla: "PSG", cor: "#004170", overall: 87 },
    { id: "m05", nome: "Al-Hilal",        sigla: "HIL", cor: "#0033A0", overall: 82 },
    { id: "m06", nome: "Fluminense",      sigla: "FLU", cor: "#6B0F1A", overall: 81 },
    { id: "m07", nome: "Auckland City",   sigla: "AUC", cor: "#1a1a1a", overall: 68 },
  ].map(function(t) {
    return Object.assign({}, t, {
      jogadores: gerarJogadoresFicticios(t.id, t.overall),
      budget: 50000000, tecnico_id: "t01"
    });
  });

  var participantes = times.slice();
  if (campLibertadores && campLibertadores !== "m06") {
    var camp = clubePorId(campLibertadores);
    if (camp) participantes.push(camp);
  }
  participantes = shuffle(participantes).slice(0, 8);
  estadoTorneios._timesMundial = times;

  // Fase de grupos: 2 grupos de 4
  var grupos = [
    { letra:"A", clubes: participantes.slice(0,4).map(function(c){return c.id;}), jogos:[] },
    { letra:"B", clubes: participantes.slice(4,8).map(function(c){return c.id;}), jogos:[] }
  ];

  estadoTorneios.mundial = {
    nome: "Mundial de Clubes",
    icone: "🌍",
    grupos: grupos,
    jogos: [],
    faseAtual: "grupos",
    campeao: null
  };

  grupos.forEach(function(g) {
    for (var i=0;i<g.clubes.length;i++) {
      for (var j=i+1;j<g.clubes.length;j++) {
        estadoTorneios.mundial.jogos.push({ fase:"grupos",grupo:g.letra,mandanteId:g.clubes[i],visitanteId:g.clubes[j],gM:null,gV:null,simulado:false });
      }
    }
  });
}

function simularMundial() {
  var mun = estadoTorneios.mundial;
  if (!mun || mun.campeao) return;
  var meuId = estado.meuClube.id;
  var todos = (estadoTorneios._timesMundial||[]).concat(CLUBES);

  function findClube(id) { return todos.find(function(c){return c.id===id;}) || clubePorId(id); }

  mun.jogos.filter(function(j){return !j.simulado;}).forEach(function(jogo) {
    var m = findClube(jogo.mandanteId);
    var v = findClube(jogo.visitanteId);
    if (!m||!v) { jogo.simulado=true; jogo.gM=0; jogo.gV=0; return; }
    var r = simularJogoTorneio(m, v);
    jogo.gM=r.gM; jogo.gV=r.gV; jogo.simulado=true;

    var ehMeu = jogo.mandanteId===meuId||jogo.visitanteId===meuId;
    if (ehMeu) {
      var euM=jogo.mandanteId===meuId;
      adicionarNoticia("🌍 Mundial · " + (euM?m.sigla:v.sigla) + " " + (euM?r.gM:r.gV) + "x" + (euM?r.gV:r.gM) + " " + (euM?v.sigla:m.sigla), estado.rodadaAtual);
    }
  });

  // Verificar campeão (simplificado: melhor pontuação geral)
  var todos_pendentes = mun.jogos.filter(function(j){return !j.simulado;});
  if (todos_pendentes.length === 0 && mun.faseAtual !== "fim") {
    var pts = {};
    mun.jogos.forEach(function(j) {
      if (!pts[j.mandanteId]) pts[j.mandanteId]=0;
      if (!pts[j.visitanteId]) pts[j.visitanteId]=0;
      if(j.gM>j.gV) pts[j.mandanteId]+=3;
      else if(j.gM<j.gV) pts[j.visitanteId]+=3;
      else { pts[j.mandanteId]+=1; pts[j.visitanteId]+=1; }
    });
    var campeaoId = Object.keys(pts).sort(function(a,b){return pts[b]-pts[a];})[0];
    mun.campeao = campeaoId;
    mun.faseAtual = "fim";
    var camp = findClube(campeaoId);
    adicionarNoticia("🌍 " + (camp?camp.nome:"?") + " é CAMPEÃO MUNDIAL!", estado.rodadaAtual);
    if (campeaoId===meuId) {
      estado.manager.titulos = (estado.manager.titulos||0)+1;
      estado.inbox.push({ id:"mundial_"+Date.now(), titulo:"🌍 CAMPEÃO MUNDIAL!", remetente:"FIFA", texto:"Seu clube conquistou o Mundial de Clubes! Feito histórico!", lida:false });
    }
  }
}

var ESTADOS_CLUBES = {
  "SP": ["palmeiras","corinthians","saopulo","santos","rbbragantino"],
  "RJ": ["flamengo","fluminense","vasco","botafogo"],
  "MG": ["atleticomg","cruzeiro"],

};

var NOMES_ESTADUAIS = {

  "RS":"Campeonato Gaúcho","PR":"Campeonato Paranaense","BA":"Campeonato Baiano",
  "CE":"Campeonato Cearense","MT":"Campeonato Mato-grossense","GO":"Campeonato Goiano"
};

function inicializarEstaduais() {
  estadoTorneios.estaduais = {};
  Object.entries(ESTADOS_CLUBES).forEach(function(entry) {
    var uf = entry[0], ids = entry[1];
    var clubes = ids.map(function(id){ return clubePorId(id); }).filter(Boolean);
    if (clubes.length < 2) return;

    var jogos = [];
    var shuffled = shuffle(clubes);
    for (var i=0; i<shuffled.length; i++) {
      for (var j=i+1; j<shuffled.length; j++) {
        jogos.push({ mandanteId:shuffled[i].id, visitanteId:shuffled[j].id, gM:null, gV:null, simulado:false });
        jogos.push({ mandanteId:shuffled[j].id, visitanteId:shuffled[i].id, gM:null, gV:null, simulado:false });
      }
    }

    estadoTorneios.estaduais[uf] = {
      nome: NOMES_ESTADUAIS[uf],
      uf: uf,
      clubes: clubes.map(function(c){return c.id;}),
      jogos: jogos,
      campeao: null
    };
  });
}

function simularRodadaEstaduais() {
  if (!estadoTorneios.estaduais) return;
  var meuId = estado.meuClube.id;

  Object.values(estadoTorneios.estaduais).forEach(function(est) {
    if (est.campeao) return;
    var pendente = est.jogos.find(function(j){return !j.simulado;});
    if (!pendente) {
      // Calcular campeão
      var pts = {};
      est.clubes.forEach(function(id){pts[id]=0;});
      est.jogos.forEach(function(j){
        if(j.gM>j.gV) pts[j.mandanteId]=(pts[j.mandanteId]||0)+3;
        else if(j.gM<j.gV) pts[j.visitanteId]=(pts[j.visitanteId]||0)+3;
        else { pts[j.mandanteId]=(pts[j.mandanteId]||0)+1; pts[j.visitanteId]=(pts[j.visitanteId]||0)+1; }
      });
      est.campeao = est.clubes.slice().sort(function(a,b){return (pts[b]||0)-(pts[a]||0);})[0];
      var camp = clubePorId(est.campeao);
      adicionarNoticia("🏅 " + (camp?camp.nome:"?") + " é campeão do " + est.nome + "!", estado.rodadaAtual);
      if (est.campeao===meuId) {
        estado.manager.titulos=(estado.manager.titulos||0)+1;
        estado.inbox.push({id:"est_"+est.uf+"_"+Date.now(),titulo:"🏅 Campeão do "+est.nome+"!",remetente:"Federação",texto:"Parabéns! Título estadual conquistado!",lida:false});
      }
      return;
    }

    var m = clubePorId(pendente.mandanteId);
    var v = clubePorId(pendente.visitanteId);
    if (!m||!v) { pendente.simulado=true; pendente.gM=0; pendente.gV=0; return; }

    var r = simularJogoTorneio(m, v);
    pendente.gM=r.gM; pendente.gV=r.gV; pendente.simulado=true;

    var ehMeu = pendente.mandanteId===meuId||pendente.visitanteId===meuId;
    if (ehMeu) {
      var euM=pendente.mandanteId===meuId;
      adicionarNoticia("🏅 " + est.nome + " · " + m.sigla + " " + r.gM + "x" + r.gV + " " + v.sigla, estado.rodadaAtual);
    }
  });
}

function inicializarTorneios() {
  inicializarEstaduais();
  inicializarCopaBrasil();
  inicializarLibertadores();
  // Mundial só após Libertadores
}

// Chamado a cada rodada simulada
function processarTorneiosRodada(rodadaIdx) {
  // Estaduais: rodam nas primeiras rodadas
  if (rodadaIdx < 8) simularRodadaEstaduais();

  // Copa do Brasil: a partir da rodada 3
  if (rodadaIdx >= 3 && estadoTorneios.copaBrasil && !estadoTorneios.copaBrasil.campeao) {
    avancarFaseCopa();
  }

  // Libertadores: a partir da rodada 5
  if (rodadaIdx >= 5 && estadoTorneios.libertadores && !estadoTorneios.libertadores.campeao) {
    simularRodadaLibertadores();
  }

  // Mundial: após rodada 38
  if (rodadaIdx >= 37) {
    if (!estadoTorneios.mundial && estadoTorneios.libertadores && estadoTorneios.libertadores.campeao) {
      inicializarMundial();
    }
    if (estadoTorneios.mundial) simularMundial();
  }
}

// ── Utilitários ──
function shuffleArr(arr) {
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}

function gerarJogadoresFicticios(clubeId, overallBase) {
  var posicoes=["GOL","GOL","LD","LD","ZAG","ZAG","ZAG","LE","LE","VOL","VOL","VOL","MEI","MEI","MEI","ATA","ATA","ATA","ATA","MEI","VOL","ZAG","LD","LE"];
  return posicoes.map(function(pos,i){
    var ov=Math.max(40,Math.min(85,overallBase+Math.floor(Math.random()*10)-5));
    return {id:clubeId+"_j"+i,nome:"Jogador "+(i+1),posicao:pos,overall:ov,
      stats:{jogos:0,gols:0,assistencias:0,nota_media:0},
      valor_mercado:Math.round(ov*8000),salario:Math.round(ov*300),
      clausula_rescisoria:Math.round(ov*20000),contrato_termino:20+Math.floor(Math.random()*18),fadiga:0};
  });
}

function simularJPaulista(mId, vId, allClubes) {
  var m=allClubes.find(function(c){return c.id===mId;});
  var v=allClubes.find(function(c){return c.id===vId;});
  if(!m||!v) return {gM:0,gV:0};
  var fM=calcularForca(m).forca, fV=calcularForca(v).forca;
  var diff=(fM-fV)/20;
  var baseGols=1.5;
  var gM=Math.max(0,Math.round(baseGols+diff+(Math.random()*3-1)));
  var gV=Math.max(0,Math.round(baseGols-diff+(Math.random()*3-1)));
  return {gM:gM,gV:gV};
}

// Gerar todos os jogos de turno único (round robin)
function gerarJogosGrupo(clubes, divKey) {
  var jogos=[];
  for(var i=0;i<clubes.length;i++){
    for(var j=i+1;j<clubes.length;j++){
      jogos.push({div:divKey,fase:"grupos",mId:clubes[i].id,vId:clubes[j].id,gM:null,gV:null,ok:false,rodada:i+j});
    }
  }
  return jogos;
}

// Calcular pontuação de um grupo
function calcPts(jogos, clubeIds) {
  var pts={};
  clubeIds.forEach(function(id){pts[id]={p:0,j:0,v:0,e:0,d:0,gp:0,gc:0};});
  jogos.filter(function(j){return j.ok;}).forEach(function(j){
    if(!pts[j.mId]||!pts[j.vId]) return;
    pts[j.mId].j++; pts[j.vId].j++;
    pts[j.mId].gp+=j.gM; pts[j.mId].gc+=j.gV;
    pts[j.vId].gp+=j.gV; pts[j.vId].gc+=j.gM;
    if(j.gM>j.gV){pts[j.mId].p+=3;pts[j.mId].v++; pts[j.vId].d++;}
    else if(j.gM<j.gV){pts[j.vId].p+=3;pts[j.vId].v++;pts[j.mId].d++;}
    else{pts[j.mId].p++;pts[j.mId].e++;pts[j.vId].p++;pts[j.vId].e++;}
  });
  return pts;
}

function rankear(ids, pts) {
  return ids.slice().sort(function(a,b){
    var pa=pts[a]||{p:0,gp:0,gc:0,v:0}, pb=pts[b]||{p:0,gp:0,gc:0,v:0};
    return (pb.p-pa.p)||(pb.v-pa.v)||((pb.gp-pb.gc)-(pa.gp-pa.gc))||(pb.gp-pa.gp);
  });
}

// ── Inicialização ──
function inicializarPaulista() {
  var _ptIdx = 0;
  function prepDiv(lista, nivel, overallBase) {
    return lista.map(function(c){
      var jogs = gerarJogadoresFicticios(c.id, overallBase+Math.floor(Math.random()*8)-4);
      aplicarNomesFicticios(jogs, c.id.charCodeAt(2)*997 + overallBase*31);
      return Object.assign({},c,{
        divisao_paulista:nivel,
        jogadores:jogs,
        budget:Math.round(overallBase/100*8000000*(0.6+Math.random()*0.8)),
        tecnico_id:"t"+String((_ptIdx++%40)+1).padStart(2,"0")
      });
    });
  }

  estadoPaulista.a1.clubes = prepDiv(CLUBES_PAULISTA_A1,"a1",74);
  estadoPaulista.a2.clubes = prepDiv(CLUBES_PAULISTA_A2,"a2",66);
  estadoPaulista.a3.clubes = prepDiv(CLUBES_PAULISTA_A3,"a3",60);
  estadoPaulista.a4.clubes = prepDiv(CLUBES_PAULISTA_A4,"a4",54);

  // Bezinha: preparar clubes de todos os grupos
  GRUPOS_BEZINHA.forEach(function(g){
    g.clubes = g.clubes.map(function(c){
      var jogs=gerarJogadoresFicticios(c.id, 46+Math.floor(Math.random()*8)-4);
      aplicarNomesFicticios(jogs, c.id.charCodeAt(3)*997 + 46*31);
      return Object.assign({},c,{
        divisao_paulista:"b1",
        jogadores:jogs,
        budget:500000,
        tecnico_id:"t"+String((Math.floor(Math.random()*40)+1)).padStart(2,"0")
      });
    });
  });

  // Gerar jogos de fase de grupos
  ["a1","a2","a3","a4"].forEach(function(div){
    var est=estadoPaulista[div];
    est.jogos = gerarJogosGrupo(est.clubes, div);
    est.faseAtual = "grupos";
  });

  // Bezinha: gerar jogos por grupo (turno+returno = 10 rodadas para 6 times)
  GRUPOS_BEZINHA.forEach(function(g){
    var ids=g.clubes.map(function(c){return c.id;});
    for(var i=0;i<ids.length;i++){
      for(var j=i+1;j<ids.length;j++){
        estadoPaulista.b1.jogos.push({div:"b1",grupo:g.letra,fase:"grupos",mId:ids[i],vId:ids[j],gM:null,gV:null,ok:false});
        estadoPaulista.b1.jogos.push({div:"b1",grupo:g.letra,fase:"grupos",mId:ids[j],vId:ids[i],gM:null,gV:null,ok:false});
      }
    }
  });
  estadoPaulista.b1.faseAtual = "grupos";

  // Copa Paulista: top 8 da A1 + 8 da A2 (não em Libertadores)
  var copaClubes = shuffleArr(estadoPaulista.a1.clubes.slice(0,8).concat(estadoPaulista.a2.clubes.slice(0,8)));
  estadoPaulista.copa.clubes = copaClubes;
  gerarJogosCopaPaulista();
}

function gerarJogosCopaPaulista() {
  var c=estadoPaulista.copa.clubes;
  estadoPaulista.copa.jogos = [];
  for(var i=0;i<c.length;i+=2){
    if(i+1>=c.length) break;
    estadoPaulista.copa.jogos.push({fase:"oitavas",mId:c[i].id,vId:c[i+1].id,gM:null,gV:null,ok:false});
  }
}

// Todos os clubes de uma divisão (flat)
function clubesPaulista(div) {
  if(div==="b1") return GRUPOS_BEZINHA.reduce(function(acc,g){return acc.concat(g.clubes);}, []);
  return estadoPaulista[div].clubes||[];
}

function clubePaulistaPorId(id) {
  var divs=["a1","a2","a3","a4"];
  for(var i=0;i<divs.length;i++){
    var c=(estadoPaulista[divs[i]].clubes||[]).find(function(x){return x.id===id;});
    if(c) return c;
  }
  for(var j=0;j<GRUPOS_BEZINHA.length;j++){
    var c2=GRUPOS_BEZINHA[j].clubes.find(function(x){return x.id===id;});
    if(c2) return c2;
  }
  return null;
}

// ── Simular jogos por evento ──
function simularEventoPaulista(rodadaIdx) {
  var meuId = estado.meuClube.id;

  ["a1","a2","a3","a4"].forEach(function(div){
    var est=estadoPaulista[div];
    if(!est.clubes) return;

    if(est.faseAtual==="grupos"){
      // Simular jogos de grupo (todos os clubes jogam 1 partida por evento)
      var numPorEvento = Math.ceil(est.clubes.length / 2); // 1 rodada completa
      var pendentes=est.jogos.filter(function(j){return j.fase==="grupos"&&!j.ok;}).slice(0, numPorEvento);
      pendentes.forEach(function(jogo){
        var r=simularJPaulista(jogo.mId,jogo.vId,est.clubes);
        jogo.gM=r.gM; jogo.gV=r.gV; jogo.ok=true;
        var ehMeu=jogo.mId===meuId||jogo.vId===meuId;
        if(ehMeu){
          var m=est.clubes.find(function(c){return c.id===jogo.mId;});
          var v=est.clubes.find(function(c){return c.id===jogo.vId;});
          adicionarNoticia("🏅 Paulistão "+div.toUpperCase()+" · "+(m?m.sigla:"?")+' '+r.gM+"x"+r.gV+" "+(v?v.sigla:"?"), rodadaIdx);
        }
      });
      // Verificar se grupos terminaram → gerar mata-mata
      var restantes=est.jogos.filter(function(j){return j.fase==="grupos"&&!j.ok;});
      if(restantes.length===0) gerarMataMata(div);
    } else {
      // Simular 1 jogo de mata-mata por evento
      var pend=est.jogos.find(function(j){return j.fase!=="grupos"&&!j.ok;});
      if(pend){
        var r=simularJPaulista(pend.mId,pend.vId,est.clubes);
        pend.gM=r.gM; pend.gV=r.gV; pend.ok=true;
        verificarFasePaulista(div);
      }
    }
  });

  // Bezinha — simular exatamente 1 jogo por grupo por evento
  // Cada grupo avança 1 jogo por vez = todos sincronizados
  if(estadoPaulista.b1.faseAtual==="grupos"){
    var todosB1=GRUPOS_BEZINHA.reduce(function(a,gr){return a.concat(gr.clubes);}, []);
    GRUPOS_BEZINHA.forEach(function(g){
      var pend=estadoPaulista.b1.jogos.find(function(j){
        return j.grupo===g.letra&&j.fase==="grupos"&&!j.ok;
      });
      if(pend){
        var r=simularJPaulista(pend.mId,pend.vId,todosB1);
        pend.gM=r.gM; pend.gV=r.gV; pend.ok=true;
      }
    });
    var restB=estadoPaulista.b1.jogos.filter(function(j){return j.fase==="grupos"&&!j.ok;});
    if(restB.length===0) gerarMataMataB1();
  } else {
    var pendB=estadoPaulista.b1.jogos.find(function(j){return j.fase!=="grupos"&&!j.ok;});
    if(pendB){
      var todos=GRUPOS_BEZINHA.reduce(function(a,g){return a.concat(g.clubes);}, []);
      var r=simularJPaulista(pendB.mId,pendB.vId,todos);
      pendB.gM=r.gM; pendB.gV=r.gV; pendB.ok=true;
      verificarFaseB1();
    }
  }

  // Copa Paulista
  var pendCopa=estadoPaulista.copa.jogos.find(function(j){return !j.ok;});
  if(pendCopa && rodadaIdx>=15){
    var m=estadoPaulista.copa.clubes.find(function(c){return c.id===pendCopa.mId;});
    var v=estadoPaulista.copa.clubes.find(function(c){return c.id===pendCopa.vId;});
    if(m&&v){
      var r=simularJPaulista(pendCopa.mId,pendCopa.vId,estadoPaulista.copa.clubes);
      pendCopa.gM=r.gM; pendCopa.gV=r.gV; pendCopa.ok=true;
      verificarFaseCopa();
    }
  }
}

// ── Gerar mata-mata após fase de grupos ──
// A1/A3/A4: top 8 → quartas → semi → final (mata-mata simples)
// A2: top 8 → 2 grupos de 4 (turno+returno) → semi → final
function gerarMataMata(div) {
  var est=estadoPaulista[div];
  var ids=est.clubes.map(function(c){return c.id;});
  var pts=calcPts(est.jogos,ids);
  var ranked=rankear(ids,pts);
  var top8=ranked.slice(0,8);
  est.rebaixados=ranked.slice(14);
  est.mataMataClubes=top8;

  if(div==="a2"){
    // 2 grupos de 4: turno+returno
    var g1=top8.slice(0,4), g2=top8.slice(4,8);
    [g1,g2].forEach(function(g){
      for(var i=0;i<g.length;i++){
        for(var j=i+1;j<g.length;j++){
          est.jogos.push({div:div,fase:"semifase",mId:g[i],vId:g[j],gM:null,gV:null,ok:false});
          est.jogos.push({div:div,fase:"semifase",mId:g[j],vId:g[i],gM:null,gV:null,ok:false});
        }
      }
    });
    est.faseAtual="semifase";
  } else {
    // quartas: 1x8, 2x7, 3x6, 4x5 (jogo único)
    var pares=[[0,7],[1,6],[2,5],[3,4]];
    pares.forEach(function(p){
      est.jogos.push({div:div,fase:"quartas",mId:top8[p[0]],vId:top8[p[1]],gM:null,gV:null,ok:false});
    });
    est.faseAtual="quartas";
  }
  adicionarNoticia("🏅 Paulistão "+div.toUpperCase()+": mata-mata definido!", estado.rodadaAtual);
}

function verificarFasePaulista(div) {
  var est=estadoPaulista[div];

  if(div==="a2" && est.faseAtual==="semifase"){
    var pendentes=est.jogos.filter(function(j){return j.fase==="semifase"&&!j.ok;});
    if(pendentes.length===0){
      // Calcular top 2 de cada grupo (4 times total)
      var g1=est.mataMataClubes.slice(0,4), g2=est.mataMataClubes.slice(4,8);
      var pts1=calcPts(est.jogos.filter(function(j){return j.fase==="semifase"&&(g1.indexOf(j.mId)>=0);}), g1);
      var pts2=calcPts(est.jogos.filter(function(j){return j.fase==="semifase"&&(g2.indexOf(j.mId)>=0);}), g2);
      var top1=rankear(g1,pts1).slice(0,2);
      var top2=rankear(g2,pts2).slice(0,2);
      // Semi: 1G1 x 2G2, 2G1 x 1G2
      est.jogos.push({div:div,fase:"semi",mId:top1[0],vId:top2[1],gM:null,gV:null,ok:false});
      est.jogos.push({div:div,fase:"semi",mId:top2[0],vId:top1[1],gM:null,gV:null,ok:false});
      est.faseAtual="semi";
    }
    return;
  }

  var faseMap={quartas:"semi",semi:"final"};
  var fase=est.faseAtual;
  var jogFase=est.jogos.filter(function(j){return j.fase===fase&&!j.ok;});
  if(jogFase.length>0) return;

  var vencedores=est.jogos.filter(function(j){return j.fase===fase&&j.ok;}).map(function(j){
    if(j.gM>j.gV) return j.mId;
    if(j.gM<j.gV) return j.vId;
    return Math.random()>0.5?j.mId:j.vId; // pênaltis
  });

  if(fase==="final"){
    est.campeao=vencedores[0];
    var camp=est.clubes.find(function(c){return c.id===vencedores[0];});
    adicionarNoticia("🏅 "+(camp?camp.nome:"?")+" CAMPEÃO do Paulistão "+div.toUpperCase()+"!", estado.rodadaAtual);
    if(est.campeao===estado.meuClube.id){
      estado.manager.titulos=(estado.manager.titulos||0)+1;
      estado.inbox.push({id:"titulo_paul_"+div+"_"+Date.now(),titulo:"🏅 CAMPEÃO DO PAULISTÃO "+div.toUpperCase()+"!",remetente:"FPF",texto:"Parabéns! Título paulista conquistado!",lida:false});
    }
    est.faseAtual="fim";
    return;
  }

  var proxFase=faseMap[fase];
  est.faseAtual=proxFase;
  if(proxFase==="semi"){
    est.jogos.push({div:div,fase:"semi",mId:vencedores[0],vId:vencedores[3],gM:null,gV:null,ok:false});
    est.jogos.push({div:div,fase:"semi",mId:vencedores[1],vId:vencedores[2],gM:null,gV:null,ok:false});
  } else if(proxFase==="final"){
    est.jogos.push({div:div,fase:"final",mId:vencedores[0],vId:vencedores[1],gM:null,gV:null,ok:false});
  }
}

// ── Promoção/Rebaixamento ao fim da temporada ──
function processarPromocaoRebaixamentoPaulista() {
  var niveis=["a1","a2","a3","a4"];
  for(var i=0;i<niveis.length;i++){
    var divAtual=niveis[i], divAbaixo=niveis[i+1];
    var est=estadoPaulista[divAtual];
    if(!est.clubes||est.clubes.length<2) continue;

    // Campeão
    if(!est.campeao){
      var camp=est.clubes[0];
      adicionarNoticia("🏅 Temporada do Paulistão "+divAtual.toUpperCase()+" encerrada.", estado.rodadaAtual);
    }

    if(!divAbaixo) continue;
    var estAbaixo=estadoPaulista[divAbaixo];
    if(!estAbaixo) continue;

    // Promovidos (top 2 do abaixo sobem) e rebaixados (últimos 2 do atual descem)
    var idsAtual=est.clubes.map(function(c){return c.id;});
    var ptsAtual=calcPts(est.jogos.filter(function(j){return j.fase==="grupos";}),idsAtual);
    var rankAtual=rankear(idsAtual,ptsAtual);
    var rebaixadosAtual=rankAtual.slice(-2);

    rebaixadosAtual.forEach(function(id){
      var clube=est.clubes.find(function(c){return c.id===id;});
      if(clube){
        clube.divisao_paulista=divAbaixo;
        if(estAbaixo.clubes) estAbaixo.clubes.push(clube);
        est.clubes=est.clubes.filter(function(c){return c.id!==id;});
        adicionarNoticia("⬇ "+clube.nome+" rebaixado para o Paulistão "+divAbaixo.toUpperCase(), estado.rodadaAtual);
      }
    });

    if(estAbaixo.clubes && estAbaixo.clubes.length>=2){
      var idsAbaixo=estAbaixo.clubes.map(function(c){return c.id;});
      var ptsAbaixo=calcPts(estAbaixo.jogos.filter(function(j){return j.fase==="grupos";}),idsAbaixo);
      var rankAbaixo=rankear(idsAbaixo,ptsAbaixo);
      var promovidos=rankAbaixo.slice(0,2);
      promovidos.forEach(function(id){
        var clube=estAbaixo.clubes.find(function(c){return c.id===id;});
        if(clube){
          clube.divisao_paulista=divAtual;
          est.clubes.push(clube);
          estAbaixo.clubes=estAbaixo.clubes.filter(function(c){return c.id!==id;});
          adicionarNoticia("⬆ "+clube.nome+" promovido para o Paulistão "+divAtual.toUpperCase(), estado.rodadaAtual);
        }
      });
    }

    // Reset para nova temporada
    est.jogos=[]; est.faseAtual="grupos"; est.campeao=null;
    if(est.clubes.length>=2) est.jogos=gerarJogosGrupo(est.clubes,divAtual);
    if(estAbaixo.clubes && estAbaixo.clubes.length>=2){
      estAbaixo.jogos=gerarJogosGrupo(estAbaixo.clubes,divAbaixo);
      estAbaixo.faseAtual="grupos"; estAbaixo.campeao=null;
    }
  }
}

// Calcular valor de um clube paulista para tela de seleção
function valorClubePaulista(clube) {
  var bases={a1:12000000,a2:3500000,a3:800000,a4:200000,b1:50000};
  var div=clube.divisao_paulista||"a4";
  var base=bases[div]||200000;
  var mediaOvr=clube.jogadores?clube.jogadores.reduce(function(s,j){return s+j.overall;},0)/clube.jogadores.length:55;
  return Math.round(base*(0.7+(mediaOvr-50)/60));
}

function gerarCalendarioPaulista(div) {
  var est = div === "b1" ? estadoPaulista.b1 : estadoPaulista[div];
  if (!est) return gerarCalendario(CLUBES); // fallback

  // Montar um calendário de rodadas sintético
  // cada "rodada" tem 1 jogo do meu clube + jogos dos outros
  var meuId = estado.meuClube ? estado.meuClube.id : null;
  var todosClubes = div === "b1"
    ? GRUPOS_BEZINHA.reduce(function(a,g){return a.concat(g.clubes);}, [])
    : (estadoPaulista[div].clubes || []);

  // Agrupar jogos por "rodada virtual" — meus jogos primeiro
  var meusJogos = est.jogos.filter(function(j){
    return j.mId === meuId || j.vId === meuId;
  });
  var outrosJogos = est.jogos.filter(function(j){
    return j.mId !== meuId && j.vId !== meuId;
  });

  var rodadas = [];
  var maxRod = Math.max(meusJogos.length, Math.ceil(outrosJogos.length / Math.max(todosClubes.length/2 - 1, 1)));

  for (var i = 0; i < Math.max(meusJogos.length, 20); i++) {
    var jogosRodada = [];

    // Meu jogo desta rodada
    if (meusJogos[i]) {
      jogosRodada.push({ mandanteId: meusJogos[i].mId, visitanteId: meusJogos[i].vId, _paulistaIdx: i });
    }

    // Alguns jogos dos outros (para simular junto)
    var porRodada = Math.floor(outrosJogos.length / Math.max(meusJogos.length, 1));
    var inicio = i * porRodada;
    var fim = Math.min(inicio + porRodada, outrosJogos.length);
    for (var j = inicio; j < fim; j++) {
      jogosRodada.push({ mandanteId: outrosJogos[j].mId, visitanteId: outrosJogos[j].vId, _paulistaIdx: null });
    }

    rodadas.push({ numero: i + 1, jogos: jogosRodada, _div: div, _paulista: true });
  }

  return rodadas;
}

// ── Tela de jogo para times paulistas ──
function renderTelaJogoPaulista(rodadaIdx, div) {
  var est = div === "b1" ? estadoPaulista.b1 : estadoPaulista[div];
  var meuId = estado.meuClube.id;
  var todosClubes = div === "b1"
    ? GRUPOS_BEZINHA.reduce(function(a,g){return a.concat(g.clubes);}, [])
    : (estadoPaulista[div] ? estadoPaulista[div].clubes || [] : []);

  // Achar próximo jogo do meu clube não simulado
  var meuJogo = est ? est.jogos.find(function(j){
    return (j.mId===meuId||j.vId===meuId) && !j.ok;
  }) : null;

  if (!meuJogo) {
    // Sem mais jogos — simular evento e voltar ao dashboard
    simularEventoPaulista(rodadaIdx);
    estado.rodadaAtual++;
    renderDashboard();
    return;
  }

  // Garantir que os clubes estão no calendário correto
  if (!estado.calendario[rodadaIdx]) {
    estado.calendario[rodadaIdx] = { numero: rodadaIdx+1, jogos: [] };
  }
  // Atualizar jogo desta rodada no calendário
  estado.calendario[rodadaIdx].jogos = [{ mandanteId: meuJogo.mId, visitanteId: meuJogo.vId }];

  // Adicionar clubes paulistas temporariamente ao CLUBES global
  // para que renderTelaJogo os encontre
  todosClubes.forEach(function(c){
    if (!CLUBES.find(function(x){return x.id===c.id;})) CLUBES.push(c);
  });

  estado._jogoAtivoPaulista = { jogo: meuJogo, div: div, rodadaIdx: rodadaIdx };
  renderTelaJogo(rodadaIdx);
}

// Finalizar jogo paulista após tela ao vivo
var _origFinalizarPartida = null;
function hookFinalizarPartidaPaulista() {
  if (!estado._jogoAtivoPaulista) return false;
  var info = estado._jogoAtivoPaulista;
  var jogo = info.jogo;
  var div  = info.div;
  var est  = div==="b1"?estadoPaulista.b1:estadoPaulista[div];

  // Marcar jogo como simulado com resultado real
  jogo.gM  = jogoAtivo ? jogoAtivo.resultado.golsMandante : 0;
  jogo.gV  = jogoAtivo ? jogoAtivo.resultado.golsVisitante : 0;
  jogo.ok  = true;

  estado._jogoAtivoPaulista = null;
  simularEventoPaulista(info.rodadaIdx);
  return true;
}</script>

// ── Calendário visual (estilo da imagem) ──
function renderCalendarioVisual() {
  var meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  var mes   = calView.mes;
  var ano   = calView.ano;
  var evAtual = estado.eventos[estado.eventoAtual];

  // Mapear eventos do mês atual
  var eventosPorDia = {};
  estado.eventos.forEach(function(ev) {
    if (!ev.data) return;
    var d = new Date(ev.data);
    if (d.getMonth() === mes && d.getFullYear() === ano) {
      var dia = d.getDate();
      if (!eventosPorDia[dia]) eventosPorDia[dia] = [];
      eventosPorDia[dia].push(ev);
    }
  });

  var html = '<div class="cal-visual">';

  // Header do mês
  html += '<div class="cal-mes-header">';
  html += '<button class="cal-mes-btn" onclick="mudarMes(-1)">‹</button>';
  html += '<span class="cal-mes-nome">' + meses[mes] + ' ' + ano + '</span>';
  html += '<button class="cal-mes-btn" onclick="mudarMes(1)">›</button>';
  html += '</div>';

  // Dias da semana
  html += '<div class="cal-dias-semana">';
  ["D","S","T","Q","Q","S","S"].forEach(function(d) {
    html += '<span>' + d + '</span>';
  });
  html += '</div>';

  // Grid dos dias
  html += '<div class="cal-grid">';
  var primeiroDia = new Date(ano, mes, 1).getDay();
  var ultimoDia   = new Date(ano, mes + 1, 0).getDate();

  // Células vazias antes do dia 1
  for (var i = 0; i < primeiroDia; i++) {
    html += '<div class="cal-dia vazio"></div>';
  }

  // Dias do mês
  for (var dia = 1; dia <= ultimoDia; dia++) {
    var evsDia  = eventosPorDia[dia] || [];
    var ehHoje  = evAtual && evAtual.data &&
                  new Date(evAtual.data).getDate() === dia &&
                  new Date(evAtual.data).getMonth() === mes;
    var temEv   = evsDia.length > 0;
    var cls     = "cal-dia" + (ehHoje ? " cal-dia-atual" : "") + (temEv ? " tem-evento" : "");
    var icons   = evsDia.map(function(e) {
      return '<span class="cal-ev-dot" style="background:' + corEvento(e.tipo) + '"></span>';
    }).join("");

    html += '<div class="' + cls + '">';
    html += '<span class="cal-dia-num">' + dia + '</span>';
    if (icons) html += '<div class="cal-dots">' + icons + '</div>';
    html += '</div>';
  }

  html += '</div>'; // cal-grid

  // Legenda
  html += '<div class="cal-legenda">';
  html += '<span><span class="cal-ev-dot" style="background:#4f8ef7"></span> Jogo</span>';
  html += '<span><span class="cal-ev-dot" style="background:#2ecc71"></span> Janela</span>';
  html += '<span><span class="cal-ev-dot" style="background:#e74c3c"></span> Contrato</span>';
  html += '</div>';

  html += '</div>'; // cal-visual
  return html;
}

  var cores = {
    jogo: "#4f8ef7",
    janela_abre: "#2ecc71",
    janela_fecha: "#e74c3c",
    fim_contrato: "#e74c3c",
    mensagem: "#f1c40f",

  };
  return cores[tipo] || "#888";
}

function mudarMes(delta) {
  calView.mes += delta;
  if (calView.mes < 0)  { calView.mes = 11; calView.ano--; }
  if (calView.mes > 11) { calView.mes = 0;  calView.ano++; }
  renderDashboard();
}

function irParaEventoDia(dia, mes, ano) {
  var alvo = estado.eventos.findIndex(function(ev) {
    if (!ev.data) return false;
    var d = new Date(ev.data);
    return d.getDate() === dia && d.getMonth() === mes && d.getFullYear() === ano;
  });
  if (alvo < 0) return;
  irParaEvento(alvo);
}

function irParaEvento(idx) {
  while (estado.eventoAtual < idx) {
    estado.eventoAtual++;
    processarEvento(estado.eventos[estado.eventoAtual]);
  }
  var ev = estado.eventos[estado.eventoAtual];
  atualizarCalView(ev);
  if (ev.tipo === TIPO_EVENTO.JOGO) {
    renderTelaJogo(ev.rodada);
  } else {
    renderDashboard();
  }
}

// ── Jogos card ──
function renderJogosCard() {
  var meuId  = estado.meuClube.id;
  var cal    = estado.calendario;
  var meusJogos = [];
  cal.forEach(function(rodada, idx) {
    rodada.jogos.forEach(function(jogo) {
      if (jogo.mandanteId === meuId || jogo.visitanteId === meuId) {
        meusJogos.push({ rodadaIdx: idx, rodadaNum: rodada.numero, jogo: jogo });
      }
    });
  });

  var passados = meusJogos.filter(function(j) { return j.rodadaIdx < estado.rodadaAtual; }).slice(-3);
  var futuros  = meusJogos.filter(function(j) { return j.rodadaIdx >= estado.rodadaAtual; }).slice(0, 3);

  var html = '<div class="jogos-lista">';
  if (passados.length > 0) {
    html += '<div class="jogos-secao-titulo">Últimos jogos</div>';
    passados.forEach(function(item) {
      var res = estado.resultados.find(function(r) {
        return r.rodada === item.rodadaIdx && r.mandanteId === item.jogo.mandanteId && r.visitanteId === item.jogo.visitanteId;
      });
      var adv = buscarClubePorId(item.jogo.mandanteId === meuId ? item.jogo.visitanteId : item.jogo.mandanteId);
      var euM = item.jogo.mandanteId === meuId;
      html += '<div class="jogo-item">';
      html += '<span class="jogo-rodada">R' + item.rodadaNum + '</span>';
      html += '<span class="jogo-mando">' + (euM ? 'C' : 'F') + '</span>';
      html += '<span class="jogo-adv">' + adv.sigla + '</span>';
      if (res) {
        var mg = euM ? res.golsMandante : res.golsVisitante;
        var dg = euM ? res.golsVisitante : res.golsMandante;
        html += '<span class="jogo-resultado ' + (mg > dg ? 'res-v' : mg < dg ? 'res-d' : 'res-e') + '">' + mg + '-' + dg + '</span>';
      }
      html += '</div>';
    });
  }
  if (futuros.length > 0) {
    html += '<div class="jogos-secao-titulo" style="margin-top:10px">Próximos jogos</div>';
    futuros.forEach(function(item) {
      var adv = buscarClubePorId(item.jogo.mandanteId === meuId ? item.jogo.visitanteId : item.jogo.mandanteId);
      var ev  = estado.eventos.find(function(e) { return e.tipo === "jogo" && e.rodada === item.rodadaIdx; });
      html += '<div class="jogo-item proximo">';
      html += '<span class="jogo-rodada">R' + item.rodadaNum + '</span>';
      html += '<span class="jogo-mando">' + (item.jogo.mandanteId === meuId ? 'C' : 'F') + '</span>';
      html += '<span class="jogo-adv">' + adv.sigla + '</span>';
      html += '<span class="jogo-resultado pendente">' + (ev && ev.subtitulo ? ev.subtitulo : 'vs') + '</span>';
      html += '</div>';
    });
  }
  if (!passados.length && !futuros.length) html += '<div class="dash-empty">Nenhum jogo.</div>';
  html += '</div>';
  return html;
}

// ── Mini tabela ──
function renderMiniTabela() {
  // detectar divisão para mini tabela
  var _clubesMT = CLUBES, _resultsMT = estado.resultados;
  if (estado.minhaDivisao && estado.minhaDivisao.indexOf("paulista") === 0) {
    var _div = estado.minhaDivisao.replace("paulista_","");
    if (_div === "b1") {
      _clubesMT = GRUPOS_BEZINHA.reduce(function(a,g){return a.concat(g.clubes);}, []);
      _resultsMT = estadoPaulista.b1.jogos.filter(function(j){return j.ok;}).map(function(j){
        return { mandanteId:j.mId, visitanteId:j.vId, golsMandante:j.gM, golsVisitante:j.gV };
      });
    } else if (estadoPaulista[_div] && estadoPaulista[_div].clubes) {
      _clubesMT = estadoPaulista[_div].clubes;
      _resultsMT = estadoPaulista[_div].jogos.filter(function(j){return j.ok;}).map(function(j){
        return { mandanteId:j.mId, visitanteId:j.vId, golsMandante:j.gM, golsVisitante:j.gV };
      });
    }
  } else if (estado.minhaDivisao === "serieB" && estadoDivisoes.b.clubes) {
    _clubesMT = estadoDivisoes.b.clubes; _resultsMT = estadoDivisoes.b.resultados;
  } else if (estado.minhaDivisao === "serieC" && estadoDivisoes.c.clubes) {
    _clubesMT = estadoDivisoes.c.clubes; _resultsMT = estadoDivisoes.c.resultados;
  } else if (estado.minhaDivisao === "serieD" && estadoDivisoes.d.clubes) {
    _clubesMT = estadoDivisoes.d.clubes; _resultsMT = estadoDivisoes.d.resultados;
  }
  var tabela   = calcularTabela(_clubesMT, _resultsMT);
  var meuId    = estado.meuClube.id;
  var minhaPos = tabela.findIndex(function(t) { return t.id === meuId; });
  var inicio   = Math.max(0, minhaPos - 2);
  var fim      = Math.min(tabela.length, minhaPos + 3);

  var html = '<div class="mini-tabela">';
  html += '<div class="mini-tab-header"><span>#</span><span>Clube</span><span>Pts</span><span>J</span><span>SG</span></div>';
  tabela.slice(inicio, fim).forEach(function(t, i) {
    var pos = inicio + i + 1;
    var cls = t.id === meuId ? ' mini-tab-eu' : '';
    html += '<div class="mini-tab-row' + cls + '">';
    html += '<span class="mini-tab-pos">' + pos + '</span>';
    html += '<span class="mini-tab-nome"><span class="escudo-mini" style="background:' + t.cor + '">' + t.sigla + '</span>' + t.nome + '</span>';
    html += '<span class="mini-tab-pts">' + t.pts + '</span>';
    html += '<span>' + t.j + '</span>';
    html += '<span>' + (t.sg > 0 ? '+' + t.sg : t.sg) + '</span>';
    html += '</div>';
  });
  html += '</div>';
  html += '<div class="dash-ver-mais" onclick="navegarPara(\'tabela\')">Tabela completa</div>';
  return html;
}

// ── Tela 2: Selecionar clube ──
var _abaSelecao = "serieA";

function calcularValorClube(clube) {
  // Paulistas têm seu próprio cálculo
  if (clube.divisao_paulista) return valorClubePaulista(clube);
  // Nacionais por divisão
  var ehA = CLUBES.find(function(c){return c.id===clube.id;});
  var ehB = (estadoDivisoes.b.clubes||[]).find(function(c){return c.id===clube.id;});
  var ehC = (estadoDivisoes.c.clubes||[]).find(function(c){return c.id===clube.id;});
  var base = ehA ? 150000000 : ehB ? 25000000 : ehC ? 5000000 : 800000;
  var forca = calcularForca(clube).forca;
  return Math.round(base * (0.5 + (forca - 60) / 80));
}

function renderSelecionarClube() {
  ocultarNav();
  var budget = estado.manager.budget || 1000000;
  var aba    = _abaSelecao;

  var todasAbas = [
    { k:"serieA",    label:"Série A",      clubes: CLUBES },
    { k:"serieB",    label:"Série B",      clubes: estadoDivisoes.b.clubes||[] },
    { k:"serieC",    label:"Série C",      clubes: estadoDivisoes.c.clubes||[] },
    { k:"serieD",    label:"Série D",      clubes: estadoDivisoes.d.clubes||[] },
    { k:"paulistaA1",label:"Paulistão A1", clubes: estadoPaulista.a1.clubes||[] },
    { k:"paulistaA2",label:"Paulistão A2", clubes: estadoPaulista.a2.clubes||[] },
    { k:"paulistaA3",label:"Paulistão A3", clubes: estadoPaulista.a3.clubes||[] },
    { k:"paulistaA4",label:"Paulistão A4", clubes: estadoPaulista.a4.clubes||[] },
    { k:"bezinha",   label:"Bezinha",      clubes: (function(){ return GRUPOS_BEZINHA.reduce(function(a,g){return a.concat(g.clubes);},[]); })() }
  ];

  var tabAtual   = todasAbas.find(function(t){return t.k===aba;}) || todasAbas[0];
  var todosClubesAba = tabAtual.clubes;
  var clubesAba  = todosClubesAba.filter(function(c){
    return calcularValorClube(c) <= budget;
  });

  var html = '<div class="tela-selecao">';

  html += '<div class="selecao-tabs">';
  todasAbas.forEach(function(t) {

  });
  html += '</div>';

  if (clubesAba.length === 0) {
    html += '<div class="selecao-sem-budget">';

    html += '<div style="font-size:13px;color:var(--text2)">Nenhum clube desta divisão cabe no orçamento de ' + formatarDinheiro(budget) + '.</div>';
    html += '</div>';
  } else {
    html += '<div class="grid-clubes">';
    clubesAba.forEach(function(c) {
      var f   = calcularForca(c);
      var tec = TECNICOS_DISPONIVEIS.find(function(t){return t.id===c.tecnico_id;});
      var val = calcularValorClube(c);
      html += '<div class="card-clube" onclick="comprarClube(\'' + c.id + '\',\'' + aba + '\')">';
      html += '<div class="escudo" style="background:' + c.cor + '">' + c.sigla + '</div>';
      html += '<div class="nome">' + c.nome + '</div>';
      html += '<div class="forca">Força: <strong>' + f.forca + '</strong></div>';
      html += '<div class="forca" style="font-size:11px;margin-top:2px">' + (tec ? tec.nome : 'Sem técnico') + '</div>';

}

function mudarAbaSelecao(aba) { _abaSelecao = aba; renderSelecionarClube(); }

function comprarClube(id, aba) {
  var mapa = {
    serieA: CLUBES,
    serieB: estadoDivisoes.b.clubes||[],
    serieC: estadoDivisoes.c.clubes||[],
    serieD: estadoDivisoes.d.clubes||[],
    paulistaA1: estadoPaulista.a1.clubes||[],
    paulistaA2: estadoPaulista.a2.clubes||[],
    paulistaA3: estadoPaulista.a3.clubes||[],
    paulistaA4: estadoPaulista.a4.clubes||[],
    bezinha:    GRUPOS_BEZINHA.reduce(function(a,g){return a.concat(g.clubes);}, [])
  };
  var lista = mapa[aba] || CLUBES;
  var clube = lista.find(function(c){return c.id===id;});
  if (!clube) { alert("Clube não encontrado."); return; }
  var val    = calcularValorClube(clube);
  var budget = estado.manager.budget || 0;
  if (val > budget) { alert("Budget insuficiente!"); return; }
  if (!confirm("Comprar " + clube.nome + " por " + formatarDinheiro(val) + "?\nSaldo restante: " + formatarDinheiro(budget - val))) return;
  estado.manager.budget = budget - val;
  selecionarClube(id, lista);
}

function detectarDivisaoClube(id) {
  if (CLUBES.find(function(c){return c.id===id;})) return "serieA";
  if ((estadoDivisoes.b.clubes||[]).find(function(c){return c.id===id;})) return "serieB";
  if ((estadoDivisoes.c.clubes||[]).find(function(c){return c.id===id;})) return "serieC";
  if ((estadoDivisoes.d.clubes||[]).find(function(c){return c.id===id;})) return "serieD";
  // Paulistão divisões A1-A4
  var divsPaul = ["a1","a2","a3","a4"];
  for (var i=0;i<divsPaul.length;i++){
    var est=estadoPaulista[divsPaul[i]];
    if(est&&est.clubes&&est.clubes.find(function(c){return c.id===id;})) return "paulista_"+divsPaul[i];
  }
  // Bezinha — verificar em todos os grupos
  for (var g=0;g<GRUPOS_BEZINHA.length;g++){
    if(GRUPOS_BEZINHA[g].clubes.find(function(c){return c.id===id;})) return "paulista_b1";
  }
  return "serieA";
}

function clubesParaCalendario(divisao) {
  if (divisao==="serieA") return CLUBES;
  if (divisao==="serieB") return estadoDivisoes.b.clubes||CLUBES;
  if (divisao==="serieC") return estadoDivisoes.c.clubes||CLUBES;
  if (divisao==="serieD") return estadoDivisoes.d.clubes||CLUBES;
  // Paulistas não têm calendário nacional — retorna lista vazia (calendário será gerido pelo paulista.js)
  return [];
}

function selecionarClube(id, lista) {
  var fonte = lista || CLUBES;
  var clube = fonte.find(function(c){return c.id===id;});
  if (!clube) clube = CLUBES.find(function(c){return c.id===id;});
  if (!clube) clube = clubePaulistaPorId(id);
  if (!clube && estadoDivisoes.b.clubes) clube = estadoDivisoes.b.clubes.find(function(c){return c.id===id;});
  if (!clube && estadoDivisoes.c.clubes) clube = estadoDivisoes.c.clubes.find(function(c){return c.id===id;});
  if (!clube && estadoDivisoes.d.clubes) clube = estadoDivisoes.d.clubes.find(function(c){return c.id===id;});
  if (!clube) { alert("Clube não encontrado!"); return; }

  estado.meuClube     = clube;
  estado.rodadaAtual  = 0;
  estado.resultados   = [];
  estado.calendario   = []; // limpar antes de gerar
  estado.minhaDivisao = detectarDivisaoClube(id);

  // Gerar calendário correto conforme divisão
  var divCal = estado.minhaDivisao;
  var clubesCal = clubesParaCalendario(divCal);
  if (clubesCal.length >= 2) {
    estado.calendario = gerarCalendario(clubesCal);
  } else {
    estado.calendario = gerarCalendarioPaulista(divCal.replace("paulista_",""));
  }

  var tec_id = estado.meuClube.tecnico_id;
  estado.meuTecnico = TECNICOS_DISPONIVEIS.find(function(t){return t.id===tec_id;}) || TECNICOS_DISPONIVEIS[0];
  iniciarJogo();
}
