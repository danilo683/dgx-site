<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manager FC</title>
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --bg2: #1a1d27;
  --bg3: #22263a;
  --border: #2e3350;
  --text: #e8eaf0;
  --text2: #8a90a8;
  --accent: #4f8ef7;
  --green: #2ecc71;
  --red: #e74c3c;
  --yellow: #f1c40f;
  --radius: 10px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

/* ── Layout ── */
#app { display: flex; flex-direction: column; min-height: 100vh; }

header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
}

header h1 { font-size: 16px; font-weight: 600; color: var(--accent); letter-spacing: .5px; }
header span { font-size: 12px; color: var(--text2); }

nav {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  padding: 0 24px;
  gap: 4px;
}

nav button {
  background: none;
  border: none;
  color: var(--text2);
  padding: 12px 16px;
  cursor: pointer;
  font-size: 13px;
  border-bottom: 2px solid transparent;
  transition: all .15s;
}

nav button:hover { color: var(--text); }
nav button.ativo { color: var(--accent); border-bottom-color: var(--accent); }

main { flex: 1; padding: 24px; max-width: 900px; margin: 0 auto; width: 100%; }

/* ── Tela de seleção de clube ── */
#tela-selecao h2 { font-size: 18px; margin-bottom: 6px; }
#tela-selecao p  { color: var(--text2); margin-bottom: 24px; font-size: 13px; }

.grid-clubes {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
}

.card-clube {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 16px;
  cursor: pointer;
  transition: border-color .15s, transform .1s;
  text-align: center;
}

.card-clube:hover { border-color: var(--accent); transform: translateY(-2px); }

.card-clube .escudo {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  margin: 0 auto 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 13px;
  color: #fff;
}

.card-clube .nome { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.card-clube .forca { font-size: 12px; color: var(--text2); }

/* ── Tela principal ── */
.secao-titulo {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--text);
}

/* ── Elenco ── */
.lista-jogadores { display: flex; flex-direction: column; gap: 6px; }

.item-jogador {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.posicao-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 7px;
  border-radius: 4px;
  min-width: 36px;
  text-align: center;
}

.pos-GOL { background: #7b2d00; color: #ffaa77; }
.pos-DEF { background: #003a7b; color: #77aaff; }
.pos-MEI { background: #1a5c1a; color: #77dd77; }
.pos-ATK { background: #5c1a1a; color: #ff8888; }

.jogador-nome { flex: 1; font-size: 13px; }

.overall-badge {
  font-weight: 700;
  font-size: 14px;
  min-width: 32px;
  text-align: right;
}

.overall-alto  { color: var(--green); }
.overall-medio { color: var(--yellow); }
.overall-baixo { color: var(--red); }

/* ── Tabela de classificação ── */
.tabela-classificacao {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.tabela-classificacao table {
  width: 100%;
  border-collapse: collapse;
}

.tabela-classificacao th {
  padding: 10px 12px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .5px;
  border-bottom: 1px solid var(--border);
}

.tabela-classificacao td {
  padding: 10px 12px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
}

.tabela-classificacao tr:last-child td { border-bottom: none; }
.tabela-classificacao tr.meu-clube td { background: rgba(79,142,247,.08); }
.tabela-classificacao tr:hover td { background: var(--bg3); }

.td-pos { color: var(--text2); width: 28px; font-size: 12px; }
.td-pts { font-weight: 700; color: var(--accent); }

.escudo-mini {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  font-size: 9px;
  font-weight: 700;
  color: #fff;
  margin-right: 8px;
  vertical-align: middle;
}

/* ── Rodadas / Jogos ── */
.rodadas-container { display: flex; flex-direction: column; gap: 16px; }

.card-rodada {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.rodada-header {
  padding: 10px 14px;
  background: var(--bg3);
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.btn-simular {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  font-weight: 600;
  transition: opacity .15s;
}

.btn-simular:hover { opacity: .85; }
.btn-simular:disabled { opacity: .4; cursor: default; }

.lista-jogos { padding: 8px 0; }

.item-jogo {
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
}

.item-jogo:last-child { border-bottom: none; }

.time-nome { flex: 1; }
.time-nome.direita { text-align: right; }
.time-nome.meu { color: var(--accent); font-weight: 600; }

.placar {
  font-weight: 700;
  font-size: 15px;
  min-width: 48px;
  text-align: center;
  background: var(--bg3);
  padding: 3px 8px;
  border-radius: 6px;
}

.placar.pendente { color: var(--text2); font-size: 11px; font-weight: 400; }
.placar.vitoria  { color: var(--green); }
.placar.derrota  { color: var(--red); }
.placar.empate   { color: var(--yellow); }

/* ── Modal de partida ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}

.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  width: 100%;
  max-width: 480px;
  overflow: hidden;
}

.modal-header {
  background: var(--bg3);
  padding: 20px;
  text-align: center;
}

.modal-placar {
  font-size: 36px;
  font-weight: 700;
  margin: 8px 0 4px;
  letter-spacing: 4px;
}

.modal-times {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text2);
  padding: 0 20px;
}

.modal-eventos {
  padding: 16px 20px;
  max-height: 240px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.evento-item {
  display: flex;
  gap: 10px;
  font-size: 13px;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
}

.evento-minuto { color: var(--text2); min-width: 34px; font-size: 12px; }

.modal-footer { padding: 16px 20px; }

.btn-fechar {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: background .15s;
}

.btn-fechar:hover { background: var(--border); }

/* ── Stats do clube ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  text-align: center;
}

.stat-valor { font-size: 26px; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 11px; color: var(--text2); margin-top: 4px; }

/* ── Utilitários ── */
.hidden { display: none !important; }
.mt16 { margin-top: 16px; }

.btn-primario {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s;
}

.btn-primario:hover { opacity: .85; }
  </style>
</head>

  <script>
// Calcula a força de um clube por setor
function calcularForca(clube) {
  const jogadores = clube.jogadores;

  const media = (posicao) => {
    const grupo = jogadores.filter(j => j.posicao === posicao);
    if (grupo.length === 0) return 50;
    return grupo.reduce((s, j) => s + j.overall, 0) / grupo.length;
  };

  const gol = media("GOL");
  const def = media("DEF");
  const mei = media("MEI");
  const atk = media("ATK");

  // Pesos: defesa vale um pouco mais (realismo)
  const forca = gol * 0.20 + def * 0.30 + mei * 0.25 + atk * 0.25;

  return { forca: Math.round(forca), gol, def, mei, atk };
}

// Gera um número de gols baseado na força de ataque vs defesa adversária
function gerarGols(ataque, defesaAdversaria) {
  const vantagem = (ataque - defesaAdversaria) / 100;
  const base = 0.5 + vantagem * 1.5;
  const rand = Math.random();

  if (rand < 0.20) return 0;
  if (rand < 0.45) return 1;
  if (rand < 0.68) return 2;
  if (rand < 0.83) return 3;
  if (rand < 0.93) return 4;
  return 5;
}

// Simula uma partida entre dois clubes
function simularPartida(clubeMandante, clubeVisitante) {
  const m = calcularForca(clubeMandante);
  const v = calcularForca(clubeVisitante);

  // Fator casa: leve vantagem pro mandante
  const golsMandante = gerarGols(m.atk + 3, v.def);
  const golsVisitante = gerarGols(v.atk, m.def + 3);

  const eventos = gerarEventos(clubeMandante, clubeVisitante, golsMandante, golsVisitante);

  return {
    mandante: clubeMandante.nome,
    visitante: clubeVisitante.nome,
    golsMandante,
    golsVisitante,
    forcaMandante: m,
    forcaVisitante: v,
    eventos
  };
}

// Gera eventos textuais da partida (gols com autor)
function gerarEventos(mandante, visitante, golsM, golsV) {
  const eventos = [];
  const minutosUsados = new Set();

  const minutoUnico = () => {
    let m;
    do { m = Math.floor(Math.random() * 90) + 1; } while (minutosUsados.has(m));
    minutosUsados.add(m);
    return m;
  };

  const atacantes = (clube) =>
    clube.jogadores.filter(j => j.posicao === "ATK" || j.posicao === "MEI");

  const marcador = (clube) => {
    const lista = atacantes(clube);
    return lista[Math.floor(Math.random() * lista.length)];
  };

  for (let i = 0; i < golsM; i++) {
    const jogador = marcador(mandante);
    eventos.push({ minuto: minutoUnico(), texto: `⚽ Gol de ${jogador.nome} (${mandante.nome})` });
  }

  for (let i = 0; i < golsV; i++) {
    const jogador = marcador(visitante);
    eventos.push({ minuto: minutoUnico(), texto: `⚽ Gol de ${jogador.nome} (${visitante.nome})` });
  }

  eventos.sort((a, b) => a.minuto - b.minuto);
  return eventos;
}

// Gera a tabela do campeonato a partir dos resultados
function calcularTabela(clubes, resultados) {
  const tabela = clubes.map(c => ({
    id: c.id,
    nome: c.nome,
    sigla: c.sigla,
    cor: c.cor,
    pts: 0, j: 0, v: 0, e: 0, d: 0, gp: 0, gc: 0, sg: 0
  }));

  const encontrar = (id) => tabela.find(t => t.id === id);

  resultados.forEach(r => {
    const m = encontrar(r.mandanteId);
    const v = encontrar(r.visitanteId);
    if (!m || !v) return;

    m.j++; v.j++;
    m.gp += r.golsMandante; m.gc += r.golsVisitante;
    v.gp += r.golsVisitante; v.gc += r.golsMandante;

    if (r.golsMandante > r.golsVisitante) {
      m.pts += 3; m.v++;
      v.d++;
    } else if (r.golsMandante < r.golsVisitante) {
      v.pts += 3; v.v++;
      m.d++;
    } else {
      m.pts++; v.pts++;
      m.e++; v.e++;
    }
  });

  tabela.forEach(t => t.sg = t.gp - t.gc);
  tabela.sort((a, b) => b.pts - a.pts || b.sg - a.sg || b.gp - a.gp);

  return tabela;
}

// Gera calendário de rodadas (todos contra todos, ida e volta)
function gerarCalendario(clubes) {
  const ids = clubes.map(c => c.id);
  const rodadas = [];
  const n = ids.length;

  // Algoritmo round-robin
  const lista = [...ids];
  if (lista.length % 2 !== 0) lista.push(null); // bye

  const totalRodadas = lista.length - 1;

  for (let r = 0; r < totalRodadas; r++) {
    const jogos = [];
    for (let i = 0; i < lista.length / 2; i++) {
      const m = lista[i];
      const v = lista[lista.length - 1 - i];
      if (m && v) jogos.push({ mandanteId: m, visitanteId: v });
    }
    rodadas.push({ numero: r + 1, jogos });
    // Rotacionar fixando o primeiro
    lista.splice(1, 0, lista.pop());
  }

  // Volta (invertendo mando de campo)
  const idaLength = rodadas.length;
  for (let r = 0; r < idaLength; r++) {
    rodadas.push({
      numero: idaLength + r + 1,
      jogos: rodadas[r].jogos.map(j => ({ mandanteId: j.visitanteId, visitanteId: j.mandanteId }))
    });
  }

  return rodadas;
}

function overallClasse(v) {
  if (v >= 80) return "overall-alto";
  if (v >= 70) return "overall-medio";

// ── Aba: Campeonato ──
function renderCampeonato() {
  const rodadas = estado.calendario;
  const meuId = estado.meuClube.id;

  document.getElementById("main").innerHTML = `

        const proxima = idx === estado.rodadaAtual;

        return `

            </div>

                let placarHTML = `<span class="placar pendente">vs</span>`;

                  const classeP = placarClasse(resultado, meuId);
                  placarHTML = `
                    <span class="placar ${classeP}" 
                      onclick="abrirModal(${JSON.stringify(resultado).replace(/"/g, '&quot;')})"

                return `

                    ${placarHTML}

                  </div>
                `;

          </div>
        `;
      }).join("")}

  `;
}

function placarClasse(resultado, meuId) {
  if (resultado.mandanteId !== meuId && resultado.visitanteId !== meuId) return "";
  const euSouMandante = resultado.mandanteId === meuId;
  const meusGols = euSouMandante ? resultado.golsMandante : resultado.golsVisitante;
  const delesGols = euSouMandante ? resultado.golsVisitante : resultado.golsMandante;
  if (meusGols > delesGols) return "vitoria";
  if (meusGols < delesGols) return "derrota";
  return "empate";
}

function simularRodada(idx) {
  const rodada = estado.calendario[idx];

  rodada.jogos.forEach(jogo => {
    const mandante = CLUBES.find(c => c.id === jogo.mandanteId);
    const visitante = CLUBES.find(c => c.id === jogo.visitanteId);

  const eventosHTML = resultado.eventos.length > 0
    ? resultado.eventos.map(e => `

  overlay.addEventListener("click", (e) => {

  });

  document.body.appendChild(overlay);
}
