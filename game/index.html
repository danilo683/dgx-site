<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manager FC</title>
  <style>*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --bg2: #1a1d27;
  --bg3: #22263a;
  --border: #2e3350;
  --text: #e8eaf0;
  --text2: #8a90a8;
  --accent: #4f8ef7;
  --green: #2ecc71;
  --red: #e74c3c;
  --yellow: #f1c40f;
  --radius: 10px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

/* ── Layout ── */
#app { display: flex; min-height: 100vh; }

/* Sidebar esquerda */
#sidebar {
  width: 200px;
  min-width: 200px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}

#sidebar-logo {
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--border);
}

#sidebar-logo h1 { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: .5px; margin-bottom: 10px; }

.sidebar-info { display: flex; flex-direction: column; gap: 4px; }
.sidebar-info-item { font-size: 11px; color: var(--text2); }
.sidebar-info-item strong { color: var(--text); display: block; font-size: 12px; }

#sidebar-nav { display: flex; flex-direction: column; padding: 12px 8px; gap: 2px; flex: 1; }

#sidebar-nav button {
  background: none;
  border: none;
  color: var(--text2);
  padding: 10px 12px;
  cursor: pointer;
  font-size: 13px;
  border-radius: 8px;
  text-align: left;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 8px;
}

#sidebar-nav button:hover { background: var(--bg3); color: var(--text); }
#sidebar-nav button.ativo { background: rgba(79,142,247,.15); color: var(--accent); font-weight: 600; }

/* Conteúdo principal */
#conteudo {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

header h1 { display: none; }
header span { font-size: 12px; color: var(--text2); }

/* nav horizontal removido — sidebar substitui */
nav { display: none; }

main { flex: 1; padding: 24px; max-width: 860px; width: 100%; }

/* ── Tela de seleção de clube ── */
#tela-selecao h2 { font-size: 18px; margin-bottom: 6px; }
#tela-selecao p  { color: var(--text2); margin-bottom: 24px; font-size: 13px; }

.grid-clubes {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
}

.card-clube {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 16px;
  cursor: pointer;
  transition: border-color .15s, transform .1s;
  text-align: center;
}

.card-clube:hover { border-color: var(--accent); transform: translateY(-2px); }

.card-clube .escudo {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  margin: 0 auto 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 13px;
  color: #fff;
}

.card-clube .nome { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.card-clube .forca { font-size: 12px; color: var(--text2); }

/* ── Tela principal ── */
.secao-titulo {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--text);
}

/* ── Elenco ── */
.lista-jogadores { display: flex; flex-direction: column; gap: 6px; }

.item-jogador {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.posicao-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 7px;
  border-radius: 4px;
  min-width: 36px;
  text-align: center;
}

.pos-GOL { background: #5c2d00; color: #ffaa77; }
.pos-LD  { background: #003a7b; color: #77aaff; }
.pos-ZAG { background: #00307b; color: #88bbff; }
.pos-LE  { background: #003a7b; color: #77aaff; }
.pos-VOL { background: #1a4a1a; color: #88dd88; }
.pos-MEI { background: #1a5c1a; color: #77dd77; }
.pos-ATA { background: #5c1a1a; color: #ff8888; }

.jogador-nome { flex: 1; font-size: 13px; }

.overall-badge {
  font-weight: 700;
  font-size: 14px;
  min-width: 32px;
  text-align: right;
}

.overall-alto  { color: var(--green); }
.overall-medio { color: var(--yellow); }
.overall-baixo { color: var(--red); }

/* ── Tabela de classificação ── */
.tabela-classificacao {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.tabela-classificacao table {
  width: 100%;
  border-collapse: collapse;
}

.tabela-classificacao th {
  padding: 10px 12px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .5px;
  border-bottom: 1px solid var(--border);
}

.tabela-classificacao td {
  padding: 10px 12px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
}

.tabela-classificacao tr:last-child td { border-bottom: none; }
.tabela-classificacao tr.meu-clube td { background: rgba(79,142,247,.08); }
.tabela-classificacao tr:hover td { background: var(--bg3); }

.td-pos { color: var(--text2); width: 28px; font-size: 12px; }
.td-pts { font-weight: 700; color: var(--accent); }

.escudo-mini {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  font-size: 9px;
  font-weight: 700;
  color: #fff;
  margin-right: 8px;
  vertical-align: middle;
}

/* ── Rodadas / Jogos ── */
.rodadas-container { display: flex; flex-direction: column; gap: 16px; }

.card-rodada {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.rodada-header {
  padding: 10px 14px;
  background: var(--bg3);
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.btn-simular {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  font-weight: 600;
  transition: opacity .15s;
}

.btn-simular:hover { opacity: .85; }
.btn-simular:disabled { opacity: .4; cursor: default; }

.lista-jogos { padding: 8px 0; }

.item-jogo {
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
}

.item-jogo:last-child { border-bottom: none; }

.time-nome { flex: 1; }
.time-nome.direita { text-align: right; }
.time-nome.meu { color: var(--accent); font-weight: 600; }

.placar {
  font-weight: 700;
  font-size: 15px;
  min-width: 48px;
  text-align: center;
  background: var(--bg3);
  padding: 3px 8px;
  border-radius: 6px;
}

.placar.pendente { color: var(--text2); font-size: 11px; font-weight: 400; }
.placar.vitoria  { color: var(--green); }
.placar.derrota  { color: var(--red); }
.placar.empate   { color: var(--yellow); }

/* ── Modal de partida ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}

.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  width: 100%;
  max-width: 480px;
  overflow: hidden;
}

.modal-header {
  background: var(--bg3);
  padding: 20px;
  text-align: center;
}

.modal-placar {
  font-size: 36px;
  font-weight: 700;
  margin: 8px 0 4px;
  letter-spacing: 4px;
}

.modal-times {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text2);
  padding: 0 20px;
}

.modal-eventos {
  padding: 16px 20px;
  max-height: 240px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.evento-item {
  display: flex;
  gap: 10px;
  font-size: 13px;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
}

.evento-minuto { color: var(--text2); min-width: 34px; font-size: 12px; }

.modal-footer { padding: 16px 20px; }

.btn-fechar {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: background .15s;
}

.btn-fechar:hover { background: var(--border); }

/* ── Stats do clube ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  text-align: center;
}

.stat-valor { font-size: 26px; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 11px; color: var(--text2); margin-top: 4px; }

/* ── Utilitários ── */
.hidden { display: none !important; }
.mt16 { margin-top: 16px; }

.btn-primario {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s;
}

.btn-primario:hover { opacity: .85; }

/* ── Tela intro / criar manager ── */
.tela-intro {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 70vh;
}

.intro-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 36px;
  width: 100%;
  max-width: 400px;
  text-align: center;
}

.intro-logo { font-size: 48px; margin-bottom: 12px; }
.intro-card h2 { font-size: 22px; margin-bottom: 6px; }
.intro-sub { color: var(--text2); font-size: 13px; margin-bottom: 28px; }

.form-group { text-align: left; margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
.form-group input, .form-group select {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 10px 12px;
  font-size: 14px;
}
.form-group input:focus, .form-group select:focus {
  outline: none;
  border-color: var(--accent);
}

/* ── Lista de técnicos ── */
.lista-tecnicos { display: flex; flex-direction: column; gap: 10px; }

.card-tecnico {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  cursor: pointer;
  transition: border-color .15s, transform .1s;
}
.card-tecnico:hover { border-color: var(--accent); transform: translateY(-1px); }

.tecnico-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}

.tecnico-nome { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
.tecnico-meta { font-size: 12px; color: var(--text2); }
.flag { font-size: 14px; }

.overall-grande {
  font-size: 28px;
  font-weight: 700;
  min-width: 48px;
  text-align: center;
}

.tecnico-stats {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

.tstat {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
}
.tstat-label { color: var(--text2); }
.tstat-val   { font-weight: 600; }

/* ── Card staff técnico ── */
.card-staff-tecnico {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
}

.staff-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 6px;
}

.staff-cargo { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.staff-nome  { font-size: 18px; font-weight: 700; margin-bottom: 3px; }
.staff-meta  { font-size: 12px; color: var(--text2); }

.btn-demitir {
  margin-top: 16px;
  width: 100%;
  background: none;
  border: 1px solid var(--red);
  color: var(--red);
  padding: 8px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  transition: background .15s;
}
.btn-demitir:hover { background: rgba(231,76,60,.1); }

/* ── Vagas de staff ── */
.vagas-staff { margin-top: 8px; }

.vaga-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.vaga-item:last-child { border-bottom: none; }
.vaga-cargo { color: var(--text2); }

.vaga-badge {
  font-size: 11px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 3px 8px;
  border-radius: 20px;
}

/* ── Header atualizado ── */
.header-info-group { display: flex; gap: 16px; align-items: center; font-size: 12px; color: var(--text2); }
.header-info-group strong { color: var(--text); }

.tela-selecao h2 { font-size: 18px; margin-bottom: 6px; }
.tela-selecao .sub { color: var(--text2); margin-bottom: 24px; font-size: 13px; }

/* Técnico atual destacado */
.card-tecnico.tecnico-atual {
  border-color: var(--accent);
  opacity: .7;
  cursor: default;
}
.badge-atual {
  font-size: 10px;
  background: var(--bg-accent, rgba(79,142,247,.15));
  color: var(--accent);
  border: 1px solid var(--accent);
  padding: 2px 7px;
  border-radius: 20px;
  margin-left: 6px;
  vertical-align: middle;
}

/* ── Mercado ── */
.janela-aberta, .janela-fechada {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: 16px;
  background: var(--bg2);
}
.janela-aberta  { border-color: var(--green); }
.janela-fechada { border-color: var(--border); }
.janela-icon { font-size: 20px; }

.budget-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.budget-label { font-size: 12px; color: var(--text2); }
.budget-valor { font-size: 22px; font-weight: 700; color: var(--green); }

.mercado-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
}
.mtab {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  transition: all .15s;
}
.mtab:hover { color: var(--text); border-color: var(--accent); }
.mtab.ativo  { background: var(--accent); color: #fff; border-color: var(--accent); }

.mercado-filtros {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.mercado-filtros select {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 8px 10px;
  font-size: 13px;
  flex: 1;
}

.lista-jogadores-mercado { display: flex; flex-direction: column; gap: 6px; }

.item-mercado {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.mercado-info { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.mercado-jogador { min-width: 0; }
.mercado-nome { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mercado-clube { font-size: 11px; color: var(--text2); margin-top: 2px; }
.mercado-valores { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.mercado-overall { font-size: 15px; font-weight: 700; min-width: 28px; text-align: center; }
.mercado-vm { font-size: 12px; color: var(--text2); min-width: 56px; text-align: right; }

.btn-proposta {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 5px 12px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
.btn-proposta:hover { opacity: .85; }

.sem-budget { font-size: 11px; color: var(--text2); white-space: nowrap; }

.badge-contrato {
  font-size: 10px;
  background: rgba(241,196,15,.15);
  color: var(--yellow);
  border: 1px solid var(--yellow);
  padding: 2px 6px;
  border-radius: 20px;
  margin-left: 4px;
}

.proposta-info { display: flex; flex-direction: column; gap: 6px; }
.proposta-aviso {
  background: rgba(241,196,15,.1);
  border: 1px solid var(--yellow);
  color: var(--yellow);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 12px;
  margin-top: 12px;
}

/* ── Feed de noticias ── */
.feed-noticias { display: flex; flex-direction: column; gap: 8px; }
.noticia-item {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 13px;
}
.noticia-icon { font-size: 16px; flex-shrink: 0; }
.noticia-texto { flex: 1; line-height: 1.5; }
.noticia-rodada { font-size: 11px; color: var(--text2); white-space: nowrap; flex-shrink: 0; }

/* ══════════════════════════════════
   DASHBOARD
══════════════════════════════════ */
.dash-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 10px;
}

.dash-nav-btn {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
  width: 40px;
  height: 40px;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  flex-shrink: 0;
  transition: all .15s;
}
.dash-nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.dash-nav-btn:disabled { opacity: .3; cursor: default; }
.dash-nav-btn.destaque { background: var(--accent); border-color: var(--accent); color: #fff; font-size: 18px; width: 48px; height: 48px; }
.dash-nav-btn.destaque:hover { opacity: .85; }

.dash-evento-info {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
  min-width: 0;
}
.dash-evento-icone { font-size: 28px; flex-shrink: 0; }
.dash-evento-titulo { font-size: 16px; font-weight: 600; }
.dash-evento-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

.temporada-progress {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin-bottom: 16px;
  overflow: hidden;
}
.temporada-bar {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width .4s ease;
}

/* Grid 2x3 */
.dash-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.dash-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  min-height: 160px;
}

.dash-card-titulo {
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.dash-empty {
  font-size: 13px;
  color: var(--text2);
  padding: 8px 0;
}

.dash-ver-mais {
  font-size: 12px;
  color: var(--accent);
  cursor: pointer;
  margin-top: 10px;
  text-align: center;
}
.dash-ver-mais:hover { text-decoration: underline; }

/* ── Mini calendário ── */
.mini-cal { display: flex; flex-direction: column; gap: 4px; }

.cal-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  transition: background .1s;
  color: var(--text2);
}
.cal-item:hover { background: var(--bg3); }
.cal-item.cal-atual { background: rgba(79,142,247,.12); color: var(--text); font-weight: 500; }
.cal-item.cal-passado { opacity: .5; }
.cal-icone { font-size: 14px; flex-shrink: 0; }
.cal-titulo { flex: 1; }
.cal-agora { font-size: 10px; background: var(--accent); color: #fff; padding: 1px 6px; border-radius: 10px; }

/* ── Inbox ── */
.inbox-badge {
  background: var(--red);
  color: #fff;
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 10px;
  font-weight: 700;
}
.inbox-lista { display: flex; flex-direction: column; gap: 4px; }
.inbox-item {
  padding: 8px 10px;
  border-radius: 6px;
  background: var(--bg3);
  cursor: pointer;
  transition: background .1s;
  border-left: 3px solid transparent;
}
.inbox-item:hover { background: var(--border); }
.inbox-item.nao-lida { border-left-color: var(--accent); }
.inbox-remetente { font-size: 11px; color: var(--text2); margin-bottom: 2px; }
.inbox-assunto { font-size: 13px; font-weight: 500; }

/* ── Jogos ── */
.jogos-lista { display: flex; flex-direction: column; gap: 4px; }
.jogos-secao-titulo { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }

.jogo-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 6px;
  background: var(--bg3);
  font-size: 12px;
}
.jogo-item.proximo { opacity: .7; }
.jogo-rodada { color: var(--text2); min-width: 24px; font-size: 11px; }
.jogo-mando {
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 4px;
  background: var(--bg2);
  color: var(--text2);
  border: 1px solid var(--border);
}
.jogo-adv { flex: 1; font-weight: 500; }
.jogo-resultado { font-weight: 700; font-size: 13px; min-width: 32px; text-align: right; }
.jogo-resultado.pendente { color: var(--text2); font-weight: 400; font-size: 11px; }
.res-v { color: var(--green); }
.res-d { color: var(--red); }
.res-e { color: var(--yellow); }

/* ── Mini tabela ── */
.mini-tabela { display: flex; flex-direction: column; gap: 2px; }
.mini-tab-header {
  display: grid;
  grid-template-columns: 24px 1fr 28px 20px 28px;
  gap: 4px;
  font-size: 10px;
  color: var(--text2);
  text-transform: uppercase;
  padding: 0 4px;
  margin-bottom: 4px;
}
.mini-tab-row {
  display: grid;
  grid-template-columns: 24px 1fr 28px 20px 28px;
  gap: 4px;
  font-size: 12px;
  padding: 5px 4px;
  border-radius: 6px;
  align-items: center;
}
.mini-tab-row.mini-tab-eu { background: rgba(79,142,247,.1); font-weight: 600; }
.mini-tab-pos { color: var(--text2); font-size: 11px; }
.mini-tab-nome { display: flex; align-items: center; gap: 4px; overflow: hidden; white-space: nowrap; }
.mini-tab-pts { color: var(--accent); font-weight: 700; }

/* ── Baixas ── */
.baixas-lista { display: flex; flex-direction: column; gap: 6px; }
.baixa-item { display: flex; align-items: center; gap: 8px; }
.baixa-info { flex: 1; }
.baixa-nome { font-size: 13px; font-weight: 500; }
.baixa-detalhe { font-size: 11px; color: var(--text2); margin-top: 2px; }

/* ── Notícias ── */
.noticias-lista { display: flex; flex-direction: column; gap: 6px; }
.noticia-dash {
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  line-height: 1.5;
}
.noticia-dash:last-child { border-bottom: none; }
.noticia-dash-texto { color: var(--text); }
.noticia-dash-rodada { font-size: 11px; color: var(--text2); margin-top: 3px; }

/* ── Calendário visual ── */
.cal-visual { display: flex; flex-direction: column; gap: 8px; }

.cal-mes-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 4px;
}
.cal-mes-nome { font-size: 13px; font-weight: 600; }
.cal-mes-btn {
  background: none; border: 1px solid var(--border); color: var(--text);
  width: 24px; height: 24px; border-radius: 6px; cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
}
.cal-mes-btn:hover { border-color: var(--accent); color: var(--accent); }

.cal-dias-semana {
  display: grid; grid-template-columns: repeat(7, 1fr);
  text-align: center; font-size: 10px; color: var(--text2);
  margin-bottom: 4px;
}

.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }

.cal-dia {
  aspect-ratio: 1; border-radius: 6px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; cursor: pointer;
  font-size: 11px; position: relative; transition: background .1s;
  padding: 2px 0;
}
.cal-dia:hover:not(.vazio) { background: var(--bg3); }
.cal-dia.vazio { cursor: default; }
.cal-dia.cal-dia-atual {
  background: var(--accent); color: #fff; font-weight: 700;
}
.cal-dia.tem-evento:not(.cal-dia-atual) { background: rgba(79,142,247,.08); }

.cal-dia-num { font-size: 11px; line-height: 1; }
.cal-dots { display: flex; gap: 2px; margin-top: 2px; }
.cal-ev-dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; }

.cal-legenda {
  display: flex; gap: 10px; font-size: 10px; color: var(--text2);
  margin-top: 4px;
}
.cal-legenda span { display: flex; align-items: center; gap: 4px; }

/* ── Tela de jogo ── */
.tela-jogo {
  max-width: 600px; margin: 0 auto; padding: 8px 0;
}
.jogo-screen-header {
  text-align: center; margin-bottom: 24px;
}
.jogo-screen-rodada {
  font-size: 13px; color: var(--text2); font-weight: 500;
  text-transform: uppercase; letter-spacing: .5px;
}

.jogo-confronto {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; margin-bottom: 20px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 16px; padding: 24px 20px;
}
.jogo-time { text-align: center; flex: 1; }
.jogo-escudo {
  width: 64px; height: 64px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 16px; color: #fff;
  margin: 0 auto 10px;
}
.jogo-time-nome { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.jogo-mando-tag { font-size: 11px; color: var(--accent); }
.jogo-forca-tag { font-size: 11px; color: var(--text2); }
.jogo-vs { font-size: 28px; font-weight: 700; color: var(--text2); flex-shrink: 0; }

.jogo-prestats {
  display: flex; justify-content: space-around;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px; margin-bottom: 16px;
}
.prestat { text-align: center; }
.prestat-val { font-size: 20px; font-weight: 700; }
.prestat-label { font-size: 11px; color: var(--text2); margin-top: 3px; }

.outros-jogos {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px; margin-bottom: 20px;
}
.outros-jogos-titulo { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
.outro-jogo {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px;
}
.outro-jogo:last-child { border-bottom: none; }
.outro-time { flex: 1; }
.outro-time:last-child { text-align: right; }
.outro-vs { color: var(--text2); font-size: 11px; }

.jogo-acoes { text-align: center; }
.btn-simular-grande {
  background: var(--accent); color: #fff; border: none;
  padding: 14px 40px; border-radius: 12px; font-size: 16px;
  font-weight: 700; cursor: pointer; transition: opacity .15s;
  width: 100%;
}
.btn-simular-grande:hover { opacity: .85; }

/* ── Tela de resultado ── */
.tela-resultado { max-width: 600px; margin: 0 auto; }
.resultado-titulo {
  font-size: 16px; font-weight: 600; margin-bottom: 16px; text-align: center;
}
.resultados-lista { display: flex; flex-direction: column; gap: 4px; margin-bottom: 20px; }
.resultado-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: 8px;
  background: var(--bg2); border: 1px solid var(--border); font-size: 13px;
}
.resultado-item.resultado-meu { border-color: var(--accent); }
.res-time { flex: 1; font-size: 12px; }
.res-time.direita { text-align: right; }
.res-placar { font-weight: 700; font-size: 15px; min-width: 48px; text-align: center; }
.resultado-tabela-titulo { font-size: 13px; font-weight: 600; margin-bottom: 10px; }

/* ── Dashboard topbar ── */
.dash-topbar {
  display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
}

/* ── Próximos eventos ── */
.proximos-eventos { display: flex; flex-direction: column; gap: 6px; }

.proximo-ev-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px;
  border-radius: 8px;
  cursor: pointer;
  transition: background .1s;
}
.proximo-ev-item:hover { background: var(--bg3); }

.proximo-ev-icone {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.proximo-ev-info { flex: 1; min-width: 0; }
.proximo-ev-titulo { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.proximo-ev-data { font-size: 11px; color: var(--text2); margin-top: 2px; }

/* Baixas em largura total */
.dash-card-full { grid-column: 1 / -1; }

/* ── Grids do dashboard ── */
.dash-grid-top {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}

.dash-grid-bottom {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}

.dash-card-full-row {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 12px;
}

/* Jogos em linha horizontal quando card é largo */
.dash-card-full-row .jogos-lista {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0 24px;
}

.dash-card-full-row .jogos-secao-titulo {
  grid-column: 1 / -1;
}

/* ── Grid 3 colunas ── */
.dash-grid-3col {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}

/* ── Sidebar botões maiores ── */
#sidebar-nav button {
  padding: 13px 14px !important;
  font-size: 14px !important;
  border-radius: 10px !important;
  font-weight: 500 !important;
}

#sidebar-nav button.ativo {
  font-weight: 700 !important;

  <script>// ── Janelas de transferência do Brasileirão ──
const JANELAS = [
  { nome: "Janela de verão",   inicio: 1,  fim: 6  },
  { nome: "Janela de inverno", inicio: 19, fim: 23 }
];

function janelaAberta(rodada) {
  return JANELAS.find(function(j) { return rodada >= j.inicio && rodada <= j.fim; }) || null;
}

// ── Valor de mercado por overall ──
function calcularValorMercado(overall) {
  if (overall >= 90) return 45000000;
  if (overall >= 87) return 28000000;
  if (overall >= 85) return 18000000;
  if (overall >= 82) return 12000000;
  if (overall >= 80) return 8000000;
  if (overall >= 77) return 5000000;
  if (overall >= 75) return 3000000;
  if (overall >= 72) return 1800000;
  if (overall >= 70) return 1000000;
  if (overall >= 67) return 600000;
  if (overall >= 65) return 350000;
  return 180000;
}

function calcularSalario(valorMercado) {
  return Math.round(valorMercado * 0.004);
}

function calcularClausula(valorMercado, overall) {
  var mult = overall >= 82 ? 2.5 : overall >= 75 ? 2.0 : 1.5;
  return Math.round(valorMercado * mult);
}

function calcularContratoTermino(overall) {
  // Estrelas têm contratos mais longos
  if (overall >= 82) return Math.floor(Math.random() * 20) + 18;
  if (overall >= 75) return Math.floor(Math.random() * 20) + 10;
  return Math.floor(Math.random() * 25) + 5;
}

// ── Inicializar dados financeiros nos jogadores e clubes ──
function inicializarFinancas() {
  var budgets = {
    flamengo: 95000000,    palmeiras: 90000000,
    corinthians: 60000000, saopulo: 58000000,
    atleticomg: 55000000,  internacional: 45000000,
    gremio: 42000000,      botafogo: 48000000,
    bahia: 28000000,       fortaleza: 30000000,
    cruzeiro: 25000000,    fluminense: 32000000,
    vasco: 28000000,       atleticopr: 38000000,
    rbbragantino: 22000000,cuiaba: 10000000,
    juventude: 8000000,    goias: 9000000,
    coritiba: 7000000,     santos: 14000000
  };

  CLUBES.forEach(function(clube) {
    clube.budget = budgets[clube.id] || 10000000;
    clube.receita_rodada = clube.budget >= 80000000 ? 2500000 :
                           clube.budget >= 40000000 ? 1500000 : 700000;

    clube.jogadores.forEach(function(j) {
      if (!j.valor_mercado) {
        j.valor_mercado       = calcularValorMercado(j.overall);
        j.salario             = calcularSalario(j.valor_mercado);
        j.clausula_rescisoria = calcularClausula(j.valor_mercado, j.overall);
        j.contrato_termino    = calcularContratoTermino(j.overall);
        j.clube_id            = clube.id;
      }
    });
  });
}

// ── Formatar moeda ──
function formatarDinheiro(valor) {
  if (valor >= 1000000) return 'R$ ' + (valor / 1000000).toFixed(1) + 'M';
  if (valor >= 1000)    return 'R$ ' + (valor / 1000).toFixed(0) + 'K';
  return 'R$ ' + valor;
}

// ── Avaliar proposta do jogador (retorna {aceita, motivo}) ──
function avaliarProposta(jogador, clubeVendedor, valorProposto) {
  var vm = jogador.valor_mercado;

  // Fim de contrato: sai de graça
  if (jogador.contrato_termino <= estado.rodadaAtual + 6) {
    return { aceita: true, motivo: "Contrato prestes a vencer — clube aceitou liberar." };
  }

  // Abaixo de 80% do valor → recusa automática
  if (valorProposto < vm * 0.8) {
    return { aceita: false, motivo: "Proposta muito abaixo do valor de mercado." };
  }

  // Acima da cláusula → aceita por lei
  if (valorProposto >= jogador.clausula_rescisoria) {
    return { aceita: true, motivo: "Cláusula rescisória ativada — saída garantida por lei." };
  }

  // Entre 80% e cláusula → chance proporcional
  var percentual = (valorProposto - vm * 0.8) / (jogador.clausula_rescisoria - vm * 0.8);
  var chance = 0.15 + percentual * 0.75; // 15% a 90%

  // Ajustes: titular é mais difícil de vender
  var jogadoresClube = clubeVendedor.jogadores.filter(function(j) { return j.posicao === jogador.posicao; });
  jogadoresClube.sort(function(a, b) { return b.overall - a.overall; });
  var eTitular = jogadoresClube[0] && jogadoresClube[0].id === jogador.id;
  if (eTitular) chance -= 0.2;

  // Clube com budget baixo aceita mais fácil
  if (clubeVendedor.budget < 15000000) chance += 0.2;

  chance = Math.max(0.05, Math.min(0.95, chance));

  if (Math.random() < chance) {
    return { aceita: true, motivo: "Proposta aceita pelo clube." };
  } else {
    return { aceita: false, motivo: "Clube recusou a proposta. Tente um valor maior." };
  }
}

// ── Executar transferência ──
function executarTransferencia(jogador, clubeOrigem, clubeDestino, valor) {
  // Remove do clube origem
  clubeOrigem.jogadores = clubeOrigem.jogadores.filter(function(j) { return j.id !== jogador.id; });
  clubeOrigem.budget += valor;

  // Adiciona ao clube destino
  jogador.clube_id = clubeDestino.id;
  jogador.contrato_termino = estado.rodadaAtual + calcularContratoTermino(jogador.overall);
  jogador.clausula_rescisoria = calcularClausula(jogador.valor_mercado, jogador.overall);
  clubeDestino.jogadores.push(jogador);
  clubeDestino.budget -= valor;

  return jogador;
}

    var jogador = candidatos[Math.floor(Math.random() * candidatos.length)];
    var valor   = Math.round(jogador.valor_mercado * (0.9 + Math.random() * 0.3));

function calcularEncaixe(clube, formacao) {
  const req = FORMACOES[formacao].requisitos;
  let totalReq = 0, totalAtendido = 0;

  Object.entries(req).forEach(([pos, qtd]) => {
    const disponiveis = clube.jogadores
      .filter(j => j.posicao === pos)
      .sort((a, b) => b.overall - a.overall)
      .slice(0, qtd);

    totalReq += qtd;
    totalAtendido += disponiveis.length;
  });

  return totalAtendido / totalReq;
}

// Calcula força do clube considerando técnico e formação
function calcularForca(clube, tecnico = null) {
  const jogadores = clube.jogadores;
  const media = (pos) => {
    const g = jogadores.filter(j => j.posicao === pos);
    return g.length === 0 ? 50 : g.reduce((s, j) => s + j.overall, 0) / g.length;
  };

  const gol = media("GOL");
  const ld  = media("LD");
  const zag = media("ZAG");
  const le  = media("LE");
  const vol = media("VOL");
  const mei = media("MEI");
  const ata = media("ATA");

  // Pesos padrão (sem técnico)
  let pesos = { GOL: 0.15, LD: 0.10, ZAG: 0.20, LE: 0.10, VOL: 0.15, MEI: 0.15, ATA: 0.15 };
  let bonusTecnico = 0;
  let bonusFormacao = 0;
  let encaixe = 1;
  let formacao = null;

  if (tecnico) {
    formacao = tecnico.formacao;
    pesos = FORMACOES[formacao].pesos;

    // Bônus do overall do técnico: escala de 0 a +6 pontos
    bonusTecnico = ((tecnico.overall - 60) / 40) * 6;

    // Bônus/penalidade de encaixe: -8 a +4 pontos
    encaixe = calcularEncaixe(clube, formacao);
    bonusFormacao = (encaixe - 0.7) * 20; // 70% encaixe = neutro
  }

  const forcaBase =
    gol * pesos.GOL +
    ld  * pesos.LD  +
    zag * pesos.ZAG +
    le  * pesos.LE  +
    vol * pesos.VOL +
    mei * pesos.MEI +
    ata * pesos.ATA;

  const forca = Math.round(Math.max(40, Math.min(99,
    forcaBase + bonusTecnico + bonusFormacao
  )));

  return {
    forca, gol, ld, zag, le, vol, mei, ata,
    bonusTecnico: Math.round(bonusTecnico * 10) / 10,
    bonusFormacao: Math.round(bonusFormacao * 10) / 10,
    encaixe: Math.round(encaixe * 100),
    formacao
  };
}

function gerarGols(ataque, defesaAdversaria) {
  const vantagem = (ataque - defesaAdversaria) / 100;
  const rand = Math.random();
  const limites = [0.20, 0.45, 0.68, 0.83, 0.93];
  const gols    = [0,    1,    2,    3,    4,    5];
  // Vantagem desloca levemente os limites
  const ajuste = vantagem * 0.08;
  for (let i = 0; i < limites.length; i++) {
    if (rand < limites[i] - ajuste) return gols[i];
  }
  return gols[5];
}

function simularPartida(clubeMandante, clubeVisitante, tecnicoMandante = null, tecnicoVisitante = null) {

function gerarEventos(mandante, visitante, golsM, golsV) {
  const eventos = [];
  const usados = new Set();
  const minuto = () => {
    let m;
    do { m = Math.floor(Math.random() * 90) + 1; } while (usados.has(m));
    usados.add(m);
    return m;
  };
  const marcador = (clube) => {
    const lista = clube.jogadores.filter(j => j.posicao === "ATA" || j.posicao === "MEI");
    return lista[Math.floor(Math.random() * lista.length)];
  };
  for (let i = 0; i < golsM; i++) {
    const j = marcador(mandante);
    eventos.push({ minuto: minuto(), texto: `⚽ ${j.nome} (${mandante.nome})` });
  }
  for (let i = 0; i < golsV; i++) {
    const j = marcador(visitante);
    eventos.push({ minuto: minuto(), texto: `⚽ ${j.nome} (${visitante.nome})` });
  }
  return eventos.sort((a, b) => a.minuto - b.minuto);
}

function calcularTabela(clubes, resultados) {
  const tabela = clubes.map(c => ({
    id: c.id, nome: c.nome, sigla: c.sigla, cor: c.cor,
    pts: 0, j: 0, v: 0, e: 0, d: 0, gp: 0, gc: 0, sg: 0
  }));
  const find = (id) => tabela.find(t => t.id === id);
  resultados.forEach(r => {
    const m = find(r.mandanteId), v = find(r.visitanteId);
    if (!m || !v) return;
    m.j++; v.j++;
    m.gp += r.golsMandante; m.gc += r.golsVisitante;
    v.gp += r.golsVisitante; v.gc += r.golsMandante;
    if (r.golsMandante > r.golsVisitante)      { m.pts += 3; m.v++; v.d++; }
    else if (r.golsMandante < r.golsVisitante) { v.pts += 3; v.v++; m.d++; }
    else                                        { m.pts++; v.pts++; m.e++; v.e++; }
  });
  tabela.forEach(t => t.sg = t.gp - t.gc);
  return tabela.sort((a, b) => b.pts - a.pts || b.sg - a.sg || b.gp - a.gp);
}

function gerarCalendario(clubes) {
  const ids = [...clubes.map(c => c.id)];
  if (ids.length % 2 !== 0) ids.push(null);
  const rodadas = [];
  const total = ids.length - 1;
  const lista = [...ids];
  for (let r = 0; r < total; r++) {
    const jogos = [];
    for (let i = 0; i < lista.length / 2; i++) {
      const m = lista[i], v = lista[lista.length - 1 - i];
      if (m && v) jogos.push({ mandanteId: m, visitanteId: v });
    }
    rodadas.push({ numero: r + 1, jogos });
    lista.splice(1, 0, lista.pop());
  }
  const ida = rodadas.length;
  for (let r = 0; r < ida; r++) {
    rodadas.push({
      numero: ida + r + 1,
      jogos: rodadas[r].jogos.map(j => ({ mandanteId: j.visitanteId, visitanteId: j.mandanteId }))
    });
  }
  return rodadas;

function processarEvento(evento) {

  switch (evento.tipo) {
    case TIPO_EVENTO.MENSAGEM:
      estado.inbox = estado.inbox || [];
      estado.inbox.push(evento);
      break;

    case TIPO_EVENTO.JANELA_ABRE:

        lida: false

      break;

    case TIPO_EVENTO.JANELA_FECHA:
      adicionarNoticia("🔴 " + evento.titulo, evento.rodada);
      break;

    case TIPO_EVENTO.FIM_CONTRATO:
      estado.inbox = estado.inbox || [];

        titulo: evento.titulo,
        remetente: "Departamento jurídico",
        texto: evento.descricao,

  if (!estado.eventos || estado.eventoAtual >= estado.eventos.length - 1) {
    alert("Temporada encerrada!"); return;
  }
  estado.eventoAtual++;
  var ev = estado.eventos[estado.eventoAtual];
  processarEvento(ev);

  if (ev.tipo === TIPO_EVENTO.JOGO) {
    renderTelaJogo(ev.rodada);
  } else {
    atualizarCalView(ev);
    renderDashboard();
  }
}

function voltarEvento() {
  if (!estado.eventoAtual || estado.eventoAtual <= 0) return;
  estado.eventoAtual--;
  var ev = estado.eventos[estado.eventoAtual];
  atualizarCalView(ev);
  renderDashboard();
}

function atualizarCalView(ev) {
  if (ev && ev.data) {
    calView.mes = ev.data.getMonth();
    calView.ano = ev.data.getFullYear();
  }

function irParaEvento(idx) {
  while (estado.eventoAtual < idx) {
    estado.eventoAtual++;
    processarEvento(estado.eventos[estado.eventoAtual]);

  var ev = estado.eventos[estado.eventoAtual];
  atualizarCalView(ev);
  renderDashboard();

    html += '<div class="jogo-time-nome">' + adversario.nome + '</div>';
    html += '<div class="jogo-forca-tag">Força: ' + calcularForca(adversario).forca + '</div>';
    html += '</div>';
    html += '</div>';

    // Stats pré-jogo
    var minhaForca = calcularForca(estado.meuClube, estado.meuTecnico);
    var forcaAdv   = calcularForca(adversario);
    html += '<div class="jogo-prestats">';
    html += '<div class="prestat"><div class="prestat-val" style="color:var(--accent)">' + minhaForca.forca + '</div><div class="prestat-label">Sua força</div></div>';
    html += '<div class="prestat"><div class="prestat-val">' + estado.meuTecnico.formacao + '</div><div class="prestat-label">Formação</div></div>';
    html += '<div class="prestat"><div class="prestat-val" style="color:var(--text2)">' + forcaAdv.forca + '</div><div class="prestat-label">Força deles</div></div>';
    html += '</div>';
  }

  // Outros jogos da rodada
  html += '<div class="outros-jogos">';
  html += '<div class="outros-jogos-titulo">Outros jogos da rodada</div>';
  rodada.jogos.forEach(function(jogo) {
    if (jogo.mandanteId === meuId || jogo.visitanteId === meuId) return;
    var m = CLUBES.find(function(c) { return c.id === jogo.mandanteId; });
    var v = CLUBES.find(function(c) { return c.id === jogo.visitanteId; });
    html += '<div class="outro-jogo">';
    html += '<span class="outro-time">' + m.sigla + '</span>';
    html += '<span class="outro-vs">vs</span>';
    html += '<span class="outro-time">' + v.sigla + '</span>';
    html += '</div>';
  });
  html += '</div>';

  // Botão simular
  html += '<div class="jogo-acoes">';
  html += '<button class="btn-simular-grande" onclick="simularEVoltar(' + rodadaIdx + ')">▶ Simular Rodada</button>';
  html += '</div>';

  html += '</div>';
  document.getElementById("main").innerHTML = html;
}

function simularEVoltar(rodadaIdx) {
  simularRodada(rodadaIdx);

  // Resultado do meu jogo
  var meuId = estado.meuClube.id;
  var rodada = estado.calendario[rodadaIdx];
  var meuJogo = rodada.jogos.find(function(j) {
    return j.mandanteId === meuId || j.visitanteId === meuId;
  });

  if (meuJogo) {
    var resultado = estado.resultados.find(function(r) {
      return r.rodada === rodadaIdx &&
        r.mandanteId === meuJogo.mandanteId &&
        r.visitanteId === meuJogo.visitanteId;
    });
    if (resultado) {
      var euMandante = meuJogo.mandanteId === meuId;
      var meusG  = euMandante ? resultado.golsMandante : resultado.golsVisitante;
      var delesG = euMandante ? resultado.golsVisitante : resultado.golsMandante;
      var adv    = CLUBES.find(function(c) {
        return c.id === (euMandante ? meuJogo.visitanteId : meuJogo.mandanteId);
      });
      var txt = meusG > delesG ? "Vitória" : meusG < delesG ? "Derrota" : "Empate";
      adicionarNoticia(txt + " " + meusG + "x" + delesG + " contra o " + adv.nome + " (Rod. " + (rodadaIdx + 1) + ")", rodadaIdx);
      estado.inbox = estado.inbox || [];
      estado.inbox.push({
        id: "res_" + rodadaIdx,
        titulo: txt + " " + meusG + "x" + delesG + " · " + adv.nome,
        remetente: "Imprensa",
        texto: estado.meuClube.nome + " " + txt.toLowerCase() + " por " + meusG + " a " + delesG + " contra o " + adv.nome + " pela rodada " + (rodadaIdx + 1) + ".",
        lida: false
      });
    }
  }

  renderResultadoRodada(rodadaIdx);
}

function renderResultadoRodada(rodadaIdx) {
  var rodada  = estado.calendario[rodadaIdx];
  var meuId   = estado.meuClube.id;
  var tabela  = calcularTabela(CLUBES, estado.resultados);
  var minhaPos = tabela.findIndex(function(t) { return t.id === meuId; });

  var html = '<div class="tela-resultado">';
  html += '<div class="resultado-titulo">Rodada ' + rodada.numero + ' — Resultados</div>';

  // Resultado dos jogos
  html += '<div class="resultados-lista">';
  rodada.jogos.forEach(function(jogo) {
    var resultado = estado.resultados.find(function(r) {
      return r.rodada === rodadaIdx &&
        r.mandanteId === jogo.mandanteId &&
        r.visitanteId === jogo.visitanteId;
    });
    var m = CLUBES.find(function(c) { return c.id === jogo.mandanteId; });
    var v = CLUBES.find(function(c) { return c.id === jogo.visitanteId; });
    var ehMeu = jogo.mandanteId === meuId || jogo.visitanteId === meuId;

    html += '<div class="resultado-item' + (ehMeu ? ' resultado-meu' : '') + '">';
    html += '<span class="res-time">' + m.nome + '</span>';
    if (resultado) {
      var euM   = jogo.mandanteId === meuId;
      var meusG = euM ? resultado.golsMandante : resultado.golsVisitante;
      var delesG= euM ? resultado.golsVisitante : resultado.golsMandante;
      var cls   = ehMeu ? (meusG > delesG ? 'res-v' : meusG < delesG ? 'res-d' : 'res-e') : '';
      html += '<span class="res-placar ' + cls + '">' + resultado.golsMandante + ' – ' + resultado.golsVisitante + '</span>';
    }
    html += '<span class="res-time direita">' + v.nome + '</span>';
    html += '</div>';
  });
  html += '</div>';

  // Mini tabela pós-rodada
  html += '<div class="resultado-tabela-titulo">Classificação</div>';
  html += '<div class="mini-tabela">';
  html += '<div class="mini-tab-header"><span>#</span><span>Clube</span><span>Pts</span><span>J</span><span>SG</span></div>';
  var inicio = Math.max(0, minhaPos - 2);
  var fim    = Math.min(tabela.length, minhaPos + 3);
  tabela.slice(inicio, fim).forEach(function(t, i) {
    var pos = inicio + i + 1;
    var cls = t.id === meuId ? ' mini-tab-eu' : '';
    html += '<div class="mini-tab-row' + cls + '">';
    html += '<span class="mini-tab-pos">' + pos + '</span>';
    html += '<span class="mini-tab-nome"><span class="escudo-mini" style="background:' + t.cor + '">' + t.sigla + '</span>' + t.nome + '</span>';
    html += '<span class="mini-tab-pts">' + t.pts + '</span>';
    html += '<span>' + t.j + '</span>';
    html += '<span>' + (t.sg > 0 ? '+' + t.sg : t.sg) + '</span>';
    html += '</div>';
  });
  html += '</div>';

  // Botão voltar
  html += '<div class="jogo-acoes" style="margin-top:20px">';
  html += '<button class="btn-primario" onclick="voltarAoDashboard()">← Voltar ao Dashboard</button>';
  html += '</div>';
  html += '</div>';

  document.getElementById("main").innerHTML = html;
}

function voltarAoDashboard() {
  var ev = estado.eventos[estado.eventoAtual];
  atualizarCalView(ev);
  renderDashboard();
}

// ════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════
function renderDashboard() {
  var evento  = estado.eventos[estado.eventoAtual];
  var total   = estado.eventos.length;
  var progPct = Math.round((estado.eventoAtual / (total - 1)) * 100);

  var html = '<div class="dash-topbar">';
  html += '<button class="dash-nav-btn" onclick="voltarEvento()" ' + (estado.eventoAtual === 0 ? 'disabled' : '') + '>◀</button>';
  html += '<div class="dash-evento-info">';
  html += '<div class="dash-evento-icone">' + evento.icone + '</div>';
  html += '<div><div class="dash-evento-titulo">' + evento.titulo + '</div>';
  html += '<div class="dash-evento-sub">' + (evento.subtitulo || '') + '</div></div>';
  html += '</div>';
  html += '<button class="dash-nav-btn destaque" onclick="avancarEvento()">▶</button>';
  html += '</div>';
  html += '<div class="temporada-progress"><div class="temporada-bar" style="width:' + progPct + '%"></div></div>';

  // Grid 3x2: linha 1 = Calendário + Próximos eventos + Inbox
  var naoLidas = contarNaoLidas();
  html += '<div class="dash-grid-3col">';
  html += '<div class="dash-card"><div class="dash-card-titulo">📅 Calendário</div>' + renderCalendarioVisual() + '</div>';
  html += '<div class="dash-card"><div class="dash-card-titulo">🗓 Próximos eventos</div>' + renderProximosEventos() + '</div>';
  html += '<div class="dash-card"><div class="dash-card-titulo">✉️ Inbox ' + (naoLidas > 0 ? '<span class="inbox-badge">' + naoLidas + '</span>' : '') + '</div>' + renderInboxPreview() + '</div>';
  html += '</div>';

  // Linha 2: Jogos + Tabela + Notícias
  html += '<div class="dash-grid-3col">';
  html += '<div class="dash-card"><div class="dash-card-titulo">⚽ Jogos — <span style="font-size:11px;color:var(--text2)">C=Casa · F=Fora</span></div>' + renderJogosCard() + '</div>';
  html += '<div class="dash-card"><div class="dash-card-titulo">📊 Classificação</div>' + renderMiniTabela() + '</div>';
  html += '<div class="dash-card"><div class="dash-card-titulo">📰 Notícias</div>' + renderNoticias() + '</div>';
  html += '</div>';

  // Linha 3: Baixas largura total
  html += '<div class="dash-card-full-row">';
  html += '<div class="dash-card-titulo">🏥 Baixas</div>';
  html += renderBaixas();
  html += '</div>';
  document.getElementById("main").innerHTML = html;
}

// ── Calendário visual (estilo da imagem) ──
function renderCalendarioVisual() {
  var meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  var mes   = calView.mes;
  var ano   = calView.ano;
  var evAtual = estado.eventos[estado.eventoAtual];

  // Mapear eventos do mês atual
  var eventosPorDia = {};
  estado.eventos.forEach(function(ev) {
    if (!ev.data) return;
    var d = new Date(ev.data);
    if (d.getMonth() === mes && d.getFullYear() === ano) {
      var dia = d.getDate();
      if (!eventosPorDia[dia]) eventosPorDia[dia] = [];
      eventosPorDia[dia].push(ev);
    }
  });

  var html = '<div class="cal-visual">';

  // Header do mês
  html += '<div class="cal-mes-header">';
  html += '<button class="cal-mes-btn" onclick="mudarMes(-1)">‹</button>';
  html += '<span class="cal-mes-nome">' + meses[mes] + ' ' + ano + '</span>';
  html += '<button class="cal-mes-btn" onclick="mudarMes(1)">›</button>';
  html += '</div>';

  // Dias da semana
  html += '<div class="cal-dias-semana">';
  ["D","S","T","Q","Q","S","S"].forEach(function(d) {
    html += '<span>' + d + '</span>';
  });
  html += '</div>';

  // Grid dos dias
  html += '<div class="cal-grid">';
  var primeiroDia = new Date(ano, mes, 1).getDay();
  var ultimoDia   = new Date(ano, mes + 1, 0).getDate();

  // Células vazias antes do dia 1
  for (var i = 0; i < primeiroDia; i++) {
    html += '<div class="cal-dia vazio"></div>';
  }

  // Dias do mês
  for (var dia = 1; dia <= ultimoDia; dia++) {
    var evsDia  = eventosPorDia[dia] || [];
    var ehHoje  = evAtual && evAtual.data &&
                  new Date(evAtual.data).getDate() === dia &&
                  new Date(evAtual.data).getMonth() === mes;
    var temEv   = evsDia.length > 0;
    var cls     = "cal-dia" + (ehHoje ? " cal-dia-atual" : "") + (temEv ? " tem-evento" : "");
    var icons   = evsDia.map(function(e) {
      return '<span class="cal-ev-dot" style="background:' + corEvento(e.tipo) + '"></span>';
    }).join("");

    html += '<div class="' + cls + '" onclick="irParaEventoDia(' + dia + ',' + mes + ',' + ano + ')">';
    html += '<span class="cal-dia-num">' + dia + '</span>';
    if (icons) html += '<div class="cal-dots">' + icons + '</div>';
    html += '</div>';
  }

  html += '</div>'; // cal-grid

  // Legenda
  html += '<div class="cal-legenda">';
  html += '<span><span class="cal-ev-dot" style="background:#4f8ef7"></span> Jogo</span>';
  html += '<span><span class="cal-ev-dot" style="background:#2ecc71"></span> Janela</span>';
  html += '<span><span class="cal-ev-dot" style="background:#e74c3c"></span> Contrato</span>';
  html += '</div>';

  html += '</div>'; // cal-visual
  return html;
}

function corEvento(tipo) {
  var cores = {
    jogo: "#4f8ef7",
    janela_abre: "#2ecc71",
    janela_fecha: "#e74c3c",
    fim_contrato: "#e74c3c",
    mensagem: "#f1c40f",
    noticia: "#9b59b6"
  };
  return cores[tipo] || "#888";
}

function mudarMes(delta) {
  calView.mes += delta;
  if (calView.mes < 0)  { calView.mes = 11; calView.ano--; }
  if (calView.mes > 11) { calView.mes = 0;  calView.ano++; }
  renderDashboard();
}

function irParaEventoDia(dia, mes, ano) {
  var alvo = estado.eventos.findIndex(function(ev) {
    if (!ev.data) return false;
    var d = new Date(ev.data);
    return d.getDate() === dia && d.getMonth() === mes && d.getFullYear() === ano;
  });
  if (alvo < 0) return;
  irParaEvento(alvo);
}

function irParaEvento(idx) {
  while (estado.eventoAtual < idx) {
    estado.eventoAtual++;
    processarEvento(estado.eventos[estado.eventoAtual]);
  }
  var ev = estado.eventos[estado.eventoAtual];
  atualizarCalView(ev);
  if (ev.tipo === TIPO_EVENTO.JOGO) {
    renderTelaJogo(ev.rodada);
  } else {
    renderDashboard();
  }
}


// ── Próximos eventos ──
function renderProximosEventos() {
  var atual  = estado.eventoAtual;
  var eventos = estado.eventos;
  var proximos = [];

  for (var i = atual + 1; i < eventos.length && proximos.length < 6; i++) {
    proximos.push({ ev: eventos[i], idx: i });
  }

  if (proximos.length === 0) {
    return '<div class="dash-empty">Nenhum evento próximo.</div>';
  }

  var html = '<div class="proximos-eventos">';
  proximos.forEach(function(item) {
    var ev  = item.ev;
    var cor = corEvento(ev.tipo);
    html += '<div class="proximo-ev-item" onclick="irParaEvento(' + item.idx + ')">';
    html += '<div class="proximo-ev-icone" style="background:' + cor + '22;border:1px solid ' + cor + '44">' + ev.icone + '</div>';
    html += '<div class="proximo-ev-info">';
    html += '<div class="proximo-ev-titulo">' + ev.titulo + '</div>';
    html += '<div class="proximo-ev-data">' + (ev.subtitulo || '') + '</div>';
    html += '</div>';
    html += '</div>';
  });
  html += '</div>';
  return html;
}

// ── Inbox preview ──
function contarNaoLidas() {
  return (estado.inbox || []).filter(function(m) { return !m.lida; }).length;
}

function renderInboxPreview() {
  var inbox = (estado.inbox || []).slice().reverse();
  if (inbox.length === 0) return '<div class="dash-empty">Nenhuma mensagem ainda.</div>';
  var html = '<div class="inbox-lista">';
  inbox.slice(0, 5).forEach(function(msg, i) {
    var idx = (estado.inbox.length - 1) - i;
    html += '<div class="inbox-item ' + (msg.lida ? '' : 'nao-lida') + '" onclick="abrirMensagem(' + idx + ')">';
    html += '<div class="inbox-remetente">' + (msg.remetente || 'Sistema') + '</div>';
    html += '<div class="inbox-assunto">' + msg.titulo + '</div>';
    html += '</div>';
  });
  html += '</div>';
  if (inbox.length > 5) html += '<div class="dash-ver-mais">Ver todas (' + inbox.length + ')</div>';
  return html;
}

function abrirMensagem(idx) {
  var msg = estado.inbox[idx];
  if (!msg) return;
  msg.lida = true;
  var overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML =
    '<div class="modal"><div class="modal-header" style="text-align:left;padding:20px">' +
    '<div style="font-size:11px;color:var(--text2);margin-bottom:4px">De: ' + (msg.remetente || 'Sistema') + '</div>' +
    '<div style="font-size:16px;font-weight:600;margin-bottom:12px">' + msg.titulo + '</div>' +
    '<div style="font-size:14px;line-height:1.6;color:var(--text2)">' + msg.texto + '</div>' +
    '</div><div class="modal-footer">' +
    '<button class="btn-fechar" onclick="this.closest(\'.modal-overlay\').remove();renderDashboard()">Fechar</button>' +
    '</div></div>';
  overlay.addEventListener("click", function(e) { if (e.target === overlay) { overlay.remove(); renderDashboard(); }});
  document.body.appendChild(overlay);
}

// ── Jogos card ──
function renderJogosCard() {
  var meuId  = estado.meuClube.id;
  var cal    = estado.calendario;
  var meusJogos = [];
  cal.forEach(function(rodada, idx) {
    rodada.jogos.forEach(function(jogo) {
      if (jogo.mandanteId === meuId || jogo.visitanteId === meuId) {
        meusJogos.push({ rodadaIdx: idx, rodadaNum: rodada.numero, jogo: jogo });
      }
    });
  });

  var passados = meusJogos.filter(function(j) { return j.rodadaIdx < estado.rodadaAtual; }).slice(-3);
  var futuros  = meusJogos.filter(function(j) { return j.rodadaIdx >= estado.rodadaAtual; }).slice(0, 3);

  var html = '<div class="jogos-lista">';
  if (passados.length > 0) {
    html += '<div class="jogos-secao-titulo">Últimos jogos</div>';
    passados.forEach(function(item) {
      var res = estado.resultados.find(function(r) {
        return r.rodada === item.rodadaIdx && r.mandanteId === item.jogo.mandanteId && r.visitanteId === item.jogo.visitanteId;
      });
      var adv = CLUBES.find(function(c) { return c.id === (item.jogo.mandanteId === meuId ? item.jogo.visitanteId : item.jogo.mandanteId); });
      var euM = item.jogo.mandanteId === meuId;
      html += '<div class="jogo-item">';
      html += '<span class="jogo-rodada">R' + item.rodadaNum + '</span>';
      html += '<span class="jogo-mando">' + (euM ? 'C' : 'F') + '</span>';
      html += '<span class="jogo-adv">' + adv.sigla + '</span>';
      if (res) {
        var mg = euM ? res.golsMandante : res.golsVisitante;
        var dg = euM ? res.golsVisitante : res.golsMandante;
        html += '<span class="jogo-resultado ' + (mg > dg ? 'res-v' : mg < dg ? 'res-d' : 'res-e') + '">' + mg + '-' + dg + '</span>';
      }
      html += '</div>';
    });
  }
  if (futuros.length > 0) {
    html += '<div class="jogos-secao-titulo" style="margin-top:10px">Próximos jogos</div>';
    futuros.forEach(function(item) {
      var adv = CLUBES.find(function(c) { return c.id === (item.jogo.mandanteId === meuId ? item.jogo.visitanteId : item.jogo.mandanteId); });
      var ev  = estado.eventos.find(function(e) { return e.tipo === "jogo" && e.rodada === item.rodadaIdx; });
      html += '<div class="jogo-item proximo">';
      html += '<span class="jogo-rodada">R' + item.rodadaNum + '</span>';
      html += '<span class="jogo-mando">' + (item.jogo.mandanteId === meuId ? 'C' : 'F') + '</span>';
      html += '<span class="jogo-adv">' + adv.sigla + '</span>';
      html += '<span class="jogo-resultado pendente">' + (ev && ev.subtitulo ? ev.subtitulo : 'vs') + '</span>';
      html += '</div>';
    });
  }
  if (!passados.length && !futuros.length) html += '<div class="dash-empty">Nenhum jogo.</div>';
  html += '</div>';
  return html;
}

// ── Mini tabela ──

  var meuId    = estado.meuClube.id;

  var inicio   = Math.max(0, minhaPos - 2);

    html += '<span class="mini-tab-pos">' + pos + '</span>';
    html += '<span class="mini-tab-nome"><span class="escudo-mini" style="background:' + t.cor + '">' + t.sigla + '</span>' + t.nome + '</span>';
    html += '<span class="mini-tab-pts">' + t.pts + '</span>';

    html += '</div>';
  });

  html += '<div class="dash-ver-mais" onclick="navegarPara(\'tabela\')">Tabela completa</div>';

}

// ── Baixas ──
function renderBaixas() {
  if (!estado.baixas) {
    estado.baixas = [];
    var qtd = Math.floor(Math.random() * 2);
    for (var i = 0; i < qtd; i++) {
      var js = estado.meuClube.jogadores;
      var j  = js[Math.floor(Math.random() * js.length)];
      estado.baixas.push({ nome: j.nome, posicao: j.posicao, tipo: "machucado", ate_rodada: estado.rodadaAtual + Math.floor(Math.random() * 4) + 1 });
    }
  }
  estado.baixas = estado.baixas.filter(function(b) { return b.ate_rodada > estado.rodadaAtual; });
  if (!estado.baixas.length) return '<div class="dash-empty">Nenhuma baixa. ✅</div>';
  var html = '<div class="baixas-lista">';
  estado.baixas.forEach(function(b) {
    html += '<div class="baixa-item">';
    html += '<span class="posicao-badge pos-' + b.posicao + '">' + b.posicao + '</span>';
    html += '<div class="baixa-info"><div class="baixa-nome">' + b.nome + '</div>';
    html += '<div class="baixa-detalhe">' + (b.tipo === "machucado" ? "🏥 Machucado" : "🟨 Suspenso") + ' · retorna rod. ' + b.ate_rodada + '</div></div>';

// ── Modal de partida ──
function abrirModal(dadosStr) {
  var resultado = JSON.parse(decodeURIComponent(dadosStr));
  var mandante  = CLUBES.find(function(c) { return c.id === resultado.mandanteId; });
  var visitante = CLUBES.find(function(c) { return c.id === resultado.visitanteId; });
  var diff = resultado.golsMandante - resultado.golsVisitante;
  var cor  = diff > 0 ? "var(--green)" : diff < 0 ? "var(--red)" : "var(--yellow)";
  var fm   = resultado.forcaMandante;
  var fv   = resultado.forcaVisitante;

  var eventosHtml = '';
  if (resultado.eventos && resultado.eventos.length > 0) {
    resultado.eventos.forEach(function(e) {
      eventosHtml += '<div class="evento-item"><span class="evento-minuto">' + e.minuto + '\'</span><span>' + e.texto + '</span></div>';
    });
  } else {
    eventosHtml = '<p style="color:var(--text2);font-size:13px">Jogo sem gols.</p>';
  }

  var forcaHtml = '';
  if (fm) {
    forcaHtml = '<div style="display:flex;justify-content:space-around;padding:10px 20px;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border)">' +
      '<span>Força: <strong style="color:var(--text)">' + fm.forca + '</strong></span><span>vs</span>' +
      '<span>Força: <strong style="color:var(--text)">' + fv.forca + '</strong></span></div>';
  }

  var overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML =
    '<div class="modal">' +
      '<div class="modal-header">' +
        '<div style="font-size:12px;color:var(--text2);margin-bottom:6px">Resultado final</div>' +
        '<div class="modal-placar" style="color:' + cor + '">' + resultado.golsMandante + ' – ' + resultado.golsVisitante + '</div>' +
        '<div class="modal-times"><span>' + mandante.nome + '</span><span>' + visitante.nome + '</span></div>' +
      '</div>' +
      forcaHtml +
      '<div class="modal-eventos">' + eventosHtml + '</div>' +
      '<div class="modal-footer"><button class="btn-fechar" onclick="this.closest(\'.modal-overlay\').remove()">Fechar</button></div>' +
    '</div>';

  overlay.addEventListener("click", function(e) { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

// ── Helpers ──
function placarClasse(resultado, meuId) {
  if (resultado.mandanteId !== meuId && resultado.visitanteId !== meuId) return "";
  var euM  = resultado.mandanteId === meuId;
  var meus = euM ? resultado.golsMandante : resultado.golsVisitante;
  var deles= euM ? resultado.golsVisitante : resultado.golsMandante;
  return meus > deles ? "vitoria" : meus < deles ? "derrota" : "empate";
}

function overallClasse(v) {
  return v >= 80 ? "overall-alto" : v >= 70 ? "overall-medio" : "overall-baixo";
}

function bandeira(nac) {
  var flags = { BR:"🇧🇷", PT:"🇵🇹", AR:"🇦🇷", ES:"🇪🇸", IT:"🇮🇹", DE:"🇩🇪", FR:"🇫🇷", EN:"🏴󠁧󠁢󠁥󠁮󠁧󠁿" };
  return flags[nac] || "🌍";
}

  var janela  = janelaAberta(rodada);
  var meuClube = estado.meuClube;

  var html = '<p class="secao-titulo">Mercado de Transferências</p>';

  // Status da janela
  if (janela) {
    html += '<div class="janela-aberta">';
    html += '<span class="janela-icon">🟢</span>';
    html += '<div><strong>' + janela.nome + ' aberta</strong>';
    html += '<div style="font-size:12px;color:var(--text2)">Rodadas ' + janela.inicio + ' a ' + janela.fim + ' — fecha na rodada ' + janela.fim + '</div></div>';
    html += '</div>';
  } else {
    var proxima = JANELAS.find(function(j) { return j.inicio > rodada; });
    html += '<div class="janela-fechada">';
    html += '<span class="janela-icon">🔴</span>';
    html += '<div><strong>Mercado fechado</strong>';
    if (proxima) html += '<div style="font-size:12px;color:var(--text2)">Próxima janela: ' + proxima.nome + ' (rodada ' + proxima.inicio + ')</div>';
    html += '</div></div>';
  }

  // Budget do meu clube
  html += '<div class="budget-card">';
  html += '<div class="budget-label">Caixa disponível</div>';
  html += '<div class="budget-valor">' + formatarDinheiro(meuClube.budget) + '</div>';
  html += '</div>';

  if (janela) {
    // Abas internas: Buscar jogadores / Feed de noticias
    html += '<div class="mercado-tabs">';
    html += '<button class="mtab ativo" onclick="renderMercadoBusca()">🔍 Buscar jogadores</button>';
    html += '<button class="mtab" onclick="renderFeedNoticias()">📰 Transferências</button>';
    html += '</div>';
    html += '<div id="mercado-conteudo">';
    html += renderMercadoBuscaHTML();
    html += '</div>';
  } else {
    // Mercado fechado — só mostra feed
    html += '<div class="mercado-tabs">';
    html += '<button class="mtab ativo" onclick="renderFeedNoticias()">📰 Transferências recentes</button>';
    html += '</div>';
    html += '<div id="mercado-conteudo">';
    html += renderFeedNoticiasHTML();
    html += '</div>';
  }

  document.getElementById("main").innerHTML = html;
}

function renderMercadoBusca() {
  document.getElementById("mercado-conteudo").innerHTML = renderMercadoBuscaHTML();
  document.querySelectorAll(".mtab").forEach(function(b) { b.classList.remove("ativo"); });
  document.querySelectorAll(".mtab")[0].classList.add("ativo");
}

function renderFeedNoticias() {
  document.getElementById("mercado-conteudo").innerHTML = renderFeedNoticiasHTML();
  document.querySelectorAll(".mtab").forEach(function(b) { b.classList.remove("ativo"); });
  document.querySelectorAll(".mtab")[1].classList.add("ativo");
}

function renderMercadoBuscaHTML() {
  var meuClube = estado.meuClube;
  var todos = [];
  CLUBES.forEach(function(clube) {
    if (clube.id === meuClube.id) return;
    clube.jogadores.forEach(function(j) {
      todos.push({ jogador: j, clube: clube });
    });
  });

  // Ordenar por overall desc
  todos.sort(function(a, b) { return b.jogador.overall - a.jogador.overall; });

  var html = '<div class="mercado-filtros">';
  html += '<select id="filtro-pos" onchange="filtrarMercado()">';
  html += '<option value="">Todas as posições</option>';
  ["GOL","LD","ZAG","LE","VOL","MEI","ATA"].forEach(function(p) {
    html += '<option value="' + p + '">' + p + '</option>';
  });
  html += '</select>';
  html += '<select id="filtro-budget" onchange="filtrarMercado()">';
  html += '<option value="">Qualquer valor</option>';
  html += '<option value="5000000">Até R$ 5M</option>';
  html += '<option value="15000000">Até R$ 15M</option>';
  html += '<option value="30000000">Até R$ 30M</option>';
  html += '</select>';
  html += '</div>';

  html += '<div id="lista-mercado">';
  html += renderListaJogadoresMercado(todos);
  html += '</div>';
  return html;
}

function filtrarMercado() {
  var pos    = document.getElementById("filtro-pos").value;
  var budget = document.getElementById("filtro-budget").value;
  var meuClube = estado.meuClube;

  var todos = [];
  CLUBES.forEach(function(clube) {
    if (clube.id === meuClube.id) return;
    clube.jogadores.forEach(function(j) {
      if (pos && j.posicao !== pos) return;
      if (budget && j.valor_mercado > parseInt(budget)) return;
      todos.push({ jogador: j, clube: clube });
    });
  });
  todos.sort(function(a, b) { return b.jogador.overall - a.jogador.overall; });
  document.getElementById("lista-mercado").innerHTML = renderListaJogadoresMercado(todos);
}

function renderListaJogadoresMercado(lista) {
  if (lista.length === 0) return '<p style="color:var(--text2);padding:16px">Nenhum jogador encontrado.</p>';

  var html = '<div class="lista-jogadores-mercado">';
  lista.slice(0, 60).forEach(function(item) {
    var j = item.jogador;
    var c = item.clube;
    var fimContrato = j.contrato_termino <= estado.rodadaAtual + 6;
    var podeContratar = estado.meuClube.budget >= j.valor_mercado * 0.8;

    html += '<div class="item-mercado">';
    html += '<div class="mercado-info">';
    html += '<span class="posicao-badge pos-' + j.posicao + '">' + j.posicao + '</span>';
    html += '<div class="mercado-jogador">';
    html += '<div class="mercado-nome">' + j.nome;
    if (fimContrato) html += ' <span class="badge-contrato">Fim de contrato</span>';
    html += '</div>';
    html += '<div class="mercado-clube">' + c.nome + '</div>';
    html += '</div>';
    html += '</div>';
    html += '<div class="mercado-valores">';
    html += '<div class="mercado-overall ' + overallClasse(j.overall) + '">' + j.overall + '</div>';
    html += '<div class="mercado-vm">' + formatarDinheiro(j.valor_mercado) + '</div>';
    if (podeContratar || fimContrato) {
      html += '<button class="btn-proposta" onclick="abrirModalProposta(\'' + j.id + '\',\'' + c.id + '\')">Propor</button>';
    } else {
      html += '<span class="sem-budget">Sem budget</span>';
    }
    html += '</div>';
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function renderFeedNoticiasHTML() {
  var noticias = estado.feedNoticias || [];
  if (noticias.length === 0) {
    return '<p style="color:var(--text2);padding:20px 0;font-size:13px">Nenhuma transferência registrada ainda.</p>';
  }
  var html = '<div class="feed-noticias">';
  noticias.slice().reverse().forEach(function(n) {
    html += '<div class="noticia-item">';
    html += '<span class="noticia-icon">⚽</span>';
    html += '<span class="noticia-texto">' + n.texto + '</span>';
    if (n.rodada !== undefined) html += '<span class="noticia-rodada">Rod. ' + (n.rodada + 1) + '</span>';
    html += '</div>';
  });
  html += '</div>';
  return html;
}

// ── Modal de proposta ──
function abrirModalProposta(jogadorId, clubeId) {
  var clube   = CLUBES.find(function(c) { return c.id === clubeId; });
  var jogador = clube.jogadores.find(function(j) { return j.id === jogadorId; });
  var fimContrato = jogador.contrato_termino <= estado.rodadaAtual + 6;

  var overlay = document.createElement("div");
  overlay.className = "modal-overlay";

  var html = '<div class="modal">';
  html += '<div class="modal-header" style="text-align:left;padding:20px">';
  html += '<div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Proposta de transferência</div>';
  html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">';
  html += '<span class="posicao-badge pos-' + jogador.posicao + '">' + jogador.posicao + '</span>';
  html += '<div><div style="font-size:16px;font-weight:600">' + jogador.nome + '</div>';
  html += '<div style="font-size:12px;color:var(--text2)">' + clube.nome + '</div></div>';
  html += '<div class="overall-grande ' + overallClasse(jogador.overall) + '" style="margin-left:auto">' + jogador.overall + '</div>';
  html += '</div>';

  html += '<div class="proposta-info">';
  html += '<div class="tstat"><span class="tstat-label">Valor de mercado</span><span class="tstat-val">' + formatarDinheiro(jogador.valor_mercado) + '</span></div>';
  html += '<div class="tstat"><span class="tstat-label">Cláusula rescisória</span><span class="tstat-val">' + formatarDinheiro(jogador.clausula_rescisoria) + '</span></div>';
  html += '<div class="tstat"><span class="tstat-label">Salário mensal</span><span class="tstat-val">' + formatarDinheiro(jogador.salario) + '</span></div>';
  html += '<div class="tstat"><span class="tstat-label">Contrato até rodada</span><span class="tstat-val">' + jogador.contrato_termino;
  if (fimContrato) html += ' <span class="badge-contrato">Em breve</span>';
  html += '</span></div>';
  html += '</div>';

  if (fimContrato) {
    html += '<div class="proposta-aviso">Contrato prestes a vencer — você pode contratar por um valor menor.</div>';
  }

  html += '<div class="form-group" style="margin-top:16px">';
  html += '<label>Sua proposta</label>';
  html += '<input type="number" id="inp-proposta" placeholder="Ex: 8000000" min="0" step="500000" value="' + jogador.valor_mercado + '" />';
  html += '</div>';
  html += '<div style="font-size:11px;color:var(--text2);margin-top:4px">Seu caixa: ' + formatarDinheiro(estado.meuClube.budget) + '</div>';
  html += '</div>';

  html += '<div class="modal-footer" style="display:flex;gap:8px">';
  html += '<button class="btn-fechar" style="flex:1" onclick="this.closest(\'.modal-overlay\').remove()">Cancelar</button>';
  html += '<button class="btn-primario" style="flex:1" onclick="enviarProposta(\'' + jogadorId + '\',\'' + clubeId + '\')">Enviar proposta</button>';
  html += '</div></div>';

  overlay.innerHTML = html;
  overlay.addEventListener("click", function(e) { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

function enviarProposta(jogadorId, clubeId) {
  var clube   = CLUBES.find(function(c) { return c.id === clubeId; });
  var jogador = clube.jogadores.find(function(j) { return j.id === jogadorId; });
  var valor   = parseInt(document.getElementById("inp-proposta").value);

  if (!valor || valor <= 0) { alert("Digite um valor válido."); return; }
  if (valor > estado.meuClube.budget) { alert("Você não tem budget suficiente!"); return; }

  var result = avaliarProposta(jogador, clube, valor);

  document.querySelector(".modal-overlay").remove();

  if (result.aceita) {
    executarTransferencia(jogador, clube, estado.meuClube, valor);
    if (!estado.feedNoticias) estado.feedNoticias = [];
    estado.feedNoticias.push({
      rodada: estado.rodadaAtual,
      texto: "✅ " + jogador.nome + " (" + jogador.overall + ") chegou ao " + estado.meuClube.nome + " vindo do " + clube.nome + " por " + formatarDinheiro(valor)
    });
    mostrarResultadoProposta(true, result.motivo, jogador.nome);
  } else {
    if (!estado.feedNoticias) estado.feedNoticias = [];
    estado.feedNoticias.push({
      rodada: estado.rodadaAtual,
      texto: "❌ " + estado.meuClube.nome + " teve proposta recusada pelo " + clube.nome + " por " + jogador.nome
    });
    mostrarResultadoProposta(false, result.motivo, jogador.nome);
  }
}

function mostrarResultadoProposta(aceita, motivo, nomeJogador) {
  var overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  var cor  = aceita ? "var(--green)" : "var(--red)";
  var icon = aceita ? "✅" : "❌";
  var titulo = aceita ? "Transferência concluída!" : "Proposta recusada";

  overlay.innerHTML =
    '<div class="modal">' +
      '<div class="modal-header" style="text-align:center;padding:28px 20px">' +
        '<div style="font-size:36px;margin-bottom:8px">' + icon + '</div>' +
        '<div style="font-size:18px;font-weight:700;color:' + cor + ';margin-bottom:6px">' + titulo + '</div>' +
        '<div style="font-size:13px;color:var(--text2)">' + motivo + '</div>' +
        (aceita ? '<div style="font-size:13px;margin-top:8px">' + nomeJogador + ' agora é do seu clube!</div>' : '') +
      '</div>' +
      '<div class="modal-footer">' +
        '<button class="btn-fechar" onclick="this.closest(\'.modal-overlay\').remove();navegarPara(\'mercado\')">OK</button>' +
      '</div>' +
    '</div>';

  overlay.addEventListener("click", function(e) { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

// ── Processar mercado da IA ao simular rodada ──
function processarMercadoRodada(rodadaIdx) {
  if (!estado.feedNoticias) estado.feedNoticias = [];
  var janela = janelaAberta(rodadaIdx);
  if (!janela) return;

  // IA faz transferências entre si
  var noticias = simularMercadoIA();
  noticias.forEach(function(n) {
    n.rodada = rodadaIdx;
    estado.feedNoticias.push(n);
  });

  // Receita de bilheteria
  processarReceitaRodada(rodadaIdx);
}</script>
