function clubesPaulista(div) {
  if(div==="b1") return GRUPOS_BEZINHA.reduce(function(acc,g){return acc.concat(g.clubes);}, []);
  return estadoPaulista[div].clubes||[];
}

function clubePaulistaPorId(id) {
  var divs=["a1","a2","a3","a4"];
  for(var i=0;i<divs.length;i++){
    var c=(estadoPaulista[divs[i]].clubes||[]).find(function(x){return x.id===id;});
    if(c) return c;
  }
  for(var j=0;j<GRUPOS_BEZINHA.length;j++){
    var c2=GRUPOS_BEZINHA[j].clubes.find(function(x){return x.id===id;});
    if(c2) return c2;
  }
  return null;
}

// ── Simular jogos por evento ──
function simularEventoPaulista(rodadaIdx) {
  var meuId = estado.meuClube.id;

  ["a1","a2","a3","a4"].forEach(function(div){
    var est=estadoPaulista[div];
    if(!est.clubes) return;

    if(est.faseAtual==="grupos"){
      // Simular jogos de grupo (todos os clubes jogam 1 partida por evento)
      var numPorEvento = Math.ceil(est.clubes.length / 2); // 1 rodada completa
      var pendentes=est.jogos.filter(function(j){return j.fase==="grupos"&&!j.ok;}).slice(0, numPorEvento);
      pendentes.forEach(function(jogo){
        var r=simularJPaulista(jogo.mId,jogo.vId,est.clubes);
        jogo.gM=r.gM; jogo.gV=r.gV; jogo.ok=true;
        var ehMeu=jogo.mId===meuId||jogo.vId===meuId;
        if(ehMeu){
          var m=est.clubes.find(function(c){return c.id===jogo.mId;});
          var v=est.clubes.find(function(c){return c.id===jogo.vId;});
          adicionarNoticia("🏅 Paulistão "+div.toUpperCase()+" · "+(m?m.nome:"?")+' '+r.gM+"x"+r.gV+" "+(v?v.nome:"?"), rodadaIdx);
        }
      });
      // Verificar se grupos terminaram → gerar mata-mata
      var restantes=est.jogos.filter(function(j){return j.fase==="grupos"&&!j.ok;});
      if(restantes.length===0) gerarMataMata(div);
    } else {
      // Simular 1 jogo de mata-mata por evento
      var pend=est.jogos.find(function(j){return j.fase!=="grupos"&&!j.ok;});
      if(pend){
        var r=simularJPaulista(pend.mId,pend.vId,est.clubes);
        pend.gM=r.gM; pend.gV=r.gV; pend.ok=true;
        verificarFasePaulista(div);
      }
    }
  });

  // Bezinha — simular 3 jogos por grupo por evento (rodada completa de grupo de 6)
  // Grupo de 6 times: rodada completa = 3 jogos simultâneos
  if(estadoPaulista.b1.faseAtual==="grupos"){
    var todosB1=GRUPOS_BEZINHA.reduce(function(a,gr){return a.concat(gr.clubes);}, []);
    GRUPOS_BEZINHA.forEach(function(g){
      // Encontrar a próxima rodada pendente deste grupo
      var pendentes = estadoPaulista.b1.jogos.filter(function(j){
        return j.grupo===g.letra && j.fase==="grupos" && !j.ok;
      });
      if (pendentes.length === 0) return;
      // Pegar a rodada com número menor (próxima rodada)
      var proxRodada = pendentes[0].rodada;
      var jogosRodada = pendentes.filter(function(j){ return j.rodada===proxRodada; });
      // Se não tem campo rodada (saves antigos), simular 3
      if (jogosRodada.length === 0) jogosRodada = pendentes.slice(0, 3);
      jogosRodada.forEach(function(pend){
        var r=simularJPaulista(pend.mId,pend.vId,todosB1);
        pend.gM=r.gM; pend.gV=r.gV; pend.ok=true;
      });
    });
    var restB=estadoPaulista.b1.jogos.filter(function(j){return j.fase==="grupos"&&!j.ok;});
    if(restB.length===0) gerarMataMataB1();
  } else {
    // Mata-mata: simular todos os jogos pendentes da fase atual
    var todos=GRUPOS_BEZINHA.reduce(function(a,g){return a.concat(g.clubes);}, []);
    var faseAtualB1 = estadoPaulista.b1.faseAtual || "oitavas";
    var pendentesB1=estadoPaulista.b1.jogos.filter(function(j){return j.fase===faseAtualB1&&!j.ok;});
    pendentesB1.forEach(function(pendB){
      var r=simularJPaulista(pendB.mId,pendB.vId,todos);
      pendB.gM=r.gM; pendB.gV=r.gV; pendB.ok=true;
    });
    if(pendentesB1.length>0) verificarFaseB1();
  }

  // Copa Paulista
  var pendCopa=estadoPaulista.copa.jogos.find(function(j){return !j.ok;});
  if(pendCopa && rodadaIdx>=15){
    var m=estadoPaulista.copa.clubes.find(function(c){return c.id===pendCopa.mId;});
    var v=estadoPaulista.copa.clubes.find(function(c){return c.id===pendCopa.vId;});
    if(m&&v){
      var r=simularJPaulista(pendCopa.mId,pendCopa.vId,estadoPaulista.copa.clubes);
      pendCopa.gM=r.gM; pendCopa.gV=r.gV; pendCopa.ok=true;
      verificarFaseCopa();
    }
  }
}

// ── Gerar mata-mata após fase de grupos ──
// A1/A3/A4: top 8 → quartas → semi → final (mata-mata simples)
// A2: top 8 → 2 grupos de 4 (turno+returno) → semi → final
function gerarMataMata(div) {
  var est=estadoPaulista[div];
  var ids=est.clubes.map(function(c){return c.id;});
  var pts=calcPts(est.jogos,ids);
  var ranked=rankear(ids,pts);
  var top8=ranked.slice(0,8);
  est.rebaixados=ranked.slice(14);
  est.mataMataClubes=top8;

  if(div==="a2"){
    // 2 grupos de 4: turno+returno
    var g1=top8.slice(0,4), g2=top8.slice(4,8);
    [g1,g2].forEach(function(g){
      for(var i=0;i<g.length;i++){
        for(var j=i+1;j<g.length;j++){
          est.jogos.push({div:div,fase:"semifase",mId:g[i],vId:g[j],gM:null,gV:null,ok:false});
          est.jogos.push({div:div,fase:"semifase",mId:g[j],vId:g[i],gM:null,gV:null,ok:false});
        }
      }
    });
    est.faseAtual="semifase";
  } else {
    // quartas: 1x8, 2x7, 3x6, 4x5 (jogo único)
    var pares=[[0,7],[1,6],[2,5],[3,4]];
    pares.forEach(function(p){
      est.jogos.push({div:div,fase:"quartas",mId:top8[p[0]],vId:top8[p[1]],gM:null,gV:null,ok:false});
    });
    est.faseAtual="quartas";
  }
  adicionarNoticia("🏅 Paulistão "+div.toUpperCase()+": mata-mata definido!", estado.rodadaAtual);
}

function verificarFasePaulista(div) {
  var est=estadoPaulista[div];

  if(div==="a2" && est.faseAtual==="semifase"){
    var pendentes=est.jogos.filter(function(j){return j.fase==="semifase"&&!j.ok;});
    if(pendentes.length===0){
      // Calcular top 2 de cada grupo (4 times total)
      var g1=est.mataMataClubes.slice(0,4), g2=est.mataMataClubes.slice(4,8);
      var pts1=calcPts(est.jogos.filter(function(j){return j.fase==="semifase"&&(g1.indexOf(j.mId)>=0);}), g1);
      var pts2=calcPts(est.jogos.filter(function(j){return j.fase==="semifase"&&(g2.indexOf(j.mId)>=0);}), g2);
      var top1=rankear(g1,pts1).slice(0,2);
      var top2=rankear(g2,pts2).slice(0,2);
      // Semi: 1G1 x 2G2, 2G1 x 1G2
      est.jogos.push({div:div,fase:"semi",mId:top1[0],vId:top2[1],gM:null,gV:null,ok:false});
      est.jogos.push({div:div,fase:"semi",mId:top2[0],vId:top1[1],gM:null,gV:null,ok:false});
      est.faseAtual="semi";
    }
    return;
  }

  var faseMap={quartas:"semi",semi:"final"};
  var fase=est.faseAtual;
  var jogFase=est.jogos.filter(function(j){return j.fase===fase&&!j.ok;});
  if(jogFase.length>0) return;

  var vencedores=est.jogos.filter(function(j){return j.fase===fase&&j.ok;}).map(function(j){
    if(j.gM>j.gV) return j.mId;
    if(j.gM<j.gV) return j.vId;
    return Math.random()>0.5?j.mId:j.vId; // pênaltis
  });

  if(fase==="final"){
    est.campeao=vencedores[0];
    var camp=est.clubes.find(function(c){return c.id===vencedores[0];});
    adicionarNoticia("🏅 "+(camp?camp.nome:"?")+" CAMPEÃO do Paulistão "+div.toUpperCase()+"!", estado.rodadaAtual);
    if(est.campeao===estado.meuClube.id){
      estado.manager.titulos=(estado.manager.titulos||0)+1;
      estado.inbox.push({id:"titulo_paul_"+div+"_"+Date.now(),titulo:"🏅 CAMPEÃO DO PAULISTÃO "+div.toUpperCase()+"!",remetente:"FPF",texto:"Parabéns! Título paulista conquistado!",lida:false});
    }
    est.faseAtual="fim";
    return;
  }

  var proxFase=faseMap[fase];
  est.faseAtual=proxFase;
  if(proxFase==="semi"){
    est.jogos.push({div:div,fase:"semi",mId:vencedores[0],vId:vencedores[3],gM:null,gV:null,ok:false});
    est.jogos.push({div:div,fase:"semi",mId:vencedores[1],vId:vencedores[2],gM:null,gV:null,ok:false});
  } else if(proxFase==="final"){
    est.jogos.push({div:div,fase:"final",mId:vencedores[0],vId:vencedores[1],gM:null,gV:null,ok:false});
  }
}

// ── Promoção/Rebaixamento ao fim da temporada ──
function processarPromocaoRebaixamentoPaulista() {
  var niveis=["a1","a2","a3","a4"];
  for(var i=0;i<niveis.length;i++){
    var divAtual=niveis[i], divAbaixo=niveis[i+1];
    var est=estadoPaulista[divAtual];
    if(!est.clubes||est.clubes.length<2) continue;

    // Campeão
    if(!est.campeao){
      var camp=est.clubes[0];
      adicionarNoticia("🏅 Temporada do Paulistão "+divAtual.toUpperCase()+" encerrada.", estado.rodadaAtual);
    }

    if(!divAbaixo) continue;
    var estAbaixo=estadoPaulista[divAbaixo];
    if(!estAbaixo) continue;

    // Promovidos (top 2 do abaixo sobem) e rebaixados (últimos 2 do atual descem)
    var idsAtual=est.clubes.map(function(c){return c.id;});
    var ptsAtual=calcPts(est.jogos.filter(function(j){return j.fase==="grupos";}),idsAtual);
    var rankAtual=rankear(idsAtual,ptsAtual);
    var rebaixadosAtual=rankAtual.slice(-2);

    rebaixadosAtual.forEach(function(id){
      var clube=est.clubes.find(function(c){return c.id===id;});
      if(clube){
        clube.divisao_paulista=divAbaixo;
        if(estAbaixo.clubes) estAbaixo.clubes.push(clube);
        est.clubes=est.clubes.filter(function(c){return c.id!==id;});
        adicionarNoticia("⬇ "+clube.nome+" rebaixado para o Paulistão "+divAbaixo.toUpperCase(), estado.rodadaAtual);
      }
    });

    if(estAbaixo.clubes && estAbaixo.clubes.length>=2){
      var idsAbaixo=estAbaixo.clubes.map(function(c){return c.id;});
      var ptsAbaixo=calcPts(estAbaixo.jogos.filter(function(j){return j.fase==="grupos";}),idsAbaixo);
      var rankAbaixo=rankear(idsAbaixo,ptsAbaixo);
      var promovidos=rankAbaixo.slice(0,2);
      promovidos.forEach(function(id){
        var clube=estAbaixo.clubes.find(function(c){return c.id===id;});
        if(clube){
          clube.divisao_paulista=divAtual;
          est.clubes.push(clube);
          estAbaixo.clubes=estAbaixo.clubes.filter(function(c){return c.id!==id;});
          adicionarNoticia("⬆ "+clube.nome+" promovido para o Paulistão "+divAtual.toUpperCase(), estado.rodadaAtual);
        }
      });
    }

    // Reset para nova temporada
    est.jogos=[]; est.faseAtual="grupos"; est.campeao=null;
    if(est.clubes.length>=2) est.jogos=gerarJogosGrupo(est.clubes,divAtual);
    if(estAbaixo.clubes && estAbaixo.clubes.length>=2){
      estAbaixo.jogos=gerarJogosGrupo(estAbaixo.clubes,divAbaixo);
      estAbaixo.faseAtual="grupos"; estAbaixo.campeao=null;
    }
  }
}

// Calcular valor de um clube paulista para tela de seleção
function valorClubePaulista(clube) {
  var bases={a1:12000000,a2:3500000,a3:800000,a4:200000,b1:50000};
  var div=clube.divisao_paulista||"a4";
  var base=bases[div]||200000;
  var mediaOvr=clube.jogadores?clube.jogadores.reduce(function(s,j){return s+j.overall;},0)/clube.jogadores.length:55;
  return Math.round(base*(0.7+(mediaOvr-50)/60));
}

// CALENDÁRIO PARA TIMES PAULISTAS
// Gera eventos de jogo baseados nos jogos do Paulistão
// ════════════════════════════════════════
function gerarCalendarioPaulista(div) {
  // Garantir que paulista foi inicializado
  if (!estadoPaulista.a1.clubes && !estadoPaulista.b1.jogos.length) inicializarPaulista();
  var est = div === "b1" ? estadoPaulista.b1 : estadoPaulista[div];
  if (!est) return gerarCalendario(CLUBES); // fallback

  // Montar um calendário de rodadas sintético
  // cada "rodada" tem 1 jogo do meu clube + jogos dos outros
  var meuId = estado.meuClube ? estado.meuClube.id : null;
  var todosClubes = div === "b1"
    ? GRUPOS_BEZINHA.reduce(function(a,g){return a.concat(g.clubes);}, [])
    : (estadoPaulista[div].clubes || []);

  // Agrupar jogos por "rodada virtual" — meus jogos primeiro
  var meusJogos = est.jogos.filter(function(j){
    return j.mId === meuId || j.vId === meuId;
  });
  var outrosJogos = est.jogos.filter(function(j){
    return j.mId !== meuId && j.vId !== meuId;
  });

  var rodadas = [];
  var maxRod = Math.max(meusJogos.length, Math.ceil(outrosJogos.length / Math.max(todosClubes.length/2 - 1, 1)));

  for (var i = 0; i < Math.max(meusJogos.length, 20); i++) {
    var jogosRodada = [];

    // Meu jogo desta rodada
    if (meusJogos[i]) {
      jogosRodada.push({ mandanteId: meusJogos[i].mId, visitanteId: meusJogos[i].vId, _paulistaIdx: i });
    }

    // Alguns jogos dos outros (para simular junto)
    var porRodada = Math.floor(outrosJogos.length / Math.max(meusJogos.length, 1));
    var inicio = i * porRodada;
    var fim = Math.min(inicio + porRodada, outrosJogos.length);
    for (var j = inicio; j < fim; j++) {
      jogosRodada.push({ mandanteId: outrosJogos[j].mId, visitanteId: outrosJogos[j].vId, _paulistaIdx: null });
    }

    rodadas.push({ numero: i + 1, jogos: jogosRodada, _div: div, _paulista: true });
  }

  return rodadas;
}

// ── Tela de jogo para times paulistas ──
function renderTelaJogoPaulista(rodadaIdx, div) {
  var est = div === "b1" ? estadoPaulista.b1 : estadoPaulista[div];
  var meuId = estado.meuClube.id;
  var todosClubes = div === "b1"
    ? GRUPOS_BEZINHA.reduce(function(a,g){return a.concat(g.clubes);}, [])
    : (estadoPaulista[div] ? estadoPaulista[div].clubes || [] : []);

  // Achar próximo jogo do meu clube não simulado
  var meuJogo = est ? est.jogos.find(function(j){
    return (j.mId===meuId||j.vId===meuId) && !j.ok;
  }) : null;

  if (!meuJogo) {
    // Sem mais jogos — simular evento e voltar ao dashboard
    simularEventoPaulista(rodadaIdx);
    estado.rodadaAtual++;
    renderDashboard();
    return;
  }

  // Garantir que os clubes estão no calendário correto
  if (!estado.calendario[rodadaIdx]) {
    estado.calendario[rodadaIdx] = { numero: rodadaIdx+1, jogos: [] };
  }
  // Atualizar jogo desta rodada no calendário
  estado.calendario[rodadaIdx].jogos = [{ mandanteId: meuJogo.mId, visitanteId: meuJogo.vId }];

  // Adicionar clubes paulistas temporariamente ao CLUBES global
  // para que renderTelaJogo os encontre
  todosClubes.forEach(function(c){
    if (!CLUBES.find(function(x){return x.id===c.id;})) CLUBES.push(c);
  });

  estado._jogoAtivoPaulista = { jogo: meuJogo, div: div, rodadaIdx: rodadaIdx };
  renderTelaJogo(rodadaIdx);
}

// Finalizar jogo paulista após tela ao vivo
var _origFinalizarPartida = null;
function hookFinalizarPartidaPaulista() {
  if (!estado._jogoAtivoPaulista) return false;
  var info = estado._jogoAtivoPaulista;
  var jogo = info.jogo;
  var div  = info.div;
  var est  = div==="b1"?estadoPaulista.b1:estadoPaulista[div];

  // Marcar jogo como simulado com resultado real
  jogo.gM  = jogoAtivo ? jogoAtivo.resultado.golsMandante : 0;
  jogo.gV  = jogoAtivo ? jogoAtivo.resultado.golsVisitante : 0;
  jogo.ok  = true;

  estado._jogoAtivoPaulista = null;
  simularEventoPaulista(info.rodadaIdx);
  return true;
}

    html += '<div class="inf-card-desc">' + item.desc + '</div>';
    html += '<div class="inf-nivel">';
    for (var i=1; i<=5; i++) {
      html += '<div class="inf-nivel-pip' + (i<=item.nivel?" ativo":"") + '"></div>';
    }
    html += '</div>';
    html += '<div class="inf-label-nivel">' + labelNivel(item.nivel) + ' · ' + item.efeito + '</div>';
    html += '</div>';
    html += '<div class="inf-card-acao">';
    if (maxNivel) {
      html += '<div class="inf-max">✅ Máximo</div>';
    } else {
      html += '<div class="inf-custo">' + formatarDinheiro(custo) + '</div>';
      html += '<button class="btn-primario inf-btn" ' + (podeMelhorar?'':'disabled') + ' onclick="melhorarInfraestrutura(\'' + item.key + '\',' + custo + ')">' + (podeMelhorar ? '⬆ Melhorar' : 'Sem budget') + '</button>';
    }
    html += '</div>';
    html += '</div>';
  });
  html += '</div>';
  html += '</div>';
  document.getElementById("main").innerHTML = html;
}

function melhorarInfraestrutura(key, custo) {
  var clube = estado.meuClube;
  if (clube.budget < custo) { alert("Budget insuficiente!"); return; }
  if (!confirm("Investir " + formatarDinheiro(custo) + " em infraestrutura?")) return;
  clube.budget -= custo;
  clube[key] = (clube[key] || 1) + 1;
  adicionarNoticia("🏗 " + clube.nome + " melhorou a infraestrutura do clube.", estado.rodadaAtual);
  salvarJogo();
  renderInfraestrutura();
}

<script>
// ════════════════════════════════════════
// DASHBOARD

// Busca clube em todas as fontes disponíveis
function buscarClubePorId(id) {
  var c = CLUBES.find(function(x){return x.id===id;});
  if (c) return c;
  if (estadoDivisoes.b.clubes) { c = estadoDivisoes.b.clubes.find(function(x){return x.id===id;}); if(c) return c; }
  if (estadoDivisoes.c.clubes) { c = estadoDivisoes.c.clubes.find(function(x){return x.id===id;}); if(c) return c; }
  if (estadoDivisoes.d.clubes) { c = estadoDivisoes.d.clubes.find(function(x){return x.id===id;}); if(c) return c; }
  // Paulistão divisões
  var divsPaul = ["a1","a2","a3","a4"];
  for (var i=0;i<divsPaul.length;i++) {
    var est = estadoPaulista[divsPaul[i]];
    if (est && est.clubes) { c = est.clubes.find(function(x){return x.id===id;}); if(c) return c; }
  }
  // Bezinha grupos
  for (var g=0;g<GRUPOS_BEZINHA.length;g++) {
    c = GRUPOS_BEZINHA[g].clubes.find(function(x){return x.id===id;});
    if (c) return c;
  }
  return { sigla:"?", nome:"Desconhecido", cor:"#555" };
}

function renderDashboard() {
  var evento  = estado.eventos[estado.eventoAtual];
  var total   = estado.eventos.length;

  var naoLidas = contarNaoLidas();

  html += '<div class="dash-grid-top2">';

  html += '<div class="dash-card"><div class="dash-card-titulo">📊 Classificação</div>' + renderMiniTabela() + '</div>';
  html += '<div class="dash-card"><div class="dash-card-titulo">📰 Notícias</div>' + renderNoticias() + '</div>';

  // Linha 3: Baixas largura total
  html += '<div class="dash-card-full-row">';

// ── Calendário visual (estilo da imagem) ──
function renderCalendarioVisual() {
  var meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  var mes   = calView.mes;
  var ano   = calView.ano;
  var evAtual = estado.eventos[estado.eventoAtual];

  // Mapear eventos do mês atual
  var eventosPorDia = {};
  estado.eventos.forEach(function(ev) {
    if (!ev.data) return;
    var d = new Date(ev.data);
    if (d.getMonth() === mes && d.getFullYear() === ano) {
      var dia = d.getDate();
      if (!eventosPorDia[dia]) eventosPorDia[dia] = [];
      eventosPorDia[dia].push(ev);
    }
  });

  var html = '<div class="cal-visual">';

  // Header do mês
  html += '<div class="cal-mes-header">';
  html += '<button class="cal-mes-btn" onclick="mudarMes(-1)">‹</button>';
  html += '<span class="cal-mes-nome">' + meses[mes] + ' ' + ano + '</span>';
  html += '<button class="cal-mes-btn" onclick="mudarMes(1)">›</button>';
  html += '</div>';

  // Dias da semana
  html += '<div class="cal-dias-semana">';
  ["D","S","T","Q","Q","S","S"].forEach(function(d) {
    html += '<span>' + d + '</span>';
  });
  html += '</div>';

  // Grid dos dias
  html += '<div class="cal-grid">';
  var primeiroDia = new Date(ano, mes, 1).getDay();
  var ultimoDia   = new Date(ano, mes + 1, 0).getDate();

  // Células vazias antes do dia 1
  for (var i = 0; i < primeiroDia; i++) {
    html += '<div class="cal-dia vazio"></div>';
  }

  // Dias do mês
  for (var dia = 1; dia <= ultimoDia; dia++) {
    var evsDia  = eventosPorDia[dia] || [];
    var ehHoje  = evAtual && evAtual.data &&
                  new Date(evAtual.data).getDate() === dia &&
                  new Date(evAtual.data).getMonth() === mes;
    var temEv   = evsDia.length > 0;
    var cls     = "cal-dia" + (ehHoje ? " cal-dia-atual" : "") + (temEv ? " tem-evento" : "");
    var icons   = evsDia.map(function(e) {
      return '<span class="cal-ev-dot" style="background:' + corEvento(e.tipo) + '"></span>';
    }).join("");

    html += '<div class="' + cls + '">';
    html += '<span class="cal-dia-num">' + dia + '</span>';
    if (icons) html += '<div class="cal-dots">' + icons + '</div>';
    html += '</div>';
  }

  html += '</div>'; // cal-grid

  // Legenda
  html += '<div class="cal-legenda">';
  html += '<span><span class="cal-ev-dot" style="background:#4f8ef7"></span> Jogo</span>';
  html += '<span><span class="cal-ev-dot" style="background:#2ecc71"></span> Janela</span>';
  html += '<span><span class="cal-ev-dot" style="background:#e74c3c"></span> Contrato</span>';
  html += '</div>';

  html += '</div>'; // cal-visual
  return html;
}

function corEvento(tipo) {
  var cores = {
    jogo: "#4f8ef7",
    janela_abre: "#2ecc71",
    janela_fecha: "#e74c3c",
    fim_contrato: "#e74c3c",
    mensagem: "#f1c40f",
    noticia: "#9b59b6"
  };
  return cores[tipo] || "#888";
}

function mudarMes(delta) {
  calView.mes += delta;
  if (calView.mes < 0)  { calView.mes = 11; calView.ano--; }
  if (calView.mes > 11) { calView.mes = 0;  calView.ano++; }
  renderDashboard();
}

function irParaEventoDia(dia, mes, ano) {
  var alvo = estado.eventos.findIndex(function(ev) {
    if (!ev.data) return false;
    var d = new Date(ev.data);
    return d.getDate() === dia && d.getMonth() === mes && d.getFullYear() === ano;
  });
  if (alvo < 0) return;
  irParaEvento(alvo);
}

function irParaEvento(idx) {
  while (estado.eventoAtual < idx) {
    estado.eventoAtual++;
    processarEvento(estado.eventos[estado.eventoAtual]);
  }
  var ev = estado.eventos[estado.eventoAtual];
  atualizarCalView(ev);
  if (ev.tipo === TIPO_EVENTO.JOGO) {
    renderTelaJogo(ev.rodada);
  } else {
    renderDashboard();
  }
}


// ── Próximos eventos ──
function renderProximosEventos() {
  var atual  = estado.eventoAtual;
  var eventos = estado.eventos;
  var proximos = [];

  for (var i = atual + 1; i < eventos.length && proximos.length < 5; i++) {
    proximos.push({ ev: eventos[i], idx: i });
  }

  if (proximos.length === 0) {
    return '<div class="dash-empty">Nenhum evento próximo.</div>';
  }

  var html = '<div class="proximos-eventos">';
  proximos.forEach(function(item) {
    var ev  = item.ev;
    var cor = corEvento(ev.tipo);
    html += '<div class="proximo-ev-item" onclick="irParaEvento(' + item.idx + ')">';
    html += '<div class="proximo-ev-icone" style="background:' + cor + '22;border:1px solid ' + cor + '44">' + ev.icone + '</div>';
    html += '<div class="proximo-ev-info">';
    html += '<div class="proximo-ev-titulo">' + ev.titulo + '</div>';
    html += '<div class="proximo-ev-data">' + (ev.subtitulo || '') + '</div>';
    html += '</div>';
    html += '</div>';
  });
  html += '</div>';
  return html;
}

// ── Inbox preview ──
function contarNaoLidas() {
  return (estado.inbox || []).filter(function(m) { return !m.lida; }).length;
}

function renderInboxPreview() {
  var inbox = (estado.inbox || []).slice().reverse();
  if (inbox.length === 0) return '<div class="dash-empty">Nenhuma mensagem ainda.</div>';
  var html = '<div class="inbox-lista">';
  inbox.slice(0, 5).forEach(function(msg, i) {
    var idx = (estado.inbox.length - 1) - i;
    html += '<div class="inbox-item ' + (msg.lida ? '' : 'nao-lida') + '" onclick="abrirMensagem(' + idx + ')">';
    html += '<div class="inbox-remetente">' + (msg.remetente || 'Sistema') + '</div>';
    html += '<div class="inbox-assunto">' + msg.titulo + '</div>';
    html += '</div>';
  });
  html += '</div>';
  if (inbox.length > 5) html += '<div class="dash-ver-mais" onclick="navegarPara(\'inbox\')">Ver todas (' + inbox.length + ')</div>';
  return html;
}

function abrirMensagem(idx) {
  var msg = estado.inbox[idx];
  if (!msg) return;
  msg.lida = true;
  var overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML =
    '<div class="modal"><div class="modal-header" style="text-align:left;padding:20px">' +
    '<div style="font-size:11px;color:var(--text2);margin-bottom:4px">De: ' + (msg.remetente || 'Sistema') + '</div>' +
    '<div style="font-size:16px;font-weight:600;margin-bottom:12px">' + msg.titulo + '</div>' +
    '<div style="font-size:14px;line-height:1.6;color:var(--text2)">' + msg.texto + '</div>' +
    '</div><div class="modal-footer">' +
    '<button class="btn-fechar" onclick="this.closest(\'.modal-overlay\').remove();renderDashboard()">Fechar</button>' +
    '</div></div>';
  overlay.addEventListener("click", function(e) { if (e.target === overlay) { overlay.remove(); renderDashboard(); }});
  document.body.appendChild(overlay);
}

// ── Jogos card ──
function renderJogosCard() {
  var meuId  = estado.meuClube.id;
  var cal    = estado.calendario;
  var meusJogos = [];
  cal.forEach(function(rodada, idx) {
    rodada.jogos.forEach(function(jogo) {
      if (jogo.mandanteId === meuId || jogo.visitanteId === meuId) {
        meusJogos.push({ rodadaIdx: idx, rodadaNum: rodada.numero, jogo: jogo });
      }
    });
  });

  var passados = meusJogos.filter(function(j) { return j.rodadaIdx < estado.rodadaAtual; }).slice(-3);
  var futuros  = meusJogos.filter(function(j) { return j.rodadaIdx >= estado.rodadaAtual; }).slice(0, 3);

  var html = '<div class="jogos-lista">';
  if (passados.length > 0) {
    html += '<div class="jogos-secao-titulo">Últimos jogos</div>';
    passados.forEach(function(item) {
      var res = estado.resultados.find(function(r) {
        return r.rodada === item.rodadaIdx && r.mandanteId === item.jogo.mandanteId && r.visitanteId === item.jogo.visitanteId;
      });
      var advId = item.jogo.mandanteId === meuId ? item.jogo.visitanteId : item.jogo.mandanteId;
      var adv = buscarClubePorId(advId) || {nome:"?", sigla:"?", cor:"#555"};
      var euM = item.jogo.mandanteId === meuId;
      html += '<div class="jogo-item">';
      html += '<span class="jogo-rodada">R' + item.rodadaNum + '</span>';
      html += '<span class="jogo-mando">' + (euM ? 'C' : 'F') + '</span>';
      html += '<span class="jogo-adv">' + adv.nome + '</span>';
      if (res) {
        var mg = euM ? res.golsMandante : res.golsVisitante;
        var dg = euM ? res.golsVisitante : res.golsMandante;
        html += '<span class="jogo-resultado ' + (mg > dg ? 'res-v' : mg < dg ? 'res-d' : 'res-e') + '">' + mg + '-' + dg + '</span>';
      }
      html += '</div>';
    });
  }
  if (futuros.length > 0) {
    html += '<div class="jogos-secao-titulo" style="margin-top:10px">Próximos jogos</div>';
    futuros.forEach(function(item) {
      var adv = buscarClubePorId(item.jogo.mandanteId === meuId ? item.jogo.visitanteId : item.jogo.mandanteId);
      var ev  = estado.eventos.find(function(e) { return e.tipo === "jogo" && e.rodada === item.rodadaIdx; });
      html += '<div class="jogo-item proximo">';
      html += '<span class="jogo-rodada">R' + item.rodadaNum + '</span>';
      html += '<span class="jogo-mando">' + (item.jogo.mandanteId === meuId ? 'C' : 'F') + '</span>';
      html += '<span class="jogo-adv">' + adv.nome + '</span>';
      html += '<span class="jogo-resultado pendente">' + (ev && ev.subtitulo ? ev.subtitulo : 'vs') + '</span>';
      html += '</div>';
    });
  }
  if (!passados.length && !futuros.length) html += '<div class="dash-empty">Nenhum jogo.</div>';
  html += '</div>';
  return html;
}

// ── Mini tabela ──
function renderMiniTabela() {
  // detectar divisão para mini tabela
  var _clubesMT = CLUBES, _resultsMT = estado.resultados;
  if (estado.minhaDivisao && estado.minhaDivisao.indexOf("paulista") === 0) {
    var _div = estado.minhaDivisao.replace("paulista_","");
    if (_div === "b1") {
      _clubesMT = GRUPOS_BEZINHA.reduce(function(a,g){return a.concat(g.clubes);}, []);
      _resultsMT = estadoPaulista.b1.jogos.filter(function(j){return j.ok;}).map(function(j){
        return { mandanteId:j.mId, visitanteId:j.vId, golsMandante:j.gM, golsVisitante:j.gV };
      });
    } else if (estadoPaulista[_div] && estadoPaulista[_div].clubes) {
      _clubesMT = estadoPaulista[_div].clubes;
      _resultsMT = estadoPaulista[_div].jogos.filter(function(j){return j.ok;}).map(function(j){
        return { mandanteId:j.mId, visitanteId:j.vId, golsMandante:j.gM, golsVisitante:j.gV };
      });
    }
  } else if (estado.minhaDivisao === "serieB" && estadoDivisoes.b.clubes) {
    _clubesMT = estadoDivisoes.b.clubes; _resultsMT = estadoDivisoes.b.resultados;
  } else if (estado.minhaDivisao === "serieC" && estadoDivisoes.c.clubes) {
    _clubesMT = estadoDivisoes.c.clubes; _resultsMT = estadoDivisoes.c.resultados;
  } else if (estado.minhaDivisao === "serieD" && estadoDivisoes.d.clubes) {
    _clubesMT = estadoDivisoes.d.clubes; _resultsMT = estadoDivisoes.d.resultados;
  }
  var tabela   = calcularTabela(_clubesMT, _resultsMT);
  var meuId    = estado.meuClube.id;
  var minhaPos = tabela.findIndex(function(t) { return t.id === meuId; });
  var inicio   = Math.max(0, minhaPos - 2);
  var fim      = Math.min(tabela.length, minhaPos + 3);

  var html = '<div class="mini-tabela">';
  html += '<div class="mini-tab-header"><span>#</span><span>Clube</span><span>Pts</span><span>J</span><span>SG</span></div>';
  tabela.slice(inicio, fim).forEach(function(t, i) {
    var pos = inicio + i + 1;
    var cls = t.id === meuId ? ' mini-tab-eu' : '';
    html += '<div class="mini-tab-row' + cls + '">';
    html += '<span class="mini-tab-pos">' + pos + '</span>';
    html += '<span class="mini-tab-nome"><span class="escudo-mini" style="background:' + t.cor + '">' + t.sigla + '</span>' + t.nome + '</span>';
    html += '<span class="mini-tab-pts">' + t.pts + '</span>';
    html += '<span>' + t.j + '</span>';
    html += '<span>' + (t.sg > 0 ? '+' + t.sg : t.sg) + '</span>';
    html += '</div>';
  });
  html += '</div>';
  html += '<div class="dash-ver-mais" onclick="navegarPara(\'tabela\')">Tabela completa</div>';
  return html;
}

// ── Baixas ──
function renderBaixas() {
  if (!estado.baixas) {
    estado.baixas = [];
    var qtd = Math.floor(Math.random() * 2);
    for (var i = 0; i < qtd; i++) {
      var js = estado.meuClube.jogadores;
      var j  = js[Math.floor(Math.random() * js.length)];
      estado.baixas.push({ nome: j.nome, posicao: j.posicao, tipo: "machucado", ate_rodada: estado.rodadaAtual + Math.floor(Math.random() * 4) + 1 });
    }
  }
  estado.baixas = estado.baixas.filter(function(b) { return b.ate_rodada > estado.rodadaAtual; });
  if (!estado.baixas.length) return '<div class="dash-empty">Nenhuma baixa. ✅</div>';
  var html = '<div class="baixas-lista">';
  estado.baixas.forEach(function(b) {
    html += '<div class="baixa-item">';
    html += '<span class="posicao-badge pos-' + b.posicao + '">' + b.posicao + '</span>';
    html += '<div class="baixa-info"><div class="baixa-nome">' + b.nome + '</div>';
    html += '<div class="baixa-detalhe">' + (b.tipo === "machucado" ? "🏥 Machucado" : "🟨 Suspenso") + ' · retorna rod. ' + b.ate_rodada + '</div></div>';
    html += '</div>';
  });
  html += '</div>';
  return html;
}

// ── Notícias ──
function renderNoticias() {
  var n1 = (estado.noticias || []).slice().reverse();
  var n2 = (estado.feedNoticias || []).map(function(n) { return { texto: n.texto, rodada: n.rodada }; }).reverse();
  var todas = n1.concat(n2).sort(function(a, b) { return (b.rodada || 0) - (a.rodada || 0); });
  if (!todas.length) return '<div class="dash-empty">Nenhuma notícia ainda.</div>';
  var html = '<div class="noticias-lista">';
  todas.slice(0, 6).forEach(function(n) {
    html += '<div class="noticia-dash"><div class="noticia-dash-texto">' + n.texto + '</div>';
    if (n.rodada !== undefined) html += '<div class="noticia-dash-rodada">Rod. ' + Math.ceil(n.rodada) + '</div>';
    html += '</div>';
  });
  html += '</div>';
  return html;
}
</script>

var _abaSelecao = "serieA";

function calcularValorClube(clube) {
  // Paulistas têm seu próprio cálculo
  if (clube.divisao_paulista) return valorClubePaulista(clube);
  // Nacionais por divisão
  var ehA = CLUBES.find(function(c){return c.id===clube.id;});
  var ehB = (estadoDivisoes.b.clubes||[]).find(function(c){return c.id===clube.id;});
  var ehC = (estadoDivisoes.c.clubes||[]).find(function(c){return c.id===clube.id;});
  var base = ehA ? 150000000 : ehB ? 25000000 : ehC ? 5000000 : 800000;
  var forca = calcularForca(clube).forca;
  return Math.round(base * (0.5 + (forca - 60) / 80));
}

function renderSelecionarClube() {
  ocultarNav();
  var budget = estado.manager.budget || 1000000;
  var aba    = _abaSelecao;

  var todasAbas = [
    { k:"serieA",    label:"Série A",      clubes: CLUBES },
    { k:"serieB",    label:"Série B",      clubes: estadoDivisoes.b.clubes||[] },
    { k:"serieC",    label:"Série C",      clubes: estadoDivisoes.c.clubes||[] },
    { k:"serieD",    label:"Série D",      clubes: estadoDivisoes.d.clubes||[] },
    { k:"paulistaA1",label:"Paulistão A1", clubes: estadoPaulista.a1.clubes||[] },
    { k:"paulistaA2",label:"Paulistão A2", clubes: estadoPaulista.a2.clubes||[] },
    { k:"paulistaA3",label:"Paulistão A3", clubes: estadoPaulista.a3.clubes||[] },
    { k:"paulistaA4",label:"Paulistão A4", clubes: estadoPaulista.a4.clubes||[] },
    { k:"bezinha",   label:"Bezinha",      clubes: (function(){ return GRUPOS_BEZINHA.reduce(function(a,g){return a.concat(g.clubes);},[]); })() }
  ];

  var tabAtual   = todasAbas.find(function(t){return t.k===aba;}) || todasAbas[0];
  var todosClubesAba = tabAtual.clubes;
  var clubesAba  = todosClubesAba.filter(function(c){
    return calcularValorClube(c) <= budget;
  });

  var html = '<div class="tela-selecao">';
  html += '<h2>Olá, <strong>' + estado.manager.nome + '</strong> — escolha seu clube</h2>';
  html += '<p class="sub">Orçamento: <strong style="color:var(--green)">' + formatarDinheiro(budget) + '</strong> · Só clubes dentro do seu budget aparecem.</p>';

  html += '<div class="selecao-tabs">';
  todasAbas.forEach(function(t) {
    html += '<button class="div-tab' + (aba===t.k?" ativo":"") + '" onclick="mudarAbaSelecao(\'' + t.k + '\')">' + t.label + '</button>';
  });
  html += '</div>';

  if (clubesAba.length === 0) {
    html += '<div class="selecao-sem-budget">';
    html += '<div style="font-size:40px;margin-bottom:12px">💸</div>';
    html += '<div style="font-size:16px;font-weight:600;margin-bottom:8px">Budget insuficiente</div>';
    html += '<div style="font-size:13px;color:var(--text2)">Nenhum clube desta divisão cabe no orçamento de ' + formatarDinheiro(budget) + '.</div>';
    html += '</div>';
  } else {
    html += '<div class="grid-clubes">';
    clubesAba.forEach(function(c) {
      var f   = calcularForca(c);
      var tec = getTecnicoClube(c);
      var val = calcularValorClube(c);
      html += '<div class="card-clube" onclick="comprarClube(\'' + c.id + '\',\'' + aba + '\')">';

function comprarClube(id, aba) {
  var mapa = {
    serieA: CLUBES,
    serieB: estadoDivisoes.b.clubes||[],
    serieC: estadoDivisoes.c.clubes||[],
    serieD: estadoDivisoes.d.clubes||[],
    paulistaA1: estadoPaulista.a1.clubes||[],
    paulistaA2: estadoPaulista.a2.clubes||[],
    paulistaA3: estadoPaulista.a3.clubes||[],
    paulistaA4: estadoPaulista.a4.clubes||[],
    bezinha:    GRUPOS_BEZINHA.reduce(function(a,g){return a.concat(g.clubes);}, [])
  };
  var lista = mapa[aba] || CLUBES;
  var clube = lista.find(function(c){return c.id===id;});
  if (!clube) { alert("Clube não encontrado."); return; }
  var val    = calcularValorClube(clube);
  var budget = estado.manager.budget || 0;
  if (val > budget) { alert("Budget insuficiente!"); return; }
  estado.manager.budget = budget - val;
  selecionarClube(id, lista);
}

function detectarDivisaoClube(id) {
  if (CLUBES.find(function(c){return c.id===id;})) return "serieA";
  if ((estadoDivisoes.b.clubes||[]).find(function(c){return c.id===id;})) return "serieB";
  if ((estadoDivisoes.c.clubes||[]).find(function(c){return c.id===id;})) return "serieC";
  if ((estadoDivisoes.d.clubes||[]).find(function(c){return c.id===id;})) return "serieD";
  // Paulistão divisões A1-A4
  var divsPaul = ["a1","a2","a3","a4"];
  for (var i=0;i<divsPaul.length;i++){
    var est=estadoPaulista[divsPaul[i]];
    if(est&&est.clubes&&est.clubes.find(function(c){return c.id===id;})) return "paulista_"+divsPaul[i];
  }
  // Bezinha — verificar em todos os grupos
  for (var g=0;g<GRUPOS_BEZINHA.length;g++){
    if(GRUPOS_BEZINHA[g].clubes.find(function(c){return c.id===id;})) return "paulista_b1";
  }
  return "serieA";
}

function clubesParaCalendario(divisao) {
  if (divisao==="serieA") return CLUBES;
  if (divisao==="serieB") return estadoDivisoes.b.clubes||CLUBES;
  if (divisao==="serieC") return estadoDivisoes.c.clubes||CLUBES;
  if (divisao==="serieD") return estadoDivisoes.d.clubes||CLUBES;
  // Paulistas não têm calendário nacional — retorna lista vazia (calendário será gerido pelo paulista.js)
  return [];
}

function selecionarClube(id, lista) {
  var fonte = lista || CLUBES;
  var clube = fonte.find(function(c){return c.id===id;});
  if (!clube) clube = CLUBES.find(function(c){return c.id===id;});
  if (!clube) clube = clubePaulistaPorId(id);
  if (!clube && estadoDivisoes.b.clubes) clube = estadoDivisoes.b.clubes.find(function(c){return c.id===id;});
  if (!clube && estadoDivisoes.c.clubes) clube = estadoDivisoes.c.clubes.find(function(c){return c.id===id;});
  if (!clube && estadoDivisoes.d.clubes) clube = estadoDivisoes.d.clubes.find(function(c){return c.id===id;});
  if (!clube) { alert("Clube não encontrado!"); return; }

  estado.meuClube     = clube;
  estado.rodadaAtual  = 0;
  estado.resultados   = [];
  estado.calendario   = []; // limpar antes de gerar
  estado.minhaDivisao = detectarDivisaoClube(id);

  // Gerar calendário correto conforme divisão
  var divCal = estado.minhaDivisao;
  var clubesCal = clubesParaCalendario(divCal);
  if (clubesCal.length >= 2) {
    estado.calendario = gerarCalendario(clubesCal);
  } else {
    estado.calendario = gerarCalendarioPaulista(divCal.replace("paulista_",""));
  }

  estado.meuTecnico = getTecnicoClube(estado.meuClube) || TECNICOS_DISPONIVEIS[0];
  renderMancheteJornal(estado.meuClube, estado.manager);
}

  mostrarNav();

  // Se calendário já foi gerado por selecionarClube (paulistas), só inicializar os eventos
  // Caso contrário (Série A/B/C/D), gerar calendário agora
  if (!estado.calendario || estado.calendario.length === 0) {
    var div = estado.minhaDivisao || "serieA";
    var clubesCal = clubesParaCalendario(div);
    if (clubesCal.length >= 2) {
      estado.calendario = gerarCalendario(clubesCal);
    } else {
      estado.calendario = gerarCalendarioPaulista(div.replace("paulista_",""));

  }
  inicializarCalendario();

  if (!estadoDivisoes.b.clubes) inicializarDivisoes();
  if (!estadoPaulista.a1.clubes) inicializarPaulista();
  inicializarTorneios();
  salvarJogo();

  // Navegar para o dashboard
  setTimeout(function() {
    try {
      renderDashboard();
      // Marcar Dashboard como ativo no menu
      document.querySelectorAll("#sidebar-nav button").forEach(function(b){ b.classList.remove("ativo"); });

    else if (col === 'nome') { va = a.nome; vb = b.nome; }
    else if (col === 'overall') { va = a.overall; vb = b.overall; }
    else if (col === 'idade') { va = a.idade || 0; vb = b.idade || 0; }
    else if (col === 'jogos') { va = (a.stats||{}).jogos||0; vb = (b.stats||{}).jogos||0; }
    else if (col === 'gols') { va = (a.stats||{}).gols||0; vb = (b.stats||{}).gols||0; }
    else if (col === 'assistencias') { va = (a.stats||{}).assistencias||0; vb = (b.stats||{}).assistencias||0; }
    else if (col === 'nota') { va = (a.stats||{}).nota_media||0; vb = (b.stats||{}).nota_media||0; }
    else if (col === 'contrato') { va = a.contrato_termino||0; vb = b.contrato_termino||0; }
    else if (col === 'salario') { va = a.salario||0; vb = b.salario||0; }
    else if (col === 'valor') { va = a.valor_mercado||0; vb = b.valor_mercado||0; }
    else { va = 0; vb = 0; }
    if (va < vb) return elencoOrdem.asc ? -1 : 1;
    if (va > vb) return elencoOrdem.asc ? 1 : -1;
    return ordemPos[a.posicao] - ordemPos[b.posicao];
  });

  // Cards de força
  var html = '<div class="stats-grid" style="margin-bottom:20px">';
  html += '<div class="stat-card"><div class="stat-valor" style="color:var(--accent)">' + stats.forca + '</div><div class="stat-label">Força c/ técnico</div></div>';
  var sinal = stats.bonusFormacao >= 0 ? '+' : '';
  var corBonus = stats.bonusFormacao >= 0 ? 'overall-alto' : 'overall-baixo';
  html += '<div class="stat-card"><div class="stat-valor ' + corBonus + '">' + sinal + stats.bonusFormacao + '</div><div class="stat-label">Encaixe ' + stats.formacao + '</div></div>';
  ['gol','ld','zag','le','vol','mei','ata'].forEach(function(s) {
    html += '<div class="stat-card"><div class="stat-valor">' + Math.round(stats[s]) + '</div><div class="stat-label">' + s.toUpperCase() + '</div></div>';
  });
  html += '</div>';

  // Legenda de cores
  html += '<div class="elenco-legenda">';
  var legendas = [{pos:'GOL',label:'Goleiro'},{pos:'LD',label:'Lateral'},{pos:'ZAG',label:'Zagueiro'},{pos:'VOL',label:'Volante'},{pos:'MEI',label:'Meia'},{pos:'ATA',label:'Atacante'}];
  legendas.forEach(function(l){
    html += '<span class="legenda-item"><span class="legenda-cor" style="background:'+COR_BORDA_POS[l.pos]+'"></span>'+l.label+'</span>';
  });
  html += '</div>';

  // Tabela
  html += '<div class="elenco-tabela-wrap">';
  html += '<table class="elenco-tabela">';

  var cols = [
    { key: 'posicao',     label: 'Pos' },
    { key: 'nome',        label: 'Jogador' },
    { key: 'overall',     label: 'OVR' },
    { key: 'nota',        label: 'Nota' },
    { key: 'jogos',       label: 'J' },
    { key: 'gols',        label: 'G' },
    { key: 'assistencias',label: 'A' },
    { key: 'idade',       label: 'Idade' },
    { key: 'contrato',    label: 'Contrato' },
    { key: 'salario',     label: 'Salário' },
    { key: 'valor',       label: 'Valor' },
    { key: 'status',      label: '●' }
  ];

  html += '<thead><tr>';
  cols.forEach(function(c) {
    if (c.key === 'status') { html += '<th title="Status">●</th>'; return; }
    var ativo = elencoOrdem.col === c.key;
    var seta  = ativo ? (elencoOrdem.asc ? ' ↑' : ' ↓') : '';
    html += '<th onclick="ordenarElenco(\'' + c.key + '\')" class="' + (ativo ? 'col-ativa' : '') + '">' + c.label + seta + '</th>';
  });
  html += '</tr></thead><tbody>';

  var FLAGS_MAP = { BR:'🇧🇷',AR:'🇦🇷',UY:'🇺🇾',CL:'🇨🇱',CO:'🇨🇴',VE:'🇻🇪',PY:'🇵🇾',EC:'🇪🇨',PT:'🇵🇹',FR:'🇫🇷',ES:'🇪🇸',DE:'🇩🇪',IT:'🇮🇹',EN:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',BO:'🇧🇴',PE:'🇵🇪' };

  jogadores.forEach(function(j) {
    var s    = j.stats || { jogos:0, gols:0, assistencias:0, nota_media:0 };
    var nota = s.jogos > 0 ? s.nota_media.toFixed(1) : '-';
    var nac  = j.nacionalidade || 'BR';
    var flag = FLAGS_MAP[nac] || FLAGS_MAP['BR'];
    var rodadasRestantes = (j.contrato_termino || 0) - estado.rodadaAtual;
    var contratoLabel = rodadasRestantes > 0 ? 'Rod. ' + j.contrato_termino : '<span style="color:var(--red)">Vencido</span>';
    var corContrato   = rodadasRestantes <= 5 ? 'color:var(--yellow)' : '';
    var corLinha      = COR_LINHA_POS[j.posicao] || '';
    var bordaEsq      = COR_BORDA_POS[j.posicao] || 'transparent';

    // Badge pos2
    var posLabel = '<span class="posicao-badge pos-' + j.posicao + '">' + j.posicao + '</span>';
    if (j.pos2) posLabel += '<span class="posicao-badge pos-' + j.pos2 + '" style="opacity:.75;font-size:9px;padding:1px 4px">' + j.pos2 + '</span>';

    // Status
    var statusHtml = '';
    if (j.a_venda) statusHtml += '<span title="À venda" class="status-dot venda">💰</span>';
    if (j.para_emprestimo) statusHtml += '<span title="Para empréstimo" class="status-dot emprestimo">🔄</span>';

    html += '<tr class="elenco-linha-clicavel" onclick="abrirFichaJogador(\'' + j.id + '\')" style="background:' + corLinha + ';border-left:3px solid ' + bordaEsq + '">';
    html += '<td>' + posLabel + '</td>';
    html += '<td><div class="col-nome"><span class="flag-jogador" style="display:inline-block;width:20px;text-align:center;font-size:14px">' + flag + '</span> ' + j.nome + statusHtml + '</div></td>';
    html += '<td class="col-centro ' + overallClasse(j.overall) + '">' + j.overall + '</td>';
    html += '<td class="col-centro">' + nota + '</td>';
    html += '<td class="col-centro">' + s.jogos + '</td>';
    html += '<td class="col-centro">' + s.gols + '</td>';
    html += '<td class="col-centro">' + s.assistencias + '</td>';
    html += '<td class="col-centro">' + (j.idade || '-') + '</td>';
    html += '<td class="col-centro" style="' + corContrato + '">' + contratoLabel + '</td>';
    html += '<td class="col-centro">' + formatarDinheiro(j.salario || 0) + '</td>';
    html += '<td class="col-centro">' + formatarDinheiro(j.valor_mercado || 0) + '</td>';
    // statusHtml agora está dentro da col-nome
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  document.getElementById("main").innerHTML = html;
}

function ordenarElenco(col) {
  if (elencoOrdem.col === col) {
    elencoOrdem.asc = !elencoOrdem.asc;
  } else {
    elencoOrdem.col = col;
    elencoOrdem.asc = col === 'nome';
  }
  renderElenco();
}

function renderCampeonato() {
  var meuId = estado.meuClube.id;

  estado.calendario.forEach(function(rodada, idx) {

    html += '</div><div class="lista-jogos">';

    rodada.jogos.forEach(function(jogo) {
      var resultado = estado.resultados.find(function(r) {
        return r.rodada === idx && r.mandanteId === jogo.mandanteId && r.visitanteId === jogo.visitanteId;
      });
      var mandante  = buscarClubePorId(jogo.mandanteId) || {nome:"?",sigla:"?",cor:"#555"};

      var clsV = jogo.visitanteId === meuId ? ' meu' : '';

      var placar;
      if (resultado) {

        placar = '<span class="placar ' + cls + '" onclick="abrirModal(\'' + dadosStr + '\')" style="cursor:pointer">' + resultado.golsMandante + ' – ' + resultado.golsVisitante + '</span>';

      html += '<span class="time-nome direita' + clsV + '">' + visitante.nome + '</span>';
      html += '</div>';
    });

    html += '</div></div>';

  html += '</div>';

function simularRodada(idx) {
  var rodada = estado.calendario[idx];
  var meuId  = estado.meuClube.id;
  var meuTec = estado.meuTecnico;
  var ehPaulista = estado.minhaDivisao && estado.minhaDivisao.indexOf("paulista_") === 0;

  // Resultados vão para arrays separados por divisão
  var arrResultados = ehPaulista ? (estado.resultadosPaulista || (estado.resultadosPaulista=[])) : estado.resultados;

  rodada.jogos.forEach(function(jogo) {
    var mandante  = buscarClubePorId(jogo.mandanteId);
    var visitante = buscarClubePorId(jogo.visitanteId);
    if (!mandante || !visitante) return; // ignorar jogos com clubes inválidos
    var tecM = jogo.mandanteId  === meuId ? meuTec : null;
    var tecV = jogo.visitanteId === meuId ? meuTec : null;
    var r = simularPartidaSimples(mandante, visitante, tecM, tecV);
    arrResultados.push({
      rodada: idx,
      mandanteId: jogo.mandanteId, visitanteId: jogo.visitanteId,
      golsMandante: r.golsMandante, golsVisitante: r.golsVisitante,
      eventos: r.eventos,
      forcaMandante: r.forcaMandante, forcaVisitante: r.forcaVisitante
    });
  });

  estado.rodadaAtual = idx + 1;
  simularRodadaDivisoes(idx);
  if (idx === 37) { processarPromocaoRebaixamento(); processarPromocaoRebaixamentoPaulista(); }

  processarMercadoRodada(idx);
  // Receitas da rodada para todos os clubes
  CLUBES.forEach(function(c) {
    var jogosEmCasa = estado.calendario[idx].jogos.filter(function(j) { return j.mandanteId === c.id; }).length;
    processarReceitasRodada(c, idx, jogosEmCasa);
  });
  simularPropostasIA();
  salvarJogo();
  renderCampeonato();
  var proxima = document.getElementById("rodada-" + (idx + 1));
  if (proxima) proxima.scrollIntoView({ behavior: "smooth", block: "start" });
}

// ── Modal de partida ──
function abrirModal(dadosStr) {
  var resultado = JSON.parse(decodeURIComponent(dadosStr));
  var mandante  = CLUBES.find(function(c) { return c.id === resultado.mandanteId; });
  var visitante = CLUBES.find(function(c) { return c.id === resultado.visitanteId; });
  var diff = resultado.golsMandante - resultado.golsVisitante;
  var cor  = diff > 0 ? "var(--green)" : diff < 0 ? "var(--red)" : "var(--yellow)";
  var fm   = resultado.forcaMandante;
  var fv   = resultado.forcaVisitante;

  var eventosHtml = '';
  if (resultado.eventos && resultado.eventos.length > 0) {
    resultado.eventos.forEach(function(e) {
      eventosHtml += '<div class="evento-item"><span class="evento-minuto">' + e.minuto + '\'</span><span>' + e.texto + '</span></div>';
    });
  } else {
    eventosHtml = '<p style="color:var(--text2);font-size:13px">Jogo sem gols.</p>';
  }

  var forcaHtml = '';
  if (fm) {
    forcaHtml = '<div style="display:flex;justify-content:space-around;padding:10px 20px;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border)">' +
      '<span>Força: <strong style="color:var(--text)">' + fm.forca + '</strong></span><span>vs</span>' +
      '<span>Força: <strong style="color:var(--text)">' + fv.forca + '</strong></span></div>';
  }

  var overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML =
    '<div class="modal">' +
      '<div class="modal-header">' +
        '<div style="font-size:12px;color:var(--text2);margin-bottom:6px">Resultado final</div>' +
        '<div class="modal-placar" style="color:' + cor + '">' + resultado.golsMandante + ' – ' + resultado.golsVisitante + '</div>' +
        '<div class="modal-times"><span>' + mandante.nome + '</span><span>' + visitante.nome + '</span></div>' +
      '</div>' +
      forcaHtml +
      '<div class="modal-eventos">' + eventosHtml + '</div>' +
      '<div class="modal-footer"><button class="btn-fechar" onclick="this.closest(\'.modal-overlay\').remove()">Fechar</button></div>' +
    '</div>';

  overlay.addEventListener("click", function(e) { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

// ── Helpers ──
function placarClasse(resultado, meuId) {
  if (resultado.mandanteId !== meuId && resultado.visitanteId !== meuId) return "";
  var euM  = resultado.mandanteId === meuId;
  var meus = euM ? resultado.golsMandante : resultado.golsVisitante;
  var deles= euM ? resultado.golsVisitante : resultado.golsMandante;
  return meus > deles ? "vitoria" : meus < deles ? "derrota" : "empate";
}

function overallClasse(v) {
  return v >= 80 ? "overall-alto" : v >= 70 ? "overall-medio" : "overall-baixo";
}

function bandeira(nac) {
  var flags = { BR:"🇧🇷", PT:"🇵🇹", AR:"🇦🇷", ES:"🇪🇸", IT:"🇮🇹", DE:"🇩🇪", FR:"🇫🇷", EN:"🏴󠁧󠁢󠁥󠁮󠁧󠁿" };
  return flags[nac] || "🌍";
}

function ocultarNav() {
  document.getElementById("header-info").classList.add("hidden");
  var sb = document.getElementById("sidebar-nav");
  if (sb) sb.classList.add("hidden");
}

function mostrarNav() {
  document.getElementById("header-info").classList.remove("hidden");
  var sb = document.getElementById("sidebar-nav");
  if (sb) sb.classList.remove("hidden");
}

function _todosJogadoresMercado() {
  var meuClube = estado.meuClube;
  var todos = [];
  function add(clube) {
    if (!clube || !clube.jogadores || clube.id === meuClube.id) return;
    clube.jogadores.forEach(function(j) { todos.push({ jogador: j, clube: clube }); });
  }
  CLUBES.forEach(add);
  (estadoDivisoes.b.clubes||[]).forEach(add);
  (estadoDivisoes.c.clubes||[]).forEach(add);
  (estadoDivisoes.d.clubes||[]).forEach(add);
  ["a1","a2","a3","a4"].forEach(function(d){ (estadoPaulista[d]&&estadoPaulista[d].clubes||[]).forEach(add); });
  GRUPOS_BEZINHA.forEach(function(g){ g.clubes.forEach(add); });
  return todos;
}

function filtrarMercado() {
  var pos    = document.getElementById("filtro-pos").value;
  var budget = document.getElementById("filtro-budget").value;
  var status = document.getElementById("filtro-status").value;

  var todos = _todosJogadoresMercado().filter(function(item) {
    var j = item.jogador;
    if (pos && j.posicao !== pos) return false;
    if (budget && j.valor_mercado > parseInt(budget)) return false;
    if (status === "venda" && !j.a_venda) return false;
    if (status === "emprestimo" && !j.para_emprestimo) return false;
    return true;
  });
  todos.sort(function(a, b) { return b.jogador.overall - a.jogador.overall; });
  document.getElementById("lista-mercado").innerHTML = renderListaJogadoresMercado(todos);
}

function enviarProposta(jogadorId, clubeId) {
  var clube   = CLUBES.find(function(c) { return c.id === clubeId; });
  var jogador = clube.jogadores.find(function(j) { return j.id === jogadorId; });
  var valor   = parseInt(document.getElementById("inp-proposta").value);

  if (!valor || valor <= 0) { alert("Digite um valor válido."); return; }
  if (valor > estado.meuClube.budget) { alert("Você não tem budget suficiente!"); return; }

  var result = avaliarProposta(jogador, clube, valor);

  document.querySelector(".modal-overlay").remove();

  if (result.aceita) {
    executarTransferencia(jogador, clube, estado.meuClube, valor);
    if (!estado.feedNoticias) estado.feedNoticias = [];
    estado.feedNoticias.push({
      rodada: estado.rodadaAtual,
      texto: "✅ " + jogador.nome + " (" + jogador.overall + ") chegou ao " + estado.meuClube.nome + " vindo do " + clube.nome + " por " + formatarDinheiro(valor)
    });
    mostrarResultadoProposta(true, result.motivo, jogador.nome);
  } else {
    if (!estado.feedNoticias) estado.feedNoticias = [];
    estado.feedNoticias.push({
      rodada: estado.rodadaAtual,
      texto: "❌ " + estado.meuClube.nome + " teve proposta recusada pelo " + clube.nome + " por " + jogador.nome
    });
    mostrarResultadoProposta(false, result.motivo, jogador.nome);
  }
}

// ── Processar mercado da IA ao simular rodada ──
function processarMercadoRodada(rodadaIdx) {
  if (!estado.feedNoticias) estado.feedNoticias = [];

  // IA decide vendas/empréstimos sempre (mesmo fora da janela) — chance baixa por rodada
  if (Math.random() < 0.3) iaDecidirVendasEmprestimos();

  var janela = janelaAberta(rodadaIdx);
  if (janela) {
    // IA faz transferências entre si (só durante a janela)
    var noticias = simularMercadoIA();
    noticias.forEach(function(n) {
      n.rodada = rodadaIdx;
      estado.feedNoticias.push(n);
    });
  }

  // Receita de bilheteria
  processarReceitaRodada(rodadaIdx);
}

var inboxMsgSelecionada = null;

function renderInbox() {
  var inbox = (estado.inbox || []).slice().reverse();

  var html = '<div class="inbox-screen">';

  // Header
  html += '<div class="inbox-header">';
  html += '<div class="inbox-header-titulo">✉️ Inbox <span class="inbox-count">(' + inbox.length + ')</span></div>';
  html += '<button class="btn-marcar-lidas" onclick="marcarTodasLidas()">✓ Marcar todas como lidas</button>';
  html += '</div>';

  html += '<div class="inbox-body">';

  // Lista de mensagens
  html += '<div class="inbox-lista-email" id="inbox-lista">';
  if (inbox.length === 0) {
    html += '<div class="inbox-vazio">Nenhuma mensagem.</div>';
  } else {
    inbox.forEach(function(msg, i) {
      var idx = (estado.inbox.length - 1) - i;
      var ativa = inboxMsgSelecionada === idx;
      html += '<div class="inbox-email-item ' + (msg.lida ? '' : 'nao-lida') + (ativa ? ' ativa' : '') + '" onclick="selecionarMensagem(' + idx + ')">';
      html += '<div class="inbox-email-remetente">' + (msg.remetente || 'Sistema') + '</div>';
      html += '<div class="inbox-email-assunto">' + msg.titulo + '</div>';
      if (msg.subtitulo) html += '<div class="inbox-email-data">' + msg.subtitulo + '</div>';
      html += '</div>';
    });
  }
  html += '</div>';

  // Conteúdo da mensagem
  html += '<div class="inbox-email-conteudo" id="inbox-conteudo">';
  if (inboxMsgSelecionada !== null && estado.inbox[inboxMsgSelecionada]) {
    html += renderConteudoEmail(estado.inbox[inboxMsgSelecionada]);
  } else {
    html += '<div class="inbox-selecione">← Selecione uma mensagem</div>';
  }
  html += '</div>';

  html += '</div>'; // inbox-body
  html += '</div>'; // inbox-screen

  document.getElementById("main").innerHTML = html;
}

function renderConteudoEmail(msg) {
  var html = '<div class="email-view">';
  html += '<div class="email-view-assunto">' + msg.titulo + '</div>';
  html += '<div class="email-view-meta">';
  html += '<div class="email-view-de"><span>De:</span> <strong>' + (msg.remetente || 'Sistema') + '</strong></div>';
  if (msg.subtitulo) html += '<div class="email-view-data">' + msg.subtitulo + '</div>';
  html += '</div>';
  html += '<div class="email-view-separador"></div>';
  html += '<div class="email-view-corpo">' + (msg.texto || '') + '</div>';

  // Botões aceitar/recusar para propostas recebidas
  if (msg.tipo === "proposta_recebida" && !msg.respondida) {
    html += '<div style="display:flex;gap:10px;margin-top:20px">';
    html += '<button class="btn-primario" style="flex:1" onclick="responderProposta(\"' + msg.id + '\",true)">✅ Aceitar proposta</button>';
    html += '<button class="btn-demitir" style="flex:1;margin-top:0" onclick="responderProposta(\"' + msg.id + '\",false)">❌ Recusar</button>';
    html += '</div>';
  } else if (msg.tipo === "proposta_recebida" && msg.respondida) {
    html += '<div style="margin-top:16px;font-size:13px;color:var(--text2)">✓ Proposta já respondida.</div>';
  }

  html += '</div>';
  return html;
}

function selecionarMensagem(idx) {
  var msg = estado.inbox[idx];
  if (!msg) return;
  msg.lida = true;
  inboxMsgSelecionada = idx;

  // Atualizar lista (remover nao-lida do item) e conteúdo sem re-render total
  var lista = document.getElementById("inbox-lista");
  var conteudo = document.getElementById("inbox-conteudo");

  if (lista && conteudo) {
    // Atualizar classes na lista
    var items = lista.querySelectorAll(".inbox-email-item");
    items.forEach(function(el) { el.classList.remove("ativa"); });
    // Índice reverso na lista
    var inbox = (estado.inbox || []).slice().reverse();
    var idxLista = inbox.findIndex(function(m) { return m === msg; });
    if (idxLista >= 0 && items[idxLista]) {
      items[idxLista].classList.add("ativa");
      items[idxLista].classList.remove("nao-lida");
    }
    conteudo.innerHTML = renderConteudoEmail(msg);
  } else {
    renderInbox();
  }

  // Atualizar badge do dashboard
  salvarJogo();
}

function marcarTodasLidas() {
  (estado.inbox || []).forEach(function(m) { m.lida = true; });
  inboxMsgSelecionada = estado.inbox.length > 0 ? estado.inbox.length - 1 : null;
  renderInbox();
  salvarJogo();
}

function abrirAcoesJogador(jogadorId) {
  var clube = estado.meuClube;
  var j = clube.jogadores.find(function(x) { return x.id === jogadorId; });
  if (!j) return;

  var rodadasContrato = Math.max(0, (j.contrato_termino || 0) - estado.rodadaAtual);
  var custoRescisao   = Math.round(j.salario * rodadasContrato * 0.5);

  var overlay = document.createElement("div");
  overlay.className = "modal-overlay";

  var html = '<div class="modal">';
  html += '<div class="modal-header" style="text-align:left;padding:20px">';
  html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">';
  html += '<span class="posicao-badge pos-' + j.posicao + '">' + j.posicao + '</span>';

function confirmarDispensa(jogadorId, acordoMutuo) {
  var j = estado.meuClube.jogadores.find(function(x) { return x.id === jogadorId; });
  var msg = acordoMutuo ? "Dispensar " + j.nome + " por acordo mútuo (sem custo)?" : "Pagar rescisão para dispensar " + j.nome + "?";
  if (!confirm(msg)) return;

  document.querySelector(".modal-overlay").remove();

// Aceitar/recusar proposta recebida
function responderProposta(msgId, aceitar) {
  var msg = estado.inbox.find(function(m) { return m.id === msgId; });
  if (!msg || msg.tipo !== "proposta_recebida") return;

  if (aceitar) {
    var jogador = estado.meuClube.jogadores.find(function(j) { return j.id === msg.jogadorId; });
    var clubeComprador = CLUBES.find(function(c) { return c.id === msg.clubeOfertanteId; });
    if (jogador && clubeComprador) {
      executarTransferencia(jogador, estado.meuClube, clubeComprador, msg.valor);
      registrarTransferenciaFinanceiro(estado.meuClube, "Venda: " + jogador.nome + " → " + clubeComprador.nome, msg.valor, "receita");
      adicionarNoticia("✅ " + jogador.nome + " vendido ao " + clubeComprador.nome + " por " + formatarDinheiro(msg.valor), estado.rodadaAtual);
    }
  } else {
    adicionarNoticia("❌ Proposta do " + (CLUBES.find(function(c){return c.id===msg.clubeOfertanteId;})||{}).nome + " por " + (estado.meuClube.jogadores.find(function(j){return j.id===msg.jogadorId;})||{}).nome + " recusada.", estado.rodadaAtual);
  }

  msg.respondida = true;
  msg.lida = true;
  salvarJogo();
  renderInbox();
}

// Renovar contrato
function renovarContrato(jogadorId) {
  var j = estado.meuClube.jogadores.find(function(x) { return x.id === jogadorId; });
  if (!j) return;
  var novoSalario = parseInt(document.getElementById("inp-sal-renovacao").value);
  var duracao     = parseInt(document.getElementById("inp-dur-renovacao").value);
  if (!novoSalario || novoSalario <= 0) { alert("Digite um salário válido."); return; }

  // Jogador aceita se salário >= atual
  var aceita = novoSalario >= j.salario;
  // Chance de recusar mesmo com aumento se overall alto
  if (aceita && j.overall >= 82 && novoSalario < j.salario * 1.15) {
    aceita = Math.random() > 0.4;
  }

  if (aceita) {
    j.salario          = novoSalario;
    j.contrato_termino = estado.rodadaAtual + duracao;
    j.clausula_rescisoria = Math.round(j.valor_mercado * (j.overall >= 82 ? 2.5 : 2.0));
    adicionarNoticia("📝 " + j.nome + " renovou contrato até a rodada " + j.contrato_termino + " por " + formatarDinheiro(novoSalario) + "/mês", estado.rodadaAtual);
    salvarJogo();
    alert("✅ " + j.nome + " aceitou a renovação!");
    abrirFichaJogador(jogadorId);
  } else {
    alert("❌ " + j.nome + " recusou a proposta. Tente um salário maior.");
  }
}

var _torneioHubAba = "brasileirao";

function renderTorneiosHub() {
  var meuClube = estado.meuClube;
  var meuId    = meuClube.id;
  var div      = estado.minhaDivisao || "serieA";
  // Reset se aba antiga não existe mais
  var abasValidas = ["nacional","internacional","estadual"];
  if (!_torneioHubAba || abasValidas.indexOf(_torneioHubAba) < 0) _torneioHubAba = "nacional";
  // Times paulistas (Bezinha ou Paulistão) abrem direto na aba Estadual
  if (div.indexOf("paulista_") === 0 && _torneioHubAba === "nacional" && !window._torneioHubVisitadoNacional) {
    _torneioHubAba = "estadual";
  }
  window._torneioHubVisitadoNacional = true;
  var aba      = _torneioHubAba;

  // Detectar divisão principal do clube (só relevante para times NACIONAIS)
  var labelPrincipal, renderPrincipal;
  if (div.indexOf("paulista_") === 0) {
    // Times paulistas não têm aba "serie" no Nacional — usar fallback simples
    labelPrincipal = "🇧🇷 Série A"; renderPrincipal = renderBrasileirao;
  } else {
    var divisaoNacional = "A";
    if (estadoDivisoes.b.clubes && estadoDivisoes.b.clubes.find(function(c){return c.id===meuId;})) divisaoNacional="B";
    else if (estadoDivisoes.c.clubes && estadoDivisoes.c.clubes.find(function(c){return c.id===meuId;})) divisaoNacional="C";
    else if (estadoDivisoes.d.clubes && estadoDivisoes.d.clubes.find(function(c){return c.id===meuId;})) divisaoNacional="D";
    labelPrincipal = "🇧🇷 Série "+divisaoNacional;
    renderPrincipal = renderBrasileirao;
  }

  // Detectar participação em torneios
  var nasCopaBR = estadoTorneios.copaBrasil && estadoTorneios.copaBrasil.participantes &&
    estadoTorneios.copaBrasil.participantes.indexOf(meuId) >= 0 &&
    !(estadoTorneios.copaBrasil.eliminados||[]).includes(meuId);
  var naLib = estadoTorneios.libertadores && estadoTorneios.libertadores.grupos &&
    estadoTorneios.libertadores.grupos.some(function(g){ return g.clubes.indexOf(meuId)>=0; });
  var noMundial = estadoTorneios.mundial &&
    estadoTorneios.mundial.grupos &&
    estadoTorneios.mundial.grupos.some(function(g){ return g.clubes.indexOf(meuId)>=0; });
  var naPaulistaDiv = ["a1","a2","a3","a4"].some(function(d){
    return estadoPaulista[d].clubes && estadoPaulista[d].clubes.find(function(c){return c.id===meuId;});
  });
  var naBezinha = GRUPOS_BEZINHA.some(function(g){ return g.clubes.find(function(c){return c.id===meuId;}); });

  // Tabs principais
  var tabs = [
    { k:"nacional",       label:"🇧🇷 Nacional" },
    { k:"internacional",  label:"🌎 Internacional" },
    { k:"estadual",       label:"🏅 Estadual" }
  ];

  var html = '<div class="torneios-hub">';
  html += '<div class="hub-tabs">';
  tabs.forEach(function(t) {
    html += '<button class="hub-tab'+(aba===t.k?" ativo":"")+'" onclick="mudarTorneioHub(\'' + t.k + '\')">'+t.label+'</button>';
  });
  html += '</div><div class="hub-conteudo">';

  if (aba === "nacional") html += renderNacionalHub(meuId, labelPrincipal, renderPrincipal, nasCopaBR, div);
  if (aba === "internacional") html += renderInternacionalHub(meuId, naLib, noMundial);
  if (aba === "estadual") html += renderEstadualHub(meuId, naPaulistaDiv, naBezinha, div);

  html += '</div></div>';
  document.getElementById("main").innerHTML = html;
}

function mudarTorneioHub(aba) { _torneioHubAba=aba; renderTorneiosHub(); }

// ── NACIONAL ──
function renderNacionalHub(meuId, labelPrincipal, renderPrincipal, nasCopaBR, div) {
  var ehTimePaulista = div.indexOf("paulista_") === 0;
  var subaba = window._subabaNacional || (ehTimePaulista ? "serieA" : "serie");
  if (ehTimePaulista && subaba === "serie") subaba = "serieA";
  var html = '<div class="hub-sub-tabs">';

  // Sub-abas: divisão do clube (só se NÃO for paulista) + todas as séries + Copa do Brasil
  var subs = [];
  if (!ehTimePaulista) subs.push({ k:"serie",  label: labelPrincipal, destaque: true });
  subs.push({ k:"serieA", label:"Série A" });
  subs.push({ k:"serieB", label:"Série B" });
  subs.push({ k:"serieC", label:"Série C" });
  subs.push({ k:"serieD", label:"Série D" });
  subs.push({ k:"copa",   label:"🏆 Copa do Brasil", destaque: nasCopaBR });

  subs.forEach(function(s) {
    var cls = "hub-sub-tab"+(subaba===s.k?" ativo":"")+(s.destaque?" meu-torneio":"");
    html += '<button class="'+cls+'" onclick="mudarSubabaNacional(\'' + s.k + '\')"> '+(s.destaque&&subaba!==s.k?'⭐ ':'')+s.label+'</button>';
  });
  html += '</div>';

function renderBrasileirao() {
  var meuId = estado.meuClube.id;
  var div = estado.minhaDivisao || "serieA";

  // Times paulistas não jogam Brasileirão — redirecionar para seu torneio
  if (div.indexOf("paulista") === 0) {
    var pdiv = div.replace("paulista_","");
    if (pdiv === "b1") return renderBezinhaTela();
    return renderDivisaoPaulistaTela(pdiv);
  }

  var ehB = estadoDivisoes.b.clubes && estadoDivisoes.b.clubes.find(function(c){return c.id===meuId;});
  var ehC = estadoDivisoes.c.clubes && estadoDivisoes.c.clubes.find(function(c){return c.id===meuId;});
  var ehD = estadoDivisoes.d.clubes && estadoDivisoes.d.clubes.find(function(c){return c.id===meuId;});

  var clubes, resultados, rodada;
  if (ehB) { clubes=estadoDivisoes.b.clubes; resultados=estadoDivisoes.b.resultados; rodada=estadoDivisoes.b.rodadaAtual; }
  else if (ehC) { clubes=estadoDivisoes.c.clubes; resultados=estadoDivisoes.c.resultados; rodada=estadoDivisoes.c.rodadaAtual; }
  else if (ehD) { clubes=estadoDivisoes.d.clubes; resultados=estadoDivisoes.d.resultados; rodada=estadoDivisoes.d.rodadaAtual; }
  else {
    clubes=CLUBES;
    // Filtrar só resultados de times da Série A (evitar times da Bezinha)
    var clubeIds = CLUBES.map(function(c){return c.id;});
    resultados = (estado.resultados||[]).filter(function(r){
      return clubeIds.indexOf(r.mandanteId) >= 0 || clubeIds.indexOf(r.visitanteId) >= 0;
    });
    rodada=estado.rodadaAtual;
  }

  var tabela = calcularTabela(clubes, resultados);
  var html = '<div class="divisoes-grid">';

  // Tabela
  html += '<div class="div-tabela-wrap">';
  html += '<div class="fin-secao-titulo">Classificação — Rodada ' + rodada + '</div>';
  html += '<table class="elenco-tabela"><thead><tr><th>#</th><th>Clube</th><th>Pts</th><th>J</th><th>V</th><th>E</th><th>D</th><th>SG</th></tr></thead><tbody>';
  tabela.forEach(function(t,i) {
    var pos=i+1;
    var cls=t.id===meuId?" mini-tab-eu":"";
    var corPos=pos<=4?"color:var(--green)":pos>tabela.length-4?"color:var(--red)":"";
    html+='<tr class="'+cls+'"><td class="td-pos" style="'+corPos+'">'+pos+'</td>';
    html+='<td><span class="escudo-mini" style="background:'+t.cor+'">'+t.sigla+'</span>'+t.nome+'</td>';
    html+='<td class="td-pts">'+t.pts+'</td><td>'+t.j+'</td><td>'+t.v+'</td><td>'+t.e+'</td><td>'+t.d+'</td>';
    html+='<td>'+(t.sg>0?"+"+t.sg:t.sg)+'</td></tr>';
  });
  html += '</tbody></table></div>';

  // Próximos e últimos jogos
  html += '<div class="div-resultados">';
  html += '<div class="fin-secao-titulo">Jogos do meu clube</div>';
  var meusJogos = resultados.filter(function(r){return r.mandanteId===meuId||r.visitanteId===meuId;}).slice(-5);
  if (meusJogos.length===0) html += '<div class="dash-empty">Nenhum jogo ainda.</div>';
  meusJogos.forEach(function(r){
    var m=clubes.find(function(c){return c.id===r.mandanteId;})||{sigla:"?"};
    var v=clubes.find(function(c){return c.id===r.visitanteId;})||{sigla:"?"};
    var euM=r.mandanteId===meuId;
    var mg=euM?r.golsMandante:r.golsVisitante;
    var dg=euM?r.golsVisitante:r.golsMandante;
    var cor=mg>dg?"var(--green)":mg<dg?"var(--red)":"var(--yellow)";
    html+='<div class="resultado-item"><span class="res-time">'+m.sigla+'</span>';
    html+='<span class="res-placar" style="color:'+cor+'">'+r.golsMandante+' – '+r.golsVisitante+'</span>';
    html+='<span class="res-time direita">'+v.sigla+'</span></div>';
  });
  html += '</div>';

  // Artilheiros
  html += '<div class="div-resultados" style="grid-column:1/-1;margin-top:16px">';
  html += '<div class="fin-secao-titulo">⚽ Artilheiros</div>';
  var lancesArt = [];
  resultados.forEach(function(r){ if(r.eventos) r.eventos.forEach(function(e){ lancesArt.push(e); }); });
  var artTop = calcularArtilheiros(lancesArt, clubes);
  html += renderArtilheiros(artTop, "Artilheiros", 8);
  html += '</div>';

  html += '</div>';
  return html;
}

// Voltar ao dashboard após partida
function voltarAoDashboard() {
  desbloquearMenuPartida();
  try {
    // Processar resultado antes de zerar jogoAtivo
    if (jogoAtivo) {
      if (jogoAtivo.resultado && estado.meuClube) {
        var gM = jogoAtivo.resultado.golsMandante;
        var gV = jogoAtivo.resultado.golsVisitante;
        var meuMandante = jogoAtivo.mandante && jogoAtivo.mandante.id === estado.meuClube.id;
        var meuGols = meuMandante ? gM : gV;
        var advGols = meuMandante ? gV : gM;
        var res = meuGols > advGols ? 'vitoria' : meuGols < advGols ? 'derrota' : 'empate';
        try { atualizarConfiancaTorcida(estado.meuClube, res); } catch(e){}
        try { processarReceitasRodada(estado.meuClube, estado.minhaDivisao||'serieA', meuMandante, res, 10); } catch(e){}
      }
      if (estado._jogoAtivoPaulista && jogoAtivo.resultado) {
        try {
          var info = estado._jogoAtivoPaulista;
          info.jogo.gM = jogoAtivo.resultado.golsMandante;
          info.jogo.gV = jogoAtivo.resultado.golsVisitante;
          info.jogo.ok = true;
          estado._jogoAtivoPaulista = null;
          simularEventoPaulista(info.rodadaIdx);
        } catch(e){}
      }
      if (jogoAtivo.timer) { clearInterval(jogoAtivo.timer); jogoAtivo.timer = null; }
    }
  } catch(e) { console.error("voltarAoDashboard erro parcial:", e); }

  // Zerar estado do jogo
  jogoAtivo = null;
  _partidaPausada = false;

  // Atualizar sidebar
  document.querySelectorAll("#sidebar-nav button").forEach(function(b) { b.classList.remove("ativo"); });
  var btnDash = document.querySelector('#sidebar-nav button[data-aba="dashboard"]');
  if (btnDash) btnDash.classList.add("ativo");

  // Salvar e ir ao dashboard
  try { salvarJogo(); } catch(e){}

  try {
    renderDashboard();
  } catch(e) {
    console.error("Erro ao renderizar dashboard:", e);
    document.getElementById("main").innerHTML =
      '<div style="padding:40px;text-align:center">' +
      '<div style="font-size:20px;margin-bottom:16px">Dashboard</div>' +
      '<div style="color:var(--text2);margin-bottom:20px">Erro ao carregar: ' + e.message + '</div>' +
      '<button class="btn-primario" onclick="location.reload()">🔄 Recarregar página</button>' +
      '</div>';
  }
}

// ARTILHEIROS E ASSISTÊNCIAS
// ════════════════════════════════════════
function calcularArtilheiros(lances, clubes) {
  var stats = {}; // { jogadorId: { nome, clube, gols, assists } }
  
  lances.forEach(function(l) {
    if (l.tipo !== "gol") return;
    
    // Gol
    if (l.jogadorId) {
      if (!stats[l.jogadorId]) {
        var j = null;
        clubes.forEach(function(c){ if(c.jogadores) { var jj=c.jogadores.find(function(x){return x.id===l.jogadorId;}); if(jj){j=jj; j._clube=c.nome; j._sigla=c.sigla;} } });
        if (j) stats[l.jogadorId] = { nome:j.nome, clube:j._clube, sigla:j._sigla||"?", gols:0, assists:0 };
      }
      if (stats[l.jogadorId]) stats[l.jogadorId].gols++;
    }
    
    // Assistência
    if (l.assistenteId) {
      if (!stats[l.assistenteId]) {
        var j2 = null;
        clubes.forEach(function(c){ if(c.jogadores) { var jj=c.jogadores.find(function(x){return x.id===l.assistenteId;}); if(jj){j2=jj; j2._clube=c.nome; j2._sigla=c.sigla;} } });
        if (j2) stats[l.assistenteId] = { nome:j2.nome, clube:j2._clube, sigla:j2._sigla||"?", gols:0, assists:0 };
      }
      if (stats[l.assistenteId]) stats[l.assistenteId].assists++;
    }
  });
  
  return Object.values(stats).sort(function(a,b){ return (b.gols-a.gols)||(b.assists-a.assists); });
}

function renderArtilheiros(artilheiros, titulo, max) {
  var top = artilheiros.slice(0, max||10);
  if (top.length === 0) return '<div class="dash-empty">Sem dados ainda.</div>';
  
  var html = '<div class="artilheiros-lista">';
  top.forEach(function(a, i) {
    html += '<div class="artilheiro-item">';
    html += '<span class="art-pos">'+(i+1)+'</span>';
    html += '<div class="art-info"><div class="art-nome">'+a.nome+'</div><div class="art-clube">'+a.clube+'</div></div>';
    html += '<div class="art-stats">';
    html += '<span class="art-gols">⚽ '+a.gols+'</span>';
    if (a.assists > 0) html += '<span class="art-assists">🎯 '+a.assists+'</span>';
    html += '</div></div>';
  });
  html += '</div>';
  return html;
}

function getLancesResultados(resultados) {
  var lances = [];
  resultados.forEach(function(r){
    if (r.eventos) r.eventos.forEach(function(e){ lances.push(e); });
  });
  return lances;
}
