<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Manager FC</title><style>*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --bg2: #1a1d27;
  --bg3: #22263a;
  --border: #2e3350;
  --text: #e8eaf0;
  --text2: #8a90a8;
  --accent: #4f8ef7;
  --green: #2ecc71;
  --red: #e74c3c;
  --yellow: #f1c40f;
  --radius: 10px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

/* ── Layout ── */
#app { display: flex; min-height: 100vh; }

/* Sidebar esquerda */
#sidebar {
  width: 200px;
  min-width: 200px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}

#sidebar-logo {
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--border);
}

#sidebar-logo h1 { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: .5px; margin-bottom: 10px; }

.sidebar-info { display: flex; flex-direction: column; gap: 4px; }
.sidebar-info-item { font-size: 11px; color: var(--text2); }
.sidebar-info-item strong { color: var(--text); display: block; font-size: 12px; }

#sidebar-nav { display: flex; flex-direction: column; padding: 12px 8px; gap: 2px; flex: 1; }

#sidebar-nav button {
  background: none;
  border: none;
  color: var(--text2);
  padding: 10px 12px;
  cursor: pointer;
  font-size: 13px;
  border-radius: 8px;
  text-align: left;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 8px;
}

#sidebar-nav button:hover { background: var(--bg3); color: var(--text); }
#sidebar-nav button.ativo { background: rgba(79,142,247,.15); color: var(--accent); font-weight: 600; }

/* Conteúdo principal */
#conteudo {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

header h1 { display: none; }
header span { font-size: 12px; color: var(--text2); }

/* nav horizontal removido — sidebar substitui */
nav { display: none; }

main { flex: 1; padding: 24px; width: 100%; overflow-y: auto; }

/* ── Tela de seleção de clube ── */
#tela-selecao h2 { font-size: 18px; margin-bottom: 6px; }
#tela-selecao p  { color: var(--text2); margin-bottom: 24px; font-size: 13px; }

.grid-clubes {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
}

.card-clube {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 16px;
  cursor: pointer;
  transition: border-color .15s, transform .1s;
  text-align: center;
}

.card-clube:hover { border-color: var(--accent); transform: translateY(-2px); }

.card-clube .escudo {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  margin: 0 auto 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 13px;
  color: #fff;
}

.card-clube .nome { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.card-clube .forca { font-size: 12px; color: var(--text2); }

/* ── Tela principal ── */
.secao-titulo {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--text);
}

/* ── Elenco ── */
.lista-jogadores { display: flex; flex-direction: column; gap: 6px; }

.item-jogador {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.posicao-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 7px;
  border-radius: 4px;
  min-width: 36px;
  text-align: center;
}

.pos-GOL { background: #5c2d00; color: #ffaa77; }
.pos-LD  { background: #003a7b; color: #77aaff; }
.pos-ZAG { background: #00307b; color: #88bbff; }
.pos-LE  { background: #003a7b; color: #77aaff; }
.pos-VOL { background: #1a4a1a; color: #88dd88; }
.pos-MEI { background: #1a5c1a; color: #77dd77; }
.pos-ATA { background: #5c1a1a; color: #ff8888; }

.jogador-nome { flex: 1; font-size: 13px; }

.overall-badge {
  font-weight: 700;
  font-size: 14px;
  min-width: 32px;
  text-align: right;
}

.overall-alto  { color: var(--green); }
.overall-medio { color: var(--yellow); }
.overall-baixo { color: var(--red); }

/* ── Tabela de classificação ── */
.tabela-classificacao {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.tabela-classificacao table {
  width: 100%;
  border-collapse: collapse;
}

.tabela-classificacao th {
  padding: 10px 12px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .5px;
  border-bottom: 1px solid var(--border);
}

.tabela-classificacao td {
  padding: 10px 12px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
}

.tabela-classificacao tr:last-child td { border-bottom: none; }
.tabela-classificacao tr.meu-clube td { background: rgba(79,142,247,.08); }
.tabela-classificacao tr:hover td { background: var(--bg3); }

.td-pos { color: var(--text2); width: 28px; font-size: 12px; }
.td-pts { font-weight: 700; color: var(--accent); }

.escudo-mini {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  font-size: 9px;
  font-weight: 700;
  color: #fff;
  margin-right: 8px;
  vertical-align: middle;
}

/* ── Rodadas / Jogos ── */
.rodadas-container { display: flex; flex-direction: column; gap: 16px; }

.card-rodada {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.rodada-header {
  padding: 10px 14px;
  background: var(--bg3);
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.btn-simular {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  font-weight: 600;
  transition: opacity .15s;
}

.btn-simular:hover { opacity: .85; }
.btn-simular:disabled { opacity: .4; cursor: default; }

.lista-jogos { padding: 8px 0; }

.item-jogo {
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
}

.item-jogo:last-child { border-bottom: none; }

.time-nome { flex: 1; }
.time-nome.direita { text-align: right; }
.time-nome.meu { color: var(--accent); font-weight: 600; }

.placar {
  font-weight: 700;
  font-size: 15px;
  min-width: 48px;
  text-align: center;
  background: var(--bg3);
  padding: 3px 8px;
  border-radius: 6px;
}

.placar.pendente { color: var(--text2); font-size: 11px; font-weight: 400; }
.placar.vitoria  { color: var(--green); }
.placar.derrota  { color: var(--red); }
.placar.empate   { color: var(--yellow); }

/* ── Modal de partida ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}

.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  width: 100%;
  max-width: 480px;
  overflow: hidden;
}

.modal-header {
  background: var(--bg3);
  padding: 20px;
  text-align: center;
}

.modal-placar {
  font-size: 36px;
  font-weight: 700;
  margin: 8px 0 4px;
  letter-spacing: 4px;
}

.modal-times {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text2);
  padding: 0 20px;
}

.modal-eventos {
  padding: 16px 20px;
  max-height: 240px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.evento-item {
  display: flex;
  gap: 10px;
  font-size: 13px;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
}

.evento-minuto { color: var(--text2); min-width: 34px; font-size: 12px; }

.modal-footer { padding: 16px 20px; }

.btn-fechar {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: background .15s;
}

.btn-fechar:hover { background: var(--border); }

/* ── Stats do clube ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  text-align: center;
}

.stat-valor { font-size: 26px; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 11px; color: var(--text2); margin-top: 4px; }

/* ── Utilitários ── */
.hidden { display: none !important; }
.mt16 { margin-top: 16px; }

.btn-primario {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s;
}

.btn-primario:hover { opacity: .85; }

.intro-card h2 { font-size: 26px; margin-bottom: 4px; letter-spacing: -0.5px; }
.intro-sub { color: rgba(255,255,255,0.55); font-size: 13px; margin-bottom: 28px; }

.form-group { text-align: left; margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
.form-group input, .form-group select {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 10px 12px;
  font-size: 14px;
}
.form-group input:focus, .form-group select:focus {
  outline: none;
  border-color: var(--accent);
}

/* ── Lista de técnicos ── */
.lista-tecnicos { display: flex; flex-direction: column; gap: 10px; }

.card-tecnico {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  cursor: pointer;
  transition: border-color .15s, transform .1s;
}
.card-tecnico:hover { border-color: var(--accent); transform: translateY(-1px); }

.tecnico-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}

.tecnico-nome { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
.tecnico-meta { font-size: 12px; color: var(--text2); }
.flag { font-size: 14px; }

.overall-grande {
  font-size: 28px;
  font-weight: 700;
  min-width: 48px;
  text-align: center;
}

.tecnico-stats {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

.tstat {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
}
.tstat-label { color: var(--text2); }
.tstat-val   { font-weight: 600; }

/* ── Card staff técnico ── */
.card-staff-tecnico {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
}

.staff-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 6px;
}

.staff-cargo { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.staff-nome  { font-size: 18px; font-weight: 700; margin-bottom: 3px; }
.staff-meta  { font-size: 12px; color: var(--text2); }

.btn-demitir {
  margin-top: 16px;
  width: 100%;
  background: none;
  border: 1px solid var(--red);
  color: var(--red);
  padding: 8px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  transition: background .15s;
}
.btn-demitir:hover { background: rgba(231,76,60,.1); }

/* ── Vagas de staff ── */
.vagas-staff { margin-top: 8px; }

.vaga-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.vaga-item:last-child { border-bottom: none; }
.vaga-cargo { color: var(--text2); }

.vaga-badge {
  font-size: 11px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 3px 8px;
  border-radius: 20px;
}

/* ── Header atualizado ── */
.header-info-group { display: flex; gap: 16px; align-items: center; font-size: 12px; color: var(--text2); }
.header-info-group strong { color: var(--text); }

.tela-selecao h2 { font-size: 18px; margin-bottom: 6px; }
.tela-selecao .sub { color: var(--text2); margin-bottom: 24px; font-size: 13px; }

/* Técnico atual destacado */
.card-tecnico.tecnico-atual {
  border-color: var(--accent);
  opacity: .7;
  cursor: default;
}
.badge-atual {
  font-size: 10px;
  background: var(--bg-accent, rgba(79,142,247,.15));
  color: var(--accent);
  border: 1px solid var(--accent);
  padding: 2px 7px;
  border-radius: 20px;
  margin-left: 6px;
  vertical-align: middle;
}

/* ── Mercado ── */
.janela-aberta, .janela-fechada {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: 16px;
  background: var(--bg2);
}
.janela-aberta  { border-color: var(--green); }
.janela-fechada { border-color: var(--border); }
.janela-icon { font-size: 20px; }

.budget-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.budget-label { font-size: 12px; color: var(--text2); }
.budget-valor { font-size: 22px; font-weight: 700; color: var(--green); }

.mercado-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
}
.mtab {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  transition: all .15s;
}
.mtab:hover { color: var(--text); border-color: var(--accent); }
.mtab.ativo  { background: var(--accent); color: #fff; border-color: var(--accent); }

.mercado-filtros {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.mercado-filtros select {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 8px 10px;
  font-size: 13px;
  flex: 1;
}

.lista-jogadores-mercado { display: flex; flex-direction: column; gap: 6px; }

.item-mercado {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.mercado-info { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.mercado-jogador { min-width: 0; }
.mercado-nome { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mercado-clube { font-size: 11px; color: var(--text2); margin-top: 2px; }
.mercado-valores { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.mercado-overall { font-size: 15px; font-weight: 700; min-width: 28px; text-align: center; }
.mercado-vm { font-size: 12px; color: var(--text2); min-width: 56px; text-align: right; }

.btn-proposta {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 5px 12px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
.btn-proposta:hover { opacity: .85; }

.sem-budget { font-size: 11px; color: var(--text2); white-space: nowrap; }

.badge-contrato {
  font-size: 10px;
  background: rgba(241,196,15,.15);
  color: var(--yellow);
  border: 1px solid var(--yellow);
  padding: 2px 6px;
  border-radius: 20px;
  margin-left: 4px;
}

.proposta-info { display: flex; flex-direction: column; gap: 6px; }
.proposta-aviso {
  background: rgba(241,196,15,.1);
  border: 1px solid var(--yellow);
  color: var(--yellow);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 12px;
  margin-top: 12px;
}

/* ── Feed de noticias ── */
.feed-noticias { display: flex; flex-direction: column; gap: 8px; }
.noticia-item {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 13px;
}
.noticia-icon { font-size: 16px; flex-shrink: 0; }
.noticia-texto { flex: 1; line-height: 1.5; }
.noticia-rodada { font-size: 11px; color: var(--text2); white-space: nowrap; flex-shrink: 0; }

/* ══════════════════════════════════
   DASHBOARD
══════════════════════════════════ */
.dash-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 10px;
}

.dash-nav-btn {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
  width: 40px;
  height: 40px;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  flex-shrink: 0;
  transition: all .15s;
}
.dash-nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.dash-nav-btn:disabled { opacity: .3; cursor: default; }
.dash-nav-btn.destaque { background: var(--accent); border-color: var(--accent); color: #fff; font-size: 18px; width: 48px; height: 48px; }
.dash-nav-btn.destaque:hover { opacity: .85; }

.dash-evento-info {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
  min-width: 0;
}
.dash-evento-icone { font-size: 28px; flex-shrink: 0; }
.dash-evento-titulo { font-size: 16px; font-weight: 600; }
.dash-evento-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

.temporada-progress {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin-bottom: 16px;
  overflow: hidden;
}
.temporada-bar {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width .4s ease;
}

/* Grid 2x3 */
.dash-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.dash-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  min-height: 160px;
}

.dash-card-titulo {
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.dash-empty {
  font-size: 13px;
  color: var(--text2);
  padding: 8px 0;
}

.dash-ver-mais {
  font-size: 12px;
  color: var(--accent);
  cursor: pointer;
  margin-top: 10px;
  text-align: center;
}
.dash-ver-mais:hover { text-decoration: underline; }

/* ── Mini calendário ── */
.mini-cal { display: flex; flex-direction: column; gap: 4px; }

.cal-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  transition: background .1s;
  color: var(--text2);
}
.cal-item:hover { background: var(--bg3); }
.cal-item.cal-atual { background: rgba(79,142,247,.12); color: var(--text); font-weight: 500; }
.cal-item.cal-passado { opacity: .5; }
.cal-icone { font-size: 14px; flex-shrink: 0; }
.cal-titulo { flex: 1; }
.cal-agora { font-size: 10px; background: var(--accent); color: #fff; padding: 1px 6px; border-radius: 10px; }

/* ── Inbox ── */
.inbox-badge {
  background: var(--red);
  color: #fff;
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 10px;
  font-weight: 700;
}
.inbox-lista { display: flex; flex-direction: column; gap: 4px; }
.inbox-item {
  padding: 8px 10px;
  border-radius: 6px;
  background: var(--bg3);
  cursor: pointer;
  transition: background .1s;
  border-left: 3px solid transparent;
}
.inbox-item:hover { background: var(--border); }
.inbox-item.nao-lida { border-left-color: var(--accent); }
.inbox-remetente { font-size: 11px; color: var(--text2); margin-bottom: 2px; }
.inbox-assunto { font-size: 13px; font-weight: 500; }

/* ── Jogos ── */
.jogos-lista { display: flex; flex-direction: column; gap: 4px; }
.jogos-secao-titulo { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }

.jogo-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 6px;
  background: var(--bg3);
  font-size: 12px;
}
.jogo-item.proximo { opacity: .7; }
.jogo-rodada { color: var(--text2); min-width: 24px; font-size: 11px; }
.jogo-mando {
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 4px;
  background: var(--bg2);
  color: var(--text2);
  border: 1px solid var(--border);
}
.jogo-adv { flex: 1; font-weight: 500; }
.jogo-resultado { font-weight: 700; font-size: 13px; min-width: 32px; text-align: right; }
.jogo-resultado.pendente { color: var(--text2); font-weight: 400; font-size: 11px; }
.res-v { color: var(--green); }
.res-d { color: var(--red); }
.res-e { color: var(--yellow); }

/* ── Mini tabela ── */
.mini-tabela { display: flex; flex-direction: column; gap: 2px; }
.mini-tab-header {
  display: grid;
  grid-template-columns: 24px 1fr 28px 20px 28px;
  gap: 4px;
  font-size: 10px;
  color: var(--text2);
  text-transform: uppercase;
  padding: 0 4px;
  margin-bottom: 4px;
}
.mini-tab-row {
  display: grid;
  grid-template-columns: 24px 1fr 28px 20px 28px;
  gap: 4px;
  font-size: 12px;
  padding: 5px 4px;
  border-radius: 6px;
  align-items: center;
}
.mini-tab-row.mini-tab-eu { background: rgba(79,142,247,.1); font-weight: 600; }
.mini-tab-pos { color: var(--text2); font-size: 11px; }
.mini-tab-nome { display: flex; align-items: center; gap: 4px; overflow: hidden; white-space: nowrap; }
.mini-tab-pts { color: var(--accent); font-weight: 700; }

/* ── Baixas ── */
.baixas-lista { display: flex; flex-direction: column; gap: 6px; }
.baixa-item { display: flex; align-items: center; gap: 8px; }
.baixa-info { flex: 1; }
.baixa-nome { font-size: 13px; font-weight: 500; }
.baixa-detalhe { font-size: 11px; color: var(--text2); margin-top: 2px; }

/* ── Notícias ── */
.noticias-lista { display: flex; flex-direction: column; gap: 6px; max-height: 280px; overflow-y: auto; }
.noticia-dash {
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  line-height: 1.5;
}
.noticia-dash:last-child { border-bottom: none; }
.noticia-dash-texto { color: var(--text); }
.noticia-dash-rodada { font-size: 11px; color: var(--text2); margin-top: 3px; }

/* ── Calendário visual ── */
.cal-visual { display: flex; flex-direction: column; gap: 8px; }

.cal-mes-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 4px;
}
.cal-mes-nome { font-size: 13px; font-weight: 600; }
.cal-mes-btn {
  background: none; border: 1px solid var(--border); color: var(--text);
  width: 24px; height: 24px; border-radius: 6px; cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
}
.cal-mes-btn:hover { border-color: var(--accent); color: var(--accent); }

.cal-dias-semana {
  display: grid; grid-template-columns: repeat(7, 1fr);
  text-align: center; font-size: 10px; color: var(--text2);
  margin-bottom: 4px;
}

.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }

.cal-dia {
  aspect-ratio: 1; border-radius: 6px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; cursor: default;
  font-size: 11px; position: relative; transition: background .1s;
  padding: 2px 0;
}
.cal-dia:hover:not(.vazio):not(.tem-evento) { background: none; }
.cal-dia.vazio { cursor: default; }
.cal-dia.cal-dia-atual {
  background: var(--accent); color: #fff; font-weight: 700;
}
.cal-dia.tem-evento:not(.cal-dia-atual) { background: rgba(79,142,247,.08); }

.cal-dia-num { font-size: 11px; line-height: 1; }
.cal-dots { display: flex; gap: 2px; margin-top: 2px; }
.cal-ev-dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; }

.cal-legenda {
  display: flex; gap: 10px; font-size: 10px; color: var(--text2);
  margin-top: 4px;
}
.cal-legenda span { display: flex; align-items: center; gap: 4px; }

/* ── Tela de jogo ── */
.tela-jogo {
  max-width: 600px; margin: 0 auto; padding: 8px 0;
}
.jogo-screen-header {
  text-align: center; margin-bottom: 24px;
}
.jogo-screen-rodada {
  font-size: 13px; color: var(--text2); font-weight: 500;
  text-transform: uppercase; letter-spacing: .5px;
}

.jogo-confronto {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; margin-bottom: 20px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 16px; padding: 24px 20px;
}
.jogo-time { text-align: center; flex: 1; }
.jogo-escudo {
  width: 64px; height: 64px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 16px; color: #fff;
  margin: 0 auto 10px;
}
.jogo-time-nome { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.jogo-mando-tag { font-size: 11px; color: var(--accent); }
.jogo-forca-tag { font-size: 11px; color: var(--text2); }
.jogo-vs { font-size: 28px; font-weight: 700; color: var(--text2); flex-shrink: 0; }

.jogo-prestats {
  display: flex; justify-content: space-around;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px; margin-bottom: 16px;
}
.prestat { text-align: center; }
.prestat-val { font-size: 20px; font-weight: 700; }
.prestat-label { font-size: 11px; color: var(--text2); margin-top: 3px; }

.outros-jogos {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px; margin-bottom: 20px;
}
.outros-jogos-titulo { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
.outro-jogo {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px;
}
.outro-jogo:last-child { border-bottom: none; }
.outro-time { flex: 1; }
.outro-time:last-child { text-align: right; }
.outro-vs { color: var(--text2); font-size: 11px; }

.jogo-acoes { text-align: center; }
.btn-simular-grande {
  background: var(--accent); color: #fff; border: none;
  padding: 14px 40px; border-radius: 12px; font-size: 16px;
  font-weight: 700; cursor: pointer; transition: opacity .15s;
  width: 100%;
}
.btn-simular-grande:hover { opacity: .85; }

/* ── Tela de resultado ── */
.tela-resultado { max-width: 600px; margin: 0 auto; }
.resultado-titulo {
  font-size: 16px; font-weight: 600; margin-bottom: 16px; text-align: center;
}
.resultados-lista { display: flex; flex-direction: column; gap: 4px; margin-bottom: 20px; }
.resultado-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: 8px;
  background: var(--bg2); border: 1px solid var(--border); font-size: 13px;
}
.resultado-item.resultado-meu { border-color: var(--accent); }
.res-time { flex: 1; font-size: 12px; }
.res-time.direita { text-align: right; }
.res-placar { font-weight: 700; font-size: 15px; min-width: 48px; text-align: center; }
.resultado-tabela-titulo { font-size: 13px; font-weight: 600; margin-bottom: 10px; }

/* ── Dashboard topbar ── */
.dash-topbar {
  display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
}

/* ── Próximos eventos ── */
.proximos-eventos { display: flex; flex-direction: column; gap: 6px; }

.proximo-ev-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px;
  border-radius: 8px;
  cursor: pointer;
  transition: background .1s;
}
.proximo-ev-item:hover { background: var(--bg3); }

.proximo-ev-icone {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.proximo-ev-info { flex: 1; min-width: 0; }
.proximo-ev-titulo { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.proximo-ev-data { font-size: 11px; color: var(--text2); margin-top: 2px; }

/* Baixas em largura total */
.dash-card-full { grid-column: 1 / -1; }

/* ── Grids do dashboard ── */
.dash-grid-top {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}

.dash-grid-bottom {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}

.dash-card-full-row {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 12px;
}

/* Jogos em linha horizontal quando card é largo */
.dash-card-full-row .jogos-lista {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0 24px;
}

.dash-card-full-row .jogos-secao-titulo {
  grid-column: 1 / -1;
}

/* ── Grid 3 colunas ── */
.dash-grid-3col {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}

/* ── Sidebar botões maiores ── */
#sidebar-nav button {
  padding: 13px 14px !important;
  font-size: 14px !important;
  border-radius: 10px !important;
  font-weight: 500 !important;
}

#sidebar-nav button.ativo {
  font-weight: 700 !important;
}

/* ── Save ── */
.save-encontrado {
  background: var(--bg3);
  border: 1px solid var(--accent);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 16px;
  text-align: left;
}
.save-titulo { font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--accent); }
.save-detalhe { font-size: 13px; margin-bottom: 4px; }

.btn-novo-jogo {
  width: 100%;
  background: none;
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 8px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  margin-top: 8px;
  transition: border-color .15s;
}
.btn-novo-jogo:hover { border-color: var(--red); color: var(--red); }

/* Botão salvar na sidebar */
.sidebar-save-btn {
  margin: 8px;
  background: none;
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all .15s;
  width: calc(100% - 16px);
}
.sidebar-save-btn:hover { border-color: var(--green); color: var(--green); }
.sidebar-save-btn.salvo { color: var(--green); border-color: var(--green); }

/* ── Tabela de elenco ── */
.elenco-tabela-wrap {
  overflow-x: auto;
  border-radius: var(--radius);
  border: 1px solid var(--border);
}

.elenco-tabela {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  min-width: 780px;
}

.elenco-tabela thead th {
  padding: 10px 12px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .4px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  cursor: pointer;
  white-space: nowrap;
  user-select: none;
}

.elenco-tabela thead th:hover { color: var(--text); }
.elenco-tabela thead th.col-ativa { color: var(--accent); }

.elenco-tabela tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .1s;
}
.elenco-tabela tbody tr:last-child { border-bottom: none; }
.elenco-tabela tbody tr:hover { background: var(--bg3); }

.elenco-tabela td {
  padding: 9px 12px;
  vertical-align: middle;
}

.col-nome {
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 6px;
}

.col-centro { text-align: center; }

.flag-jogador { font-size: 14px; flex-shrink: 0; display: inline-block; line-height: 1; width: 18px; text-align: center; }

/* ── Grid dashboard com proporção ajustada ── */
.dash-grid-top2 {
  display: grid;
  grid-template-columns: 1.1fr 1fr 1fr;
  gap: 14px;
  margin-bottom: 14px;
  width: 100%;
}

/* Cards da linha de baixo maiores */
.dash-grid-top2 .dash-card {
  min-height: 200px;
}

/* ════════════════════════════════════
   INBOX — tela estilo email
════════════════════════════════════ */
.inbox-screen {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 96px);
}

.inbox-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 14px;
  margin-bottom: 0;
  border-bottom: 1px solid var(--border);
}

.inbox-header-titulo {
  font-size: 18px;
  font-weight: 700;
}

.inbox-count {
  font-size: 13px;
  color: var(--text2);
  font-weight: 400;
}

.btn-marcar-lidas {
  background: none;
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
}
.btn-marcar-lidas:hover { border-color: var(--accent); color: var(--accent); }

.inbox-body {
  display: flex;
  flex: 1;
  overflow: hidden;
  margin-top: 0;
  gap: 0;
}

/* Lista de emails */
.inbox-lista-email {
  width: 280px;
  min-width: 280px;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.inbox-email-item {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
  border-left: 3px solid transparent;
}
.inbox-email-item:hover { background: var(--bg3); }
.inbox-email-item.ativa { background: rgba(79,142,247,.1); border-left-color: var(--accent); }
.inbox-email-item.nao-lida { border-left-color: var(--accent); }
.inbox-email-item.nao-lida .inbox-email-assunto { font-weight: 700; color: var(--text); }

.inbox-email-remetente {
  font-size: 11px;
  color: var(--text2);
  margin-bottom: 3px;
  text-transform: uppercase;
  letter-spacing: .4px;
}
.inbox-email-assunto {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.inbox-email-data {
  font-size: 11px;
  color: var(--text2);
  margin-top: 3px;
}

.inbox-vazio {
  padding: 20px 16px;
  font-size: 13px;
  color: var(--text2);
}

/* Conteúdo do email */
.inbox-email-conteudo {
  flex: 1;
  overflow-y: auto;
  padding: 0;
}

.inbox-selecione {
  padding: 40px 32px;
  font-size: 14px;
  color: var(--text2);
}

.email-view {
  padding: 28px 32px;
  max-width: 100%;
}

.email-view-assunto {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 14px;
  line-height: 1.3;
}

.email-view-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.email-view-de {
  font-size: 13px;
  color: var(--text2);
}
.email-view-de strong { color: var(--text); }

.email-view-data {
  font-size: 12px;
  color: var(--text2);
}

.email-view-separador {
  height: 1px;
  background: var(--border);
  margin-bottom: 24px;
}

.email-view-corpo {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text2);
  white-space: pre-wrap;
}

/* ════════════════════════════════════
   TELA DE JOGO AO VIVO
════════════════════════════════════ */
.jogo-tela { max-width: 100%; }

.jogo-tela-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 20px;
  margin-bottom: 12px;
}

.jogo-tela-rodada { font-size: 12px; color: var(--text2); }

.jogo-tela-placar {
  display: flex;
  align-items: center;
  gap: 12px;
}

.jogo-tela-sigla {
  font-size: 13px;
  font-weight: 700;
  color: var(--text2);
}

.placar-numeros {
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: 4px;
  min-width: 80px;
  text-align: center;
}

.jogo-tela-cronometro {
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
  min-width: 48px;
  text-align: right;
}

/* Stats ao vivo */
.jogo-stats-vivos {
  display: flex;
  justify-content: space-around;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 12px;
}

.stat-vivo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
}

.stat-vivo span:first-child,
.stat-vivo span:last-child {
  font-weight: 700;
  min-width: 36px;
  text-align: center;
}

.stat-vivo span:nth-child(2) {
  font-size: 11px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .5px;
}

.stat-vivo span:first-child { color: var(--accent); }
.stat-vivo span:last-child { color: var(--text2); }

/* Campo tático */
.campo-tatico {
  margin-bottom: 12px;
  border-radius: 10px;
  overflow: hidden;
}

.campo-svg { width: 100%; display: block; }

/* Feed de lances */
.lances-feed {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 12px;
  overflow: hidden;
}

.lances-feed-titulo {
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .5px;
  border-bottom: 1px solid var(--border);
  background: var(--bg3);
}

.lances-lista {
  max-height: 180px;
  overflow-y: auto;
  padding: 6px 0;
}

.lance-vazio {
  padding: 16px 14px;
  color: var(--text2);
  font-size: 13px;
}

.lance-item {
  display: flex;
  gap: 10px;
  padding: 6px 14px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
  animation: fadeInLance .3s ease;
}

.lance-item:last-child { border-bottom: none; }

.lance-gol {
  background: rgba(46,204,113,.08);
  color: var(--green);
  font-weight: 600;
}

.lance-intervalo {
  background: rgba(79,142,247,.06);
  color: var(--accent);
  font-style: italic;
  justify-content: center;
}

.lance-fim {
  background: rgba(79,142,247,.12);
  color: var(--accent);
  font-weight: 700;
  justify-content: center;
}

.lance-min {
  color: var(--text2);
  min-width: 30px;
  font-size: 12px;
  flex-shrink: 0;
}

.lance-texto { flex: 1; }

@keyframes fadeInLance {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Tela resultado com notas */
.resultado-tela { max-width: 900px; margin: 0 auto; }

.resultado-placar-final {
  text-align: center;
  border: 2px solid;
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 24px;
  background: var(--bg2);
}

.res-final-titulo { font-size: 22px; font-weight: 800; letter-spacing: 2px; margin-bottom: 8px; }
.res-final-times  { font-size: 13px; color: var(--text2); margin: 4px 0; }
.res-final-numeros{ font-size: 36px; font-weight: 800; letter-spacing: 6px; margin: 6px 0; }

.notas-titulo {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
}

.notas-grid { display: flex; flex-direction: column; gap: 6px; }

.nota-card {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
}

.nota-card-info { flex: 1; }
.nota-card-nome { font-size: 13px; font-weight: 500; }
.nota-card-stats { font-size: 11px; color: var(--text2); margin-top: 2px; }

.nota-valor {
  font-size: 20px;
  font-weight: 800;
  min-width: 40px;
  text-align: right;
}

/* ── Layout dois painéis no jogo ── */
.jogo-dois-paineis {
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 14px;
  margin-bottom: 12px;
}

.jogo-painel-campo { min-width: 0; }
.jogo-painel-feed {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 540px;
  height: 100%;
}

.jogo-painel-feed .lances-lista {
  flex: 1;
  max-height: none;
  overflow-y: auto;
}

/* Lance substituição */
.lance-sub {
  background: rgba(155,89,182,.08);
  color: #c39bd3;
  font-style: italic;
}

/* Borda colorida por time */
.lance-mandante { border-left: 3px solid #fb9 !important; }
.lance-visitante { border-left: 3px solid #9be !important; }

/* Lances mais espaçados e clean */
.lance-item {
  padding: 7px 10px !important;
  font-size: 12px !important;
  line-height: 1.4 !important;
  border-bottom: 1px solid rgba(255,255,255,.04) !important;
}
.lance-min {
  font-size: 11px !important;
  min-width: 28px !important;
  color: var(--accent) !important;
  font-weight: 700 !important;
}
.lance-gol { font-weight: 700; }

/* Fadiga barra no resultado */
.fadiga-barra-wrap {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 5px;
  overflow: hidden;
}
.fadiga-barra {
  height: 100%;
  border-radius: 2px;
  transition: width .3s;
}

/* ── Financeiro ── */
.fin-tela { max-width: 100%; }
.fin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.fin-caixa { font-size: 14px; color: var(--text2); }

.fin-dre-cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}

.fin-dre-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  text-align: center;
}
.fin-dre-card.receita  { border-color: rgba(46,204,113,.4); }
.fin-dre-card.despesa  { border-color: rgba(231,76,60,.4); }
.fin-dre-card.positivo { border-color: var(--green); }
.fin-dre-card.negativo { border-color: var(--red); }
.fin-dre-card.neutro   { border-color: var(--border); }

.fin-dre-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
.fin-dre-valor { font-size: 20px; font-weight: 700; }
.fin-dre-card.receita .fin-dre-valor  { color: var(--green); }
.fin-dre-card.despesa .fin-dre-valor  { color: var(--red); }
.fin-dre-card.positivo .fin-dre-valor { color: var(--green); }
.fin-dre-card.negativo .fin-dre-valor { color: var(--red); }

.fin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }

.fin-secao { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
.fin-secao-titulo { font-size: 13px; font-weight: 700; margin-bottom: 12px; }
.receita-titulo { color: var(--green); }
.despesa-titulo { color: var(--red); }

.fin-linha { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.fin-linha:last-child { border-bottom: none; }
.fin-linha-desc { color: var(--text2); }
.fin-linha-val { font-weight: 600; }
.receita-cor { color: var(--green); }
.despesa-cor { color: var(--red); }

.fin-historico { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
.fin-tabela { width: 100%; border-collapse: collapse; font-size: 13px; }
.fin-tabela th { padding: 8px; text-align: left; font-size: 11px; color: var(--text2); text-transform: uppercase; border-bottom: 1px solid var(--border); }
.fin-tabela td { padding: 8px; border-bottom: 1px solid var(--border); }
.fin-tabela tr:last-child td { border-bottom: none; }
.fin-tab-rod { color: var(--text2); width: 40px; }
.fin-tab-val { text-align: right; font-weight: 600; }

/* Botão ação jogador */
.btn-acao-jogador {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 4px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  transition: all .15s;
}
.btn-acao-jogador:hover { border-color: var(--accent); color: var(--accent); }

/* ── Ficha do jogador ── */
.ficha-jogador { max-width: 100%; }

.btn-voltar-ficha {
  background: none;
  border: none;
  color: var(--accent);
  font-size: 13px;
  cursor: pointer;
  padding: 0 0 16px 0;
  display: flex;
  align-items: center;
  gap: 4px;
}
.btn-voltar-ficha:hover { text-decoration: underline; }

.ficha-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  margin-bottom: 20px;
}

.ficha-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.ficha-escudo-pos { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.ficha-flag { font-size: 28px; }

.ficha-identidade { flex: 1; }
.ficha-nome { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.ficha-meta { font-size: 13px; color: var(--text2); }

.ficha-overall {
  font-size: 48px;
  font-weight: 800;
  text-align: center;
  min-width: 80px;
}

.ficha-stats {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 12px;
  margin-bottom: 20px;
}
.ficha-stat {
  background: var(--bg3);
  border-radius: 8px;
  padding: 12px;
  text-align: center;
}
.ficha-stat-val   { font-size: 22px; font-weight: 700; }
.ficha-stat-label { font-size: 11px; color: var(--text2); margin-top: 3px; text-transform: uppercase; letter-spacing: .4px; }

.ficha-secao-titulo {
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 10px;
}

.ficha-fadiga-wrap { margin-bottom: 4px; }

.ficha-financeiro { display: flex; flex-direction: column; gap: 8px; }

/* Grid de ações */
.ficha-acoes {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.ficha-acao-bloco {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
}

.ficha-acao-titulo {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 12px;
}

.ficha-acao-form { display: flex; flex-direction: column; gap: 10px; }

/* Linha clicável no elenco */
.elenco-linha-clicavel { cursor: pointer; }
.elenco-linha-clicavel:hover td { background: var(--bg3) !important; }

/* ── Saldo no header ── */
.header-saldo {
  font-size: 13px;
  font-weight: 700;
  color: var(--green);
  background: rgba(46,204,113,.1);
  border: 1px solid rgba(46,204,113,.3);
  padding: 4px 12px;
  border-radius: 20px;
}

/* ── Divisões ── */
.divisoes-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
.div-tab {
  background: var(--bg2); border: 1px solid var(--border); color: var(--text2);
  padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500;
  transition: all .15s;
}
.div-tab:hover { border-color: var(--accent); color: var(--text); }
.div-tab.ativo { background: var(--accent); color: #fff; border-color: var(--accent); }

.divisoes-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; }
.div-tabela-wrap { overflow-x: auto; }
.div-resultados { display: flex; flex-direction: column; gap: 4px; }

/* ── Manager ── */
.manager-tela { max-width: 100%; }
.manager-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 14px;
  padding: 24px; display: flex; align-items: center; gap: 20px; margin-bottom: 20px;
}
.manager-avatar { font-size: 56px; }
.manager-info { flex: 1; }
.manager-nome  { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.manager-meta  { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
.manager-clube { font-size: 13px; color: var(--accent); }
.manager-rep   { text-align: center; }
.manager-rep-val   { font-size: 42px; font-weight: 800; color: var(--accent); }
.manager-rep-label { font-size: 11px; color: var(--text2); text-transform: uppercase; }
.manager-stats { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; margin-bottom: 20px; }
.manager-reputacoes, .manager-titulos {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px; margin-bottom: 16px;
}
.rep-linha {
  display: flex; align-items: center; gap: 10px; padding: 8px 0;
  border-bottom: 1px solid var(--border); font-size: 13px;
}
.rep-linha:last-child { border-bottom: none; }
.rep-icon  { font-size: 18px; flex-shrink: 0; }
.rep-label { flex: 1; color: var(--text2); }
.rep-barra-wrap { width: 120px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.rep-barra { height: 100%; border-radius: 3px; }
.rep-val { min-width: 28px; text-align: right; font-weight: 700; font-size: 12px; }

/* ── Staff ── */
.staff-tela { max-width: 100%; }
.staff-vagas { display: flex; flex-direction: column; gap: 10px; }
.staff-vaga-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 16px; display: flex; align-items: center; gap: 14px;
}
.staff-vaga-icon { font-size: 28px; flex-shrink: 0; }
.staff-vaga-info { flex: 1; }
.staff-vaga-cargo { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.staff-vaga-desc  { font-size: 12px; color: var(--text2); }
.btn-contratar-staff {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text2);
  padding: 7px 14px; border-radius: 8px; font-size: 12px; cursor: not-allowed; white-space: nowrap;
}

/* ── Infraestrutura ── */
.inf-tela { max-width: 100%; }
.inf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; max-width: 1200px; }
.inf-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  padding: 18px; display: flex; gap: 14px; align-items: flex-start;
}
.inf-card-icon { font-size: 32px; flex-shrink: 0; }
.inf-card-info { flex: 1; }
.inf-card-nome { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.inf-card-desc { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
.inf-nivel { display: flex; gap: 4px; margin-bottom: 6px; }
.inf-nivel-pip {
  width: 24px; height: 6px; border-radius: 3px; background: var(--border);
}
.inf-nivel-pip.ativo { background: var(--accent); }
.inf-label-nivel { font-size: 11px; color: var(--text2); }
.inf-card-acao { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
.inf-custo { font-size: 12px; color: var(--text2); }
.inf-btn { padding: 7px 14px; font-size: 12px; white-space: nowrap; }
.inf-max { font-size: 12px; color: var(--green); font-weight: 600; }

.sidebar-sep {
  font-size: 10px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 12px 12px 4px;
  opacity: .6;
}

/* ── Torneios ── */
.torneios-tela { max-width: 100%; }
.torneio-conteudo { margin-top: 4px; }

.torneio-campeao {
  background: linear-gradient(135deg, rgba(241,196,15,.15), rgba(241,196,15,.05));
  border: 1px solid var(--yellow);
  border-radius: 10px;
  padding: 14px 20px;
  font-size: 18px;
  font-weight: 700;
  color: var(--yellow);
  text-align: center;
  margin-bottom: 16px;
}

.torneio-fases {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}

.torneio-fase {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  min-width: 200px;
  flex: 1;
}

.torneio-fase-titulo {
  font-size: 11px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.torneio-jogo {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 4px;
  border-radius: 6px;
  font-size: 12px;
  border-bottom: 1px solid var(--border);
}
.torneio-jogo:last-child { border-bottom: none; }
.torneio-jogo.torneio-meu { background: rgba(79,142,247,.08); }
.torneio-time { flex: 1; color: var(--text2); }
.torneio-time.right { text-align: right; }
.torneio-placar { font-weight: 700; min-width: 32px; text-align: center; font-size: 13px; }
.torneio-placar.pendente { color: var(--text2); font-weight: 400; font-size: 11px; }

/* Libertadores grupos */
.lib-grupos { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
.lib-grupo { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
.lib-grupo-titulo { font-size: 11px; font-weight: 700; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; }
.lib-clube-row {
  display: grid; grid-template-columns: 16px 1fr 24px 20px;
  gap: 4px; font-size: 11px; padding: 4px 2px;
  border-bottom: 1px solid var(--border); align-items: center;
}
.lib-clube-row:last-child { border-bottom: none; }
.lib-clube-row.lib-eu { font-weight: 700; color: var(--accent); }
.lib-clube-row.lib-prom { background: rgba(46,204,113,.06); }
.lib-pos { color: var(--text2); }
.lib-pts { font-weight: 700; text-align: center; }
.lib-j  { color: var(--text2); text-align: center; }

/* Estaduais */
.estaduais-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
.estadual-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px; text-align: center;
}
.estadual-card.estadual-meu { border-color: var(--accent); }
.estadual-nome { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
.estadual-campeao { font-size: 12px; color: var(--yellow); }
.estadual-prog { font-size: 12px; color: var(--text2); }

/* ── Seleção de clube com abas ── */
.selecao-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 20px;
}

.card-clube-valor {
  font-size: 12px;
  font-weight: 700;
  color: var(--green);
  margin-top: 6px;
  padding: 3px 8px;
  background: rgba(46,204,113,.1);
  border: 1px solid rgba(46,204,113,.3);
  border-radius: 20px;
}

.selecao-sem-budget {
  text-align: center;
  padding: 60px 20px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  color: var(--text);
}

/* ── Hub de Torneios ── */
.torneios-hub { display: flex; flex-direction: column; gap: 0; }

.hub-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}

.hub-tab {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 7px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: all .15s;
  white-space: nowrap;
}
.hub-tab:hover { border-color: var(--accent); color: var(--text); }
.hub-tab.ativo { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }

.hub-conteudo { min-height: 200px; }

/* ── Mercado livres ── */
.mercado-livre { border-left: 3px solid var(--green); }
.badge-livre {
  font-size: 10px; background: rgba(46,204,113,.2);
  color: var(--green); padding: 1px 6px; border-radius: 10px;
  font-weight: 600; margin-left: 6px;
}

/* ── Badge status elenco ── */
.badge-venda { font-size:10px;background:rgba(241,196,15,.2);color:var(--yellow);padding:1px 6px;border-radius:10px;font-weight:600; }
.badge-emprestimo { font-size:10px;background:rgba(79,142,247,.2);color:var(--accent);padding:1px 6px;border-radius:10px;font-weight:600; }

/* ── Partida pausada ── */
.partida-pausada-banner {
  background: linear-gradient(135deg, rgba(79,142,247,.2), rgba(79,142,247,.05));
  border: 1px solid var(--accent);
  border-radius: 10px;
  padding: 12px 18px;
  margin-bottom: 14px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: background .15s;
}
.partida-pausada-banner:hover { background: rgba(79,142,247,.25); }

.btn-retomar {
  margin-left: auto;
  background: var(--accent);
  color: #fff;
  padding: 5px 14px;
  border-radius: 8px;
  font-size: 13px;
}

/* ── Artilheiros ── */
.artilheiros-lista { display:flex;flex-direction:column;gap:6px; }
.artilheiro-item {
  display:flex;align-items:center;gap:10px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;padding:8px 12px;font-size:13px;
}
.art-pos { font-size:12px;color:var(--text2);min-width:18px;font-weight:700; }
.art-info { flex:1; }
.art-nome { font-weight:600; }
.art-clube { font-size:11px;color:var(--text2); }
.art-stats { display:flex;gap:8px; }
.art-gols { color:var(--green);font-weight:700; }
.art-assists { color:var(--accent);font-weight:600; }

/* ── Torneio destaque ── */
.hub-tab.meu-torneio {
  border-color: var(--yellow) !important;
  color: var(--yellow) !important;
}
.hub-tab.meu-torneio.ativo {
  background: var(--yellow) !important;
  color: #1a1a1a !important;
}

/* ── Bezinha grupos ── */
.bezinha-grupos-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.bezinha-grupo {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 0;
}
.bezinha-grupo-titulo {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: .5px;
}
.bezinha-tabela {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.bezinha-tabela thead th {
  padding: 5px 8px;
  text-align: left;
  font-size: 10px;
  color: var(--text2);
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}
.bezinha-tabela tbody td {
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.bezinha-tabela tbody tr:last-child td { border-bottom: none; }
.bezinha-tabela tbody tr:hover { background: var(--bg3); }
.bezinha-tabela tbody tr.mini-tab-eu { background: rgba(79,142,247,.08); }

/* ── Rodada resultados (pós-jogo) ── */
.rodada-resultados { display:flex;flex-direction:column;gap:4px;margin-top:8px; }
.rodada-jogo {
  display:flex;align-items:center;gap:8px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;padding:8px 12px;font-size:12px;
}
.rodada-jogo.resultado-meu { border-color:var(--accent);background:rgba(79,142,247,.08); }
.rj-time { flex:1;display:flex;align-items:center;gap:6px;color:var(--text2); }
.rj-time.direita { justify-content:flex-end; }
.rj-placar { font-size:14px;font-weight:700;min-width:48px;text-align:center; }

/* ── Adversário nos próximos eventos ── */
.evento-adv {
  font-size:11px;color:var(--accent);margin-top:3px;
  display:flex;align-items:center;gap:5px;
}

/* ── Sub-tabs do hub ── */
.hub-sub-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.hub-sub-tab {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 5px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: all .15s;
  white-space: nowrap;
}
.hub-sub-tab:hover { border-color: var(--accent); color: var(--text); }
.hub-sub-tab.ativo { background: var(--accent); color: #fff; border-color: var(--accent); }
.hub-sub-tab.meu-torneio { border-color: var(--yellow); color: var(--yellow); }
.hub-sub-tab.meu-torneio.ativo { background: var(--yellow); color: #1a1a1a; }

/* ── Elenco cores por posição ── */
.elenco-legenda {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 12px;
  font-size: 12px;
  color: var(--text2);
}
.legenda-item { display:flex;align-items:center;gap:5px; }
.legenda-cor  { width:12px;height:12px;border-radius:3px;flex-shrink:0; }

/* Linha colorida no elenco */
.elenco-tabela tbody tr { border-left: 3px solid transparent; }
.elenco-tabela tbody tr:hover { filter: brightness(1.15); }

/* Status na coluna */
.status-dot { font-size:14px;cursor:default; }

/* Pos2 badge menor */
.posicao-badge + .posicao-badge {
  margin-left: 3px;
}

/* ── Status ativo na ficha ── */
.ficha-status-ativo {
  background: rgba(46,204,113,.1);
  border: 1px solid var(--green);
  color: var(--green);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 600;
  text-align: center;
}

/* ── Mercado: jogador disponível (à venda/empréstimo) ── */
.item-mercado-disponivel { border-left: 3px solid var(--yellow); }

/* ── Financeiro dívidas ── */
.fin-alerta-divida {
  background: rgba(239,68,68,.1);
  border: 1px solid var(--red);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 13px;
  color: var(--red);
  margin-bottom: 12px;
}
.fin-divida-acao {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 14px;
}
.fin-divida-acao input {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 8px 12px;
  font-size: 14px;
  width: 100%;
}

/* ── Sistema de Receitas ── */
.receita-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 16px;
}
.receita-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.receita-card-header { display:flex;gap:12px;align-items:flex-start; }
.receita-icon { font-size:24px;line-height:1; }
.receita-titulo { font-weight:700;font-size:14px; }
.receita-desc { font-size:11px;color:var(--text2); }
.receita-valores { display:flex;gap:16px; }
.receita-val-item { display:flex;flex-direction:column;gap:2px; }
.receita-val-label { font-size:10px;color:var(--text2);text-transform:uppercase; }
.receita-val { font-size:14px;font-weight:700;color:var(--accent); }
.receita-anual { color:var(--green); }
.receita-info { font-size:11px;color:var(--text2);background:var(--bg3);border-radius:6px;padding:8px 10px;border-left:2px solid var(--accent); }
.receita-total {
  background: var(--bg2);
  border: 1px solid var(--green);
  border-radius: 10px;
  padding: 14px 18px;
  font-size:14px;
  font-weight:600;
}

/* Barra de confiança */
.conf-bar-wrap {
  height: 8px;
  background: var(--bg3);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 16px;
}
.conf-bar { height:100%;border-radius:4px;transition:width .4s; }

/* ── Três painéis da partida ── */
.jogo-tres-paineis {
  display: grid;
  grid-template-columns: 190px 165px minmax(0, 380px) 165px 1fr;
  gap: 8px;
  margin-bottom: 12px;
  align-items: start;
}

/* ── Painel de Stats ao vivo ── */
.jogo-painel-stats {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 10px;
  font-size: 11px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-height: 600px;
  overflow-y: auto;
}
.stats-titulo {
  font-size: 11px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .5px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.stats-posse-wrap {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.stats-posse-barra {
  height: 10px;
  background: var(--bg3);
  border-radius: 5px;
  overflow: hidden;
  display: flex;
}
.stats-posse-man { background: #fb9; border-radius: 5px 0 0 5px; transition: width .5s; }
.stats-posse-vis { background: #9be; border-radius: 0 5px 5px 0; transition: width .5s; }
.stats-posse-labels {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  font-weight: 700;
}
.stats-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 4px;
  font-size: 11px;
}
.stats-row-label { color: var(--text2); font-size: 10px; text-align: center; }
.stats-row-val-man { text-align: left; font-weight: 700; }
.stats-row-val-vis { text-align: right; font-weight: 700; }
.stats-barra-wrap {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.stats-barra-row {
  display: grid;
  grid-template-columns: 24px 1fr 10px 1fr 24px;
  align-items: center;
  gap: 3px;
  font-size: 10px;
}
.stats-barra-man-val { text-align: right; font-weight:700; color:#fb9; }
.stats-barra-vis-val { text-align: left; font-weight:700; color:#9be; }
.stats-barra-bg { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; position: relative; }
.stats-barra-fill-man { height:100%; background:#fb9; position:absolute; right:0; border-radius:3px; transition:width .4s; }
.stats-barra-fill-vis { height:100%; background:#9be; position:absolute; left:0; border-radius:3px; transition:width .4s; }

.stats-eventos { display: flex; flex-direction: column; gap: 4px; }
.stats-evento-item {
  display: flex;
  align-items: flex-start;
  gap: 5px;
  padding: 4px 6px;
  background: var(--bg3);
  border-radius: 5px;
  font-size: 10px;
  line-height: 1.3;
}
.stats-evento-min { color: var(--accent); font-weight: 700; min-width: 22px; font-size: 10px; }
.stats-evento-txt { color: var(--text); flex: 1; }

.jogo-painel-jogadores {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 8px;
  font-size: 11px;
  overflow-y: auto;
  max-height: 600px;
}

.jog-lista-titulo {
  font-weight: 700;
  font-size: 12px;
  margin-bottom: 6px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.jog-lista-header {
  display: grid;
  grid-template-columns: 36px 1fr 28px;
  gap: 4px;
  font-size: 9px;
  color: var(--text2);
  text-transform: uppercase;
  padding: 2px 2px 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2px;
}

.jog-lista-item {
  display: grid;
  grid-template-columns: 36px 1fr 28px;
  gap: 4px;
  align-items: center;
  padding: 3px 2px;
  border-radius: 4px;
  transition: background .1s;
}
.jog-lista-item:hover { background: var(--bg3); }
.jog-lista-item._substituido { opacity: 0.4; text-decoration: line-through; }
.jog-lista-item._titular { }

.jog-mandante { direction: rtl; }
.jog-mandante .jog-nome { direction: ltr; text-align: right; }

.jog-nome {
  font-size: 11px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.jog-ovr {
  font-size: 11px;
  font-weight: 700;
  text-align: center;
}

.jogo-painel-centro {
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-width: 0;
  overflow: hidden;
}

/* ── Substituições nas listas laterais ── */
.jog-saiu {
  opacity: 0.45;
  text-decoration: line-through;
}
.jog-entrou {
  color: var(--green);
  font-weight: 600;
}
.jog-sep-subs {
  font-size: 9px;
  color: var(--text2);
  text-align: center;
  padding: 4px 0 2px;
  border-top: 1px solid var(--border);
  margin-top: 4px;
}

/* ── Cartões no feed ── */
.lance-amarelo { background: rgba(234,179,8,.12); border-left: 3px solid #eab308; }
.lance-vermelho { background: rgba(239,68,68,.12); border-left: 3px solid var(--red); }

/* ── Tela de resultados da rodada ── */
.rodada-jogos-lista { display: flex; flex-direction: column; gap: 6px; margin-bottom: 4px; }
.rodada-jogo-item {
  display: grid;
  grid-template-columns: 1fr 80px 1fr;
  align-items: center;
  padding: 8px 12px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
}
.rodada-jogo-meu { border-color: var(--accent); background: rgba(79,142,247,.08); font-weight: 600; }
.rodada-jogo-placar { text-align: center; font-size: 16px; font-weight: 700; color: var(--accent); }
.rodada-jogo-time { display: flex; align-items: center; gap: 6px; }
.rodada-jogo-time.direita { justify-content: flex-end; flex-direction: row-reverse; }

/* ── Filtros de posição mercado livres ── */
.btn-pos-filter {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 11px;
  cursor: pointer;
  transition: all .15s;
}
.btn-pos-filter:hover { background: var(--bg2); color: var(--text); }

<script>// ── Janelas de transferência do Brasileirão ──
const JANELAS = [
  { nome: "Janela de verão",   inicio: 1,  fim: 6  },
  { nome: "Janela de inverno", inicio: 19, fim: 23 }
];

function janelaAberta(rodada) {
  return JANELAS.find(function(j) { return rodada >= j.inicio && rodada <= j.fim; }) || null;
}

// ── Valor de mercado por overall ──
function calcularValorMercado(overall) {
  if (overall >= 90) return 45000000;
  if (overall >= 87) return 28000000;
  if (overall >= 85) return 18000000;
  if (overall >= 82) return 12000000;
  if (overall >= 80) return 8000000;
  if (overall >= 77) return 5000000;
  if (overall >= 75) return 3000000;
  if (overall >= 72) return 1800000;
  if (overall >= 70) return 1000000;
  if (overall >= 67) return 600000;
  if (overall >= 65) return 350000;
  return 180000;
}

function calcularSalario(valorMercado) {
  return Math.round(valorMercado * 0.004);
}

function calcularClausula(valorMercado, overall) {
  var mult = overall >= 82 ? 2.5 : overall >= 75 ? 2.0 : 1.5;
  return Math.round(valorMercado * mult);
}

function calcularContratoTermino(overall) {
  // Estrelas têm contratos mais longos
  if (overall >= 82) return Math.floor(Math.random() * 20) + 18;
  if (overall >= 75) return Math.floor(Math.random() * 20) + 10;
  return Math.floor(Math.random() * 25) + 5;
}

// ── Inicializar dados financeiros nos jogadores e clubes ──
// Perfis financeiros: nem todo clube "grande" tem caixa saudável,
// e clubes "pequenos" às vezes têm caixa boa por causa de vendas recentes
var PERFIS_FINANCEIROS = {
  flamengo:     { caixa: 35000000, dividas: -180000000 },  // marca grande, dívida histórica alta
  palmeiras:    { caixa: 60000000, dividas: -20000000  },  // gestão equilibrada
  corinthians:  { caixa: 8000000,  dividas: -250000000 },  // dívida gigante, caixa apertado
  saopulo:      { caixa: 15000000, dividas: -90000000  },
  atleticomg:   { caixa: 12000000, dividas: -130000000 },
  internacional:{ caixa: 25000000, dividas: -40000000  },
  gremio:       { caixa: 10000000, dividas: -100000000 },
  botafogo:     { caixa: 40000000, dividas: -15000000  },  // dono forte, sem dívida grande
  bahia:        { caixa: 30000000, dividas: -10000000  },  // boas vendas recentes
  fortaleza:    { caixa: 20000000, dividas: -5000000   },
  cruzeiro:     { caixa: 18000000, dividas: -60000000  },
  fluminense:   { caixa: 14000000, dividas: -70000000  },
  vasco:        { caixa: 9000000,  dividas: -85000000  },
  atleticopr:   { caixa: 22000000, dividas: -35000000  },
  rbbragantino: { caixa: 28000000, dividas: -2000000   },  // investimento estrangeiro
  cuiaba:       { caixa: 6000000,  dividas: -1000000   },
  juventude:    { caixa: 4000000,  dividas: -500000    },
  goias:        { caixa: 5000000,  dividas: -8000000   },
  coritiba:     { caixa: 3500000,  dividas: -12000000  },
  santos:       { caixa: 7000000,  dividas: -95000000  }   // dívida histórica grande, caixa baixo
};

function gerarPerfilFinanceiroGenerico(overallMedioBase) {
  // Para clubes sem perfil definido (divisões B/C/D, paulistas): gerar variação aleatória
  var caixa = Math.round(overallMedioBase * 50000 * (0.5 + Math.random()*1.2));
  var temDividaGrande = Math.random() < 0.3;
  var dividas = temDividaGrande
    ? -Math.round(caixa * (1.5 + Math.random()*2))
    : -Math.round(caixa * (0.1 + Math.random()*0.4));
  return { caixa: caixa, dividas: dividas };
}

function inicializarFinancas() {
  CLUBES.forEach(function(clube) {
    var perfil = PERFIS_FINANCEIROS[clube.id] || gerarPerfilFinanceiroGenerico(75);
    clube.caixa   = perfil.caixa;
    clube.dividas = perfil.dividas; // valor negativo
    clube.budget  = clube.caixa; // budget = caixa disponível (compatibilidade)

    clube.receita_rodada = clube.caixa >= 30000000 ? 2500000 :
                           clube.caixa >= 15000000 ? 1500000 : 700000;

    clube.jogadores.forEach(function(j) {
      if (!j.valor_mercado) {
        j.valor_mercado       = calcularValorMercado(j.overall);
        j.salario             = calcularSalario(j.valor_mercado);
        j.clausula_rescisoria = calcularClausula(j.valor_mercado, j.overall);
        j.contrato_termino    = calcularContratoTermino(j.overall);
        j.clube_id            = clube.id;
      }
    });
  });
}

// Valor de mercado do clube = soma do valor de mercado de todos os jogadores
function calcularValorMercadoClube(clube) {
  if (!clube.jogadores) return 0;
  return clube.jogadores.reduce(function(s, j) { return s + (j.valor_mercado || 0); }, 0);
}

// Patrimônio líquido = caixa + valor de mercado + dívidas (dívidas já é negativo)
function calcularPatrimonioLiquido(clube) {
  return (clube.caixa || clube.budget || 0) + calcularValorMercadoClube(clube) + (clube.dividas || 0);
}

// Pagar parcela de dívida (reduz dívida e caixa simultaneamente)
function pagarParcelaDivida(clube, valor) {
  if (!clube.dividas) return;
  var pagamento = Math.min(valor, Math.abs(clube.dividas));
  clube.caixa = (clube.caixa || clube.budget || 0) - pagamento;
  clube.budget = clube.caixa;
  clube.dividas = (clube.dividas || 0) + pagamento; // se aproxima de 0
}

// ── Formatar moeda ──
function formatarDinheiro(valor) {
  if (valor >= 1000000) return 'R$ ' + (valor / 1000000).toFixed(1) + 'M';
  if (valor >= 1000)    return 'R$ ' + (valor / 1000).toFixed(0) + 'K';
  return 'R$ ' + valor;
}

// ── Avaliar proposta do jogador (retorna {aceita, motivo}) ──
function avaliarProposta(jogador, clubeVendedor, valorProposto) {
  var vm = jogador.valor_mercado;

  // Fim de contrato: sai de graça
  if (jogador.contrato_termino <= estado.rodadaAtual + 6) {
    return { aceita: true, motivo: "Contrato prestes a vencer — clube aceitou liberar." };
  }

  // Abaixo de 80% do valor → recusa automática
  if (valorProposto < vm * 0.8) {
    return { aceita: false, motivo: "Proposta muito abaixo do valor de mercado." };
  }

  // Acima da cláusula → aceita por lei
  if (valorProposto >= jogador.clausula_rescisoria) {
    return { aceita: true, motivo: "Cláusula rescisória ativada — saída garantida por lei." };
  }

  // Entre 80% e cláusula → chance proporcional
  var percentual = (valorProposto - vm * 0.8) / (jogador.clausula_rescisoria - vm * 0.8);
  var chance = 0.15 + percentual * 0.75; // 15% a 90%

  // Ajustes: titular é mais difícil de vender
  var jogadoresClube = clubeVendedor.jogadores.filter(function(j) { return j.posicao === jogador.posicao; });
  jogadoresClube.sort(function(a, b) { return b.overall - a.overall; });
  var eTitular = jogadoresClube[0] && jogadoresClube[0].id === jogador.id;
  if (eTitular) chance -= 0.2;

  // Clube com budget baixo aceita mais fácil
  if (clubeVendedor.budget < 15000000) chance += 0.2;

  chance = Math.max(0.05, Math.min(0.95, chance));

  if (Math.random() < chance) {
    return { aceita: true, motivo: "Proposta aceita pelo clube." };
  } else {
    return { aceita: false, motivo: "Clube recusou a proposta. Tente um valor maior." };
  }
}

// ── Executar transferência ──
function executarTransferencia(jogador, clubeOrigem, clubeDestino, valor) {
  // Remove do clube origem
  clubeOrigem.jogadores = clubeOrigem.jogadores.filter(function(j) { return j.id !== jogador.id; });
  clubeOrigem.budget += valor;

  // Adiciona ao clube destino
  jogador.clube_id = clubeDestino.id;
  jogador.contrato_termino = estado.rodadaAtual + calcularContratoTermino(jogador.overall);
  jogador.clausula_rescisoria = calcularClausula(jogador.valor_mercado, jogador.overall);
  clubeDestino.jogadores.push(jogador);
  clubeDestino.budget -= valor;

  return jogador;
}

// ── IA: clubes decidem quais jogadores colocar à venda/empréstimo ──
function _avaliarClubeParaVendas(clube) {
  if (!clube.jogadores || clube.jogadores.length === 0) return;
  if (clube.id === estado.meuClube.id) return; // não mexe no clube do usuário

  var folhaSalarial = clube.jogadores.reduce(function(s,j){ return s + (j.salario||0); }, 0);
  var caixaBaixo = (clube.budget||0) < folhaSalarial * 3;
  var elencoGrande = clube.jogadores.length > 24;
  var overallMedio = clube.jogadores.reduce(function(s,x){return s+x.overall;},0) / clube.jogadores.length;

  clube.jogadores.forEach(function(j) {
    if (j.a_venda || j.para_emprestimo) return;

    var motivos = [];
    var salarioMedio = folhaSalarial / clube.jogadores.length;

    if (caixaBaixo && j.salario > salarioMedio * 1.3) motivos.push('caixa');
    if (elencoGrande && j.overall < overallMedio - 8) motivos.push('reserva');

    var fimDeCarreira = (j.idade || 25) >= 32 && j.overall < overallMedio - 3;

    if (motivos.length > 0 && Math.random() < 0.12) {
      if (fimDeCarreira || (motivos.indexOf('reserva') >= 0 && Math.random() < 0.4)) {
        j.para_emprestimo = true;
        j.emprestimo_rodadas = 19;
      } else {
        j.a_venda = true;
        j.preco_minimo = Math.round((j.valor_mercado||0) * (0.75 + Math.random()*0.25));
      }
    }
  });
}

function iaDecidirVendasEmprestimos() {
  // Série A
  CLUBES.forEach(_avaliarClubeParaVendas);
  // Séries B, C, D
  (estadoDivisoes.b.clubes||[]).forEach(_avaliarClubeParaVendas);
  (estadoDivisoes.c.clubes||[]).forEach(_avaliarClubeParaVendas);
  (estadoDivisoes.d.clubes||[]).forEach(_avaliarClubeParaVendas);
  // Paulistão A1-A4
  ["a1","a2","a3","a4"].forEach(function(d){
    (estadoPaulista[d] && estadoPaulista[d].clubes || []).forEach(_avaliarClubeParaVendas);
  });
  // Bezinha
  GRUPOS_BEZINHA.forEach(function(g){ g.clubes.forEach(_avaliarClubeParaVendas); });
}

// ── IA: transferências entre clubes durante a janela ──
function simularMercadoIA() {

  var noticias = [];
  var tentativas = 8;

  for (var i = 0; i < tentativas; i++) {
    var idxVendedor  = Math.floor(Math.random() * CLUBES.length);
    var idxComprador = Math.floor(Math.random() * CLUBES.length);
    if (idxVendedor === idxComprador) continue;

    var vendedor  = CLUBES[idxVendedor];
    var comprador = CLUBES[idxComprador];
    if ((comprador.caixa||comprador.budget||0) < 500000) continue;
    if (vendedor.jogadores.length < 18) continue;

    // Escolhe um jogador que o comprador possa pagar
    var candidatos = vendedor.jogadores.filter(function(j) {
      return j.valor_mercado <= (comprador.caixa||comprador.budget||0) * 0.4;
    });
    if (candidatos.length === 0) continue;

    // Priorizar jogadores marcados como à venda (3x mais chance de serem escolhidos)
    var pool = [];
    candidatos.forEach(function(j) {
      var peso = j.a_venda ? 4 : 1;
      for (var p = 0; p < peso; p++) pool.push(j);
    });

    var jogador = pool[Math.floor(Math.random() * pool.length)];
    // Jogadores à venda aceitam ofertas mais próximas (ou abaixo) do valor mínimo
    var multiplicador = jogador.a_venda
      ? (0.75 + Math.random() * 0.35)
      : (0.9 + Math.random() * 0.3);
    var valorBase = jogador.a_venda && jogador.preco_minimo ? jogador.preco_minimo : jogador.valor_mercado;
    var valor = Math.round(valorBase * multiplicador);
    var result = avaliarProposta(jogador, vendedor, valor);

    // Jogadores à venda têm chance extra de aceitar mesmo se a avaliação normal recusaria
    var aceita = result.aceita || (jogador.a_venda && Math.random() < 0.4);

    if (aceita) {
      executarTransferencia(jogador, vendedor, comprador, valor);
      noticias.push({
        tipo: "transferencia",
        texto: jogador.nome + " (" + jogador.overall + ") saiu do " + vendedor.nome + " para o " + comprador.nome + " por " + formatarDinheiro(valor)
      });
    }
  }

  // Empréstimos: jogadores marcados para_emprestimo têm chance de sair temporariamente
  for (var k = 0; k < CLUBES.length; k++) {
    var clubeOrigem = CLUBES[k];
    var emprestaveis = clubeOrigem.jogadores.filter(function(j) { return j.para_emprestimo; });
    emprestaveis.forEach(function(j) {
      if (Math.random() > 0.15) return; // 15% de chance por evento de janela
      var idxDestino = Math.floor(Math.random() * CLUBES.length);
      var destino = CLUBES[idxDestino];
      if (destino.id === clubeOrigem.id) return;
      if ((destino.caixa||destino.budget||0) < j.salario * 4) return;
      // Mover temporariamente (simplificado: registra como emprestado)
      j._emprestado_para = destino.id;
      j._clube_origem_emprestimo = clubeOrigem.id;
      noticias.push({
        tipo: "emprestimo",
        texto: j.nome + " (" + j.overall + ") foi emprestado do " + clubeOrigem.nome + " para o " + destino.nome
      });
      // Remove temporariamente do elenco de origem, adiciona no destino
      clubeOrigem.jogadores = clubeOrigem.jogadores.filter(function(x){ return x.id !== j.id; });
      j.para_emprestimo = false;
      j.a_venda = false;
      destino.jogadores.push(j);
    });
  }

  return noticias;
}

// ── Receita por rodada ──
function processarReceitaRodada(rodadaIdx) {
  CLUBES.forEach(function(clube) {
    // Bilheteria dos jogos em casa
    var jogosEmCasa = estado.calendario[rodadaIdx] ?
      estado.calendario[rodadaIdx].jogos.filter(function(j) { return j.mandanteId === clube.id; }).length : 0;
    clube.caixa = (clube.caixa||clube.budget||0) + jogosEmCasa * clube.receita_rodada;
    clube.budget = clube.caixa;

    // Bônus por colocação (pequeno, por rodada)
    var tabela = calcularTabela(CLUBES, estado.resultados);
    var pos = tabela.findIndex(function(t) { return t.id === clube.id; });
    var bonus = pos===0?500000:pos<4?200000:pos<8?100000:0;
    if (bonus > 0) { clube.caixa = (clube.caixa||clube.budget||0)+bonus; clube.budget=clube.caixa; }
  });
}
